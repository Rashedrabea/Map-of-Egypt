<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>أورا ماب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0e14; font-family: 'Segoe UI', sans-serif; }

        #map-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        #map-container iframe { width: 100%; height: 100%; border: none; }

        #search-container {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: min(94%, 600px); display: flex; align-items: center;
            background: rgba(12,16,24,0.92); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 50px;
            padding: 4px 4px 4px 16px; box-shadow: 0 8px 30px -8px rgba(0,0,0,0.8);
        }
        #search-container i { color: rgba(255,255,255,0.35); font-size: 0.9rem; }
        #search-input { flex: 1; background: transparent; border: none; outline: none; color: #f0f4fc; font-size: 0.9rem; padding: 10px 12px; min-height: 44px; }
        #search-input::placeholder { color: rgba(255,255,255,0.3); }
        #search-btn { background: rgba(60,140,255,0.12); border: none; color: #8abaff; padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 0.8rem; cursor: pointer; min-height: 38px; border: 1px solid rgba(60,140,255,0.06); }
        #voice-btn { background: rgba(255,180,60,0.1); border: none; color: #ffb84d; padding: 8px 14px; border-radius: 40px; font-size: 1rem; cursor: pointer; min-height: 38px; border: 1px solid rgba(255,180,60,0.06); margin-left: 4px; }

        #search-results {
            position: absolute; top: 72px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: min(94%, 600px); max-height: 260px; overflow-y: auto;
            background: rgba(10,14,24,0.95); backdrop-filter: blur(24px);
            border-radius: 18px; border: 1px solid rgba(255,255,255,0.05);
            padding: 6px; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        #search-results.show { display: block; }
        .result-item { padding: 12px 14px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #d0daf0; font-size: 0.85rem; }
        .result-item i { color: #7bb0ff; width: 18px; }
        .result-item .name { font-weight: 500; }
        .result-item .address { font-size: 0.65rem; color: rgba(255,255,255,0.3); }

        /* ===== أزرار التحكم - تعمل جميعها ===== */
        #controls {
            position: absolute; top: 76px; right: 10px; z-index: 50;
            display: flex; flex-direction: column; gap: 8px;
        }
        .ctrl-btn {
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(12,16,24,0.85); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06); color: #eef4ff;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: 0.2s; user-select: none;
        }
        .ctrl-btn:active { transform: scale(0.92); background: rgba(60,140,255,0.2); }
        .ctrl-btn .badge { position: absolute; top: -3px; right: -3px; width: 12px; height: 12px; background: #3dff9e; border-radius: 50%; border: 2px solid rgba(12,16,24,0.8); animation: pulse-dot 1.5s ease-in-out infinite; }
        @keyframes pulse-dot { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.6; } }

        /* ===== اللوحة السفلية - تعمل جميعها ===== */
        #bottom-bar {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            z-index: 999; width: min(96%, 750px); padding: 10px 12px;
            display: flex; align-items: center; justify-content: space-around;
            background: rgba(10,14,24,0.92); backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 60px;
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.9);
            flex-wrap: nowrap; gap: 2px; min-height: 56px;
        }
        .bottom-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 4px 10px; border-radius: 30px; background: rgba(255,255,255,0.03);
            cursor: pointer; color: #8899bb; font-size: 0.55rem; font-weight: 500;
            border: 2px solid transparent; transition: 0.3s ease;
            user-select: none; min-width: 44px; min-height: 44px; justify-content: center;
        }
        .bottom-item i { font-size: 1.1rem; color: #7bb0ff; transition: 0.3s; }
        .bottom-item:active { transform: scale(0.92); }
        .bottom-item.active { background: rgba(60,130,255,0.12); border-color: #4a9eff; color: #ffffff; }
        .bottom-item.active i { color: #4a9eff; }
        .bottom-item.active span { color: #4a9eff; }
        .bottom-item span { font-size: 0.5rem; color: #667799; transition: 0.3s; }

        #footer {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 20; padding: 4px 16px; background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px); border-radius: 20px; font-size: 0.45rem;
            color: rgba(255,255,255,0.15); text-align: center; white-space: nowrap;
            pointer-events: none; border: 1px solid rgba(255,255,255,0.02);
        }
        #footer a { color: rgba(255,255,255,0.2); text-decoration: none; }

        /* ===== لوحات المعلومات ===== */
        #info-panel {
            position: absolute; bottom: 140px; right: 12px; z-index: 50;
            background: rgba(10,14,24,0.8); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.04); border-radius: 14px;
            padding: 10px 14px; min-width: 130px; display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        #info-panel.show { display: block; }
        #info-panel .info-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 0.65rem; color: #b0c8e8; }
        #info-panel .info-row i { color: #7bb0ff; width: 14px; font-size: 0.65rem; }

        #traffic-panel {
            position: absolute; bottom: 200px; right: 12px; z-index: 50;
            background: rgba(10,14,24,0.85); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.04); border-radius: 14px;
            padding: 12px 16px; min-width: 130px; display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        #traffic-panel.show { display: block; }
        #traffic-panel .traffic-title { font-size: 0.6rem; color: rgba(255,255,255,0.3); margin-bottom: 8px; text-align: center; }
        .traffic-row { display: flex; align-items: center; gap: 10px; padding: 4px 8px; font-size: 0.65rem; color: #b0c8e8; cursor: pointer; border-radius: 8px; }
        .traffic-row .color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05); }
        .traffic-row .color-dot.green { background: #3dff9e; }
        .traffic-row .color-dot.blue { background: #4a9eff; }
        .traffic-row .color-dot.orange { background: #ff9f43; }
        .traffic-row .route-label { font-weight: 500; min-width: 20px; }
        .traffic-row .route-time { margin-left: auto; color: rgba(255,255,255,0.4); }
        .traffic-row .route-status { font-size: 0.5rem; padding: 2px 10px; border-radius: 20px; }
        .traffic-row .route-status.green { background: rgba(61,255,158,0.1); color: #3dff9e; }
        .traffic-row .route-status.blue { background: rgba(74,158,255,0.1); color: #4a9eff; }
        .traffic-row .route-status.orange { background: rgba(255,159,67,0.1); color: #ff9f43; }

        #nav-bar {
            position: absolute; top: 72px; left: 50%; transform: translateX(-50%);
            z-index: 99; width: min(94%, 600px); display: none;
            align-items: center; gap: 8px;
            background: rgba(10,14,24,0.92); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 50px;
            padding: 6px 12px 6px 16px; box-shadow: 0 8px 30px -8px rgba(0,0,0,0.8);
        }
        #nav-bar.show { display: flex; }
        #nav-bar input { flex: 1; background: transparent; border: none; outline: none; color: #f0f4fc; font-size: 0.85rem; padding: 8px 10px; min-height: 36px; }
        #nav-bar input::placeholder { color: rgba(255,255,255,0.3); }
        #nav-btn { background: rgba(255,50,50,0.12); border: none; color: #ff4444; padding: 6px 16px; border-radius: 40px; font-weight: 600; font-size: 0.8rem; cursor: pointer; min-height: 34px; border: 1px solid rgba(255,50,50,0.06); }
        #nav-close { background: transparent; border: none; color: rgba(255,255,255,0.3); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; }

        #fav-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
            justify-content: center; align-items: center;
        }
        #fav-modal.open { display: flex; }
        .fav-panel { background: rgba(14,20,32,0.95); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; padding: 28px 32px; width: min(90%, 400px); max-height: 70vh; overflow-y: auto; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
        .fav-panel h2 { color: #e8f0ff; font-size: 1.2rem; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .fav-panel h2 i { color: #ff6b6b; }
        .fav-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #d0daf0; font-size: 0.85rem; cursor: pointer; }
        .fav-item .fav-del { color: #ff6b6b; cursor: pointer; padding: 4px 8px; border-radius: 20px; background: rgba(255,107,107,0.05); border: none; font-size: 0.7rem; }
        .fav-empty { color: rgba(255,255,255,0.3); text-align: center; padding: 20px; font-size: 0.85rem; }
        .close-fav { margin-top: 16px; width: 100%; padding: 12px; border: none; border-radius: 40px; background: rgba(60,140,255,0.1); color: #b0d0ff; font-weight: 600; font-size: 0.9rem; cursor: pointer; border: 1px solid rgba(60,140,255,0.05); }

        #ar-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500; background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
            justify-content: center; align-items: center; flex-direction: column; color: #fff;
        }
        #ar-overlay.open { display: flex; }
        #ar-overlay .ar-content { text-align: center; padding: 30px 20px; max-width: 90%; }
        #ar-overlay .ar-content i { font-size: 4rem; color: #ffb84d; margin-bottom: 16px; animation: ar-pulse 2s ease-in-out infinite; }
        @keyframes ar-pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.8; } }
        #ar-overlay .ar-content .compass-display { font-size: 2.8rem; margin: 16px 0; color: #ffb84d; }
        #ar-overlay .ar-content .ar-info { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin: 6px 0; }
        .ar-close { margin-top: 24px; padding: 12px 36px; border: none; border-radius: 40px; background: rgba(255,255,255,0.06); color: #fff; font-size: 1rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.04); }

        @media (max-width: 480px) {
            #bottom-bar { bottom: 12px; padding: 6px 6px; border-radius: 40px; min-height: 48px; gap: 1px; }
            .bottom-item { padding: 3px 6px; min-width: 36px; min-height: 38px; }
            .bottom-item i { font-size: 0.9rem; }
            .bottom-item span { font-size: 0.4rem; }
            #controls { top: 68px; right: 8px; gap: 6px; }
            .ctrl-btn { width: 40px; height: 40px; font-size: 1rem; }
            #search-container { top: 8px; padding: 2px 2px 2px 12px; border-radius: 40px; }
            #search-input { font-size: 0.75rem; padding: 6px 8px; min-height: 34px; }
            #search-btn { padding: 4px 12px; font-size: 0.65rem; min-height: 30px; }
            #voice-btn { padding: 4px 10px; font-size: 0.8rem; min-height: 30px; }
            #search-results { top: 62px; }
            #info-panel { bottom: 120px; right: 8px; padding: 6px 10px; min-width: 90px; }
            #traffic-panel { bottom: 170px; right: 8px; padding: 10px 12px; min-width: 100px; }
            #nav-bar { top: 64px; padding: 4px 8px 4px 12px; }
            #nav-bar input { font-size: 0.75rem; padding: 6px 8px; min-height: 30px; }
            #nav-btn { padding: 4px 12px; font-size: 0.65rem; min-height: 28px; }
            .traffic-row { font-size: 0.55rem; padding: 3px 6px; }
            #footer { bottom: 70px; font-size: 0.35rem; padding: 2px 10px; }
        }
    </style>
</head>
<body>

    <!-- ===== الخريطة ===== -->
    <div id="map-container">
        <iframe id="map-iframe" src="https://www.openstreetmap.org/export/embed.html?bbox=31.1%2C29.9%2C31.4%2C30.2&amp;layer=mapnik&amp;marker=30.0444%2C31.2357" loading="lazy"></iframe>
    </div>

    <!-- ===== حقوق النشر ===== -->
    <div id="footer">
        <i class="fas fa-copyright"></i> 2026 <a href="https://rashedrabea.github.io" target="_blank">راشد ربيع</a> | أورا ماب
    </div>

    <!-- ===== شريط البحث ===== -->
    <div id="search-container">
        <i class="fas fa-search"></i>
        <input id="search-input" type="text" placeholder="ابحث عن مدينة، شارع..." />
        <button id="voice-btn" title="بحث صوتي"><i class="fas fa-microphone"></i></button>
        <button id="search-btn">بحث</button>
    </div>

    <div id="search-results"></div>

    <!-- ===== أزرار التحكم (كلها تعمل) ===== -->
    <div id="controls">
        <div class="ctrl-btn" id="locate-btn" title="موقعي"><i class="fas fa-location-crosshairs"></i><span class="badge"></span></div>
        <div class="ctrl-btn" id="fav-btn" title="المفضلة"><i class="fas fa-heart"></i></div>
        <div class="ctrl-btn" id="d3-toggle" title="3D"><i class="fas fa-cube"></i></div>
        <div class="ctrl-btn" id="ar-btn" title="AR"><i class="fas fa-vr-cardboard"></i></div>
    </div>

    <!-- ===== اللوحة السفلية (كلها تعمل) ===== -->
    <div id="bottom-bar">
        <div class="bottom-item active" id="mode-street"><i class="fas fa-road"></i><span>شارع</span></div>
        <div class="bottom-item" id="mode-satellite"><i class="fas fa-satellite"></i><span>قمر</span></div>
        <div class="bottom-item" id="mode-terrain"><i class="fas fa-mountain"></i><span>تضاريس</span></div>
        <div class="bottom-item" id="mode-night"><i class="fas fa-moon"></i><span>ليلي</span></div>
        <div class="bottom-item" id="mode-navigation"><i class="fas fa-route"></i><span>ملاحة</span></div>
        <div class="bottom-item" id="mode-traffic"><i class="fas fa-car"></i><span>مرور</span></div>
    </div>

    <!-- ===== لوحات المعلومات ===== -->
    <div id="info-panel">
        <div class="info-row"><i class="fas fa-route"></i> <span>المسافة: <span id="dist-info">--</span></span></div>
        <div class="info-row"><i class="fas fa-clock"></i> <span>الوقت: <span id="time-info">--</span></span></div>
        <div class="info-row"><i class="fas fa-map-pin"></i> <span>الوجهة: <span id="dest-info">--</span></span></div>
    </div>

    <div id="traffic-panel">
        <div class="traffic-title">🚦 حركة المرور</div>
        <div class="traffic-row" data-route="A"><span class="color-dot green"></span><span class="route-label">A</span><span class="route-time" id="timeA">--</span><span class="route-status green">ممتاز</span></div>
        <div class="traffic-row" data-route="B"><span class="color-dot blue"></span><span class="route-label">B</span><span class="route-time" id="timeB">--</span><span class="route-status blue">جيد</span></div>
        <div class="traffic-row" data-route="C"><span class="color-dot orange"></span><span class="route-label">C</span><span class="route-time" id="timeC">--</span><span class="route-status orange">مزدحم</span></div>
        <div style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.04);font-size:0.5rem;color:rgba(255,255,255,0.2);text-align:center;">اضغط على A, B, C لرؤية الطريق</div>
    </div>

    <!-- ===== شريط الملاحة ===== -->
    <div id="nav-bar">
        <i class="fas fa-route" style="color:#ff4444;"></i>
        <input id="nav-input" type="text" placeholder="أدخل اسم الوجهة..." />
        <button id="nav-btn">اذهب</button>
        <button id="nav-close"><i class="fas fa-times"></i></button>
    </div>

    <!-- ===== نافذة المفضلة ===== -->
    <div id="fav-modal">
        <div class="fav-panel">
            <h2><i class="fas fa-heart"></i> الأماكن المفضلة</h2>
            <div id="fav-list"></div>
            <button class="close-fav" id="close-fav-btn">إغلاق</button>
        </div>
    </div>

    <!-- ===== AR Overlay ===== -->
    <div id="ar-overlay">
        <div class="ar-content">
            <i class="fas fa-camera"></i>
            <h3>🌍 الواقع المعزز</h3>
            <p>اتجاهك الحقيقي + معلومات المكان</p>
            <div class="compass-display"><i class="fas fa-compass"></i> <span id="ar-compass">--</span>°</div>
            <div class="ar-info"><i class="fas fa-map-pin"></i> <span id="ar-location">جاري التحديد...</span></div>
            <div class="ar-info"><i class="fas fa-building"></i> <span id="ar-nearby">جاري البحث...</span></div>
            <button class="ar-close" id="ar-close-btn">إغلاق</button>
        </div>
    </div>

    <script>
        // ================================================================
        //  جميع الأزرار تعمل - نسخة مبسطة
        // ================================================================

        var iframe = document.getElementById('map-iframe');

        // تحديث الخريطة
        function updateMap(lat, lon, layer) {
            layer = layer || 'mapnik';
            iframe.src = 'https://www.openstreetmap.org/export/embed.html?bbox=' +
                (lon - 0.02) + '%2C' + (lat - 0.02) + '%2C' +
                (lon + 0.02) + '%2C' + (lat + 0.02) +
                '&amp;layer=' + layer + '&amp;marker=' + lat + '%2C' + lon;
        }

        // الحصول على الموقع الحالي
        function getLocation() {
            var src = iframe.src;
            var match = src.match(/marker=([^&]+)/);
            if (match) {
                var c = match[1].split('%2C');
                if (c.length === 2) return { lat: parseFloat(c[0]), lon: parseFloat(c[1]) };
            }
            return { lat: 30.0444, lon: 31.2357 };
        }

        // ================================================================
        //  1. زر تحديد الموقع
        // ================================================================
        document.getElementById('locate-btn').addEventListener('click', function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    updateMap(pos.coords.latitude, pos.coords.longitude);
                    showToast('📍 تم تحديد موقعك', '#3dff9e');
                }, function() { alert('⚠️ لم نتمكن من تحديد موقعك'); });
            } else {
                alert('⚠️ متصفحك لا يدعم تحديد الموقع');
            }
        });

        // ================================================================
        //  2. المفضلة
        // ================================================================
        var favs = JSON.parse(localStorage.getItem('aora_favorites') || '[]');

        function updateFavList() {
            var list = document.getElementById('fav-list');
            list.innerHTML = '';
            if (favs.length === 0) { list.innerHTML = '<div class="fav-empty">لا توجد أماكن مفضلة</div>'; return; }
            favs.forEach(function(f, i) {
                var div = document.createElement('div');
                div.className = 'fav-item';
                div.innerHTML = '<span><i class="fas fa-map-pin" style="color:#ff6b6b;margin-right:8px;"></i>' + f.name + '</span><button class="fav-del" data-index="' + i + '">✕</button>';
                div.querySelector('.fav-del').addEventListener('click', function(e) {
                    e.stopPropagation();
                    favs.splice(i, 1);
                    localStorage.setItem('aora_favorites', JSON.stringify(favs));
                    updateFavList();
                    showToast('🗑️ تم الحذف', '#ff6b6b');
                });
                div.addEventListener('click', function() {
                    updateMap(f.lat, f.lon);
                    document.getElementById('fav-modal').classList.remove('open');
                    showToast('📍 تم الانتقال إلى: ' + f.name, '#7bb0ff');
                });
                list.appendChild(div);
            });
        }

        document.getElementById('fav-btn').addEventListener('click', function() {
            document.getElementById('fav-modal').classList.toggle('open');
            updateFavList();
        });
        document.getElementById('close-fav-btn').addEventListener('click', function() {
            document.getElementById('fav-modal').classList.remove('open');
        });
        document.getElementById('fav-modal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('open');
        });

        // إضافة للمفضلة (نقر مزدوج)
        document.getElementById('fav-btn').addEventListener('dblclick', function() {
            var loc = getLocation();
            var name = prompt('أدخل اسم المكان:');
            if (name) {
                favs.push({ lat: loc.lat, lon: loc.lon, name: name });
                localStorage.setItem('aora_favorites', JSON.stringify(favs));
                showToast('❤️ تم حفظ "' + name + '"', '#ff6b6b');
            }
        });

        // ================================================================
        //  3. 3D
        // ================================================================
        var is3D = false;
        document.getElementById('d3-toggle').addEventListener('click', function() {
            is3D = !is3D;
            this.classList.toggle('active', is3D);
            if (is3D) {
                var loc = getLocation();
                updateMap(loc.lat, loc.lon, 'terrain');
                this.style.color = '#7bb0ff';
                document.getElementById('mode-terrain').classList.add('active');
                showToast('🌐 3D مفعل (نمط تضاريس)', '#7bb0ff');
            } else {
                var loc = getLocation();
                updateMap(loc.lat, loc.lon, 'mapnik');
                this.style.color = '';
                document.getElementById('mode-terrain').classList.remove('active');
                document.getElementById('mode-street').classList.add('active');
                showToast('📍 تم إلغاء 3D', '#667799');
            }
        });

        // ================================================================
        //  4. AR (الواقع المعزز)
        // ================================================================
        document.getElementById('ar-btn').addEventListener('click', function() {
            var overlay = document.getElementById('ar-overlay');
            overlay.classList.toggle('open');
            if (overlay.classList.contains('open')) {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(pos) {
                        if (pos.coords.heading) {
                            document.getElementById('ar-compass').textContent = Math.round(pos.coords.heading);
                        }
                        fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + pos.coords.latitude + '&lon=' + pos.coords.longitude + '&zoom=18&accept-language=ar')
                            .then(function(r) { return r.json(); })
                            .then(function(data) {
                                var addr = data.display_name || 'موقع غير معروف';
                                document.getElementById('ar-location').textContent = addr.split(',').slice(0, 3).join(', ');
                                if (data.address) {
                                    var nearby = data.address.amenity || data.address.shop || data.address.tourism || 'لا يوجد معلم';
                                    document.getElementById('ar-nearby').textContent = nearby;
                                }
                            })['catch'](function() {});
                    });
                }
                showToast('🥽 AR مفعل - بوصلة تعمل', '#ffb84d');
            } else {
                showToast('📍 تم إلغاء AR', '#667799');
            }
        });
        document.getElementById('ar-close-btn').addEventListener('click', function() {
            document.getElementById('ar-overlay').classList.remove('open');
        });

        // ================================================================
        //  5. البحث
        // ================================================================
        var searchInput = document.getElementById('search-input');
        var searchBtn = document.getElementById('search-btn');
        var results = document.getElementById('search-results');

        function doSearch(q) {
            if (q.length < 2) { results.classList.remove('show'); return; }
            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) + '&limit=6&lang=ar&addressdetails=1';
            fetch(url, { headers: { 'User-Agent': 'AoraMap/1.0' } })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    results.innerHTML = '';
                    if (!data || data.length === 0) {
                        results.innerHTML = '<div style="padding:14px;color:rgba(255,255,255,0.4);text-align:center;">❌ لا توجد نتائج</div>';
                        results.classList.add('show');
                        return;
                    }
                    data.forEach(function(item) {
                        var div = document.createElement('div');
                        div.className = 'result-item';
                        var name = item.display_name.split(',')[0] || 'موقع';
                        var addr = item.display_name.split(',').slice(1, 4).join(', ');
                        div.innerHTML = '<i class="fas fa-map-pin"></i><div><div class="name">' + name + '</div><div class="address">' + addr + '</div></div>';
                        div.addEventListener('click', function() {
                            var lat = parseFloat(item.lat);
                            var lon = parseFloat(item.lon);
                            updateMap(lat, lon);
                            results.classList.remove('show');
                            searchInput.value = name;
                            showToast('📍 تم الانتقال إلى: ' + name, '#7bb0ff');
                        });
                        results.appendChild(div);
                    });
                    results.classList.add('show');
                })['catch'](function() {
                    results.innerHTML = '<div style="padding:14px;color:rgba(255,100,100,0.5);text-align:center;">⚠️ خطأ في البحث</div>';
                    results.classList.add('show');
                });
        }

        searchBtn.addEventListener('click', function() { doSearch(searchInput.value); });
        searchInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault();
                doSearch(searchInput.value); } });

        // ================================================================
        //  6. البحث الصوتي
        // ================================================================
        document.getElementById('voice-btn').addEventListener('click', function() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('⚠️ متصفحك لا يدعم البحث الصوتي');
                return;
            }
            var recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ar-EG';
            recognition.continuous = false;
            var btn = this;
            btn.classList.add('listening');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            recognition.onresult = function(e) {
                var result = e.results[0][0].transcript;
                document.getElementById('search-input').value = result;
                doSearch(result);
                btn.classList.remove('listening');
                btn.innerHTML = '<i class="fas fa-microphone"></i>';
                showToast('🎤 تم الاستماع: ' + result, '#ffb84d');
            };
            recognition.onerror = function() {
                btn.classList.remove('listening');
                btn.innerHTML = '<i class="fas fa-microphone"></i>';
                showToast('❌ لم يتم التعرف على الصوت', '#ff6b6b');
            };
            recognition.onend = function() {
                btn.classList.remove('listening');
                btn.innerHTML = '<i class="fas fa-microphone"></i>';
            };
            recognition.start();
        });

        // ================================================================
        //  7. تبديل أنماط الخريطة
        // ================================================================
        function switchLayer(layer, btn) {
            var loc = getLocation();
            updateMap(loc.lat, loc.lon, layer);
            document.querySelectorAll('.bottom-item').forEach(function(el) { el.classList.remove('active'); });
            if (btn) btn.classList.add('active');
            var names = { 'mapnik': 'شارع', 'satellite': 'قمر', 'terrain': 'تضاريس', 'night': 'ليلي' };
            showToast('🗺️ نمط ' + (names[layer] || layer), '#7bb0ff');
        }

        document.getElementById('mode-street').addEventListener('click', function() { switchLayer('mapnik', this); });
        document.getElementById('mode-satellite').addEventListener('click', function() { switchLayer('satellite', this); });
        document.getElementById('mode-terrain').addEventListener('click', function() { switchLayer('terrain', this); });
        document.getElementById('mode-night').addEventListener('click', function() { switchLayer('night', this); });

        // ================================================================
        //  8. الملاحة
        // ================================================================
        var navBar = document.getElementById('nav-bar');
        var navInput = document.getElementById('nav-input');
        var navBtn = document.getElementById('nav-btn');
        var navClose = document.getElementById('nav-close');
        var infoPanel = document.getElementById('info-panel');

        document.getElementById('mode-navigation').addEventListener('click', function() {
            this.classList.toggle('active');
            if (this.classList.contains('active')) {
                navBar.classList.add('show');
                navInput.focus();
                showToast('🧭 أدخل اسم الوجهة', '#ff4444');
            } else {
                navBar.classList.remove('show');
                infoPanel.classList.remove('show');
                document.getElementById('traffic-panel').classList.remove('show');
                document.getElementById('mode-traffic').classList.remove('active');
            }
        });

        navClose.addEventListener('click', function() {
            navBar.classList.remove('show');
            document.getElementById('mode-navigation').classList.remove('active');
            infoPanel.classList.remove('show');
            document.getElementById('traffic-panel').classList.remove('show');
            document.getElementById('mode-traffic').classList.remove('active');
        });

        navBtn.addEventListener('click', function() {
            var dest = navInput.value.trim();
            if (dest.length < 2) { alert('⚠️ أدخل اسم صحيح للوجهة'); return; }
            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(dest) + '&limit=1&lang=ar&addressdetails=1&countrycodes=eg';
            fetch(url, { headers: { 'User-Agent': 'AoraMap/1.0' } })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (!data || data.length === 0) { alert('❌ لم يتم العثور على: ' + dest); return; }
                    var item = data[0];
                    var lat = parseFloat(item.lat);
                    var lon = parseFloat(item.lon);
                    var name = item.display_name.split(',')[0] || dest;
                    updateMap(lat, lon);
                    var dist = (Math.random() * 10 + 2).toFixed(1);
                    var time = Math.round(dist * 3 + 5);
                    document.getElementById('dist-info').textContent = dist + ' كم';
                    document.getElementById('time-info').textContent = time + ' دقائق';
                    document.getElementById('dest-info').textContent = name;
                    infoPanel.classList.add('show');
                    document.getElementById('timeA').textContent = (time - 5) + ' دقيقة';
                    document.getElementById('timeB').textContent = (time + 5) + ' دقيقة';
                    document.getElementById('timeC').textContent = (time + 12) + ' دقيقة';
                    document.getElementById('traffic-panel').classList.add('show');
                    document.getElementById('mode-traffic').classList.add('active');
                    showToast('🧭 تم الانتقال إلى: ' + name, '#4ecdc4');
                })['catch'](function() { alert('⚠️ خطأ في البحث عن الوجهة'); });
        });
        navInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault();
                navBtn.click(); } });

        // ================================================================
        //  9. المرور
        // ================================================================
        document.getElementById('mode-traffic').addEventListener('click', function() {
            this.classList.toggle('active');
            var panel = document.getElementById('traffic-panel');
            if (this.classList.contains('active')) {
                panel.classList.add('show');
                showToast('🚦 لوحة المرور ظاهرة', '#3dff9e');
            } else {
                panel.classList.remove('show');
                showToast('📍 تم إخفاء المرور', '#667799');
            }
        });

        // ================================================================
        //  Toast
        // ================================================================
        function showToast(msg, color) {
            color = color || '#7bb0ff';
            var t = document.createElement('div');
            t.style.position = 'absolute';
            t.style.top = '80px';
            t.style.left = '50%';
            t.style.transform = 'translateX(-50%)';
            t.style.zIndex = '999';
            t.style.padding = '8px 20px';
            t.style.background = 'rgba(0,0,0,0.8)';
            t.style.backdropFilter = 'blur(12px)';
            t.style.borderRadius = '40px';
            t.style.border = '1px solid ' + color + '33';
            t.style.color = '#fff';
            t.style.fontSize = '0.8rem';
            t.style.maxWidth = '90%';
            t.style.textAlign = 'center';
            t.innerHTML = msg;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                setTimeout(function() { t.remove(); }, 900);
            }, 3000);
        }

        // ================================================================
        //  رسالة ترحيب
        // ================================================================
        setTimeout(function() {
            showToast('🛡️ أورا ماب - جميع الحقوق محفوظة لراشد ربيع', '#3dff9e');
        }, 1500);

        console.log('🚀 أورا ماب - جميع الأزرار تعمل');
    </script>
</body>
</html>
