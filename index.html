    <title>أورا ماب – خريطة بدون إنترنت</title>

    <!-- ===== Leaflet ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js">
    </script>

    <!-- ===== Font Awesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0e14;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* ===== الخريطة ===== */
        #map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: #1a1f2e;
        }

        /* ===== حالة الاتصال ===== */
        #status-bar {
            position: fixed;
            top: 76px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.6rem;
            color: #fff;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
        }

        #status-bar.online {
            border-color: rgba(61, 255, 158, 0.15);
            color: #3dff9e;
        }

        #status-bar.offline {
            border-color: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
        }

        /* ===== زر التخزين المؤقت ===== */
        #cache-btn {
            position: fixed;
            bottom: 85px;
            left: 12px;
            z-index: 50;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(12, 16, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #eef4ff;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            transition: 0.2s;
            user-select: none;
        }

        #cache-btn:active {
            transform: scale(0.92);
        }

        #cache-btn .cache-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            background: #ffb84d;
            border-radius: 50%;
            border: 2px solid rgba(12, 16, 24, 0.8);
            font-size: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 700;
        }

        /* ===== شريط البحث ===== */
        #search-container {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(94%, 600px);
            display: flex;
            align-items: center;
            background: rgba(12, 16, 24, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px;
            padding: 4px 4px 4px 16px;
            box-shadow: 0 8px 30px -8px rgba(0, 0, 0, 0.8);
        }

        #search-container i {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.9rem;
        }

        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4fc;
            font-size: 0.9rem;
            padding: 10px 12px;
            min-height: 44px;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #search-btn {
            background: rgba(60, 140, 255, 0.12);
            border: none;
            color: #8abaff;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            min-height: 38px;
            border: 1px solid rgba(60, 140, 255, 0.06);
            transition: 0.2s;
        }

        #search-btn:active {
            background: rgba(60, 140, 255, 0.25);
        }

        /* ===== زر البحث الصوتي ===== */
        #voice-btn {
            background: rgba(255, 180, 60, 0.1);
            border: none;
            color: #ffb84d;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            min-height: 38px;
            border: 1px solid rgba(255, 180, 60, 0.06);
            transition: 0.2s;
            margin-left: 4px;
        }

        #voice-btn:active {
            background: rgba(255, 180, 60, 0.2);
        }

        #voice-btn.listening {
            background: rgba(255, 50, 50, 0.15);
            border-color: rgba(255, 50, 50, 0.2);
            animation: pulse-voice 1s ease-in-out infinite;
        }

        @keyframes pulse-voice {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* ===== نتائج البحث ===== */
        #search-results {
            position: fixed;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(94%, 600px);
            max-height: 260px;
            overflow-y: auto;
            background: rgba(10, 14, 24, 0.95);
            backdrop-filter: blur(24px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px;
            display: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        #search-results.show {
            display: block;
        }

        .result-item {
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d0daf0;
            font-size: 0.85rem;
            transition: 0.15s;
        }

        .result-item:active {
            background: rgba(255, 255, 255, 0.06);
        }

        .result-item i {
            color: #7bb0ff;
            width: 18px;
        }

        .result-item .name {
            font-weight: 500;
        }

        .result-item .address {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* ===== أزرار التحكم الجانبية ===== */
        #controls {
            position: fixed;
            top: 76px;
            right: 10px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(12, 16, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #eef4ff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            position: relative;
            transition: 0.2s;
            user-select: none;
        }

        .ctrl-btn:active {
            transform: scale(0.92);
        }

        .ctrl-btn.active {
            background: rgba(60, 140, 255, 0.2);
            border-color: rgba(60, 140, 255, 0.15);
            box-shadow: 0 0 30px rgba(60, 140, 255, 0.1);
        }

        .ctrl-btn .badge {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 12px;
            height: 12px;
            background: #3dff9e;
            border-radius: 50%;
            border: 2px solid rgba(12, 16, 24, 0.8);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }
        }

        /* ===== اللوحة السفلية ===== */
        #bottom-bar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: min(96%, 700px);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: rgba(10, 14, 24, 0.92);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.9);
            flex-wrap: nowrap;
            gap: 2px;
            min-height: 56px;
        }

        .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            color: #8899bb;
            font-size: 0.55rem;
            font-weight: 500;
            border: 2px solid transparent;
            transition: 0.3s ease;
            user-select: none;
            min-width: 44px;
            min-height: 44px;
            justify-content: center;
        }

        .bottom-item i {
            font-size: 1.1rem;
            color: #7bb0ff;
            transition: 0.3s;
        }

        .bottom-item:active {
            transform: scale(0.92);
        }

        .bottom-item.active {
            background: rgba(60, 130, 255, 0.12);
            border-color: #4a9eff;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(60, 130, 255, 0.12);
        }

        .bottom-item.active i {
            color: #4a9eff;
        }

        .bottom-item.active span {
            color: #4a9eff;
        }

        .bottom-item span {
            font-size: 0.5rem;
            color: #667799;
            transition: 0.3s;
        }

        /* ===== باقي الأنماط (مختصرة للاختصار) ===== */
        #d3-indicator {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            padding: 5px 16px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
            align-items: center;
            gap: 8px;
        }

        #traffic-indicator {
            position: fixed;
            bottom: 140px;
            right: 12px;
            z-index: 50;
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 80px;
        }

        #traffic-indicator.show {
            display: flex;
        }

        .traffic-green {
            color: #3dff9e;
        }
        .traffic-yellow {
            color: #ffb84d;
        }
        .traffic-red {
            color: #ff6b6b;
        }

        #ar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 500;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
        }

        #ar-overlay.open {
            display: flex;
        }

        #ar-overlay .ar-content {
            text-align: center;
            padding: 30px 20px;
            max-width: 90%;
        }

        #ar-overlay .ar-content i {
            font-size: 4rem;
            color: #ffb84d;
            margin-bottom: 16px;
            animation: ar-pulse 2s ease-in-out infinite;
        }

        @keyframes ar-pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.08);
                opacity: 0.8;
            }
        }

        #ar-overlay .ar-content .compass-display {
            font-size: 2.8rem;
            margin: 16px 0;
            color: #ffb84d;
        }

        #ar-overlay .ar-content .ar-info {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            margin: 6px 0;
        }

        .ar-close {
            margin-top: 24px;
            padding: 12px 36px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        #memory-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
        }

        #memory-modal.open {
            display: flex;
        }

        .memory-panel {
            background: rgba(14, 20, 32, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 28px 32px;
            width: min(90%, 400px);
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
        }

        .memory-panel h2 {
            color: #e8f0ff;
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .memory-panel h2 i {
            color: #ffb84d;
        }

        .memory-item {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: #d0daf0;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .memory-item:active {
            background: rgba(255, 255, 255, 0.03);
        }

        .memory-item i {
            color: #ffb84d;
        }

        .memory-item .memory-date {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            margin-left: auto;
        }

        .memory-empty {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }

        .close-memory {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            background: rgba(60, 140, 255, 0.1);
            color: #b0d0ff;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid rgba(60, 140, 255, 0.05);
        }

        .close-memory:active {
            background: rgba(60, 140, 255, 0.2);
        }

        .memory-add {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .memory-add input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: #f0f4fc;
            font-size: 0.85rem;
            outline: none;
        }

        .memory-add input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .memory-add button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            background: rgba(255, 180, 60, 0.1);
            color: #ffb84d;
            cursor: pointer;
            border: 1px solid rgba(255, 180, 60, 0.06);
        }

        .memory-add button:active {
            background: rgba(255, 180, 60, 0.2);
        }

        /* ===== مؤشرات GPS والبحث ===== */
        .user-marker {
            width: 22px;
            height: 22px;
            background: #3dff9e;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(61, 255, 158, 0.5);
            border: 3px solid rgba(255, 255, 255, 0.15);
            animation: pulse-gps 1.5s ease-in-out infinite;
            position: relative;
        }

        .user-marker::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 7px;
            height: 7px;
            background: #3dff9e;
            border-radius: 50%;
        }

        @keyframes pulse-gps {
            0% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(61, 255, 158, 0.5), 0 0 80px rgba(61, 255, 158, 0.1);
            }
            100% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.3);
            }
        }

        .search-marker {
            width: 30px;
            height: 30px;
            background: #ff6b6b;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.4);
            border: 3px solid #fff;
            position: relative;
        }

        .search-marker::after {
            content: '';
            position: absolute;
            top: 9px;
            left: 9px;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            transform: rotate(45deg);
        }

        /* ===== 3D Buildings ===== */
        .building-3d {
            position: absolute;
            background: rgba(140, 155, 175, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 2px;
            pointer-events: none;
            z-index: 1;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            #cache-btn:active {
            transform: scale(0.92);
        }

            gap: 8px;
            padding: 3px 0;
            font-size: 0.65rem;
            color: #b0c8e8;
        }

        #info-panel .info-row i {
            color: #7bb0ff;
            width: 14px;
            font-size: 0.65rem;
        }

        /* ===== نافذة المفضلة ===== */
        #favorites-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
        }

        #favorites-modal.open {
            display: flex;
        }

        .favorites-panel {
            background: rgba(14, 20, 32, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 28px 32px;
            width: min(90%, 400px);
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
        }

        .favorites-panel h2 {
            color: #e8f0ff;
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .favorites-panel h2 i {
            color: #ff6b6b;
        }

        .fav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: #d0daf0;
            font-size: 0.85rem;
        }

        .fav-item .fav-del {
            color: #ff6b6b;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(255, 107, 107, 0.05);
            border: none;
            font-size: 0.7rem;
        }

        .fav-item .fav-del:active {
            background: rgba(255, 107, 107, 0.15);
        }

        .fav-empty {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }

        .close-fav {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            background: rgba(60, 140, 255, 0.1);
            color: #b0d0ff;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid rgba(60, 140, 255, 0.05);
        }

        .close-fav:active {
            background: rgba(60, 140, 255, 0.2);
        }

        /* ===== Leaflet ===== */
        .leaflet-control-attribution {
            display: none !important;
        }
        .leaflet-control-zoom {
            display: none !important;
        }
        .leaflet-tile-pane {
            filter: saturate(1.05) contrast(1.02);
        }

        /* ===== استجابة ===== */
        @media (max-width: 480px) {
            #bottom-bar {
                bottom: 12px;
                padding: 6px 6px;
                border-radius: 40px;
                min-height: 48px;
                gap: 1px;
            }

            .bottom-item {
                padding: 3px 6px;
                min-width: 36px;
                min-height: 38px;
            }

            .bottom-item i {
                font-size: 0.9rem;
            }

            .bottom-item span {
                font-size: 0.4rem;
            }

            #controls {
                top: 68px;
                right: 8px;
                gap: 6px;
            }

            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            #search-container {
                top: 8px;
                padding: 2px 2px 2px 12px;
                border-radius: 40px;
            }

            #search-input {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-height: 34px;
            }

            #search-btn {
                padding: 4px 12px;
                font-size: 0.65rem;
                min-height: 30px;
            }

            #voice-btn {
                padding: 4px 10px;
                font-size: 0.8rem;
                min-height: 30px;
            }

            #search-results {
                top: 62px;
            }

            #info-panel {
                bottom: 75px;
                right: 8px;
                padding: 6px 10px;
                min-width: 70px;
            }

            #info-panel .info-row {
                font-size: 0.5rem;
            }

            #d3-indicator {
                bottom: 75px;
                padding: 3px 12px;
                font-size: 0.5rem;
            }

            #traffic-indicator {
                bottom: 120px;
                right: 8px;
                padding: 6px 10px;
                font-size: 0.5rem;
            }

            .favorites-panel {
                padding: 20px 16px;
                width: 94%;
            }
        }
    </style>
</head>
<body>

    <!-- ===== الخريطة ===== -->
    <div id="map"></div>

    <!-- ===== شريط البحث ===== -->
    <div id="search-container">
        <i class="fas fa-search"></i>
        <input id="search-input" type="text" placeholder="ابحث عن مدينة، شارع..." autocomplete="off" />
        <button id="voice-btn" title="بحث صوتي"><i class="fas fa-microphone"></i></button>
        <button id="search-btn">بحث</button>
    </div>

    <!-- ===== نتائج البحث ===== -->
    <div id="search-results"></div>

    <!-- ===== أزرار التحكم ===== -->
    <div id="controls">
        <div class="ctrl-btn" id="locate-btn" title="موقعي">
            <i class="fas fa-location-crosshairs"></i>
            <span class="badge"></span>
        </div>
        <div class="ctrl-btn" id="favorites-btn" title="المفضلة">
            <i class="fas fa-heart"></i>
        </div>
        <div class="ctrl-btn" id="d3-toggle" title="3D">
            <i class="fas fa-cube"></i>
        </div>
        <div class="ctrl-btn" id="ar-btn" title="AR">
            <i class="fas fa-vr-cardboard"></i>
        </div>
        <div class="ctrl-btn" id="share-btn" title="مشاركة">
            <i class="fas fa-share-alt"></i>
        </div>
    </div>

    <!-- ===== اللوحة السفلية ===== -->
    <div id="bottom-bar">
        <div class="bottom-item active" id="mode-street">
            <i class="fas fa-road"></i>
            <span>شارع</span>
        </div>
        <div class="bottom-item" id="mode-satellite">
            <i class="fas fa-satellite"></i>
            <span>قمر</span>
        </div>
        <div class="bottom-item" id="mode-terrain">
            <i class="fas fa-mountain"></i>
            <span>تضاريس</span>
        </div>
        <div class="bottom-item" id="mode-night">
            <i class="fas fa-moon"></i>
            <span>ليلي</span>
        </div>
        <div class="bottom-item" id="mode-navigation">
            <i class="fas fa-route"></i>
            <span>ملاحة</span>
        </div>
        <div class="bottom-item" id="mode-traffic">
            <i class="fas fa-car"></i>
            <span>مرور</span>
        </div>
    </div>

    <!-- ===== مؤشرات ===== -->
    <div id="d3-indicator">
        <i class="fas fa-cube"></i> وضع 3D مفعل
    </div>

    <div id="traffic-indicator">
        <div class="traffic-row">
            <i class="fas fa-circle traffic-green"></i>
            <span>الطريق A: <span id="traffic-road1">25 دقيقة</span></span>
        </div>
        <div class="traffic-row">
            <i class="fas fa-circle traffic-yellow"></i>
            <span>الطريق B: <span id="traffic-road2">32 دقيقة</span></span>
        </div>
        <div class="traffic-row">
            <i class="fas fa-circle traffic-red"></i>
            <span>الطريق C: <span id="traffic-road3">45 دقيقة</span></span>
        </div>
    </div>

    <!-- ===== لوحة المعلومات ===== -->
    <div id="info-panel">
        <div class="info-row">
            <i class="fas fa-route"></i>
            <span>المسافة: <span id="distance-info">--</span></span>
        </div>
        <div class="info-row">
            <i class="fas fa-clock"></i>
            <span>الوقت: <span id="time-info">--</span></span>
        </div>
        <div class="info-row">
            <i class="fas fa-map-pin"></i>
            <span>الوجهة: <span id="location-info">--</span></span>
        </div>
    </div>

    <!-- ===== نافذة المفضلة ===== -->
    <div id="favorites-modal">
        <div class="favorites-panel">
            <h2><i class="fas fa-heart"></i> الأماكن المفضلة</h2>
            <div id="favorites-list"></div>
            <button class="close-fav" id="close-fav-btn">إغلاق</button>
        </div>
    </div>

    <!-- ===== AR Overlay ===== -->
    <div id="ar-overlay">
        <div class="ar-content">
            <i class="fas fa-camera"></i>
            <h3>🌍 الواقع المعزز</h3>
            <p>اتجاهك الحقيقي + معلومات المكان</p>
            <div class="compass-display">
                <i class="fas fa-compass"></i>
                <span id="ar-compass">--</span>°
            </div>
            <div class="ar-info">
                <i class="fas fa-map-pin"></i> <span id="ar-location">جاري التحديد...</span>
            </div>
            <div class="ar-info">
                <i class="fas fa-building"></i> <span id="ar-nearby">جاري البحث...</span>
            </div>
            <div class="ar-info">
                <i class="fas fa-route"></i> الاتجاه: <span id="ar-direction">--</span>
            </div>
            <button class="ar-close" id="ar-close-btn">إغلاق</button>
        </div>
    </div>

    <script>
        // ================================================================
        //  تهيئة الخريطة - مع التأكد من الحجم الكامل
        // ================================================================
        function initMap() {
            if (typeof L === 'undefined') {
                document.getElementById('map').innerHTML =
                    '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#667799;flex-direction:column;gap:10px;font-size:1rem;">' +
                    '<i class="fas fa-spinner fa-spin" style="font-size:2rem;color:#7bb0ff;"></i>' +
                    'جاري تحميل الخريطة...' +
                    '</div>';
                setTimeout(initMap, 1000);
                return;
            }

            // التأكد من أن الخريطة تأخذ كامل الشاشة
            var mapElement = document.getElementById('map');
            mapElement.style.width = '100vw';
            mapElement.style.height = '100vh';
            mapElement.style.position = 'fixed';
            mapElement.style.top = '0';
            mapElement.style.left = '0';

            var map = L.map('map', {
                center: [30.0444, 31.2357],
                zoom: 13,
                zoomControl: true,
            });

            // طبقات الخريطة
            var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            var satelliteLayer = L.tileLayer(
                'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    maxZoom: 19
                });

            var terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });

            var nightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });

            var currentLayer = streetLayer;

            // ================================================================
            //  تبديل الأنماط
            // ================================================================
            function switchLayer(layer, btn) {
                if (currentLayer) map.removeLayer(currentLayer);
                currentLayer = layer;
                map.addLayer(layer);
                document.querySelectorAll('.bottom-item').forEach(function(el) {
                    el.classList.remove('active');
                });
                if (btn) btn.classList.add('active');
                showToast('🗺️ تم تغيير النمط', '#7bb0ff');
            }

            document.getElementById('mode-street').addEventListener('click', function() {
                switchLayer(streetLayer, this);
            });
            document.getElementById('mode-satellite').addEventListener('click', function() {
                switchLayer(satelliteLayer, this);
            });
            document.getElementById('mode-terrain').addEventListener('click', function() {
                switchLayer(terrainLayer, this);
            });
            document.getElementById('mode-night').addEventListener('click', function() {
                switchLayer(nightLayer, this);
            });

            // ================================================================
            //  الوضع الليلي التلقائي
            // ================================================================
            function autoNightMode() {
                var hour = new Date().getHours();
                if (hour < 6 || hour > 18) {
                    var nightBtn = document.getElementById('mode-night');
                    nightBtn.click();
                    document.getElementById('mode-night').classList.add('active');
                    showToast('🌙 الوضع الليلي التلقائي مفعل', '#667799');
                }
            }
            setTimeout(autoNightMode, 2000);

            // ================================================================
            //  GPS
            // ================================================================
            var userMarker = null,
                userCircle = null,
                userPos = null;

            function createUserIcon() {
                return L.divIcon({
                    className: 'user-marker',
                    iconSize: [22, 22],
                    iconAnchor: [11, 11],
                    html: '<div></div>'
                });
            }

            function updateLocation(pos) {
                var lat = pos.coords.latitude;
                var lng = pos.coords.longitude;
                var acc = pos.coords.accuracy || 30;
                userPos = [lat, lng];

                fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng +
                        '&zoom=18&accept-language=ar')
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        var addr = data.display_name || 'موقع غير معروف';
                        document.getElementById('ar-location').textContent = addr.split(',').slice(0, 3).join(', ');
                        if (data.address) {
                            var nearby = data.address.amenity || data.address.shop || data.address.tourism ||
                                'لا يوجد معلم';
                            document.getElementById('ar-nearby').textContent = nearby;
                            if (pos.coords.heading) {
                                var dirs = ['شمال', 'شمال شرق', 'شرق', 'جنوب شرق', 'جنوب', 'جنوب غرب', 'غرب',
                                    'شمال غرب'
                                ];
                                var idx = Math.round(pos.coords.heading / 45) % 8;
                                document.getElementById('ar-direction').textContent = dirs[idx] || '--';
                            }
                        }
                    })['catch'](function() {});

                if (userMarker) {
                    userMarker.setLatLng([lat, lng]);
                    if (userCircle) userCircle.setLatLng([lat, lng]);
                } else {
                    var icon = createUserIcon();
                    userMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                    userCircle = L.circle([lat, lng], {
                        radius: acc,
                        color: '#3dff9e',
                        fillColor: '#3dff9e',
                        fillOpacity: 0.06,
                        weight: 1.5,
                        opacity: 0.5,
                    }).addTo(map);
                }

                if (pos.coords.heading) {
                    document.getElementById('ar-compass').textContent = Math.round(pos.coords.heading);
                }
                document.getElementById('locate-btn').style.color = '#3dff9e';
                showToast('📍 تم تحديد موقعك', '#3dff9e');
            }

            function locateUser() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(updateLocation, function() {
                        alert('⚠️ لم نتمكن من تحديد موقعك');
                    }, { enableHighAccuracy: true });
                    navigator.geolocation.watchPosition(updateLocation, null, { enableHighAccuracy: true });
                }
            }
            locateUser();

            document.getElementById('locate-btn').addEventListener('click', function() {
                if (userPos) {
                    map.flyTo(userPos, 16, { duration: 1.2 });
                    document.getElementById('locate-btn').style.color = '#3dff9e';
                    setTimeout(function() { document.getElementById('locate-btn').style.color = ''; }, 1000);
                } else {
                    locateUser();
                    showToast('⏳ جاري تحديد موقعك...', '#ffb84d');
                }
            });

            // ================================================================
            //  البحث الصوتي
            // ================================================================
            var voiceBtn = document.getElementById('voice-btn');

            voiceBtn.addEventListener('click', function() {
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    showToast('⚠️ متصفحك لا يدعم البحث الصوتي', '#ff6b6b');
                    return;
                }

                var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                var recognition = new SpeechRecognition();
                recognition.lang = 'ar-EG';
                recognition.continuous = false;
                recognition.interimResults = false;

                voiceBtn.classList.add('listening');
                voiceBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

                recognition.onresult = function(event) {
                    var result = event.results[0][0].transcript;
                    document.getElementById('search-input').value = result;
                    doSearch(result);
                    voiceBtn.classList.remove('listening');
                    voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                    showToast('🎤 تم الاستماع: ' + result, '#ffb84d');
                };

                recognition.onerror = function() {
                    voiceBtn.classList.remove('listening');
                    voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                    showToast('❌ لم يتم التعرف على الصوت', '#ff6b6b');
                };

                recognition.onend = function() {
                    voiceBtn.classList.remove('listening');
                    voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                };

                recognition.start();
            });

            // ================================================================
            //  البحث
            // ================================================================
            var searchInput = document.getElementById('search-input');
            var searchBtn = document.getElementById('search-btn');
            var results = document.getElementById('search-results');
            var searchMarker = null,
                searchCircle = null,
                searchTimeout = null;

            function clearSearch() {
                if (searchMarker) { map.removeLayer(searchMarker);
                    searchMarker = null; }
                if (searchCircle) { map.removeLayer(searchCircle);
                    searchCircle = null; }
            }

            function addSearch(lat, lng, name) {
                clearSearch();
                var icon = L.divIcon({
                    className: 'search-marker',
                    iconSize: [30, 30],
                    iconAnchor: [15, 30],
                    html: '<div></div>'
                });
                searchMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                searchMarker.bindPopup('📍 ' + name);
                searchCircle = L.circle([lat, lng], { radius: 50, color: '#ff6b6b', fillColor: '#ff6b6b',
                    fillOpacity: 0.05, weight: 2 }).addTo(map);
                map.flyTo([lat, lng], 16, { duration: 1.2 });
                setTimeout(function() { if (searchMarker) searchMarker.openPopup(); }, 500);
                showToast('📍 تم الانتقال إلى: ' + name, '#7bb0ff');
            }

            function doSearch(q) {
                if (q.length < 2) {
                    results.classList.remove('show');
                    return;
                }

                var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) +
                    '&limit=6&lang=ar&addressdetails=1';

                fetch(url, {
                    headers: { 'User-Agent': 'AoraMap/1.0' }
                })
                .then(function(response) {
                    if (!response.ok) throw new Error('Network error');
                    return response.json();
                })
                .then(function(data) {
                    results.innerHTML = '';
                    if (!data || data.length === 0) {
                        results.innerHTML =
                            '<div style="padding:14px;color:rgba(255,255,255,0.4);text-align:center;">❌ لا توجد نتائج</div>';
                        results.classList.add('show');
                        return;
                    }

                    data.forEach(function(item) {
                        var div = document.createElement('div');
                        div.className = 'result-item';
                        var name = item.display_name.split(',')[0] || 'موقع';
                        var addr = item.display_name.split(',').slice(1, 4).join(', ');
                        div.innerHTML =
                            '<i class="fas fa-map-pin"></i><div><div class="name">' + name +
                            '</div><div class="address">' + addr + '</div></div>';
                        div.addEventListener('click', function() {
                            var lat = parseFloat(item.lat);
                            var lon = parseFloat(item.lon);
                            addSearch(lat, lon, name);
                            results.classList.remove('show');
                            searchInput.value = name;
                        });
                        results.appendChild(div);
                    });
                    results.classList.add('show');
                })
                ['catch'](function(error) {
                    console.error('Search error:', error);
                    results.innerHTML =
                        '<div style="padding:14px;color:rgba(255,100,100,0.5);text-align:center;">⚠️ خطأ في البحث<br><button onclick="doSearch(\'' +
                        q + '\')" style="margin-top:8px;padding:6px 16px;background:rgba(60,140,255,0.15);border:1px solid rgba(60,140,255,0.1);border-radius:20px;color:#8abaff;cursor:pointer;">إعادة المحاولة</button></div>';
                    results.classList.add('show');
                });
            }

            searchBtn.addEventListener('click', function() { doSearch(searchInput.value); });

            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    doSearch(searchInput.value);
                }
            });

            searchInput.addEventListener('input', function() {
                if (searchTimeout) clearTimeout(searchTimeout);
                var q = searchInput.value.trim();
                if (q.length === 0) {
                    results.classList.remove('show');
                    clearSearch();
                    return;
                }
                if (q.length >= 2) {
                    searchTimeout = setTimeout(function() { doSearch(q); }, 500);
                }
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('#search-container') && !e.target.closest('#search-results')) {
                    results.classList.remove('show');
                }
            });

            // ================================================================
            //  الملاحة
            // ================================================================
            var navMode = false,
                routeLine = null,
                routeMarkers = [];

            function calcRoute(sLat, sLng, eLat, eLng) {
                var url = 'https://router.project-osrm.org/route/v1/driving/' + sLng + ',' + sLat + ';' + eLng + ',' +
                    eLat +
                    '?overview=full&geometries=geojson';
                return fetch(url)
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        if (d.code === 'Ok' && d.routes && d.routes.length > 0) {
                            return d.routes[0];
                        }
                        return null;
                    })['catch'](function() { return null; });
            }

            function drawRoute(route, dest) {
                if (routeLine) {
                    map.removeLayer(routeLine);
                    routeLine = null;
                }
                routeMarkers.forEach(function(m) { map.removeLayer(m); });
                routeMarkers = [];

                if (!route) return;

                var coords = route.geometry.coordinates.map(function(c) { return [c[1], c[0]]; });

                routeLine = L.polyline(coords, {
                    color: '#ff1111',
                    weight: 7,
                    opacity: 0.95,
                    lineJoin: 'round',
                    lineCap: 'round',
                }).addTo(map);

                var sIcon = L.divIcon({
                    html: '<div style="background:#00ff44;border-radius:50%;width:20px;height:20px;border:3px solid #fff;box-shadow:0 0 25px rgba(0,255,68,0.6);"></div>',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });
                routeMarkers.push(L.marker([coords[0][0], coords[0][1]], { icon: sIcon }).addTo(map).bindPopup(
                    '🟢 البداية'));

                var eIcon = L.divIcon({
                    html: '<div style="background:#ff2222;border-radius:50%;width:20px;height:20px;border:3px solid #fff;box-shadow:0 0 25px rgba(255,34,34,0.6);"></div>',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });
                routeMarkers.push(L.marker([coords[coords.length - 1][0], coords[coords.length - 1][1]], { icon: eIcon })
                    .addTo(map).bindPopup('🔴 ' + dest));

                var dist = (route.distance / 1000).toFixed(1);
                var time = Math.round(route.duration / 60);
                document.getElementById('distance-info').textContent = dist + ' كم';
                document.getElementById('time-info').textContent = time + ' دقائق';
                document.getElementById('location-info').textContent = dest;
                document.getElementById('info-panel').classList.add('show');

                var bounds = L.latLngBounds(coords);
                map.fitBounds(bounds, { padding: [60, 60], maxZoom: 15 });

                updateTraffic(time);

                showToast('🔴 المسافة: ' + dist + ' كم - ' + time + ' دقائق', '#ff3333');
            }

            document.getElementById('mode-navigation').addEventListener('click', function() {
                navMode = !navMode;
                this.classList.toggle('active', navMode);

                if (navMode) {
                    if (!userPos) {
                        alert('⚠️ حدد موقعك أولاً');
                        navMode = false;
                        this.classList.remove('active');
                        return;
                    }

                    var dest = prompt('📍 أدخل اسم الوجهة:');
                    if (!dest) {
                        navMode = false;
                        this.classList.remove('active');
                        return;
                    }

                    var searchUrl = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(
                        dest) +
                        '&limit=1&lang=ar&addressdetails=1';

                    fetch(searchUrl, {
                        headers: { 'User-Agent': 'AoraMap/1.0' }
                    })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (!data || data.length === 0) {
                            alert('⚠️ لم يتم العثور على: ' + dest);
                            navMode = false;
                            document.getElementById('mode-navigation').classList.remove('active');
                            return;
                        }

                        var lat = parseFloat(data[0].lat);
                        var lon = parseFloat(data[0].lon);

                        calcRoute(userPos[0], userPos[1], lat, lon)
                            .then(function(route) {
                                if (route) {
                                    drawRoute(route, data[0].display_name.split(',')[0]);
                                } else {
                                    alert('❌ لا يمكن حساب المسار');
                                    navMode = false;
                                    document.getElementById('mode-navigation').classList.remove('active');
                                    document.getElementById('info-panel').classList.remove('show');
                                }
                            });
                    })['catch'](function() {
                        alert('⚠️ خطأ في البحث عن الوجهة');
                        navMode = false;
                        document.getElementById('mode-navigation').classList.remove('active');
                    });

                } else {
                    if (routeLine) {
                        map.removeLayer(routeLine);
                        routeLine = null;
                    }
                    routeMarkers.forEach(function(m) { map.removeLayer(m); });
                    routeMarkers = [];
                    document.getElementById('info-panel').classList.remove('show');
                    document.getElementById('traffic-indicator').classList.remove('show');
                    showToast('📍 تم إلغاء الملاحة', '#667799');
                }
            });

            // ================================================================
            //  تحديثات المرور
            // ================================================================
            function updateTraffic(baseTime) {
                var times = [
                    Math.round(baseTime * 0.8) + Math.round(Math.random() * 5),
                    Math.round(baseTime * 1.1) + Math.round(Math.random() * 5),
                    Math.round(baseTime * 1.5) + Math.round(Math.random() * 5)
                ];
                document.getElementById('traffic-road1').textContent = times[0] + ' دقيقة';
                document.getElementById('traffic-road2').textContent = times[1] + ' دقيقة';
                document.getElementById('traffic-road3').textContent = times[2] + ' دقيقة';
                document.getElementById('traffic-indicator').classList.add('show');
            }

            document.getElementById('mode-traffic').addEventListener('click', function() {
                this.classList.toggle('active');
                if (this.classList.contains('active')) {
                    var base = 20 + Math.round(Math.random() * 30);
                    updateTraffic(base);
                    showToast('🚗 تحديثات المرور مفعلة', '#4ecdc4');
                } else {
                    document.getElementById('traffic-indicator').classList.remove('show');
                    showToast('📍 تم إلغاء تحديثات المرور', '#667799');
                }
            });

            setInterval(function() {
                var trafficBtn = document.getElementById('mode-traffic');
                if (trafficBtn.classList.contains('active')) {
                    var base = 20 + Math.round(Math.random() * 30);
                    updateTraffic(base);
                }
            }, 30000);

            // ================================================================
            //  3D
            // ================================================================
            var is3D = false;
            var btn3d = document.getElementById('d3-toggle');
            var indicator = document.getElementById('d3-indicator');
            var buildings = [],
                bInterval = null;

            var bData = [
                { lat: 30.0458, lng: 31.2242, w: 0.0012, h: 0.0012 },
                { lat: 30.0425, lng: 31.2334, w: 0.0020, h: 0.0016 },
                { lat: 30.0444, lng: 31.2357, w: 0.0025, h: 0.0020 },
                { lat: 30.0478, lng: 31.2335, w: 0.0030, h: 0.0025 },
                { lat: 30.0420, lng: 31.2260, w: 0.0020, h: 0.0015 },
                { lat: 30.0485, lng: 31.2365, w: 0.0018, h: 0.0018 },
                { lat: 30.0460, lng: 31.2380, w: 0.0022, h: 0.0016 },
                { lat: 30.0430, lng: 31.2350, w: 0.0016, h: 0.0014 },
                { lat: 30.0438, lng: 31.2340, w: 0.0028, h: 0.0018 },
                { lat: 30.0490, lng: 31.2220, w: 0.0025, h: 0.0020 },
                { lat: 30.0480, lng: 31.2300, w: 0.0018, h: 0.0015 },
                { lat: 30.0470, lng: 31.2320, w: 0.0020, h: 0.0016 },
                { lat: 30.0450, lng: 31.2370, w: 0.0015, h: 0.0015 },
                { lat: 30.0400, lng: 31.2300, w: 0.0030, h: 0.0020 },
                { lat: 30.0410, lng: 31.2320, w: 0.0025, h: 0.0025 },
                { lat: 30.0445, lng: 31.2365, w: 0.0018, h: 0.0015 },
                { lat: 30.0465, lng: 31.2250, w: 0.0014, h: 0.0014 },
                { lat: 30.0435, lng: 31.2370, w: 0.0016, h: 0.0016 },
            ];

            function createBuildings() {
                buildings.forEach(function(el) { if (el.parentNode) el.parentNode.removeChild(el); });
                buildings = [];
                if (!is3D) return;
                var c = document.getElementById('map');
                bData.forEach(function(b) {
                    try {
                        var p1 = map.latLngToContainerPoint([b.lat, b.lng]);
                        var p2 = map.latLngToContainerPoint([b.lat + b.h, b.lng + b.w]);
                        var w = Math.abs(p2.x - p1.x),
                            h = Math.abs(p2.y - p1.y);
                        if (w < 300 && h < 300 && w > 3 && h > 3) {
                            var div = document.createElement('div');
                            div.className = 'building-3d';
                            div.style.left = (Math.min(p1.x, p2.x) - 1) + 'px';
                            div.style.top = (Math.min(p1.y, p2.y) - 1) + 'px';
                            div.style.width = (w + 2) + 'px';
                            div.style.height = (h + 2) + 'px';
                            div.style.background = 'rgba(150,165,185,' + (0.3 + Math.random() * 0.2) + ')';
                            var top = document.createElement('div');
                            top.className = 'top';
                            div.appendChild(top);
                            c.appendChild(div);
                            buildings.push(div);
                        }
                    } catch (e) {}
                });
            }

            btn3d.addEventListener('click', function() {
                is3D = !is3D;
                btn3d.classList.toggle('active', is3D);
                if (is3D) {
                    switchLayer(terrainLayer, document.getElementById('mode-terrain'));
                    indicator.style.display = 'flex';
                    btn3d.style.color = '#7bb0ff';
                    setTimeout(createBuildings, 300);
                    map.on('moveend', createBuildings);
                    map.on('zoomend', createBuildings);
                    if (bInterval) clearInterval(bInterval);
                    bInterval = setInterval(createBuildings, 2000);
                    showToast('🌐 3D مفعل - المباني تظهر', '#7bb0ff');
                } else {
                    indicator.style.display = 'none';
                    btn3d.style.color = '';
                    buildings.forEach(function(el) { if (el.parentNode) el.parentNode.removeChild(el); });
                    buildings = [];
                    map.off('moveend', createBuildings);
                    map.off('zoomend', createBuildings);
                    if (bInterval) { clearInterval(bInterval);
                        bInterval = null; }
                    switchLayer(streetLayer, document.getElementById('mode-street'));
                    showToast('📍 تم إلغاء 3D', '#667799');
                }
            });

            // ================================================================
            //  المفضلة
            // ================================================================
            var favs = JSON.parse(localStorage.getItem('aora_favorites') || '[]');
            var favMarkers = [];

            function updateFavsUI() {
                var list = document.getElementById('favorites-list');
                list.innerHTML = '';
                if (favs.length === 0) {
                    list.innerHTML = '<div class="fav-empty">لا توجد أماكن مفضلة</div>';
                    return;
                }
                favs.forEach(function(f, index) {
                    var div = document.createElement('div');
                    div.className = 'fav-item';
                    div.innerHTML =
                        '<span><i class="fas fa-map-pin" style="color:#ff6b6b;margin-right:8px;"></i>' + f
                        .name + '</span>' +
                        '<button class="fav-del" data-index="' + index + '">✕</button>';
                    div.querySelector('.fav-del').addEventListener('click', function(e) {
                        e.stopPropagation();
                        favs.splice(index, 1);
                        localStorage.setItem('aora_favorites', JSON.stringify(favs));
                        updateFavsUI();
                        updateFavsMarkers();
                        showToast('🗑️ تم الحذف', '#ff6b6b');
                    });
                    div.addEventListener('click', function() {
                        map.flyTo([f.lat, f.lng], 16, { duration: 1.2 });
                        document.getElementById('favorites-modal').classList.remove('open');
                        showToast('📍 تم الانتقال إلى: ' + f.name, '#7bb0ff');
                    });
                    list.appendChild(div);
                });
            }

            function updateFavsMarkers() {
                favMarkers.forEach(function(m) { map.removeLayer(m); });
                favMarkers = [];
                favs.forEach(function(f) {
                    var icon = L.divIcon({
                        html: '<div style="background:#ff6b6b;border-radius:50%;width:14px;height:14px;border:2px solid #fff;box-shadow:0 0 20px rgba(255,107,107,0.4);"></div>',
                        iconSize: [14, 14],
                        iconAnchor: [7, 7]
                    });
                    var m = L.marker([f.lat, f.lng], { icon: icon }).addTo(map).bindPopup('❤️ ' + f.name);
                    favMarkers.push(m);
                });
            }

            document.getElementById('favorites-btn').addEventListener('click', function() {
                var modal = document.getElementById('favorites-modal');
                modal.classList.toggle('open');
                updateFavsUI();
            });

            document.getElementById('close-fav-btn').addEventListener('click', function() {
                document.getElementById('favorites-modal').classList.remove('open');
            });

            document.getElementById('favorites-modal').addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('open');
                }
            });

            // إضافة للمفضلة بالنقر المزدوج على زر القلب
            document.getElementById('favorites-btn').addEventListener('dblclick', function() {
                if (userPos) {
                    var name = prompt('أدخل اسم المكان:');
                    if (name) {
                        favs.push({ lat: userPos[0], lng: userPos[1], name: name });
                        localStorage.setItem('aora_favorites', JSON.stringify(favs));
                        updateFavsMarkers();
                        showToast('❤️ تم حفظ "' + name + '"', '#ff6b6b');
                    }
                } else {
                    showToast('⚠️ حدد موقعك أولاً', '#ff6b6b');
                }
            });

            updateFavsMarkers();

            // ================================================================
            //  مشاركة الموقع
            // ================================================================
            document.getElementById('share-btn').addEventListener('click', function() {
                if (userPos) {
                    var url = 'https://www.openstreetmap.org/?mlat=' + userPos[0] + '&mlon=' + userPos[1] +
                        '&zoom=16';
                    if (navigator.share) {
                        navigator.share({
                            title: 'موقعي على أورا ماب',
                            text: 'موقعي الحالي: ' + userPos[0].toFixed(4) + ', ' + userPos[1].toFixed(4),
                            url: url
                        })['catch'](function() {});
                    } else {
                        navigator.clipboard.writeText(url).then(function() {
                            showToast('📋 تم نسخ رابط الموقع', '#7bb0ff');
                        })['catch'](function() {
                            prompt('انسخ الرابط:', url);
                        });
                    }
                } else {
                    showToast('⚠️ حدد موقعك أولاً', '#ff6b6b');
                }
            });

            // ================================================================
            //  AR
            // ================================================================
            var arBtn = document.getElementById('ar-btn');
            var arOverlay = document.getElementById('ar-overlay');
            var arInterval = null;

            arBtn.addEventListener('click', function() {
                arOverlay.classList.toggle('open');
                if (arOverlay.classList.contains('open')) {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(function(pos) {
                            if (pos.coords.heading) {
                                document.getElementById('ar-compass').textContent = Math.round(pos.coords
                                    .heading);
                            }
                            var dirs = ['شمال', 'شمال شرق', 'شرق', 'جنوب شرق', 'جنوب', 'جنوب غرب', 'غرب',
                                'شمال غرب'
                            ];
                            if (pos.coords.heading) {
                                var idx = Math.round(pos.coords.heading / 45) % 8;
                                document.getElementById('ar-direction').textContent = dirs[idx] || '--';
                            }
                        });
                    }
                    if (arInterval) clearInterval(arInterval);
                    arInterval = setInterval(function() {
                        if (navigator.geolocation) {
                            navigator.geolocation.getCurrentPosition(function(pos) {
                                if (pos.coords.heading) {
                                    document.getElementById('ar-compass').textContent = Math.round(pos
                                        .coords.heading);
                                }
                                var dirs = ['شمال', 'شمال شرق', 'شرق', 'جنوب شرق', 'جنوب', 'جنوب غرب',
                                    'غرب', 'شمال غرب'
                                ];
                                if (pos.coords.heading) {
                                    var idx = Math.round(pos.coords.heading / 45) % 8;
                                    document.getElementById('ar-direction').textContent = dirs[idx] ||
                                    '--';
                                }
                            });
                        }
                    }, 2000);
                    showToast('🥽 AR مفعل - بوصلة تعمل', '#ffb84d');
                } else {
                    if (arInterval) clearInterval(arInterval);
                    showToast('📍 تم إلغاء AR', '#667799');
                }
            });

            document.getElementById('ar-close-btn').addEventListener('click', function() {
                arOverlay.classList.remove('open');
                if (arInterval) clearInterval(arInterval);
            });

            // ================================================================
            //  Toast
            // ================================================================
            function showToast(msg, color) {
                color = color || '#7bb0ff';
                var t = document.createElement('div');
                t.style.position = 'fixed';
                t.style.top = '72px';
                t.style.left = '50%';
                t.style.transform = 'translateX(-50%)';
                t.style.zIndex = '999';
                t.style.padding = '8px 20px';
                t.style.background = 'rgba(0,0,0,0.8)';
                t.style.backdropFilter = 'blur(12px)';
                t.style.borderRadius = '40px';
                t.style.border = '1px solid ' + color + '33';
                t.style.color = '#fff';
                t.style.fontSize = '0.8rem';
                t.style.maxWidth = '90%';
                t.style.textAlign = 'center';
                t.innerHTML = msg;
                document.body.appendChild(t);
                setTimeout(function() {
                    t.style.opacity = '0';
                    setTimeout(function() { t.remove(); }, 900);
                }, 3000);
            }

            // ================================================================
            //  تحسين حجم الخريطة - مفتاح الحل
            // ================================================================
            function fixMapSize() {
                if (map) {
                    // التأكد من أن الخريطة تأخذ كامل الشاشة
                    var container = document.getElementById('map');
                    container.style.width = '100vw';
                    container.style.height = '100vh';
                    container.style.position = 'fixed';
                    container.style.top = '0';
                    container.style.left = '0';

                    // إعادة حساب حجم الخريطة
                    setTimeout(function() {
                        map.invalidateSize();
                    }, 100);

                    console.log('📐 تم إصلاح حجم الخريطة');
                }
            }

            // تشغيل إصلاح الحجم عدة مرات للتأكد
            setTimeout(fixMapSize, 200);
            setTimeout(fixMapSize, 500);
            setTimeout(fixMapSize, 1000);
            setTimeout(fixMapSize, 2000);

            window.addEventListener('resize', function() {
                fixMapSize();
            });

            // ================================================================
            //  رسالة ترحيب
            // ================================================================
            setTimeout(function() {
                showToast('🛡️ خريطتك. خصوصيتك. نحن لا نخزن بياناتك', '#3dff9e');
            }, 1500);

            console.log('🚀 أورا ماب - جاهزة');

        } // نهاية initMap

        // ================================================================
        //  بدء التطبيق
        // ================================================================
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            initMap();
        } else {
            document.addEventListener('DOMContentLoaded', initMap);
        }

        // تأكد من تحميل الخريطة حتى لو فشل كل شيء
        setTimeout(initMap, 3000);

        // ================================================================
        //  إصلاح حجم الخريطة من خارج الدالة
        // ================================================================
        function forceMapSize() {
            var el = document.getElementById('map');
            if (el) {
                el.style.width = '100vw';
                el.style.height = '100vh';
                el.style.position = 'fixed';
                el.style.top = '0';
                el.style.left = '0';
                el.style.margin = '0';
                el.style.padding = '0';
                console.log('📐 تم إصلاح حجم الخريطة (force)');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(forceMapSize, 100);
            setTimeout(forceMapSize, 300);
            setTimeout(forceMapSize, 600);
        });

        // تشغيل فوري
        setTimeout(forceMapSize, 50);
    </script>
</body>
</html>
