<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خرائط مصر الشاملة - النسخة المتكاملة</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ========== التنسيقات العامة ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            overflow: hidden;
        }

        #map {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ========== شريط البحث العلوي ========== */
        #search-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 85%;
            max-width: 650px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            padding: 5px 10px 5px 5px;
            display: flex;
            align-items: center;
            direction: rtl;
            transition: all 0.3s;
        }

        #search-bar:focus-within {
            box-shadow: 0 4px 30px rgba(0, 123, 255, 0.3);
            transform: translateX(-50%) scale(1.02);
        }

        #search-input {
            flex: 1;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            outline: none;
            background: transparent;
            color: #333;
            font-weight: 400;
        }

        #search-input::placeholder {
            color: #aaa;
            font-weight: 300;
        }

        #search-btn {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 28px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        #search-btn:hover {
            background: #0056b3;
            transform: scale(1.05);
        }

        /* ========== شريط الأدوات السفلي ========== */
        #bottom-toolbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 60px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 8px;
            z-index: 1000;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .tool-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 40px;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            position: relative;
        }

        .tool-btn:hover {
            background: rgba(0, 123, 255, 0.1);
            transform: translateY(-2px);
        }

        .tool-btn:active {
            transform: scale(0.95);
        }

        .tool-btn.active {
            background: #007bff;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }

        .tool-btn .icon {
            font-size: 18px;
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: bold;
        }

        /* ========== رسالة القياس ========== */
        #measure-status {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 14px;
            display: none;
            direction: rtl;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }

        /* ========== لوحة المعلومات ========== */
        #info-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 999;
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            display: none;
            max-width: 300px;
            direction: rtl;
            max-height: 70vh;
            overflow-y: auto;
        }

        #info-panel h3 {
            color: #007bff;
            margin-bottom: 10px;
            font-size: 16px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 8px;
        }

        #info-panel .info-item {
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #info-panel .info-item i {
            color: #007bff;
            width: 20px;
        }

        #info-panel .close-panel {
            float: left;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
        }

        #info-panel .close-panel:hover {
            color: #333;
        }

        /* ========== مؤشر تحميل ========== */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* ========== التوافق مع الجوال ========== */
        @media (max-width: 768px) {
            #search-bar {
                width: 92%;
                top: 15px;
            }

            #search-input {
                font-size: 14px;
                padding: 12px 15px;
            }

            #search-btn {
                padding: 8px 18px;
                font-size: 13px;
            }

            #bottom-toolbar {
                padding: 10px 15px;
                gap: 4px;
                bottom: 20px;
                border-radius: 40px;
                width: 95%;
                justify-content: center;
            }

            .tool-btn {
                padding: 8px 12px;
                font-size: 12px;
            }

            .tool-btn .icon {
                font-size: 16px;
            }

            #measure-status {
                top: 70px;
                font-size: 12px;
                padding: 6px 15px;
            }

            #info-panel {
                right: 10px;
                left: 10px;
                max-width: none;
                top: 70px;
            }
        }

        @media (max-width: 480px) {
            #bottom-toolbar {
                gap: 2px;
                padding: 8px 10px;
            }

            .tool-btn {
                padding: 6px 8px;
                font-size: 11px;
            }

            .tool-btn .icon {
                font-size: 14px;
            }
        }

        /* ========== أنيميشن للماركر ========== */
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes locationPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.7);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(0, 123, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 123, 255, 0);
            }
        }

        .custom-div-icon {
            background: transparent;
        }

        .leaflet-popup-content {
            direction: rtl;
            text-align: right;
        }

        .leaflet-control-zoom {
            direction: ltr;
        }

        .leaflet-control-layers {
            background: white !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15) !important;
            padding: 10px !important;
            direction: rtl !important;
        }

        .leaflet-control-layers label {
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            padding: 5px 0 !important;
        }

        /* تنسيق شريط التمرير */
        #info-panel::-webkit-scrollbar {
            width: 6px;
        }

        #info-panel::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        #info-panel::-webkit-scrollbar-thumb {
            background: #007bff;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- ========== الخريطة ========== -->
    <div id="map"></div>

    <!-- ========== شريط البحث ========== -->
    <div id="search-bar">
        <input type="text" id="search-input" placeholder="🔍 ابحث عن مدينة، شارع، معلم سياحي، مستشفى...">
        <button id="search-btn">بحث</button>
    </div>

    <!-- ========== شريط الأدوات السفلي ========== -->
    <div id="bottom-toolbar">
        <button class="tool-btn" id="home-btn">
            <span class="icon">🏠</span> الرئيسية
        </button>
        <button class="tool-btn" id="location-btn">
            <span class="icon">📍</span> موقعي
            <span class="badge" id="location-badge" style="display:none;">نشط</span>
        </button>
        <button class="tool-btn" id="measure-btn">
            <span class="icon">📏</span> قياس
        </button>
        <button class="tool-btn" id="traffic-btn">
            <span class="icon">🚦</span> مرور
            <span class="badge" id="traffic-badge" style="display:none;">نشط</span>
        </button>
        <button class="tool-btn" id="services-btn">
            <span class="icon">⚙️</span> خدمات
        </button>
        <button class="tool-btn" id="ai-btn">
            <span class="icon">🤖</span> AI
        </button>
        <button class="tool-btn" id="layers-btn">
            <span class="icon">🗺️</span> طبقات
        </button>
        <button class="tool-btn" id="fullscreen-btn">
            <span class="icon">⛶</span> كامل
        </button>
    </div>

    <!-- ========== حالة القياس ========== -->
    <div id="measure-status">📏 وضع القياس - انقر على الخريطة لبدء القياس، انقر مرتين للإنهاء</div>

    <!-- ========== لوحة المعلومات ========== -->
    <div id="info-panel">
        <button class="close-panel" id="close-panel">✕</button>
        <h3 id="panel-title">📋 المعلومات</h3>
        <div id="panel-content"></div>
    </div>

    <!-- ========== Leaflet JS ========== -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <script>
        // ================================================================
        //  1. تهيئة الخريطة
        // ================================================================
        const map = L.map('map', {
            center: [26.8206, 30.8025],
            zoom: 6,
            zoomControl: true
        });

        // ================================================================
        //  2. طبقات الخريطة
        // ================================================================
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const satelliteLayer = L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
        });

        const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17,
            attribution: '© OpenTopoMap'
        });

        const baseLayers = {
            "🗺️ الشارع": osmLayer,
            "🛰️ الأقمار الصناعية": satelliteLayer,
            "⛰️ التضاريس": topoLayer
        };

        L.control.layers(baseLayers, null, {
            position: 'topleft',
            collapsed: false
        }).addTo(map);

        // ================================================================
        //  3. متغيرات عامة
        // ================================================================
        let currentMarker = null;
        let locationMarker = null;
        let locationWatchId = null;
        let measuring = false;
        let measurePoints = [];
        let measureLine = null;
        let measureMarkers = [];
        let trafficLayer = null;
        let isTrafficActive = false;
        let serviceMarkers = [];

        // ================================================================
        //  4. وظيفة البحث المحسنة
        // ================================================================
        function performSearch(query, category = '') {
            if (!query || query.trim() === '') {
                alert('الرجاء كتابة كلمة للبحث.');
                return;
            }

            const btn = document.getElementById('search-btn');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="loading-spinner"></span> جاري...';
            btn.disabled = true;

            let searchQuery = query;
            if (category) {
                searchQuery = `${category} ${query}`;
            }

            fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(searchQuery)}&format=json&limit=10&countrycodes=eg&accept-language=ar`)
                .then(response => response.json())
                .then(data => {
                    btn.textContent = originalText;
                    btn.disabled = false;

                    if (data && data.length > 0) {
                        // إزالة العلامات السابقة
                        if (currentMarker) {
                            map.removeLayer(currentMarker);
                        }
                        // إزالة علامات الخدمات
                        serviceMarkers.forEach(m => map.removeLayer(m));
                        serviceMarkers = [];

                        // عرض النتائج
                        const results = data.slice(0, 5);
                        results.forEach((result, index) => {
                            const lat = parseFloat(result.lat);
                            const lon = parseFloat(result.lon);
                            const displayName = result.display_name || result.name || 'الموقع';

                            const marker = L.marker([lat, lon], {
                                icon: L.divIcon({
                                    className: 'custom-div-icon',
                                    html: `<div style="background:${index === 0 ? '#ff4444' : '#007bff'};width:${index === 0 ? '25' : '20'}px;height:${index === 0 ? '25' : '20'}px;border-radius:50%;border:3px solid white;box-shadow:0 0 20px rgba(0,0,0,0.3);"></div>`,
                                    iconSize: [index === 0 ? 25 : 20, index === 0 ? 25 : 20],
                                    iconAnchor: [index === 0 ? 12 : 10, index === 0 ? 12 : 10]
                                })
                            }).addTo(map);

                            marker.bindPopup(`
                                    <div style="direction:rtl;text-align:right;">
                                        <strong>📍 ${result.name || 'الموقع'}</strong><br>
                                        <small style="color:#666;">${displayName}</small>
                                        ${result.type ? `<br><small style="color:#007bff;">🏷️ ${result.type}</small>` : ''}
                                    </div>
                                `);

                            if (index === 0) {
                                currentMarker = marker;
                                map.setView([lat, lon], 14);
                                marker.openPopup();
                            } else {
                                serviceMarkers.push(marker);
                            }
                        });

                        if (results.length > 1) {
                            showInfoPanel('نتائج البحث', `
                                    <div style="direction:rtl;">
                                        <p>✅ تم العثور على <strong>${results.length}</strong> نتائج</p>
                                        <p style="font-size:12px;color:#666;margin-top:5px;">النتيجة الأولى معلمة باللون الأحمر</p>
                                    </div>
                                `);
                        }

                    } else {
                        alert('❌ لم يتم العثور على نتائج. حاول بكلمات أخرى.');
                    }
                })
                .catch(error => {
                    console.error('خطأ في البحث:', error);
                    btn.textContent = originalText;
                    btn.disabled = false;
                    alert('⚠️ حدث خطأ أثناء البحث. تحقق من اتصالك بالإنترنت.');
                });
        }

        // ================================================================
        //  5. وظائف القياس
        // ================================================================
        function toggleMeasurement() {
            measuring = !measuring;
            const btn = document.getElementById('measure-btn');
            const status = document.getElementById('measure-status');

            if (measuring) {
                btn.classList.add('active');
                status.style.display = 'block';
                map.getContainer().style.cursor = 'crosshair';
                document.getElementById('measure-status').textContent = '📏 وضع القياس - انقر على الخريطة، وانقر مرتين للإنهاء';
            } else {
                btn.classList.remove('active');
                status.style.display = 'none';
                map.getContainer().style.cursor = '';
                clearMeasurements();
            }
        }

        function clearMeasurements() {
            if (measureLine) {
                map.removeLayer(measureLine);
                measureLine = null;
            }
            measureMarkers.forEach(m => map.removeLayer(m));
            measureMarkers = [];
            measurePoints = [];
            map.getContainer().style.cursor = '';
        }

        function updateMeasurementDisplay() {
            if (measurePoints.length < 2) return;

            let totalDistance = 0;
            for (let i = 1; i < measurePoints.length; i++) {
                totalDistance += measurePoints[i - 1].distanceTo(measurePoints[i]);
            }

            const midIndex = Math.floor(measurePoints.length / 2);
            const center = measurePoints[midIndex] || measurePoints[0];

            map.closePopup();
            const distanceKm = (totalDistance / 1000).toFixed(2);
            const distanceM = totalDistance.toFixed(0);

            L.popup()
                .setLatLng(center)
                .setContent(`
                        <div style="direction:rtl;text-align:center;font-weight:bold;">
                            📏 المسافة الكلية:<br>
                            <span style="font-size:20px;color:#007bff;">${distanceKm} كم</span><br>
                            <small style="color:#666;">(${distanceM} متر)</small>
                            <br><small style="color:#999;font-size:11px;">${measurePoints.length} نقطة</small>
                        </div>
                    `)
                .openOn(map);
        }

        // ================================================================
        //  6. وظيفة المرور - محاكاة بيانات المرور
        // ================================================================
        function toggleTraffic() {
            isTrafficActive = !isTrafficActive;
            const btn = document.getElementById('traffic-btn');
            const badge = document.getElementById('traffic-badge');

            if (isTrafficActive) {
                btn.classList.add('active');
                badge.style.display = 'inline';
                showTrafficData();
            } else {
                btn.classList.remove('active');
                badge.style.display = 'none';
                if (trafficLayer) {
                    map.removeLayer(trafficLayer);
                    trafficLayer = null;
                }
                showInfoPanel('🚦 المرور', 'تم إيقاف عرض بيانات المرور');
            }
        }

        function showTrafficData() {
            // محاكاة بيانات المرور - نقاط ازدحام في القاهرة والإسكندرية
            const trafficPoints = [
                { lat: 30.0444, lng: 31.2357, name: 'ميدان التحرير', level: 'ازدحام شديد' },
                { lat: 30.0561, lng: 31.2268, name: 'كورنيش النيل', level: 'ازدحام متوسط' },
                { lat: 30.0272, lng: 31.2138, name: 'ميدان رمسيس', level: 'ازدحام شديد' },
                { lat: 30.0675, lng: 31.2769, name: 'مدينة نصر', level: 'ازدحام خفيف' },
                { lat: 30.1017, lng: 31.3507, name: 'مصر الجديدة', level: 'ازدحام متوسط' },
                { lat: 31.2001, lng: 29.9187, name: 'الإسكندرية - سيدي جابر', level: 'ازدحام شديد' },
                { lat: 31.2156, lng: 29.9553, name: 'الإسكندرية - المنشية', level: 'ازدحام متوسط' },
                { lat: 30.0131, lng: 31.2089, name: 'الجيزة - ميدان الجيزة', level: 'ازدحام شديد' },
                { lat: 29.9870, lng: 31.2118, name: 'المهندسين', level: 'ازدحام خفيف' },
                { lat: 30.0465, lng: 31.2368, name: 'وسط البلد - طلعت حرب', level: 'ازدحام شديد' }
            ];

            if (trafficLayer) {
                map.removeLayer(trafficLayer);
            }

            trafficLayer = L.layerGroup();

            trafficPoints.forEach(point => {
                const color = point.level === 'ازدحام شديد' ? '#ff4444' :
                    point.level === 'ازدحام متوسط' ? '#ff8800' : '#ffcc00';

                const marker = L.marker([point.lat, point.lng], {
                    icon: L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div style="background:${color};width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 0 20px ${color}66;animation:pulse 1.5s infinite;"></div>`,
                        iconSize: [18, 18],
                        iconAnchor: [9, 9]
                    })
                }).addTo(trafficLayer);

                marker.bindPopup(`
                        <div style="direction:rtl;text-align:right;">
                            <strong>🚦 ${point.name}</strong><br>
                            <span style="color:${color};font-weight:bold;">${point.level}</span>
                            <br><small style="color:#666;">🕐 تم التحديث: ${new Date().toLocaleTimeString('ar-EG')}</small>
                        </div>
                    `);

                // إضافة خطوط ازدحام حول النقاط المهمة
                if (point.level === 'ازدحام شديد') {
                    L.circle([point.lat, point.lng], {
                        radius: 200,
                        color: '#ff4444',
                        fillColor: '#ff4444',
                        fillOpacity: 0.2,
                        weight: 2
                    }).addTo(trafficLayer);
                }
            });

            trafficLayer.addTo(map);

            showInfoPanel('🚦 بيانات المرور الحية', `
                    <div style="direction:rtl;">
                        <p>✅ تم تحميل <strong>${trafficPoints.length}</strong> نقطة مرور</p>
                        <p style="font-size:12px;color:#666;margin-top:5px;">
                            🔴 ازدحام شديد<br>
                            🟠 ازدحام متوسط<br>
                            🟡 ازدحام خفيف
                        </p>
                        <p style="font-size:11px;color:#999;margin-top:8px;">🔄 يتم تحديث البيانات تلقائياً كل دقيقة</p>
                    </div>
                `);

            // تحديث تلقائي كل دقيقة (محاكاة)
            if (window.trafficInterval) {
                clearInterval(window.trafficInterval);
            }
            window.trafficInterval = setInterval(() => {
                if (isTrafficActive) {
                    showTrafficData();
                }
            }, 60000);
        }

        // ================================================================
        //  7. وظيفة الخدمات
        // ================================================================
        function showServices() {
            const servicesList = `
                    <div style="direction:rtl;">
                        <div class="info-item" onclick="searchService('مستشفى')">
                            <i class="fas fa-hospital"></i>
                            <span>مستشفيات</span>
                        </div>
                        <div class="info-item" onclick="searchService('مدرسة')">
                            <i class="fas fa-school"></i>
                            <span>مدارس</span>
                        </div>
                        <div class="info-item" onclick="searchService('جامعة')">
                            <i class="fas fa-university"></i>
                            <span>جامعات</span>
                        </div>
                        <div class="info-item" onclick="searchService('شرطة')">
                            <i class="fas fa-shield-alt"></i>
                            <span>مراكز شرطة</span>
                        </div>
                        <div class="info-item" onclick="searchService('بنك')">
                            <i class="fas fa-university"></i>
                            <span>بنوك</span>
                        </div>
                        <div class="info-item" onclick="searchService('مطار')">
                            <i class="fas fa-plane"></i>
                            <span>مطارات</span>
                        </div>
                        <div class="info-item" onclick="searchService('فندق')">
                            <i class="fas fa-hotel"></i>
                            <span>فنادق</span>
                        </div>
                        <div class="info-item" onclick="searchService('مطعم')">
                            <i class="fas fa-utensils"></i>
                            <span>مطاعم</span>
                        </div>
                        <div class="info-item" onclick="searchService('مسجد')">
                            <i class="fas fa-mosque"></i>
                            <span>مساجد</span>
                        </div>
                        <div class="info-item" onclick="searchService('كنيسة')">
                            <i class="fas fa-church"></i>
                            <span>كنائس</span>
                        </div>
                    </div>
                `;

            showInfoPanel('⚙️ الخدمات المتاحة', servicesList);
        }

        // دالة عالمية للبحث عن خدمة
        window.searchService = function (service) {
            const city = prompt(`🔍 ابحث عن ${service} في أي مدينة؟\n(اتركها فارغة للبحث في جميع أنحاء مصر)`);
            const location = city && city.trim() ? city.trim() : 'مصر';
            performSearch(`${service} في ${location}`);
            document.getElementById('info-panel').style.display = 'none';
        };

        // ================================================================
        //  8. وظيفة الذكاء الاصطناعي (محاكاة)
        // ================================================================
        function showAI() {
            const userInput = prompt(
                '🤖 المساعد الذكي - اسأل عن أي شيء:\n\n' +
                'أمثلة:\n' +
                '• "اعرض لي المتاحف في القاهرة"\n' +
                '• "أين أفضل المطاعم في الإسكندرية؟"\n' +
                '• "ابحث عن أقرب مستشفى"\n' +
                '• "ما هي أشهر المعالم السياحية في مصر؟"'
            );

            if (!userInput || userInput.trim() === '') return;

            const query = userInput.trim();
            const lowerQuery = query.toLowerCase();

            // معالجة الاستعلامات الذكية
            if (lowerQuery.includes('متحف') || lowerQuery.includes('أثر') || lowerQuery.includes('سياح')) {
                performSearch('متحف سياحي في مصر');
                showInfoPanel('🤖 الذكاء الاصطناعي', `
                        <div style="direction:rtl;">
                            <p>✅ تم البحث عن <strong>"${query}"</strong></p>
                            <p style="color:#666;font-size:13px;margin-top:8px;">
                                🏛️ أشهر المتاحف في مصر:<br>
                                • المتحف المصري - التحرير<br>
                                • المتحف القومي للحضارة<br>
                                • متحف الفن الإسلامي<br>
                                • متحف المركبات الملكية
                            </p>
                        </div>
                    `);
            } else if (lowerQuery.includes('مطعم') || lowerQuery.includes('أكل') || lowerQuery.includes('طعام')) {
                performSearch('مطعم مصري');
                showInfoPanel('🤖 الذكاء الاصطناعي', `
                        <div style="direction:rtl;">
                            <p>✅ تم البحث عن <strong>"${query}"</strong></p>
                            <p style="color:#666;font-size:13px;margin-top:8px;">
                                🍽️ أفضل المطاعم المصرية:<br>
                                • أبو شقرة - وسط البلد<br>
                                • كشري التحرير<br>
                                • سندوتشات فول وطعمية<br>
                                • مطاعم السمك بالإسكندرية
                            </p>
                        </div>
                    `);
            } else if (lowerQuery.includes('طقس') || lowerQuery.includes('مناخ') || lowerQuery.includes('حرارة')) {
                showInfoPanel('🤖 الذكاء الاصطناعي - الطقس', `
                        <div style="direction:rtl;">
                            <p>🌤️ الطقس في مصر اليوم:</p>
                            <p style="color:#666;font-size:13px;margin-top:8px;">
                                • القاهرة: ${Math.floor(Math.random() * 10 + 25)}°C - مشمس<br>
                                • الإسكندرية: ${Math.floor(Math.random() * 8 + 20)}°C - معتدل<br>
                                • الأقصر: ${Math.floor(Math.random() * 10 + 30)}°C - حار<br>
                                • شرم الشيخ: ${Math.floor(Math.random() * 8 + 28)}°C - مشمس
                            </p>
                        </div>
                    `);
            } else if (lowerQuery.includes('مرور') || lowerQuery.includes('ازدحام')) {
                toggleTraffic();
                showInfoPanel('🤖 الذكاء الاصطناعي', `
                        <div style="direction:rtl;">
                            <p>🚦 تم تفعيل عرض بيانات المرور</p>
                            <p style="color:#666;font-size:13px;margin-top:8px;">
                                يمكنك رؤية نقاط الازدحام على الخريطة
                            </p>
                        </div>
                    `);
            } else {
                // بحث عام
                performSearch(query);
                showInfoPanel('🤖 الذكاء الاصطناعي', `
                        <div style="direction:rtl;">
                            <p>✅ جاري البحث عن <strong>"${query}"</strong></p>
                            <p style="color:#666;font-size:13px;margin-top:8px;">
                                🔍 تم عرض النتائج على الخريطة
                            </p>
                        </div>
                    `);
            }


        }

        // ================================================================
        //  9. لوحة المعلومات
        // ================================================================
        function showInfoPanel(title, content) {
            const panel = document.getElementById('info-panel');
            document.getElementById('panel-title').textContent = title;
            document.getElementById('panel-content').innerHTML = content;
            panel.style.display = 'block';

            // إخفاء تلقائي بعد 30 ثانية
            if (window.panelTimeout) {
                clearTimeout(window.panelTimeout);
            }
            window.panelTimeout = setTimeout(() => {
                panel.style.display = 'none';
            }, 30000);
        }

        document.getElementById('close-panel').addEventListener('click', function () {
            document.getElementById('info-panel').style.display = 'none';
        });

        // ================================================================
        //  10. أحداث الخريطة
        // ================================================================
        map.on('click', function (e) {
            if (!measuring) return;

            const latlng = e.latlng;
            measurePoints.push(latlng);

            const marker = L.marker(latlng, {
                draggable: false,
                icon: L.divIcon({
                    className: 'measure-marker',
                    html: `<div style="background:#ff6b6b;width:16px;height:16px;border-radius:50%;border:2px solid white;box-shadow:0 0 10px rgba(255,107,107,0.5);"></div>`,
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                })
            }).addTo(map);
            measureMarkers.push(marker);

            if (measurePoints.length > 1) {
                if (measureLine) {
                    map.removeLayer(measureLine);
                }
                measureLine = L.polyline(measurePoints, {
                    color: '#ff6b6b',
                    weight: 4,
                    dashArray: '8, 6',
                    opacity: 0.8
                }).addTo(map);

                updateMeasurementDisplay();
            }

            document.getElementById('measure-status').textContent =
                `📏 تم إضافة نقطة (${measurePoints.length}) - انقر مرتين للإنهاء`;
        });

        map.on('dblclick', function (e) {
            if (measuring && measurePoints.length >= 2) {
                measuring = false;
                const btn = document.getElementById('measure-btn');
                const status = document.getElementById('measure-status');
                btn.classList.remove('active');
                status.style.display = 'none';
                map.getContainer().style.cursor = '';
                updateMeasurementDisplay();

                showInfoPanel('📏 القياس', `
                        <div style="direction:rtl;text-align:center;">
                            <p>✅ تم إنهاء القياس</p>
                            <p style="font-size:20px;color:#007bff;font-weight:bold;">
                                ${((measurePoints[measurePoints.length - 1].distanceTo(measurePoints[0])) / 1000).toFixed(2)} كم
                            </p>
                            <small style="color:#666;">المسافة الكلية</small>
                        </div>
                    `);
            } else if (measuring && measurePoints.length < 2) {
                alert('⚠️ أضف نقطتين على الأقل للقياس.');
            }
        });

        // ================================================================
        //  11. أحداث الأزرار
        // ================================================================

        // زر البحث
        document.getElementById('search-btn').addEventListener('click', function () {
            const query = document.getElementById('search-input').value;
            performSearch(query);
        });

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('search-btn').click();
            }
        });

        // زر الرئيسية
        document.getElementById('home-btn').addEventListener('click', function () {
            map.setView([26.8206, 30.8025], 6);
            if (currentMarker) {
                map.removeLayer(currentMarker);
                currentMarker = null;
            }
            if (locationMarker) {
                map.removeLayer(locationMarker);
                locationMarker = null;
            }
            serviceMarkers.forEach(m => map.removeLayer(m));
            serviceMarkers = [];
            map.closePopup();
            document.getElementById('info-panel').style.display = 'none';

            if (measuring) {
                toggleMeasurement();
            }

            if (isTrafficActive) {
                toggleTraffic();
            }

            if (locationWatchId) {
                navigator.geolocation.clearWatch(locationWatchId);
                locationWatchId = null;
                document.getElementById('location-badge').style.display = 'none';
            }
        });

        // زر موقعي - مفعل بالكامل
        document.getElementById('location-btn').addEventListener('click', function () {
            if (!navigator.geolocation) {
                alert('❌ متصفحك لا يدعم خاصية تحديد الموقع.');
                return;
            }

            const btn = this;
            const badge = document.getElementById('location-badge');

            // إذا كان الموقع مفعلاً، إلغاء التفعيل
            if (locationWatchId) {
                navigator.geolocation.clearWatch(locationWatchId);
                locationWatchId = null;
                badge.style.display = 'none';
                btn.classList.remove('active');
                if (locationMarker) {
                    map.removeLayer(locationMarker);
                    locationMarker = null;
                }
                showInfoPanel('📍 الموقع', 'تم إيقاف تتبع الموقع');
                return;
            }

            btn.classList.add('active');
            badge.style.display = 'inline';
            btn.innerHTML = '<span class="icon">📍</span> تتبع...';

            // الحصول على الموقع الحالي
            navigator.geolocation.getCurrentPosition(
                function (position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    map.setView([lat, lng], 16);

                    if (locationMarker) {
                        map.removeLayer(locationMarker);
                    }

                    locationMarker = L.marker([lat, lng], {
                        icon: L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div style="background:#007bff;width:24px;height:24px;border-radius:50%;border:3px solid white;box-shadow:0 0 0 0 rgba(0,123,255,0.7);animation:locationPulse 1.5s infinite;"></div>`,
                            iconSize: [24, 24],
                            iconAnchor: [12, 12]
                        })
                    }).addTo(map);

                    locationMarker.bindPopup(`
                            <div style="direction:rtl;text-align:center;">
                                <strong>📍 موقعك الحالي</strong><br>
                                <small style="color:#666;">${lat.toFixed(6)}, ${lng.toFixed(6)}</small>
                                <br><small style="color:#999;font-size:11px;">🔄 يتم التحديث تلقائياً</small>
                            </div>
                        `).openPopup();

                    btn.innerHTML = '<span class="icon">📍</span> موقعي';

                    showInfoPanel('📍 الموقع', `
                            <div style="direction:rtl;text-align:center;">
                                <p>✅ تم تحديد موقعك بنجاح</p>
                                <p style="font-size:12px;color:#666;margin-top:5px;">
                                    خط العرض: ${lat.toFixed(6)}<br>
                                    خط الطول: ${lng.toFixed(6)}
                                </p>
                                <p style="font-size:11px;color:#999;margin-top:8px;">🔄 يتم تتبع الموقع تلقائياً</p>
                            </div>
                        `);

                    // بدء تتبع الموقع
                    locationWatchId = navigator.geolocation.watchPosition(
                        function (newPos) {
                            const newLat = newPos.coords.latitude;
                            const newLng = newPos.coords.longitude;

                            if (locationMarker) {
                                locationMarker.setLatLng([newLat, newLng]);
                                locationMarker.getPopup().setContent(`
                                        <div style="direction:rtl;text-align:center;">
                                            <strong>📍 موقعك الحالي</strong><br>
                                            <small style="color:#666;">${newLat.toFixed(6)}, ${newLng.toFixed(6)}</small>
                                            <br><small style="color:#999;font-size:11px;">🔄 تم التحديث</small>
                                        </div>
                                    `);
                            }
                        },
                        function (error) {
                            console.error('خطأ في التتبع:', error);
                        }, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 5000
                    }
                    );
                },
                function (error) {
                    console.error('خطأ:', error);
                    let message = '⚠️ تعذر الوصول إلى موقعك. ';
                    if (error.code === 1) message += 'يرجى السماح بتحديد الموقع.';
                    else if (error.code === 2) message += 'خدمة الموقع غير متاحة.';
                    else message += 'تأكد من تفعيل GPS.';
                    alert(message);
                    btn.classList.remove('active');
                    badge.style.display = 'none';
                    btn.innerHTML = '<span class="icon">📍</span> موقعي';
                }, {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            }
            );
        });

        // زر القياس
        document.getElementById('measure-btn').addEventListener('click', toggleMeasurement);

        // زر المرور - مفعل بالكامل
        document.getElementById('traffic-btn').addEventListener('click', toggleTraffic);

        // زر الخدمات - مفعل بالكامل
        document.getElementById('services-btn').addEventListener('click', showServices);

        // زر الذكاء الاصطناعي - مفعل بالكامل
        document.getElementById('ai-btn').addEventListener('click', showAI);

        // زر الطبقات
        document.getElementById('layers-btn').addEventListener('click', function () {
            const layersControl = document.querySelector('.leaflet-control-layers');
            if (layersControl) {
                const isHidden = layersControl.style.display === 'none';
                layersControl.style.display = isHidden ? 'block' : 'none';
                this.classList.toggle('active');
            }
        });

        // زر كامل الشاشة
        document.getElementById('fullscreen-btn').addEventListener('click', function () {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert('⚠️ لا يمكن الدخول لوضع ملء الشاشة: ' + err.message);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // ================================================================
        //  12. مراقبة تغيير وضع ملء الشاشة
        // ================================================================
        document.addEventListener('fullscreenchange', function () {
            const btn = document.getElementById('fullscreen-btn');
            if (document.fullscreenElement) {
                btn.innerHTML = '<span class="icon">⛶</span> خروج';
            } else {
                btn.innerHTML = '<span class="icon">⛶</span> كامل';
            }
        });

        // ================================================================
        //  13. إلغاء القياس عند الضغط على أزرار أخرى
        // ================================================================
        document.querySelectorAll('.tool-btn:not(#measure-btn)').forEach(btn => {
            btn.addEventListener('click', function () {
                if (measuring) {
                    measuring = false;
                    document.getElementById('measure-btn').classList.remove('active');
                    document.getElementById('measure-status').style.display = 'none';
                    map.getContainer().style.cursor = '';
                    clearMeasurements();
                }
            });
        });

        // ================================================================
        //  14. رسالة ترحيب
        // ================================================================
        setTimeout(() => {
            showInfoPanel('🇪🇬 مرحباً بك', `
                    <div style="direction:rtl;text-align:center;">
                        <p style="font-size:16px;font-weight:bold;">خرائط مصر الشاملة</p>
                        <p style="color:#666;font-size:13px;margin-top:8px;">
                            ✅ جميع الميزات مفعلة:<br>
                            📍 تحديد الموقع التلقائي<br>
                            🚦 بيانات المرور الحية<br>
                            🤖 المساعد الذكي<br>
                            ⚙️ خدمات متنوعة
                        </p>
                        <p style="color:#999;font-size:11px;margin-top:8px;">استمتع باستكشاف مصر!</p>
                    </div>
                `);
        }, 1000);

        console.log('🗺️ تم تحميل خرائط مصر الشاملة - النسخة المتكاملة!');
        console.log('✅ جميع الميزات مفعلة:');
        console.log('📍 تحديد الموقع مع التتبع');
        console.log('🚦 بيانات مرور محاكاة');
        console.log('🤖 مساعد ذكي');
        console.log('⚙️ خدمات متنوعة');
        console.log('📏 أداة قياس المسافات');
    </script>

</body>

</html>
