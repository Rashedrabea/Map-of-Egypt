<head>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            direction: rtl;
            background: #1a1a2e;
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 0;
            background: #1a1a2e;
        }

        /* ===== شاشة التحميل ===== */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0d47a1, #1a73e8, #0d47a1);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.8s ease;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        #loading .icon {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        #loading h1 {
            font-size: 28px;
            margin-top: 15px;
            font-weight: 700;
        }

        #loading p {
            opacity: 0.8;
            margin-top: 5px;
            font-size: 15px;
        }

        .loader-container {
            margin-top: 25px;
            width: 180px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .loader-bar {
            height: 100%;
            width: 0%;
            background: white;
            border-radius: 4px;
            animation: loadProgress 2.5s ease forwards;
        }

        @keyframes loadProgress {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        /* ===== شريط البحث ===== */
        .search-container {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 6px;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 6px 14px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            width: 96%;
            max-width: 850px;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 8px 0;
            font-size: 14px;
            outline: none;
            background: transparent;
            color: #333;
        }

        .search-box input::placeholder {
            color: #999;
        }

        .search-box .search-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .search-box .search-btn:hover {
            background: #0d47a1;
            transform: scale(1.02);
        }

        .search-box .voice-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #666;
            padding: 4px 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .search-box .voice-btn:hover {
            background: #f0f0f0;
            transform: scale(1.1);
        }

        .search-box .voice-btn.recording {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        .action-buttons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .action-buttons button {
            background: #f1f3f4;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            color: #555;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-buttons button:hover {
            background: #e2e6ea;
            transform: scale(1.05);
        }

        .leaflet-control-zoom {
            margin-bottom: 85px !important;
            margin-right: 10px !important;
            border: none !important;
        }

        .leaflet-control-zoom a {
            background: rgba(255, 255, 255, 0.95) !important;
            color: #333 !important;
            border-radius: 10px !important;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1) !important;
            width: 40px !important;
            height: 40px !important;
            line-height: 40px !important;
            font-size: 18px !important;
            border: none !important;
            transition: all 0.3s ease !important;
        }

        /* ===== مؤشر الصوت ===== */
        .voice-status {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .voice-status.show {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .voice-status .wave {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .voice-status .wave span {
            display: block;
            width: 3px;
            height: 15px;
            background: white;
            border-radius: 2px;
            animation: wave 0.8s ease infinite;
        }

        .voice-status .wave span:nth-child(2) {
            animation-delay: 0.1s;
            height: 25px;
        }

        .voice-status .wave span:nth-child(3) {
            animation-delay: 0.2s;
            height: 35px;
        }

        .voice-status .wave span:nth-child(4) {
            animation-delay: 0.3s;
            height: 25px;
        }

        .voice-status .wave span:nth-child(5) {
            animation-delay: 0.4s;
            height: 15px;
        }

        @keyframes wave {

            0%,
            100% {
                transform: scaleY(0.5);
            }

            50% {
                transform: scaleY(1);
            }
        }

        .voice-status .cancel-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .voice-status .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        /* ===== شريط الخدمات ===== */
        .services-bar {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            padding: 6px 12px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            display: flex;
            gap: 3px;
            overflow-x: auto;
            max-width: 96%;
            flex-wrap: nowrap;
            scrollbar-width: none;
        }

        .services-bar::-webkit-scrollbar {
            display: none;
        }

        .service-btn {
            background: transparent;
            border: none;
            padding: 4px 8px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 8px;
            color: #555;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            white-space: nowrap;
            min-width: 38px;
        }

        .service-btn i {
            font-size: 14px;
        }

        .service-btn span {
            font-size: 6px;
            font-weight: 500;
        }

        .service-btn:hover {
            background: #f0f2f5;
            transform: translateY(-2px);
        }

        .service-btn.active {
            background: #1a73e8;
            color: white;
            transform: translateY(-2px);
        }

        /* ===== لوحة النتائج ===== */
        #panel {
            position: absolute;
            top: 75px;
            right: -420px;
            width: 400px;
            max-height: calc(100vh - 160px);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: none;
            flex-direction: column;
        }

        #panel.open {
            display: flex;
            right: 15px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
            background: rgba(255, 255, 255, 0.8);
            flex-shrink: 0;
        }

        .panel-header h3 {
            font-size: 14px;
            color: #1a1a1a;
        }

        .panel-header button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
            transition: all 0.3s ease;
        }

        .panel-header button:hover {
            transform: rotate(90deg);
        }

        #panelContent {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .result-item {
            padding: 8px 14px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-item:hover {
            background: #f8f9fa;
            transform: translateX(-3px);
        }

        .result-item .info {
            flex: 1;
        }

        .result-item .name {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 13px;
        }

        .result-item .address {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        .result-item .distance {
            font-size: 10px;
            color: #1a73e8;
            margin-top: 2px;
        }

        .result-item .actions {
            display: flex;
            gap: 4px;
        }

        .result-item .actions button {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 3px;
            border-radius: 50%;
            transition: all 0.3s ease;
            color: #666;
        }

        .result-item .actions button:hover {
            background: #f0f0f0;
            transform: scale(1.1);
        }

        .result-item .actions .fav-btn {
            color: #e74c3c;
        }

        /* ===== مؤشر التحميل ===== */
        .search-loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 25px 35px;
            border-radius: 16px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .search-loader.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .search-loader .loader-spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .search-loader .loader-text {
            font-size: 15px;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* ===== رسائل ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            z-index: 2000;
            font-size: 12px;
            animation: toastIn 0.4s ease;
            pointer-events: none;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 768px) {
            .search-container {
                top: 8px;
                padding: 4px 10px;
                flex-wrap: wrap;
                border-radius: 25px;
                gap: 4px;
            }

            .search-box input {
                font-size: 12px;
                padding: 5px 0;
            }

            .search-box .search-btn {
                padding: 4px 10px;
                font-size: 11px;
            }

            .search-box .voice-btn {
                font-size: 16px;
                padding: 2px 6px;
            }

            .action-buttons button {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }

            .services-bar {
                bottom: 10px;
                padding: 4px 8px;
            }

            .service-btn {
                min-width: 32px;
                padding: 3px 6px;
            }

            .service-btn i {
                font-size: 12px;
            }

            .service-btn span {
                font-size: 5px;
            }

            #panel {
                width: 94%;
                right: -100%;
                top: 70px;
                max-height: calc(100vh - 160px);
            }

            #panel.open {
                right: 3%;
            }

            .leaflet-control-zoom {
                margin-bottom: 75px !important;
                margin-right: 5px !important;
            }

            .leaflet-control-zoom a {
                width: 34px !important;
                height: 34px !important;
                line-height: 34px !important;
                font-size: 16px !important;
            }
        }

        @media (max-width: 480px) {
            .search-box input {
                font-size: 11px;
            }

            .search-box .search-btn {
                padding: 3px 8px;
                font-size: 10px;
            }

            .search-box .voice-btn {
                font-size: 14px;
            }

            .action-buttons button {
                width: 24px;
                height: 24px;
                font-size: 10px;
            }

            .service-btn {
                min-width: 28px;
                padding: 2px 4px;
            }

            .service-btn i {
                font-size: 10px;
            }

            .service-btn span {
                font-size: 4px;
            }

            #panel {
                width: 96%;
                right: -100%;
                top: 65px;
            }

            #panel.open {
                right: 2%;
            }
        }

            }

            .panel-header h3 {
                color: #eee;

            .result-item .name {

            }

            .result-item .address {
                color: #aaa;
            }

            .result-item .distance {
                color: #6c9bff;
            }

            .leaflet-control-zoom a {
                background: rgba(26, 26, 46, 0.95) !important;
                color: #ccc !important;

                                bottom: -20px;
                                left: 50%;

                function getDistance(lat1, lon1, lat2, lon2) {
                    var R = 6371;
                    var dLat = (lat2 - lat1) * Math.PI / 180;
                    var dLon = (lon2 - lon1) * Math.PI / 180;
                    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                        Math.sin(dLon / 2) * Math.sin(dLon / 2);
                    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                    return R * c;
                }

                // ============================================================
                // 6. البحث - بيانات محلية + OpenStreetMap
                // ============================================================
                function searchOSM(query, category) {
                    if (!query || query.trim() === '') {
                        showToast('⚠️ ادخل نص للبحث');
                        return;
                    }

                    showLoader('⏳ جاري البحث...');

                    // 1. البحث في البيانات المحلية
                    var localResults = [];
                    var searchCategory = category || 'all';

                    if (searchCategory === 'all') {
                        for (var key in egyptData) {
                            egyptData[key].forEach(function (item) {
                                if (item.name.toLowerCase().includes(query.toLowerCase()) ||
                                    (item.address && item.address.toLowerCase().includes(query.toLowerCase()))) {
                                    localResults.push({ ...item, category: key });
                                }
                            });
                        }
                    } else if (egyptData[searchCategory]) {
                        egyptData[searchCategory].forEach(function (item) {
                            if (item.name.toLowerCase().includes(query.toLowerCase()) ||
                                (item.address && item.address.toLowerCase().includes(query.toLowerCase()))) {
                                localResults.push({ ...item, category: searchCategory });
                            }
                        });
                    }

                    // إذا وجدنا نتائج محلية
                    if (localResults.length > 0) {
                        hideLoader();
                        displayResults(localResults);
                        showToast('✅ تم العثور على ' + localResults.length + ' نتيجة');
                        return;
                    }

                    // 2. البحث في OpenStreetMap (إذا لم توجد نتائج محلية)
                    var searchQuery = query.trim();
                    if (category && category !== 'all') {
                        var categoryMap = {
                            'hospital': 'مستشفى',
                            'pharmacy': 'صيدلية',
                            'bank': 'بنك',
                            'restaurant': 'مطعم',
                            'cafe': 'كافيه',
                            'fuel': 'محطة وقود',
                            'market': 'سوق',
                            'tourist': 'معلم سياحي',
                            'historical': 'أثر',
                            'museum': 'متحف',
                            'beach': 'شاطئ',
                            'entertainment': 'ترفيه',
                            'mosque': 'مسجد',
                            'school': 'مدرسة',
                            'university': 'جامعة',
                            'parking': 'موقف',
                            'metro': 'مترو',
                            'bus': 'أتوبيس',
                            'train': 'قطار',
                            'airport': 'مطار',
                            'police': 'شرطة',
                            'fire': 'دفاع مدني',
                            'atm': 'صراف',
                            'hotel': 'فندق',
                            'park': 'حديقة',
                            'cinema': 'سينما',
                            'gym': 'جيم'
                        };
                        searchQuery = categoryMap[category] || query;
                    }

                    var url = 'https://nominatim.openstreetmap.org/search?q=' +
                        encodeURIComponent(searchQuery) +
                        '&format=json&limit=30&addressdetails=1&accept-language=ar&countrycodes=eg';

                    fetch(url, {
                        headers: { 'User-Agent': 'MyMapApp/1.0' }
                    })
                        .then(function (response) {
                            if (!response.ok) throw new Error('فشل الاتصال');
                            return response.json();
                        })
                        .then(function (data) {
                            hideLoader();
                            if (!data || data.length === 0) {
                                openPanel('<i class="fas fa-search"></i> نتائج البحث',
                                    '<div style="padding:30px 20px;text-align:center;color:#999;"><div style="font-size:40px;">🔍</div><div style="font-size:16px;font-weight:600;color:#333;margin-top:8px;">لا توجد نتائج</div></div>'
                                );
                                showToast('❌ لا توجد نتائج');
                                return;
                            }

                            var results = data.map(function (item) {
                                return {
                                    name: item.display_name.split(',')[0],
                                    address: item.display_name,
                                    lat: parseFloat(item.lat),
                                    lon: parseFloat(item.lon),
                                    category: category || 'بحث'
                                };
                            });

                            displayResults(results);
                            showToast('✅ تم العثور على ' + results.length + ' نتيجة من OpenStreetMap');
                        })
                        .catch(function (error) {
                            hideLoader();
                            console.error('❌ خطأ:', error);
                            showToast('❌ ' + error.message);
                            // عرض رسالة للمستخدم
                            openPanel('<i class="fas fa-search"></i> نتائج البحث',
                                '<div style="padding:30px 20px;text-align:center;color:#e74c3c;"><div style="font-size:40px;">⚠️</div><div style="font-size:16px;font-weight:600;margin-top:8px;">حدث خطأ في البحث</div><div style="font-size:13px;margin-top:4px;">تأكد من اتصال الإنترنت</div></div>'
                            );
                        });
                }

                function displayResults(results) {

                        var address = item.address || '';
                        var category = item.category || 'default';

                        var icon = getIcon(category);
                        var color = getColor(category);

                        var distance = getDistance(userLocation.lat, userLocation.lng, lat, lon);
                        var distanceText = distance < 1 ? (distance * 1000).toFixed(0) + ' م' : distance.toFixed(1) +

                        addCustomMarker(lat, lon, name, icon, color);

                        html += `

                // ============================================================
                // 7. البحث الصوتي
                // ============================================================
                var voiceBtn = document.getElementById('voiceBtn');
                var voiceStatus = document.getElementById('voiceStatus');
                var voiceStatusText = document.getElementById('voiceStatusText');
                var voiceCancelBtn = document.getElementById('voiceCancelBtn');
                var recognition = null;
                var isRecording = false;

                function showVoiceStatus(text) {
                    voiceStatusText.textContent = text;
                    voiceStatus.classList.add('show');
                }

                function hideVoiceStatus() {
                    voiceStatus.classList.remove('show');
                }

                function startVoiceSearch() {
                    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                        showToast('❌ متصفحك لا يدعم البحث الصوتي');
                        return;
                    }

                    if (navigator.permissions) {
                        navigator.permissions.query({ name: 'microphone' })
                            .then(function (result) {
                                if (result.state === 'denied') {
                                    showToast('⚠️ تم رفض إذن الميكروفون');
                                    return;
                                }
                                startListening();
                            })
                            .catch(function () { startListening(); });
                    } else {
                        startListening();
                    }
                }

                function startListening() {
                    try {
                        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                        recognition = new SpeechRecognition();
                        recognition.lang = 'ar-EG';
                        recognition.continuous = false;
                        recognition.interimResults = true;

                        voiceBtn.classList.add('recording');
                        isRecording = true;
                        showVoiceStatus('🎤 تحدث الآن...');

                        recognition.start();

                        recognition.onresult = function (event) {
                            var finalTranscript = '';
                            for (var i = event.resultIndex; i < event.results.length; i++) {
                                if (event.results[i].isFinal) {
                                    finalTranscript = event.results[i][0].transcript;
                                }
                            }

                            if (finalTranscript.trim() !== '') {
                                showVoiceStatus('✅ تم التعرف: "' + finalTranscript + '"');
                                document.getElementById('searchInput').value = finalTranscript;

                                setTimeout(function () {
                                    var activeBtn = document.querySelector('.service-btn.active');
                                    var category = activeBtn ? activeBtn.getAttribute('data-service') :
                                        null;
                                    searchOSM(finalTranscript, category);
                                    hideVoiceStatus();
                                    voiceBtn.classList.remove('recording');
                                    isRecording = false;
                                }, 500);
                            }
                        };

                        recognition.onerror = function (event) {
                            var errorMessages = {
                                'not-allowed': '⚠️ لم تسمح باستخدام الميكروفون',
                                'audio-capture': '⚠️ لا يوجد ميكروفون',
                                'no-speech': '🔇 لم يتم سماع صوت',
                                'aborted': '⏹️ تم الإلغاء'
                            };
                            var msg = errorMessages[event.error] || '❌ حدث خطأ: ' + event.error;
                            showToast(msg);
                            hideVoiceStatus();
                            voiceBtn.classList.remove('recording');
                            isRecording = false;
                        };

                        recognition.onend = function () {
                            if (isRecording) {
                                showToast('🔇 لم يتم سماع صوت، حاول مرة أخرى');
                                hideVoiceStatus();
                                voiceBtn.classList.remove('recording');
                                isRecording = false;
                            }
                        };

                    } catch (error) {
                        showToast('❌ حدث خطأ في تشغيل الميكروفون');
                        voiceBtn.classList.remove('recording');
                        isRecording = false;
                    }
                }

                function stopVoiceSearch() {
                    if (recognition && isRecording) {
                        try { recognition.abort(); } catch (e) { }
                    }
                    hideVoiceStatus();
                    voiceBtn.classList.remove('recording');
                    isRecording = false;
                }

                voiceBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    if (isRecording) {
                        stopVoiceSearch();
                    } else {
                        startVoiceSearch();
                    }
                });

                voiceCancelBtn.addEventListener('click', stopVoiceSearch);

                document.addEventListener('click', function (e) {
                    if (voiceStatus.classList.contains('show') &&
                        !voiceStatus.contains(e.target) &&
                        e.target !== voiceBtn &&
                        !voiceBtn.contains(e.target)) {
                        stopVoiceSearch();
                    }
                });

                // ============================================================
                // 8. المفضلة
                // ============================================================
                window.addFav = function (name, lat, lon) {
                    var displayName = decodeURIComponent(name);
                    var exists = favorites.find(function (f) { return f.lat === lat && f.lon === lon; });
                    if (exists) {
                        showToast('📍 موجود بالفعل');
                        return;
                    }
                    favorites.push({ displayName, lat, lon });
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                    showToast('❤️ تم الحفظ');
                    renderFavorites();
                };

                function removeFav(index) {
                    favorites.splice(index, 1);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                    showToast('🗑️ تم الحذف');
                    renderFavorites();
                }

                function renderFavorites() {
                    if (favorites.length === 0) {
                        openPanel('<i class="fas fa-heart" style="color:#e74c3c;"></i> المفضلة',
                            '<div style="padding:30px 20px;text-align:center;color:#999;"><div style="font-size:40px;">❤️</div><div style="font-size:16px;font-weight:600;color:#333;margin-top:8px;">لا توجد مفضلة</div></div>'
                        );
                        return;
                    }
                    var html = '';
                    favorites.forEach(function (item, index) {
                        html += `
                            <div class="result-item" onclick="map.setView([${item.lat}, ${item.lon}], 15); addCustomMarker(${item.lat}, ${item.lon}, '${item.displayName}', '📍', '#1a73e8'); closePanel();">
                                <div class="info">
                                    <div class="name">📍 ${item.displayName}</div>
                                    <div class="address">${item.lat.toFixed(4)}, ${item.lon.toFixed(4)}</div>
                                </div>
                                <div class="actions">
                                    <button onclick="event.stopPropagation(); removeFav(${index})" style="background:none;border:none;font-size:14px;cursor:pointer;color:#e74c3c;">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                    openPanel('<i class="fas fa-heart" style="color:#e74c3c;"></i> المفضلة (' + favorites.length + ')', html);
                }

                document.getElementById('favoritesBtn').addEventListener('click', function () {
                    renderFavorites();
                });

                // ============================================================
                // 9. تحديد الموقع
                // ============================================================
                document.getElementById('locateBtn').addEventListener('click', function () {
                    if (!navigator.geolocation) {
                        showToast('⚠️ الموقع غير مدعوم');
                        return;
                    }
                    showToast('⏳ جاري التحديد...');
                    navigator.geolocation.getCurrentPosition(
                        function (pos) {
                            map.setView([pos.coords.latitude, pos.coords.longitude], 15);
                            addCustomMarker(pos.coords.latitude, pos.coords.longitude, '📍 موقعك', '📍', '#2ecc71');
                            showToast('✅ تم التحديد');
                        },
                        function () {
                            showToast('⚠️ لم نتمكن من التحديد');
                        }
                    );
                });

                // ============================================================
                // 10. طبقات الخريطة
                // ============================================================
                var layers = {
                    osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap',
                        maxZoom: 19
                    }),
                    dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
                        attribution: '© CartoDB',
                        maxZoom: 19
                    }),
                    satellite: L.tileLayer(
                        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        attribution: '© Esri',
                        maxZoom: 19
                    })
                };

                var currentLayer = layers.osm;
                currentLayer.addTo(map);

                document.getElementById('layersBtn').addEventListener('click', function () {
                    var choice = prompt('اختر الطبقة:\n1- العادي 🏙️\n2- الداكن 🌙\n3- الفضائي 🛰️', '1');
                    map.removeLayer(currentLayer);
                    if (choice === '1' || choice === '') { currentLayer = layers.osm; } else if (choice === '2') {
                        currentLayer = layers.dark;
                    } else if (choice === '3') { currentLayer = layers.satellite; } else {
                        currentLayer = layers.osm;
                    }
                    currentLayer.addTo(map);
                    showToast('✅ تم تبديل الطبقة');
                });

                // ============================================================
                // 11. حركة المرور
                // ============================================================
                var trafficMarkers = [];
                var isTrafficOn = false;

                document.getElementById('trafficBtn').addEventListener('click', function () {
                    isTrafficOn = !isTrafficOn;
                    this.classList.toggle('active');

                    if (isTrafficOn) {
                        trafficMarkers.forEach(function (m) { map.removeLayer(m); });
                        trafficMarkers = [];

                        var points = [
                            { lat: 30.0444, lon: 31.2357, status: 'heavy' },
                            { lat: 30.1200, lon: 31.3000, status: 'moderate' },
                            { lat: 29.9800, lon: 31.1500, status: 'heavy' },
                            { lat: 30.0800, lon: 31.4000, status: 'good' },
                            { lat: 30.0500, lon: 31.2000, status: 'moderate' },
                            { lat: 29.9700, lon: 31.2500, status: 'good' },
                            { lat: 31.2000, lon: 29.9000, status: 'heavy' }
                        ];

                        points.forEach(function (p) {
                            var color = p.status === 'good' ? '#2ecc71' :
                                p.status === 'moderate' ? '#f39c12' : '#e74c3c';
                            var circle = L.circleMarker([p.lat, p.lon], {
                                radius: 10,
                                fillColor: color,
                                color: color,
                                weight: 2,
                                opacity: 0.8,
                                fillOpacity: 0.6
                            }).addTo(map);
                            circle.bindPopup('🚗 حركة مرور: ' +
                                (p.status === 'good' ? 'جيدة' :
                                    p.status === 'moderate' ? 'متوسطة' : 'مزدحمة'));
                            trafficMarkers.push(circle);
                        });
                        showToast('🚗 تم تفعيل المرور');
                    } else {
                        trafficMarkers.forEach(function (m) { map.removeLayer(m); });
                        trafficMarkers = [];
                        showToast('🚗 تم إلغاء المرور');
                    }
                });

                // ============================================================
                // 12. أزرار الخدمات
                // ============================================================
                document.querySelectorAll('.service-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        document.querySelectorAll('.service-btn').forEach(function (b) {
                            b.classList.remove(
                                'active');
                        });
                        this.classList.add('active');
                        var service = this.getAttribute('data-service');
                        currentCategory = service;
                        var searchTerms = {
                            'hospital': 'مستشفى',
                            'pharmacy': 'صيدلية',
                            'bank': 'بنك',
                            'restaurant': 'مطعم',
                            'cafe': 'كافيه',
                            'fuel': 'محطة وقود',
                            'market': 'سوق',
                            'tourist': 'معالم سياحية',
                            'historical': 'أماكن أثرية',
                            'museum': 'متاحف',
                            'beach': 'شواطئ',
                            'entertainment': 'أماكن ترفيهية',
                            'mosque': 'مساجد',
                            'school': 'مدارس',
                            'university': 'جامعات',
                            'parking': 'مواقف',
                            'metro': 'مترو',
                            'bus': 'أتوبيس',
                            'train': 'قطار',
                            'airport': 'مطارات',
                            'police': 'شرطة',
                            'fire': 'دفاع مدني',
                            'atm': 'صرافات',
                            'hotel': 'فنادق',
                            'park': 'حدائق',
                            'cinema': 'سينما',
                            'gym': 'جيم'
                        };
                        var query = searchTerms[service] || service;
                        document.getElementById('searchInput').value = query;
                        searchOSM(query, service);
                    });
                });

                // ============================================================
                // 13. البحث
                // ============================================================
                document.getElementById('searchBtn').addEventListener('click', function () {
                    var query = document.getElementById('searchInput').value;
                    var activeBtn = document.querySelector('.service-btn.active');
                    var category = activeBtn ? activeBtn.getAttribute('data-service') : null;
                    searchOSM(query, category);
                });

                document.getElementById('searchInput').addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        var query = document.getElementById('searchInput').value;
                        var activeBtn = document.querySelector('.service-btn.active');
                        var category = activeBtn ? activeBtn.getAttribute('data-service') : null;
                        searchOSM(query, category);
                    }
                });

                document.getElementById('closePanel').addEventListener('click', function () {
                    closePanel();
                });

                // ============================================================
                // 14. تحميل افتراضي
                // ============================================================
                setTimeout(function () {
                    document.getElementById('searchInput').placeholder = 'ابحث عن أي مكان في مصر...';
                    showToast('🔍 ابحث عن أي مكان في مصر');
                    // عرض السياحة افتراضياً
                    searchOSM('معالم سياحية', 'tourist');
                }, 1000);

                // ============================================================
                // 15. جعل الدوال عامة
                // ============================================================
                window.map = map;
                window.addCustomMarker = addCustomMarker;
                window.closePanel = closePanel;
                window.addFav = addFav;
                window.searchOSM = searchOSM;
                window.egyptData = egyptData;

                console.log('🗺️ خرائط مصر - تعمل 100% ✅');
                console.log('📋 عدد الخدمات: 27 فئة');
                console.log('📍 عدد الأماكن: ' + Object.values(egyptData).reduce(function (a, b) { return a + b.length; },
                    0) + ' مكان');

            } // نهاية initApp

        }); // نهاية DOMContentLoaded
    </script>

</body>

</html>
