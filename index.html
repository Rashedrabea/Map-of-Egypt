<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أورا ماب - خريطة مصر المتطورة</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0b0e14;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ===== الخريطة ===== */
        #map {
            height: 100vh;
            width: 100vw;
            background: #1a1f2e;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* ===== شريط البحث ===== */
        #search-bar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 8px;
            background: rgba(12, 16, 24, 0.92);
            backdrop-filter: blur(20px);
            padding: 6px 12px;
            border-radius: 50px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            width: 90%;
            max-width: 550px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #search-input {
            flex: 1;
            border: none;
            padding: 10px 16px;
            font-size: 15px;
            border-radius: 30px;
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            color: #f0f4fc;
        }
        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        #search-btn {
            background: rgba(60, 140, 255, 0.15);
            color: #8abaff;
            border: 1px solid rgba(60, 140, 255, 0.08);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
        }
        #search-btn:hover {
            background: rgba(60, 140, 255, 0.25);
        }

        /* ===== اللوحة السفلية ===== */
        #bottom-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: min(96%, 750px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: rgba(10, 14, 24, 0.92);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.9);
            flex-wrap: wrap;
            gap: 4px;
            min-height: 60px;
        }
        .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 14px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            color: #8899bb;
            font-size: 0.55rem;
            font-weight: 500;
            border: 2px solid transparent;
            transition: 0.3s ease;
            user-select: none;
            min-width: 48px;
            min-height: 48px;
            justify-content: center;
        }
        .bottom-item i {
            font-size: 1.1rem;
            color: #7bb0ff;
            transition: 0.3s;
        }
        .bottom-item:active {
            transform: scale(0.92);
        }
        .bottom-item.active {
            background: rgba(60, 130, 255, 0.12);
            border-color: #4a9eff;
            color: #ffffff;
        }
        .bottom-item.active i {
            color: #4a9eff;
        }
        .bottom-item.active span {
            color: #4a9eff;
        }
        .bottom-item span {
            font-size: 0.5rem;
            color: #667799;
            transition: 0.3s;
        }
        .bottom-item#mode-traffic.active {
            background: rgba(61, 255, 158, 0.08);
            border-color: #3dff9e;
        }
        .bottom-item#mode-traffic.active i {
            color: #3dff9e;
        }
        .bottom-item#mode-traffic.active span {
            color: #3dff9e;
        }

        /* ===== لوحة المعلومات ===== */
        #info-panel {
            position: absolute;
            bottom: 100px;
            right: 15px;
            z-index: 50;
            background: rgba(10, 14, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 12px 16px;
            min-width: 140px;
            display: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        #info-panel.show {
            display: block;
        }
        #info-panel .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 0.7rem;
            color: #b0c8e8;
        }
        #info-panel .info-row i {
            color: #7bb0ff;
            width: 16px;
            font-size: 0.7rem;
        }

        /* ===== لوحة المرور ===== */
        #traffic-panel {
            position: absolute;
            top: 80px;
            right: 15px;
            z-index: 50;
            background: rgba(10, 14, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 12px 16px;
            min-width: 130px;
            display: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        #traffic-panel.show {
            display: block;
        }
        #traffic-panel h4 {
            color: #e8f0ff;
            font-size: 0.7rem;
            margin-bottom: 8px;
            text-align: center;
        }
        .traffic-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 0.6rem;
            color: #b0c8e8;
        }
        .traffic-row .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .traffic-row .dot.green {
            background: #3dff9e;
        }
        .traffic-row .dot.yellow {
            background: #ffb84d;
        }
        .traffic-row .dot.orange {
            background: #ff9f43;
        }
        .traffic-row .dot.red {
            background: #ff6b6b;
        }
        .traffic-row .count {
            margin-left: auto;
            font-weight: bold;
            color: #e8f0ff;
        }

        /* ===== مؤشر الموقع GPS ===== */
        .gps-marker {
            width: 22px;
            height: 22px;
            background: #3dff9e;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(61, 255, 158, 0.5);
            border: 3px solid rgba(255, 255, 255, 0.15);
            animation: pulse-gps 1.5s ease-in-out infinite;
            position: relative;
        }
        .gps-marker::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 7px;
            height: 7px;
            background: #3dff9e;
            border-radius: 50%;
        }
        @keyframes pulse-gps {
            0% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(61, 255, 158, 0.5), 0 0 80px rgba(61, 255, 158, 0.1);
            }
            100% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.3);
            }
        }

        /* ===== مؤشر البحث ===== */
        .search-marker {
            width: 30px;
            height: 30px;
            background: #ff6b6b;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.4);
            border: 3px solid #fff;
            position: relative;
        }
        .search-marker::after {
            content: '';
            position: absolute;
            top: 9px;
            left: 9px;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            transform: rotate(45deg);
        }

        /* ===== نقاط المرور ===== */
        .traffic-dot {
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* ===== حالة الاتصال ===== */
        #status-bar {
            position: absolute;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            padding: 4px 16px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.02);
            display: none;
        }
        #status-bar.online {
            border-color: rgba(61, 255, 158, 0.1);
            color: rgba(61, 255, 158, 0.3);
        }
        #status-bar.offline {
            border-color: rgba(255, 107, 107, 0.1);
            color: rgba(255, 107, 107, 0.3);
        }

        /* ===== Leaflet ===== */
        .leaflet-control-attribution {
            display: none !important;
        }
        .leaflet-control-zoom {
            display: none !important;
        }

        /* ===== استجابة ===== */
        @media (max-width: 480px) {
            #bottom-bar {
                bottom: 12px;
                padding: 6px 8px;
                border-radius: 40px;
                min-height: 48px;
                gap: 2px;
            }
            .bottom-item {
                padding: 4px 8px;
                min-width: 38px;
                min-height: 38px;
            }
            .bottom-item i {
                font-size: 0.85rem;
            }
            .bottom-item span {
                font-size: 0.4rem;
            }
            #search-bar {
                top: 10px;
                padding: 4px 10px;
            }
            #search-input {
                font-size: 13px;
                padding: 8px 12px;
            }
            #search-btn {
                padding: 8px 14px;
                font-size: 14px;
            }
            #info-panel {
                bottom: 80px;
                right: 10px;
                padding: 8px 12px;
                min-width: 100px;
            }
            #info-panel .info-row {
                font-size: 0.6rem;
            }
            #traffic-panel {
                top: 70px;
                right: 10px;
                padding: 8px 12px;
                min-width: 100px;
            }
            #traffic-panel h4 {
                font-size: 0.6rem;
            }
            .traffic-row {
                font-size: 0.5rem;
            }
            #status-bar {
                bottom: 75px;
                font-size: 0.4rem;
                padding: 2px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== الخريطة ===== -->
    <div id="map"></div>

    <!-- ===== شريط البحث ===== -->
    <div id="search-bar">
        <input type="text" id="search-input" placeholder="ابحث عن مدينة، شارع، معلم..." />
        <button id="search-btn">🔍</button>
    </div>

    <!-- ===== حالة الاتصال ===== -->
    <div id="status-bar" class="online">📡 متصل</div>

    <!-- ===== لوحة المعلومات ===== -->
    <div id="info-panel">
        <div class="info-row"><i class="fas fa-route"></i> المسافة: <span id="distance">--</span> كم</div>
        <div class="info-row"><i class="fas fa-clock"></i> الوقت: <span id="time">--</span> دقيقة</div>
        <div class="info-row"><i class="fas fa-map-pin"></i> الوجهة: <span id="destination">--</span></div>
    </div>

    <!-- ===== لوحة المرور ===== -->
    <div id="traffic-panel">
        <h4>🚦 نقاط الازدحام</h4>
        <div class="traffic-row"><span class="dot green"></span> ممتاز <span class="count" id="traffic-green">0</span></div>
        <div class="traffic-row"><span class="dot yellow"></span> متوسط <span class="count" id="traffic-yellow">0</span></div>
        <div class="traffic-row"><span class="dot orange"></span> مزدحم <span class="count" id="traffic-orange">0</span></div>
        <div class="traffic-row"><span class="dot red"></span> ازدحام شديد <span class="count" id="traffic-red">0</span></div>
    </div>

    <!-- ===== اللوحة السفلية ===== -->
    <div id="bottom-bar">
        <div class="bottom-item active" id="mode-street"><i class="fas fa-road"></i><span>شارع</span></div>
        <div class="bottom-item" id="mode-satellite"><i class="fas fa-satellite"></i><span>قمر</span></div>
        <div class="bottom-item" id="mode-terrain"><i class="fas fa-mountain"></i><span>تضاريس</span></div>
        <div class="bottom-item" id="mode-night"><i class="fas fa-moon"></i><span>ليلي</span></div>
        <div class="bottom-item" id="mode-navigation"><i class="fas fa-route"></i><span>ملاحة</span></div>
        <div class="bottom-item" id="mode-traffic"><i class="fas fa-car"></i><span>مرور</span></div>
    </div>

    <script>
        // ================================================================
        //  1. تحميل Font Awesome
        // ================================================================
        var fontAwesome = document.createElement('link');
        fontAwesome.rel = 'stylesheet';
        fontAwesome.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css';
        document.head.appendChild(fontAwesome);

        // ================================================================
        //  2. تهيئة الخريطة
        // ================================================================
        var map = L.map('map', {
            center: [26.8206, 30.8025],
            zoom: 6,
            zoomControl: true,
        });

        // ===== طبقات الخريطة =====
        var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var satelliteLayer = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            });

        var terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });

        var nightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });

        var currentLayer = streetLayer;

        // ================================================================
        //  3. تبديل الأنماط
        // ================================================================
        function switchLayer(layer, btn) {
            if (currentLayer) map.removeLayer(currentLayer);
            currentLayer = layer;
            map.addLayer(layer);
            document.querySelectorAll('.bottom-item').forEach(function(el) {
                el.classList.remove('active');
            });
            if (btn) btn.classList.add('active');
            showToast('🗺️ تم تغيير النمط');
        }

        document.getElementById('mode-street').addEventListener('click', function() {
            switchLayer(streetLayer, this);
        });
        document.getElementById('mode-satellite').addEventListener('click', function() {
            switchLayer(satelliteLayer, this);
        });
        document.getElementById('mode-terrain').addEventListener('click', function() {
            switchLayer(terrainLayer, this);
        });
        document.getElementById('mode-night').addEventListener('click', function() {
            switchLayer(nightLayer, this);
        });

        // ================================================================
        //  4. GPS - تحديد الموقع
        // ================================================================
        var userMarker = null;
        var userCircle = null;
        var userPos = null;

        function createGPSIcon() {
            return L.divIcon({
                className: 'gps-marker',
                iconSize: [22, 22],
                iconAnchor: [11, 11],
                html: '<div></div>'
            });
        }

        function updateLocation(pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            var acc = pos.coords.accuracy || 30;
            userPos = [lat, lng];

            if (userMarker) {
                userMarker.setLatLng([lat, lng]);
                if (userCircle) userCircle.setLatLng([lat, lng]);
            } else {
                var icon = createGPSIcon();
                userMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                userCircle = L.circle([lat, lng], {
                    radius: acc,
                    color: '#3dff9e',
                    fillColor: '#3dff9e',
                    fillOpacity: 0.06,
                    weight: 1.5,
                    opacity: 0.5,
                }).addTo(map);

                // الطيران إلى الموقع
                map.flyTo([lat, lng], 15, { duration: 1.5 });
                showToast('📍 تم تحديد موقعك');
            }

            // تحديث اسم الموقع
            fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng +
                    '&zoom=18&accept-language=ar')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var addr = data.display_name || 'موقعك الحالي';
                    document.getElementById('destination').textContent = addr.split(',').slice(0, 3).join(', ');
                })['catch'](function() {});
        }

        function locateUser() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(updateLocation, function() {
                    alert('⚠️ لم نتمكن من تحديد موقعك. تأكد من تشغيل GPS.');
                }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 });
                navigator.geolocation.watchPosition(updateLocation, null, { enableHighAccuracy: true, maximumAge: 5000,
                    timeout: 15000 });
            } else {
                alert('⚠️ متصفحك لا يدعم تحديد الموقع');
            }
        }

        // تشغيل GPS تلقائياً بعد ثانية
        setTimeout(locateUser, 1000);

        // زر تحديد الموقع (النقر المزدوج على شريط البحث)
        document.getElementById('search-bar').addEventListener('dblclick', function() {
            if (userPos) {
                map.flyTo(userPos, 16, { duration: 1.2 });
                showToast('📍 العودة إلى موقعك');
            } else {
                locateUser();
            }
        });

        // ================================================================
        //  5. البحث
        // ================================================================
        var searchInput = document.getElementById('search-input');
        var searchBtn = document.getElementById('search-btn');
        var searchMarker = null;

        function clearSearchMarker() {
            if (searchMarker) {
                map.removeLayer(searchMarker);
                searchMarker = null;
            }
        }

        function addSearchMarker(lat, lng, name) {
            clearSearchMarker();
            var icon = L.divIcon({
                className: 'search-marker',
                iconSize: [30, 30],
                iconAnchor: [15, 30],
                html: '<div></div>'
            });
            searchMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
            searchMarker.bindPopup('📍 ' + name);
            map.flyTo([lat, lng], 15, { duration: 1.2 });
            setTimeout(function() { if (searchMarker) searchMarker.openPopup(); }, 600);
        }

        async function searchLocation() {
            var query = searchInput.value.trim();
            if (query.length < 2) {
                alert('⚠️ اكتب أكثر من حرفين');
                return;
            }

            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query) +
                '&limit=6&lang=ar&addressdetails=1&countrycodes=eg';

            try {
                var res = await fetch(url, { headers: { 'User-Agent': 'AoraMap/1.0' } });
                var data = await res.json();

                if (!data || data.length === 0) {
                    alert('❌ لا توجد نتائج');
                    return;
                }

                var item = data[0];
                var lat = parseFloat(item.lat);
                var lon = parseFloat(item.lon);
                var name = item.display_name.split(',')[0] || 'موقع';

                addSearchMarker(lat, lon, name);
                document.getElementById('destination').textContent = name;
                document.getElementById('info-panel').classList.add('show');

                // حساب المسافة من القاهرة
                var cairo = [30.0444, 31.2357];
                var dist = calcDistance(cairo[0], cairo[1], lat, lon);
                document.getElementById('distance').textContent = dist.toFixed(1);
                document.getElementById('time').textContent = Math.round(dist / 60 * 60);

                searchInput.value = name;
                showToast('📍 تم الانتقال إلى: ' + name);

            } catch (err) {
                alert('⚠️ خطأ في البحث، حاول مرة أخرى');
            }
        }

        searchBtn.addEventListener('click', searchLocation);
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchLocation();
        });

        // ================================================================
        //  6. حساب المسافة
        // ================================================================
        function calcDistance(lat1, lon1, lat2, lon2) {
            var R = 6371;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // ================================================================
        //  7. النقر على الخريطة
        // ================================================================
        map.on('click', async function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            try {
                var res = await fetch(
                    'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng +
                    '&zoom=10&lang=ar', { headers: { 'User-Agent': 'AoraMap/1.0' } }
                );
                var data = await res.json();
                var name = data.display_name || '📍 موقع مختار';
                document.getElementById('destination').textContent = name.split(',')[0];
            } catch {
                document.getElementById('destination').textContent = '📍 موقع مختار';
            }

            clearSearchMarker();

            var cairo = [30.0444, 31.2357];
            var dist = calcDistance(cairo[0], cairo[1], lat, lng);
            document.getElementById('distance').textContent = dist.toFixed(1);
            document.getElementById('time').textContent = Math.round(dist / 60 * 60);
            document.getElementById('info-panel').classList.add('show');
        });

        // ================================================================
        //  8. نقاط المرور الحقيقية (مصر - محاكاة دقيقة)
        // ================================================================
        var trafficPoints = [
            // القاهرة الكبرى
            { lat: 30.0444, lng: 31.2357, name: 'ميدان التحرير', status: 'heavy' },
            { lat: 30.0550, lng: 31.2260, name: 'شارع الهرم', status: 'congested' },
            { lat: 30.0380, lng: 31.2300, name: 'ميدان رمسيس', status: 'heavy' },
            { lat: 30.0480, lng: 31.2380, name: 'كورنيش النيل', status: 'moderate' },
            { lat: 30.0650, lng: 31.2000, name: 'مدينة 6 أكتوبر', status: 'moderate' },
            { lat: 30.0200, lng: 31.2300, name: 'المعادي', status: 'congested' },
            { lat: 30.0800, lng: 31.2800, name: 'مدينة نصر', status: 'heavy' },
            { lat: 30.0900, lng: 31.3200, name: 'مصر الجديدة', status: 'moderate' },
            { lat: 30.0300, lng: 31.2100, name: 'الزمالك', status: 'excellent' },

            // الإسكندرية
            { lat: 31.2000, lng: 29.9167, name: 'كورنيش الإسكندرية', status: 'congested' },
            { lat: 31.2150, lng: 29.9500, name: 'شارع سموحة', status: 'moderate' },
            { lat: 31.1800, lng: 29.9000, name: 'محطة الرمل', status: 'heavy' },

            // بورسعيد
            { lat: 31.2667, lng: 32.3000, name: 'بورسعيد', status: 'moderate' },

            // السويس
            { lat: 29.9667, lng: 32.5500, name: 'السويس', status: 'moderate' },

            // الدلتا
            { lat: 31.0333, lng: 31.3833, name: 'المنصورة', status: 'excellent' },
            { lat: 30.7833, lng: 31.0000, name: 'طنطا', status: 'excellent' },
            { lat: 30.5833, lng: 31.5000, name: 'الزقازيق', status: 'excellent' },
            { lat: 31.0333, lng: 30.4667, name: 'دمنهور', status: 'excellent' },
            { lat: 31.1167, lng: 30.9500, name: 'كفر الشيخ', status: 'excellent' },

            // الصعيد
            { lat: 27.1833, lng: 31.1667, name: 'أسيوط', status: 'congested' },
            { lat: 26.5500, lng: 31.7000, name: 'سوهاج', status: 'moderate' },
            { lat: 26.1667, lng: 32.7167, name: 'قنا', status: 'excellent' },
            { lat: 25.6833, lng: 32.6500, name: 'الأقصر', status: 'moderate' },
            { lat: 24.0833, lng: 32.9000, name: 'أسوان', status: 'excellent' },

            // الفيوم وبني سويف
            { lat: 29.3167, lng: 30.8333, name: 'الفيوم', status: 'excellent' },
            { lat: 29.0833, lng: 31.0833, name: 'بني سويف', status: 'excellent' },
            { lat: 28.1167, lng: 30.7500, name: 'المنيا', status: 'moderate' },

            // دمياط ومطروح
            { lat: 31.4167, lng: 31.8167, name: 'دمياط', status: 'excellent' },
            { lat: 31.3333, lng: 27.2333, name: 'مرسى مطروح', status: 'excellent' },
        ];

        var statusColors = {
            'excellent': '#3dff9e',
            'moderate': '#ffb84d',
            'congested': '#ff9f43',
            'heavy': '#ff6b6b'
        };

        var statusNames = {
            'excellent': 'ممتاز',
            'moderate': 'متوسط',
            'congested': 'مزدحم',
            'heavy': 'ازدحام شديد'
        };

        var statusSizes = {
            'excellent': 8,
            'moderate': 13,
            'congested': 18,
            'heavy': 24
        };

        var trafficMarkers = [];
        var trafficVisible = false;

        function createTrafficDots() {
            trafficMarkers.forEach(function(m) { if (m) map.removeLayer(m); });
            trafficMarkers = [];

            var counts = { excellent: 0, moderate: 0, congested: 0, heavy: 0 };

            trafficPoints.forEach(function(point) {
                var color = statusColors[point.status] || '#7bb0ff';
                var size = statusSizes[point.status] || 10;
                var statusName = statusNames[point.status] || 'غير معروف';

                var icon = L.divIcon({
                    className: 'traffic-dot',
                    html: '<div style="background:' + color +
                        ';border-radius:50%;width:' + size + 'px;height:' + size +
                        'px;border:2px solid rgba(255,255,255,0.1);box-shadow:0 0 20px ' +
                        color + '44;animation:pulse-dot 2s ease-in-out infinite;"></div>',
                    iconSize: [size, size],
                    iconAnchor: [size / 2, size / 2],
                });

                var marker = L.marker([point.lat, point.lng], { icon: icon })
                    .addTo(map)
                    .bindPopup('<strong>' + point.name + '</strong><br>🟢 الحالة: ' + statusName);

                trafficMarkers.push(marker);
                counts[point.status]++;
            });

            document.getElementById('traffic-green').textContent = counts.excellent;
            document.getElementById('traffic-yellow').textContent = counts.moderate;
            document.getElementById('traffic-orange').textContent = counts.congested;
            document.getElementById('traffic-red').textContent = counts.heavy;
        }

        function removeTrafficDots() {
            trafficMarkers.forEach(function(m) { if (m) map.removeLayer(m); });
            trafficMarkers = [];
        }

        // ================================================================
        //  9. زر المرور
        // ================================================================
        var trafficBtn = document.getElementById('mode-traffic');
        var trafficPanel = document.getElementById('traffic-panel');

        trafficBtn.addEventListener('click', function() {
            trafficVisible = !trafficVisible;
            this.classList.toggle('active', trafficVisible);

            if (trafficVisible) {
                trafficPanel.classList.add('show');
                createTrafficDots();
                showToast('🚦 نقاط الازدحام على مستوى مصر');
            } else {
                trafficPanel.classList.remove('show');
                removeTrafficDots();
                showToast('📍 تم إخفاء نقاط المرور');
            }
        });

        // تشغيل المرور تلقائياً عند التحميل
        setTimeout(function() {
            trafficBtn.click();
        }, 1500);

        // ================================================================
        //  10. الملاحة
        // ================================================================
        var navMode = false;

        document.getElementById('mode-navigation').addEventListener('click', function() {
            navMode = !navMode;
            this.classList.toggle('active', navMode);

            if (navMode) {
                if (!userPos) {
                    alert('⚠️ حدد موقعك أولاً (انتظر حتى يظهر GPS)');
                    navMode = false;
                    this.classList.remove('active');
                    return;
                }

                var dest = prompt('📍 أدخل اسم الوجهة:');
                if (!dest) {
                    navMode = false;
                    this.classList.remove('active');
                    return;
                }

                var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(dest) +
                    '&limit=1&lang=ar&addressdetails=1&countrycodes=eg';

                fetch(url, { headers: { 'User-Agent': 'AoraMap/1.0' } })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (!data || data.length === 0) {
                            alert('❌ لم يتم العثور على: ' + dest);
                            navMode = false;
                            document.getElementById('mode-navigation').classList.remove('active');
                            return;
                        }

                        var item = data[0];
                        var lat = parseFloat(item.lat);
                        var lon = parseFloat(item.lon);
                        var name = item.display_name.split(',')[0] || dest;

                        // رسم خط المسار
                        var routeLine = L.polyline([
                            [userPos[0], userPos[1]],
                            [lat, lon]
                        ], {
                            color: '#ff4444',
                            weight: 5,
                            opacity: 0.9,
                            dashArray: '8, 6',
                            lineJoin: 'round',
                        }).addTo(map);

                        // نقاط البداية والنهاية
                        var sIcon = L.divIcon({
                            html: '<div style="background:#00ff44;border-radius:50%;width:18px;height:18px;border:3px solid #fff;box-shadow:0 0 20px rgba(0,255,68,0.5);"></div>',
                            iconSize: [18, 18],
                            iconAnchor: [9, 9]
                        });
                        L.marker([userPos[0], userPos[1]], { icon: sIcon }).addTo(map).bindPopup('🟢 البداية');

                        var eIcon = L.divIcon({
                            html: '<div style="background:#ff2222;border-radius:50%;width:18px;height:18px;border:3px solid #fff;box-shadow:0 0 20px rgba(255,34,34,0.5);"></div>',
                            iconSize: [18, 18],
                            iconAnchor: [9, 9]
                        });
                        L.marker([lat, lon], { icon: eIcon }).addTo(map).bindPopup('🔴 ' + name);

                        var dist = calcDistance(userPos[0], userPos[1], lat, lon);
                        var time = Math.round(dist / 60 * 60);

                        document.getElementById('distance').textContent = dist.toFixed(1);
                        document.getElementById('time').textContent = time;
                        document.getElementById('destination').textContent = name;
                        document.getElementById('info-panel').classList.add('show');

                        map.flyToBounds([
                            [userPos[0], userPos[1]],
                            [lat, lon]
                        ], { padding: [60, 60], maxZoom: 13 });

                        showToast('🧭 المسافة: ' + dist.toFixed(1) + ' كم - ' + time + ' دقائق');

                        // إلغاء الملاحة بعد 5 ثواني أو عند النقر على الزر مرة أخرى
                        var navInterval = setInterval(function() {
                            if (!document.getElementById('mode-navigation').classList.contains('active')) {
                                clearInterval(navInterval);
                                map.removeLayer(routeLine);
                            }
                        }, 1000);

                    })['catch'](function() {
                        alert('⚠️ خطأ في البحث عن الوجهة');
                        navMode = false;
                        document.getElementById('mode-navigation').classList.remove('active');
                    });

            } else {
                showToast('📍 تم إلغاء الملاحة');
            }
        });

        // ================================================================
        //  11. حالة الاتصال
        // ================================================================
        var statusBar = document.getElementById('status-bar');

        function updateStatus() {
            if (navigator.onLine) {
                statusBar.className = 'online';
                statusBar.textContent = '📡 متصل';
            } else {
                statusBar.className = 'offline';
                statusBar.textContent = '📡 غير متصل - وضع Offline';
            }
            statusBar.style.display = 'block';
        }

        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        updateStatus();

        // ================================================================
        //  12. Toast
        // ================================================================
        function showToast(msg) {
            var t = document.createElement('div');
            t.style.position = 'absolute';
            t.style.top = '80px';
            t.style.left = '50%';
            t.style.transform = 'translateX(-50%)';
            t.style.zIndex = '999';
            t.style.padding = '8px 20px';
            t.style.background = 'rgba(0,0,0,0.8)';
            t.style.backdropFilter = 'blur(12px)';
            t.style.borderRadius = '40px';
            t.style.border = '1px solid rgba(255,255,255,0.05)';
            t.style.color = '#fff';
            t.style.fontSize = '0.8rem';
            t.style.maxWidth = '90%';
            t.style.textAlign = 'center';
            t.innerHTML = msg;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                setTimeout(function() { t.remove(); }, 900);
            }, 3000);
        }

        // ================================================================
        //  13. تحسين حجم الخريطة
        // ================================================================
        setTimeout(function() {
            map.invalidateSize();
        }, 500);

        console.log('🚀 أورا ماب - خريطة مصر المتطورة');
        console.log('📍 جميع الميزات: GPS، بحث، مرور، ملاحة، أنماط');
    </script>
</body>
</html>
