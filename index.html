<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🗺️ خرائط مصر الشاملة - بحث كل شيء</title>

    <!-- ===== المكتبات ===== -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            direction: rtl;
            background: #1a1a2e;
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 0;
            background: #1a1a2e;
        }

        /* شاشة التحميل */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0d47a1, #1a73e8, #0d47a1);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.8s ease;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        #loading .icon {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        #loading h1 {
            font-size: 28px;
            margin-top: 15px;
            font-weight: 700;
        }

        #loading p {
            opacity: 0.8;
            margin-top: 5px;
            font-size: 15px;
        }

        .loader-container {
            margin-top: 25px;
            width: 180px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .loader-bar {
            height: 100%;
            width: 0%;
            background: white;
            border-radius: 4px;
            animation: loadProgress 2.5s ease forwards;
        }

        @keyframes loadProgress {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        /* شريط البحث العلوي */
        .search-container {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 6px;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 6px 14px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            width: 96%;
            max-width: 850px;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 8px 0;
            font-size: 14px;
            outline: none;
            background: transparent;
            color: #333;
        }

        .search-box input::placeholder {
            color: #999;
        }

        .search-box .search-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .search-box .search-btn:hover {
            background: #0d47a1;
            transform: scale(1.02);
        }

        .search-box .voice-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #666;
            padding: 4px 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .search-box .voice-btn:hover {
            background: #f0f0f0;
            transform: scale(1.1);
        }

        .search-box .voice-btn.recording {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        /* أزرار التحكم */
        .action-buttons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .action-buttons button {
            background: #f1f3f4;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            color: #555;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-buttons button:hover {
            background: #e2e6ea;
            transform: scale(1.05);
        }

        .leaflet-control-zoom {
            margin-bottom: 85px !important;
            margin-right: 10px !important;
            border: none !important;
        }

        .leaflet-control-zoom a {
            background: rgba(255, 255, 255, 0.95) !important;
            color: #333 !important;
            border-radius: 10px !important;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1) !important;
            width: 40px !important;
            height: 40px !important;
            line-height: 40px !important;
            font-size: 18px !important;
            border: none !important;
            transition: all 0.3s ease !important;
        }

        /* مؤشر الصوت */
        .voice-status {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .voice-status.show {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .voice-status .wave {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .voice-status .wave span {
            display: block;
            width: 3px;
            height: 15px;
            background: white;
            border-radius: 2px;
            animation: wave 0.8s ease infinite;
        }

        .voice-status .wave span:nth-child(2) {
            animation-delay: 0.1s;
            height: 25px;
        }

        .voice-status .wave span:nth-child(3) {
            animation-delay: 0.2s;
            height: 35px;
        }

        .voice-status .wave span:nth-child(4) {
            animation-delay: 0.3s;
            height: 25px;
        }

        .voice-status .wave span:nth-child(5) {
            animation-delay: 0.4s;
            height: 15px;
        }

        @keyframes wave {

            0%,
            100% {
                transform: scaleY(0.5);
            }

            50% {
                transform: scaleY(1);
            }
        }

        .voice-status .cancel-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .voice-status .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        /* مؤشر التحميل */
        .search-loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 25px 35px;
            border-radius: 16px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .search-loader.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .search-loader .loader-spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .search-loader .loader-text {
            font-size: 15px;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* لوحة النتائج */
        #panel {
            position: absolute;
            top: 75px;
            right: -420px;
            width: 400px;
            max-height: calc(100vh - 160px);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: none;
            flex-direction: column;
        }

        #panel.open {
            display: flex;
            right: 15px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
            background: rgba(255, 255, 255, 0.8);
            flex-shrink: 0;
        }

        .panel-header h3 {
            font-size: 14px;
            color: #1a1a1a;
        }

        .panel-header button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
            transition: all 0.3s ease;
        }

        .panel-header button:hover {
            transform: rotate(90deg);
        }

        #panelContent {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .result-item {
            padding: 8px 14px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-item:hover {
            background: #f8f9fa;
            transform: translateX(-3px);
        }

        .result-item .info {
            flex: 1;
        }

        .result-item .name {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 13px;
        }

        .result-item .address {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        .result-item .distance {
            font-size: 10px;
            color: #1a73e8;
            margin-top: 2px;
        }

        .result-item .actions {
            display: flex;
            gap: 4px;
        }

        .result-item .actions button {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 3px;
            border-radius: 50%;
            transition: all 0.3s ease;
            color: #666;
        }

        .result-item .actions button:hover {
            background: #f0f0f0;
            transform: scale(1.1);
        }

        .result-item .actions .fav-btn {
            color: #e74c3c;
        }

        .result-item .actions .route-btn {
            color: #1a73e8;
        }

        /* مؤشر التوجيه */
        #navigationGuide {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1500;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: none;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            font-size: 13px;
        }

        #navigationGuide.show {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        #navigationGuide .direction-arrow {
            font-size: 24px;
        }

        #navigationGuide .direction-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #navigationGuide .direction-info .dest {
            font-weight: 600;
            color: #2ecc71;
        }

        #navigationGuide .direction-info .dist {
            font-size: 11px;
            color: #aaa;
        }

        #navigationGuide .close-guide {
            background: none;
            border: none;
            color: #999;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
        }

        /* رسائل */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            z-index: 2000;
            font-size: 12px;
            animation: toastIn 0.4s ease;
            pointer-events: none;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 768px) {
            .search-container {
                top: 8px;
                padding: 4px 10px;
                flex-wrap: wrap;
                border-radius: 25px;
                gap: 4px;
            }

            .search-box input {
                font-size: 12px;
                padding: 5px 0;
            }

            .search-box .search-btn {
                padding: 4px 10px;
                font-size: 11px;
            }

            .search-box .voice-btn {
                font-size: 16px;
                padding: 2px 6px;
            }

            .action-buttons button {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }

            #panel {
                width: 94%;
                right: -100%;
                top: 70px;
                max-height: calc(100vh - 160px);
            }

            #panel.open {
                right: 3%;
            }

            .leaflet-control-zoom {
                margin-bottom: 75px !important;
                margin-right: 5px !important;
            }

            .leaflet-control-zoom a {
                width: 34px !important;
                height: 34px !important;
                line-height: 34px !important;
                font-size: 16px !important;
            }

            #navigationGuide {
                bottom: 100px;
                padding: 8px 16px;
                font-size: 12px;
            }

            #navigationGuide .direction-arrow {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .search-box input {
                font-size: 11px;
            }

            .search-box .search-btn {
                padding: 3px 8px;
                font-size: 10px;
            }

            .search-box .voice-btn {
                font-size: 14px;
            }

            .action-buttons button {
                width: 24px;
                height: 24px;
                font-size: 10px;
            }

            #panel {
                width: 96%;
                right: -100%;
                top: 65px;
            }

            #panel.open {
                right: 2%;
            }
        }

        @media (prefers-color-scheme: dark) {
            .search-container {
                background: rgba(26, 26, 46, 0.97);
            }

            .search-box input {
                color: #eee;
            }

            .search-box input::placeholder {
                color: #666;
            }

            .search-box .voice-btn {
                color: #aaa;
            }

            .search-box .voice-btn:hover {
                background: #2a2a3e;
            }

            .action-buttons button {
                background: #2a2a3e;
                color: #ccc;
            }

            .action-buttons button:hover {
                background: #3a3a4e;
            }

            #panel {
                background: rgba(26, 26, 46, 0.98);
            }

            .panel-header {
                background: rgba(26, 26, 46, 0.9);
                border-color: #2a2a3e;
            }

            .panel-header h3 {
                color: #eee;
            }

            .result-item {
                border-color: #2a2a3e;
            }

            .result-item:hover {
                background: #2a2a3e;
            }

            .result-item .name {
                color: #eee;
            }

            .result-item .address {
                color: #aaa;
            }

            .result-item .distance {
                color: #6c9bff;
            }

            .leaflet-control-zoom a {
                background: rgba(26, 26, 46, 0.95) !important;
                color: #ccc !important;
            }

            #navigationGuide {
                background: rgba(0, 0, 0, 0.9);
            }

            .search-loader {
                background: rgba(0, 0, 0, 0.85);
            }
        }
    </style>
</head>

<body>

    <!-- ===== شاشة التحميل ===== -->
    <div id="loading">
        <div class="icon">🗺️</div>
        <h1>خرائط مصر الشاملة</h1>
        <p>ابحث عن أي مكان، شارع، منطقة، أو خدمة</p>
        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
    </div>

    <!-- ===== الخريطة ===== -->
    <div id="map"></div>

    <!-- ===== شريط البحث ===== -->
    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search" style="color:#1a73e8;"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن شارع، منطقة، مستشفى، بنك، مطعم...">
            <button class="voice-btn" id="voiceBtn" title="بحث صوتي">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="search-btn" id="searchBtn"><i class="fas fa-arrow-left"></i> بحث</button>
        </div>
        <div class="action-buttons">
            <button id="locateBtn" title="موقعي"><i class="fas fa-location-dot"></i></button>
            <button id="layersBtn" title="طبقات"><i class="fas fa-layer-group"></i></button>
            <button id="favoritesBtn" title="المفضلة"><i class="fas fa-heart"></i></button>
            <button id="trafficBtn" title="المرور"><i class="fas fa-car"></i></button>
            <button id="routeBtn" title="توجيه"><i class="fas fa-route"></i></button>
            <button id="clearRouteBtn" title="إلغاء المسار"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- ===== مؤشر الصوت ===== -->
    <div class="voice-status" id="voiceStatus">
        <div class="wave">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        <span class="text" id="voiceStatusText">🎤 استمع...</span>
        <button class="cancel-btn" id="voiceCancelBtn"><i class="fas fa-xmark"></i></button>
    </div>

    <!-- ===== مؤشر التحميل ===== -->
    <div class="search-loader" id="searchLoader">
        <div class="loader-spinner"></div>
        <div class="loader-text" id="loaderText">⏳ جاري البحث...</div>
    </div>

    <!-- ===== مؤشر التوجيه ===== -->
    <div id="navigationGuide">
        <span class="direction-arrow">📍</span>
        <div class="direction-info">
            <span class="dest" id="guideDest">الوجهة</span>
            <span class="dist" id="guideDist">0 كم</span>
        </div>
        <button class="close-guide" id="closeGuide"><i class="fas fa-xmark"></i></button>
    </div>

    <!-- ===== لوحة النتائج ===== -->
    <div id="panel">
        <div class="panel-header">
            <h3 id="panelTitle"><i class="fas fa-list"></i> النتائج</h3>
            <button id="closePanel"><i class="fas fa-xmark"></i></button>
        </div>
        <div id="panelContent"></div>
    </div>

    <!-- ============================================================ -->
    <!-- JavaScript -->
    <!-- ============================================================ -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            var loading = document.getElementById('loading');

            // ============================================================
            // 1. التحقق من Leaflet
            // ============================================================
            if (typeof L === 'undefined') {
                var script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
                script.onload = function () {
                    if (typeof L !== 'undefined') {
                        loading.classList.add('hide');
                        setTimeout(function () { loading.style.display = 'none'; }, 800);
                        initApp();
                    }
                };
                script.onerror = function () {
                    loading.innerHTML = `
                        <div style="text-align:center;padding:20px;">
                            <div style="font-size:50px;">⚠️</div>
                            <h2>خطأ في التحميل</h2>
                            <p style="opacity:0.8;margin:10px 0;">تأكد من اتصال الإنترنت</p>
                            <button onclick="location.reload()" style="background:white;color:#1a73e8;border:none;padding:10px 30px;border-radius:30px;font-size:16px;cursor:pointer;margin-top:15px;">إعادة المحاولة</button>
                        </div>
                    `;
                };
                document.head.appendChild(script);
                return;
            }

            setTimeout(function () {
                loading.classList.add('hide');
                setTimeout(function () { loading.style.display = 'none'; }, 800);
            }, 2500);

            initApp();

            function initApp() {

                // ============================================================
                // 2. الخريطة
                // ============================================================
                var map = L.map('map', {
                    center: [26.8206, 30.8025],
                    zoom: 6,
                    zoomControl: true,
                    fadeAnimation: true,
                    zoomAnimation: true,
                    inertia: true,
                    keyboard: true,
                    doubleClickZoom: true
                });

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap',
                    maxZoom: 19
                }).addTo(map);

                // ============================================================
                // 3. المتغيرات
                // ============================================================
                var currentMarker = null;
                var favorites = JSON.parse(localStorage.getItem('favorites')) || [];
                var panel = document.getElementById('panel');
                var panelContent = document.getElementById('panelContent');
                var panelTitle = document.getElementById('panelTitle');
                var markers = [];
                var routingControl = null;
                var directionMarker = null;
                var trafficMarkers = [];

                // ============================================================
                // 4. الدوال الأساسية
                // ============================================================
                function showToast(msg, duration) {
                    duration = duration || 3000;
                    var old = document.querySelector('.toast');
                    if (old) old.remove();
                    var toast = document.createElement('div');
                    toast.className = 'toast';
                    toast.textContent = msg;
                    document.body.appendChild(toast);
                    setTimeout(function () { toast.remove(); }, duration);
                }

                function showLoader(text) {
                    document.getElementById('loaderText').textContent = text || '⏳ جاري البحث...';
                    document.getElementById('searchLoader').classList.add('show');
                }

                function hideLoader() {
                    document.getElementById('searchLoader').classList.remove('show');
                }

                function addCustomMarker(lat, lon, name, icon, color) {
                    color = color || '#1a73e8';
                    var iconSize = 42;
                    var customIcon = L.divIcon({
                        className: 'custom-marker',
                        html: `
                            <div style="
                                background: white;
                                border-radius: 50%;
                                width: ${iconSize}px;
                                height: ${iconSize}px;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                font-size: 20px;
                                border: 3px solid ${color};
                                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                                transition: all 0.3s ease;
                                cursor: pointer;
                            ">
                                ${icon || '📍'}
                            </div>
                            <div style="
                                position: absolute;
                                bottom: -20px;
                                left: 50%;
                                transform: translateX(-50%);
                                background: rgba(0,0,0,0.6);
                                color: white;
                                padding: 2px 10px;
                                border-radius: 10px;
                                font-size: 10px;
                                white-space: nowrap;
                                max-width: 110px;
                                overflow: hidden;
                                text-overflow: ellipsis;
                            ">

                        iconSize: [iconSize, iconSize + 22],
                        iconAnchor: [iconSize / 2, iconSize + 12],
                        popupAnchor: [0, -iconSize]

                    var marker = L.marker([lat, lon], {
                        icon: customIcon,
                        riseOnHover: true
                    }).addTo(map);

                    marker.bindPopup(`
                        <div style="text-align:center;padding:8px;min-width:180px;">
                            <div style="font-size:28px;">${icon || '📍'}</div>
                            <div style="font-weight:700;font-size:15px;margin:6px 0;color:#1a1a1a;">${name}</div>
                            <div style="font-size:12px;color:#666;margin-bottom:6px;">📍 ${lat.toFixed(4)}, ${lon.toFixed(4)}</div>
                            <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">
                                <button onclick="map.setView([${lat}, ${lon}], 16)" style="
                                    background:#1a73e8;
                                    color:white;
                                    border:none;
                                    padding:5px 14px;
                                    border-radius:20px;
                                    cursor:pointer;
                                    font-size:12px;
                                ">
                                    <i class="fas fa-location-dot"></i> عرض
                                </button>
                                <button onclick="navigateToPlace(${lat}, ${lon}, '${name}')" style="
                                    background:#2ecc71;
                                    color:white;
                                    border:none;
                                    padding:5px 14px;
                                    border-radius:20px;
                                    cursor:pointer;
                                    font-size:12px;
                                ">
                                    <i class="fas fa-route"></i> توجيه
                                </button>
                                <button onclick="addFav('${encodeURIComponent(name)}', ${lat}, ${lon})" style="
                                    background:#e74c3c;
                                    color:white;
                                    border:none;
                                    padding:5px 14px;
                                    border-radius:20px;
                                    cursor:pointer;
                                    font-size:12px;
                                ">
                                    <i class="fas fa-heart"></i> حفظ
                                </button>
                            </div>
                        </div>

                    markers.push(marker);
                    return marker;
                }

                function clearMarkers() {
                    markers.forEach(function (m) { map.removeLayer(m); });
                    markers = [];
                    if (currentMarker) {
                        map.removeLayer(currentMarker);
                        currentMarker = null;
                    }
                }

                function openPanel(title, html) {
                    panelTitle.innerHTML = title;
                    panelContent.innerHTML = html;
                    panel.classList.add('open');
                }

                function closePanel() {
                    panel.classList.remove('open');
                }

                function getDistance(lat1, lon1, lat2, lon2) {
                    var R = 6371;
                    var dLat = (lat2 - lat1) * Math.PI / 180;
                    var dLon = (lon2 - lon1) * Math.PI / 180;
                    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                        Math.sin(dLon / 2) * Math.sin(dLon / 2);
                    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                    return R * c;
                }

                // ============================================================
                // 5. البحث الشامل - كل شيء في مصر
                // ============================================================
                function searchOSM(query) {
                    if (!query || query.trim() === '') {
                        showToast('⚠️ ادخل نص للبحث');
                        return;
                    }

                    showLoader('⏳ جاري البحث...');

                    var url = 'https://nominatim.openstreetmap.org/search?q=' +
                        encodeURIComponent(query.trim()) +
                        '&format=json&limit=30&addressdetails=1&accept-language=ar&countrycodes=eg';

                    fetch(url, {
                        headers: { 'User-Agent': 'MyMapApp/1.0' }
                    })
                        .then(function (response) {
                            if (!response.ok) throw new Error('فشل الاتصال');
                            return response.json();
                        })
                        .then(function (data) {
                            hideLoader();
                            if (!data || data.length === 0) {
                                openPanel('<i class="fas fa-search"></i> نتائج البحث',
                                    '<div style="padding:30px 20px;text-align:center;color:#999;"><div style="font-size:40px;">🔍</div><div style="font-size:16px;font-weight:600;color:#333;margin-top:8px;">لا توجد نتائج</div><div style="font-size:13px;margin-top:4px;">جرب كلمات مختلفة</div></div>'
                                );
                                showToast('❌ لا توجد نتائج');
                                return;
                            }

                            displayResults(data);
                            showToast('✅ تم العثور على ' + data.length + ' نتيجة');
                        })
                        .catch(function (error) {
                            hideLoader();
                            console.error('❌ خطأ:', error);
                            showToast('❌ ' + error.message);
                            openPanel('<i class="fas fa-search"></i> نتائج البحث',
                                '<div style="padding:30px 20px;text-align:center;color:#e74c3c;"><div style="font-size:40px;">⚠️</div><div style="font-size:16px;font-weight:600;margin-top:8px;">حدث خطأ في البحث</div><div style="font-size:13px;margin-top:4px;">تأكد من اتصال الإنترنت</div></div>'
                            );
                        });
                }

                function displayResults(results) {
                    clearMarkers();
                    var html = '';
                    var firstResult = results[0];
                    var userLocation = map.getCenter();

                    results.forEach(function (item) {
                        var lat = parseFloat(item.lat);
                        var lon = parseFloat(item.lon);
                        var name = item.display_name.split(',')[0] || 'مكان';
                        var address = item.display_name || '';

                        var icon = '📍';
                        if (item.category === 'amenity' || item.type === 'hospital') icon = '🏥';
                        else if (item.type === 'pharmacy') icon = '💊';
                        else if (item.type === 'bank') icon = '🏦';
                        else if (item.type === 'restaurant') icon = '🍽️';
                        else if (item.type === 'cafe') icon = '☕';
                        else if (item.type === 'fuel') icon = '⛽';
                        else if (item.type === 'tourism') icon = '🏛️';
                        else if (item.type === 'historical') icon = '🏛️';
                        else if (item.type === 'museum') icon = '🏛️';
                        else if (item.type === 'beach') icon = '🏖️';
                        else if (item.type === 'entertainment') icon = '🎡';
                        else if (item.type === 'place_of_worship') icon = '🕌';
                        else if (item.category === 'shop') icon = '🛒';
                        else if (item.category === 'highway') icon = '🛣️';
                        else if (item.category === 'building') icon = '🏢';
                        else if (item.category === 'landuse') icon = '🏞️';

                        var distance = getDistance(userLocation.lat, userLocation.lng, lat, lon);
                        var distanceText = distance < 1 ? (distance * 1000).toFixed(0) + ' م' : distance.toFixed(1) +
                            ' كم';

                        addCustomMarker(lat, lon, name, icon, '#1a73e8');

                        html += `
                            <div class="result-item" onclick="map.setView([${lat}, ${lon}], 15); closePanel(); navigateToPlace(${lat}, ${lon}, '${name}');">
                                <div class="info">
                                    <div class="name">${icon} ${name}</div>
                                    <div class="address">${address}</div>
                                    <div class="distance">📏 ${distanceText}</div>
                                    ${item.category ? `<div style="font-size:10px;color:#888;margin-top:2px;">📌 ${item.category}</div>` : ''}
                                </div>
                                <div class="actions">
                                    <button class="fav-btn" onclick="event.stopPropagation(); addFav('${encodeURIComponent(name)}', ${lat}, ${lon})">
                                        <i class="fas fa-heart"></i>
                                    </button>
                                    <button class="route-btn" onclick="event.stopPropagation(); navigateToPlace(${lat}, ${lon}, '${name}')">
                                        <i class="fas fa-route"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });

                    if (firstResult) {
                        var lat = parseFloat(firstResult.lat);
                        var lon = parseFloat(firstResult.lon);
                        map.setView([lat, lon], 13);
                        var firstName = firstResult.display_name.split(',')[0] || 'مكان';
                        addCustomMarker(lat, lon, firstName, '📍', '#1a73e8');
                        navigateToPlace(lat, lon, firstName);
                    }

                    openPanel('<i class="fas fa-search"></i> نتائج البحث (' + results.length + ')', html);
                }

                // ============================================================
                // 6. التوجيه وقياس المسافات
                // ============================================================
                window.navigateToPlace = function (lat, lon, name) {
                    // إزالة التوجيه السابق
                    if (routingControl) {
                        map.removeControl(routingControl);
                        routingControl = null;
                    }
                    if (directionMarker) {
                        map.removeLayer(directionMarker);
                        directionMarker = null;
                    }

                    var userPos = map.getCenter();

                    // حساب المسافة
                    var distance = getDistance(userPos.lat, userPos.lng, lat, lon);
                    var distanceText = distance < 1 ? (distance * 1000).toFixed(0) + ' م' : distance.toFixed(1) + ' كم';

                    // عرض المسار
                    routingControl = L.Routing.control({
                        waypoints: [
                            L.latLng(userPos.lat, userPos.lng),
                            L.latLng(lat, lon)
                        ],
                        routeWhileDragging: true,
                        showAlternatives: true,
                        lineOptions: {
                            styles: [{ color: '#1a73e8', weight: 5, opacity: 0.8 }]
                        },
                        createMarker: function (i, wp) {
                            return L.marker(wp.latLng, {
                                draggable: true,
                                icon: L.divIcon({
                                    className: i === 0 ? 'start-marker' : 'end-marker',
                                    html: i === 0 ? '🟢' : '🏁',
                                    iconSize: [30, 30]
                                })
                            });
                        }
                    }).addTo(map);

                    routingControl.on('routesfound', function (e) {
                        var routes = e.routes;
                        var summary = routes[0].summary;
                        var routeDistance = (summary.totalDistance / 1000).toFixed(1);
                        var time = Math.round(summary.totalTime / 60);

                        document.getElementById('guideDest').textContent = name;
                        document.getElementById('guideDist').textContent = routeDistance + ' كم • ' + time +
                            ' دقيقة';
                        document.getElementById('navigationGuide').classList.add('show');

                        showToast('🧭 المسار إلى ' + name + ' (' + routeDistance + ' كم، ' + time + ' دقيقة)');
                    });

                    // سهم في الوجهة
                    var arrowIcon = L.divIcon({
                        className: 'direction-arrow-marker',
                        html: `<div style="
                            font-size: 40px;
                            animation: arrowBounce 1.5s ease infinite;
                            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
                            text-shadow: 0 0 20px rgba(231,76,60,0.5);
                        ">📍</div>`,
                        iconSize: [50, 50],
                        iconAnchor: [25, 25]
                    });

                    directionMarker = L.marker([lat, lon], {
                        icon: arrowIcon,
                        zIndexOffset: 1000
                    }).addTo(map);

                    // نقطة حمراء
                    var destIcon = L.divIcon({
                        className: 'destination-marker',
                        html: `<div style="
                            width: 20px;
                            height: 20px;
                            background: #e74c3c;
                            border-radius: 50%;
                            border: 3px solid white;
                            box-shadow: 0 0 20px rgba(231,76,60,0.6);
                            animation: arrowBounce 1.5s ease infinite;
                        "></div>`,
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });

                    L.marker([lat, lon], {
                        icon: destIcon,
                        zIndexOffset: 999
                    }).addTo(map);
                };

                document.getElementById('routeBtn').addEventListener('click', function () {
                    var center = map.getCenter();
                    var query = prompt('أدخل اسم المكان للذهاب إليه:');
                    if (query && query.trim() !== '') {
                        searchOSM(query);
                    }
                });

                document.getElementById('clearRouteBtn').addEventListener('click', function () {
                    if (routingControl) {
                        map.removeControl(routingControl);
                        routingControl = null;
                    }
                    if (directionMarker) {
                        map.removeLayer(directionMarker);
                        directionMarker = null;
                    }
                    document.getElementById('navigationGuide').classList.remove('show');
                    showToast('🗑️ تم إلغاء المسار');
                });

                document.getElementById('closeGuide').addEventListener('click', function () {
                    document.getElementById('navigationGuide').classList.remove('show');
                    if (routingControl) {
                        map.removeControl(routingControl);
                        routingControl = null;
                    }

                        map.removeLayer(directionMarker);

                // ============================================================
                // 7. البحث الصوتي
                // ============================================================
                var voiceBtn = document.getElementById('voiceBtn');
                var voiceStatus = document.getElementById('voiceStatus');
                var voiceStatusText = document.getElementById('voiceStatusText');
                var voiceCancelBtn = document.getElementById('voiceCancelBtn');
                var recognition = null;
                var isRecording = false;

                function showVoiceStatus(text) {
                    voiceStatusText.textContent = text;
                    voiceStatus.classList.add('show');
                }

                function hideVoiceStatus() {
                    voiceStatus.classList.remove('show');
                }

                function startVoiceSearch() {
                    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                        showToast('❌ متصفحك لا يدعم البحث الصوتي');
                        return;
                    }

                    if (navigator.permissions) {
                        navigator.permissions.query({ name: 'microphone' })
                            .then(function (result) {
                                if (result.state === 'denied') {
                                    showToast('⚠️ تم رفض إذن الميكروفون');
                                    return;
                                }
                                startListening();
                            })
                            .catch(function () { startListening(); });
                    } else {
                        startListening();
                    }
                }

                function startListening() {
                    try {
                        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                        recognition = new SpeechRecognition();
                        recognition.lang = 'ar-EG';
                        recognition.continuous = false;
                        recognition.interimResults = true;

                        voiceBtn.classList.add('recording');
                        isRecording = true;
                        showVoiceStatus('🎤 تحدث الآن...');

                        recognition.start();

                        recognition.onresult = function (event) {
                            var finalTranscript = '';
                            for (var i = event.resultIndex; i < event.results.length; i++) {
                                if (event.results[i].isFinal) {
                                    finalTranscript = event.results[i][0].transcript;
                                }
                            }

                            if (finalTranscript.trim() !== '') {
                                showVoiceStatus('✅ تم التعرف: "' + finalTranscript + '"');
                                document.getElementById('searchInput').value = finalTranscript;
                                setTimeout(function () {
                                    searchOSM(finalTranscript);
                                    hideVoiceStatus();
                                    voiceBtn.classList.remove('recording');
                                    isRecording = false;
                                }, 500);
                            }
                        };

                        recognition.onerror = function (event) {
                            var errorMessages = {
                                'not-allowed': '⚠️ لم تسمح باستخدام الميكروفون',
                                'audio-capture': '⚠️ لا يوجد ميكروفون',
                                'no-speech': '🔇 لم يتم سماع صوت',
                                'aborted': '⏹️ تم الإلغاء'
                            };
                            var msg = errorMessages[event.error] || '❌ حدث خطأ: ' + event.error;
                            showToast(msg);
                            hideVoiceStatus();
                            voiceBtn.classList.remove('recording');
                            isRecording = false;
                        };

                        recognition.onend = function () {
                            if (isRecording) {
                                showToast('🔇 لم يتم سماع صوت، حاول مرة أخرى');
                                hideVoiceStatus();
                                voiceBtn.classList.remove('recording');
                                isRecording = false;
                            }
                        };

                    } catch (error) {
                        showToast('❌ حدث خطأ في تشغيل الميكروفون');
                        voiceBtn.classList.remove('recording');
                        isRecording = false;
                    }
                }

                function stopVoiceSearch() {
                    if (recognition && isRecording) {
                        try { recognition.abort(); } catch (e) { }
                    }
                    hideVoiceStatus();
                    voiceBtn.classList.remove('recording');
                    isRecording = false;
                }

                voiceBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    if (isRecording) {
                        stopVoiceSearch();
                    } else {
                        startVoiceSearch();
                    }
                });

                voiceCancelBtn.addEventListener('click', stopVoiceSearch);

                document.addEventListener('click', function (e) {
                    if (voiceStatus.classList.contains('show') &&
                        !voiceStatus.contains(e.target) &&
                        e.target !== voiceBtn &&
                        !voiceBtn.contains(e.target)) {
                        stopVoiceSearch();
                    }
                });

                // ============================================================

                });

                // ============================================================
                // 9. المفضلة
                // ============================================================
                window.addFav = function (name, lat, lon) {
                    var displayName = decodeURIComponent(name);
                    var exists = favorites.find(function (f) { return f.lat === lat && f.lon === lon; });
                    if (exists) {
                        showToast('📍 موجود بالفعل');
                        return;
                    }
                    favorites.push({ displayName, lat, lon });
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                    showToast('❤️ تم الحفظ');
                    renderFavorites();
                };

                function removeFav(index) {
                    favorites.splice(index, 1);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                    showToast('🗑️ تم الحذف');
                    renderFavorites();
                }

                function renderFavorites() {
                    if (favorites.length === 0) {
                        openPanel('<i class="fas fa-heart" style="color:#e74c3c;"></i> المفضلة',
                            '<div style="padding:30px 20px;text-align:center;color:#999;"><div style="font-size:40px;">❤️</div><div style="font-size:16px;font-weight:600;color:#333;margin-top:8px;">لا توجد مفضلة</div></div>'
                        );
                        return;
                    }
                    var html = '';
                    favorites.forEach(function (item, index) {
                        html += `
                            <div class="result-item" onclick="map.setView([${item.lat}, ${item.lon}], 15); addCustomMarker(${item.lat}, ${item.lon}, '${item.displayName}', '📍', '#1a73e8'); closePanel();">
                                <div class="info">
                                    <div class="name">📍 ${item.displayName}</div>
                                    <div class="address">${item.lat.toFixed(4)}, ${item.lon.toFixed(4)}</div>
                                </div>
                                <div class="actions">
                                    <button onclick="event.stopPropagation(); removeFav(${index})" style="background:none;border:none;font-size:14px;cursor:pointer;color:#e74c3c;">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                    openPanel('<i class="fas fa-heart" style="color:#e74c3c;"></i> المفضلة (' + favorites.length + ')', html);
                }

                document.getElementById('favoritesBtn').addEventListener('click', function () {
                    renderFavorites();
                });

                // ============================================================
                // 10. تحديد الموقع
                // ============================================================
                document.getElementById('locateBtn').addEventListener('click', function () {
                    if (!navigator.geolocation) {
                        showToast('⚠️ الموقع غير مدعوم');
                        return;
                    }
                    showToast('⏳ جاري التحديد...');
                    navigator.geolocation.getCurrentPosition(
                        function (pos) {
                            map.setView([pos.coords.latitude, pos.coords.longitude], 15);
                            addCustomMarker(pos.coords.latitude, pos.coords.longitude, '📍 موقعك', '📍', '#2ecc71');
                            showToast('✅ تم التحديد');
                        },
                        function () {
                            showToast('⚠️ لم نتمكن من التحديد');
                        }
                    );
                });

                // ============================================================
                // 11. طبقات الخريطة
                // ============================================================
                var layers = {
                    osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap',
                        maxZoom: 19
                    }),
                    dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
                        attribution: '© CartoDB',
                        maxZoom: 19
                    }),
                    satellite: L.tileLayer(
                        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        attribution: '© Esri',
                        maxZoom: 19
                    })
                };

                var currentLayer = layers.osm;
                currentLayer.addTo(map);

                document.getElementById('layersBtn').addEventListener('click', function () {
                    var choice = prompt('اختر الطبقة:\n1- العادي 🏙️\n2- الداكن 🌙\n3- الفضائي 🛰️', '1');
                    map.removeLayer(currentLayer);
                    if (choice === '1' || choice === '') { currentLayer = layers.osm; } else if (choice === '2') {
                        currentLayer = layers.dark;
                    } else if (choice === '3') { currentLayer = layers.satellite; } else {
                        currentLayer = layers.osm;
                    }
                    currentLayer.addTo(map);
                    showToast('✅ تم تبديل الطبقة');
                });

                // ============================================================
                // 12. البحث
                // ============================================================
                document.getElementById('searchBtn').addEventListener('click', function () {
                    searchOSM(document.getElementById('searchInput').value);
                });

                document.getElementById('searchInput').addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        searchOSM(document.getElementById('searchInput').value);
                    }
                });

                document.getElementById('closePanel').addEventListener('click', function () {
                    closePanel();
                });

                // ============================================================
                // 13. تحميل افتراضي
                // ============================================================
                setTimeout(function () {
                    document.getElementById('searchInput').placeholder = 'ابحث عن شارع، منطقة، خدمة...';
                    showToast('🔍 ابحث عن أي شيء في مصر');
                }, 1000);

                // ============================================================
                // 14. جعل الدوال عامة
                // ============================================================
                window.map = map;
                window.addCustomMarker = addCustomMarker;
                window.closePanel = closePanel;
                window.addFav = addFav;
                window.searchOSM = searchOSM;
                window.navigateToPlace = navigateToPlace;

                console.log('🗺️ خرائط مصر الشاملة - الإصدار النهائي ✅');
                console.log('🔍 البحث: يعمل على كل شيء (شوارع، مناطق، خدمات)');
                console.log('🧭 التوجيه وقياس المسافات: جاهز');
                console.log('🚗 حركة المرور: تغطي جميع المحافظات');
                console.log('🎤 البحث الصوتي: جاهز');

            } // نهاية initApp

        }); // نهاية DOMContentLoaded
    </script>

</body>

</html>
