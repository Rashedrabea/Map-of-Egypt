<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🗺️ خرائط مصر - النسخة المتطورة</title>

    <!-- ===== المكتبات ===== -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ===== إعدادات عامة ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            direction: rtl;
            background: #1a1a2e;
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 0;
            background: #1a1a2e;
        }

        /* ===== شاشة التحميل ===== */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0d47a1, #1a73e8, #0d47a1);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.8s ease;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        #loading .icon {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        #loading h1 {
            font-size: 28px;
            margin-top: 15px;
            font-weight: 700;
        }

        #loading p {
            opacity: 0.8;
            margin-top: 5px;
            font-size: 15px;
        }

        .loader-container {
            margin-top: 25px;
            width: 180px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .loader-bar {
            height: 100%;
            width: 0%;
            background: white;
            border-radius: 4px;
            animation: loadProgress 2.5s ease forwards;
        }

        @keyframes loadProgress {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        /* ============================================================ */
        /* شريط البحث العلوي */
        /* ============================================================ */
        .search-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 6px;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 6px 14px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            width: 96%;
            max-width: 750px;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 8px 0;
            font-size: 14px;
            outline: none;
            background: transparent;
            color: #333;
        }

        .search-box input::placeholder {
            color: #999;
        }

        .search-box .search-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .search-box .search-btn:hover {
            background: #0d47a1;
            transform: scale(1.02);
        }

        .search-box .voice-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #666;
            padding: 4px 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .search-box .voice-btn:hover {
            background: #f0f0f0;
            transform: scale(1.1);
        }

        .search-box .voice-btn.recording {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        .action-buttons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .action-buttons button {
            background: #f1f3f4;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            color: #555;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-buttons button:hover {
            background: #e2e6ea;
            transform: scale(1.05);
        }

        .action-buttons button.active-layer {
            background: #9b59b6;
            color: white;
        }

        /* ============================================================ */
        /* أزرار التحكم - تحت شريط البحث */
        /* ============================================================ */
        .control-buttons {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            gap: 6px;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 4px 12px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .control-buttons button {
            background: none;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 13px;
            color: #555;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-buttons button:hover {
            background: #e2e6ea;
            transform: scale(1.05);
        }

        .control-buttons button.active {
            background: #1a73e8;
            color: white;
        }

        /* ============================================================ */
        /* أزرار Leaflet - منقولة للأسفل */
        /* ============================================================ */
        .leaflet-control-zoom {
            margin-bottom: 85px !important;
            margin-right: 10px !important;
        }

        .leaflet-control-zoom a {
            background: rgba(255, 255, 255, 0.95) !important;
            color: #333 !important;
            border-radius: 10px !important;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1) !important;
            width: 38px !important;
            height: 38px !important;
            line-height: 38px !important;
            font-size: 18px !important;
            border: none !important;
            transition: all 0.3s ease !important;
        }

        .leaflet-control-zoom a:hover {
            background: white !important;
            transform: scale(1.05) !important;
        }

        /* ============================================================ */
        /* مؤشر الصوت */
        /* ============================================================ */
        .voice-status {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .voice-status.show {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .voice-status .wave {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .voice-status .wave span {
            display: block;
            width: 3px;
            height: 15px;
            background: white;
            border-radius: 2px;
            animation: wave 0.8s ease infinite;
        }

        .voice-status .wave span:nth-child(2) {
            animation-delay: 0.1s;
            height: 25px;
        }

        .voice-status .wave span:nth-child(3) {
            animation-delay: 0.2s;
            height: 35px;
        }

        .voice-status .wave span:nth-child(4) {
            animation-delay: 0.3s;
            height: 25px;
        }

        .voice-status .wave span:nth-child(5) {
            animation-delay: 0.4s;
            height: 15px;
        }

        @keyframes wave {

            0%,
            100% {
                transform: scaleY(0.5);
            }

            50% {
                transform: scaleY(1);
            }
        }

        .voice-status .cancel-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .voice-status .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        /* ============================================================ */
        /* شريط الخدمات */
        /* ============================================================ */
        .services-bar {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            padding: 6px 12px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            display: flex;
            gap: 3px;
            overflow-x: auto;
            max-width: 96%;
            flex-wrap: nowrap;
            scrollbar-width: none;
        }

        .services-bar::-webkit-scrollbar {
            display: none;
        }

        .service-btn {
            background: transparent;
            border: none;
            padding: 4px 8px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 8px;
            color: #555;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            white-space: nowrap;
            min-width: 38px;
        }

        .service-btn i {
            font-size: 14px;
        }

        .service-btn span {
            font-size: 6px;
            font-weight: 500;
        }

        .service-btn:hover {
            background: #f0f2f5;
            transform: translateY(-2px);
        }

        .service-btn.active {
            background: #1a73e8;
            color: white;
            transform: translateY(-2px);
        }

        /* ألوان الخدمات */
        .service-btn[data-service="hospital"] {
            color: #e74c3c;
        }

        .service-btn[data-service="hospital"].active {
            background: #e74c3c;
            color: white;
        }

        .service-btn[data-service="pharmacy"] {
            color: #2ecc71;
        }

        .service-btn[data-service="pharmacy"].active {
            background: #2ecc71;
            color: white;
        }

        .service-btn[data-service="bank"] {
            color: #f39c12;
        }

        .service-btn[data-service="bank"].active {
            background: #f39c12;
            color: white;
        }

        .service-btn[data-service="restaurant"] {
            color: #e67e22;
        }

        .service-btn[data-service="restaurant"].active {
            background: #e67e22;
            color: white;
        }

        .service-btn[data-service="fuel"] {
            color: #1a73e8;
        }

        .service-btn[data-service="fuel"].active {
            background: #1a73e8;
            color: white;
        }

        .service-btn[data-service="tourist"] {
            color: #9b59b6;
        }

        .service-btn[data-service="tourist"].active {
            background: #9b59b6;
            color: white;
        }

        .service-btn[data-service="historical"] {
            color: #8e44ad;
        }

        .service-btn[data-service="historical"].active {
            background: #8e44ad;
            color: white;
        }

        .service-btn[data-service="beach"] {
            color: #3498db;
        }

        .service-btn[data-service="beach"].active {
            background: #3498db;
            color: white;
        }

        .service-btn[data-service="entertainment"] {
            color: #e67e22;
        }

        .service-btn[data-service="entertainment"].active {
            background: #e67e22;
            color: white;
        }

        .service-btn[data-service="museum"] {
            color: #d35400;
        }

        .service-btn[data-service="museum"].active {
            background: #d35400;
            color: white;
        }

        .service-btn[data-service="cafe"] {
            color: #6c5ce7;
        }

        .service-btn[data-service="cafe"].active {
            background: #6c5ce7;
            color: white;
        }

        .service-btn[data-service="market"] {
            color: #00b894;
        }

        .service-btn[data-service="market"].active {
            background: #00b894;
            color: white;
        }

        .service-btn[data-service="mosque"] {
            color: #2d3436;
        }

        .service-btn[data-service="mosque"].active {
            background: #2d3436;
            color: white;
        }

        /* ============================================================ */
        /* لوحة النتائج */
        /* ============================================================ */
        #panel {
            position: absolute;
            top: 120px;
            right: -400px;
            width: 380px;
            max-height: calc(100vh - 180px);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: none;
            flex-direction: column;
        }

        #panel.open {
            display: flex;
            right: 15px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
            background: rgba(255, 255, 255, 0.8);
            flex-shrink: 0;
        }

        .panel-header h3 {
            font-size: 14px;
            color: #1a1a1a;
        }

        .panel-header button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
            transition: all 0.3s ease;
        }

        .panel-header button:hover {
            transform: rotate(90deg);
        }

        #panelContent {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .result-item {
            padding: 8px 14px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-item:hover {
            background: #f8f9fa;
            transform: translateX(-3px);
        }

        .result-item .info {
            flex: 1;
        }

        .result-item .name {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 13px;
        }

        .result-item .address {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        .result-item .distance {
            font-size: 10px;
            color: #1a73e8;
            margin-top: 2px;
        }

        .result-item .actions {
            display: flex;
            gap: 4px;
        }

        .result-item .actions button {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 3px;
            border-radius: 50%;
            transition: all 0.3s ease;
            color: #666;
        }

        .result-item .actions button:hover {
            background: #f0f0f0;
            transform: scale(1.1);
        }

        .result-item .actions .fav-btn {
            color: #e74c3c;
        }

        .result-item .actions .route-btn {
            color: #1a73e8;
        }

        /* ============================================================ */
        /* مؤشر التوجيه */
        /* ============================================================ */
        #navigationGuide {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1500;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: none;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            font-size: 13px;
        }

        #navigationGuide.show {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        #navigationGuide .direction-arrow {
            font-size: 24px;
            animation: arrowPulse 1.5s ease infinite;
        }

        @keyframes arrowPulse {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(8px);
            }
        }

        #navigationGuide .direction-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #navigationGuide .direction-info .dest {
            font-weight: 600;
            color: #2ecc71;
        }

        #navigationGuide .direction-info .dist {
            font-size: 11px;
            color: #aaa;
        }

        #navigationGuide .close-guide {
            background: none;
            border: none;
            color: #999;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
        }

        /* ============================================================ */
        /* رسائل التنبيه */
        /* ============================================================ */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            z-index: 2000;
            font-size: 12px;
            animation: toastIn 0.4s ease;
            pointer-events: none;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ============================================================ */
        /* التجاوب مع الشاشات */
        /* ============================================================ */
        @media (max-width: 768px) {
            .search-container {
                top: 6px;
                padding: 4px 10px;
                flex-wrap: wrap;
                border-radius: 25px;
                gap: 4px;
            }

            .search-box input {
                font-size: 12px;
                padding: 5px 0;
            }

            .search-box .search-btn {
                padding: 4px 10px;
                font-size: 11px;
            }

            .search-box .voice-btn {
                font-size: 16px;
                padding: 2px 6px;
            }

            .action-buttons button {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }

            .control-buttons {
                top: 68px;
                padding: 3px 10px;
                gap: 4px;
            }

            .control-buttons button {
                width: 26px;
                height: 26px;
                font-size: 11px;
            }

            .services-bar {
                bottom: 10px;
                padding: 4px 8px;
            }

            .service-btn {
                min-width: 32px;
                padding: 3px 6px;
            }

            .service-btn i {
                font-size: 12px;
            }

            .service-btn span {
                font-size: 5px;
            }

            #panel {
                width: 94%;
                right: -100%;
                top: 115px;
                max-height: calc(100vh - 170px);
            }

            #panel.open {
                right: 3%;
            }

            .leaflet-control-zoom {
                margin-bottom: 75px !important;
                margin-right: 5px !important;
            }

            .leaflet-control-zoom a {
                width: 32px !important;
                height: 32px !important;
                line-height: 32px !important;
                font-size: 16px !important;
            }

            #navigationGuide {
                bottom: 110px;
                padding: 8px 16px;
                font-size: 12px;
            }

            #navigationGuide .direction-arrow {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .search-box input {
                font-size: 11px;
            }

            .search-box .search-btn {
                padding: 3px 8px;
                font-size: 10px;
            }

            .search-box .voice-btn {
                font-size: 14px;
            }

            .action-buttons button {
                width: 24px;
                height: 24px;
                font-size: 10px;
            }

            .control-buttons {
                display: none;
            }

            .service-btn {
                min-width: 28px;
                padding: 2px 4px;
            }

            .service-btn i {
                font-size: 10px;
            }

            .service-btn span {
                font-size: 4px;
            }

            #panel {
                width: 96%;
                right: -100%;
                top: 110px;
            }

            #panel.open {
                right: 2%;
            }
        }

        /* ============================================================ */
        /* الوضع المظلم التلقائي */
        /* ============================================================ */
        @media (prefers-color-scheme: dark) {
            .search-container {
                background: rgba(26, 26, 46, 0.97);
            }

            .search-box input {
                color: #eee;
            }

            .search-box input::placeholder {
                color: #666;
            }

            .search-box .voice-btn {
                color: #aaa;
            }

            .search-box .voice-btn:hover {
                background: #2a2a3e;
            }

            .action-buttons button {
                background: #2a2a3e;
                color: #ccc;
            }

            .action-buttons button:hover {
                background: #3a3a4e;
            }

            .control-buttons {
                background: rgba(26, 26, 46, 0.95);
            }

            .control-buttons button {
                color: #ccc;
            }

            .control-buttons button:hover {
                background: #2a2a3e;
            }

            .services-bar {
                background: rgba(26, 26, 46, 0.97);
            }

            .service-btn {
                color: #ccc;
            }

            .service-btn:hover {
                background: #2a2a3e;
            }

            #panel {
                background: rgba(26, 26, 46, 0.98);
            }

            .panel-header {
                background: rgba(26, 26, 46, 0.9);
                border-color: #2a2a3e;
            }

            .panel-header h3 {
                color: #eee;
            }

            .result-item {
                border-color: #2a2a3e;
            }

            .result-item:hover {
                background: #2a2a3e;
            }

            .result-item .name {
                color: #eee;
            }

            .result-item .address {
                color: #aaa;
            }

            .result-item .distance {
                color: #6c9bff;
            }

            .leaflet-control-zoom a {
                background: rgba(26, 26, 46, 0.95) !important;
                color: #ccc !important;
            }

            #navigationGuide {
                background: rgba(0, 0, 0, 0.9);
            }
        }
    </style>
</head>

<body>

    <!-- ============================================================ -->
    <!-- شاشة التحميل -->
    <!-- ============================================================ -->
    <div id="loading">
        <div class="icon">🗺️</div>
        <h1>خرائط مصر المتطورة</h1>
        <p>جميع الخدمات في جميع أنحاء مصر</p>
        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- الخريطة -->
    <!-- ============================================================ -->
    <div id="map"></div>

    <!-- ============================================================ -->
    <!-- شريط البحث -->
    <!-- ============================================================ -->
    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search" style="color:#1a73e8;"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن أي مكان في مصر...">
            <button class="voice-btn" id="voiceBtn" title="بحث صوتي">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="search-btn" id="searchBtn"><i class="fas fa-arrow-left"></i> بحث</button>
        </div>
        <div class="action-buttons">
            <button id="locateBtn" title="موقعي"><i class="fas fa-location-dot"></i></button>
            <button id="layersBtn" title="طبقات"><i class="fas fa-layer-group"></i></button>
            <button id="favoritesBtn" title="المفضلة"><i class="fas fa-heart"></i></button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- أزرار التحكم (تحت شريط البحث) -->
    <!-- ============================================================ -->
    <div class="control-buttons" id="controlButtons">
        <button id="zoomInBtn" title="تكبير"><i class="fas fa-plus"></i></button>
        <button id="zoomOutBtn" title="تصغير"><i class="fas fa-minus"></i></button>
        <button id="trafficToggle" title="حركة المرور"><i class="fas fa-car"></i></button>
        <button id="guideToggle" title="مؤشر التوجيه"><i class="fas fa-location-arrow"></i></button>
        <button id="resetViewBtn" title="إعادة تعيين"><i class="fas fa-home"></i></button>

    <!-- ============================================================ -->
    <!-- مؤشر الصوت -->
    <!-- ============================================================ -->
    <div class="voice-status" id="voiceStatus">
        <div class="wave">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        <span class="text" id="voiceStatusText">🎤 استمع...</span>
        <button class="cancel-btn" id="voiceCancelBtn"><i class="fas fa-xmark"></i></button>
    </div>

    <!-- ============================================================ -->
    <!-- مؤشر التوجيه -->
    <!-- ============================================================ -->
    <div id="navigationGuide">
        <span class="direction-arrow" id="directionArrow">📍</span>
        <div class="direction-info">
            <span class="dest" id="guideDest">الوجهة</span>
            <span class="dist" id="guideDist">0 كم</span>
        </div>
        <button class="close-guide" id="closeGuide"><i class="fas fa-xmark"></i></button>
    </div>

    <!-- ============================================================ -->
    <!-- شريط الخدمات -->
    <!-- ============================================================ -->
    <div class="services-bar" id="servicesBar">
        <button class="service-btn" data-service="hospital"><i
                class="fas fa-hospital"></i><span>مستشفيات</span></button>
        <button class="service-btn" data-service="pharmacy"><i
                class="fas fa-prescription-bottle"></i><span>صيدليات</span></button>
        <button class="service-btn" data-service="bank"><i class="fas fa-university"></i><span>بنوك</span></button>
        <button class="service-btn" data-service="restaurant"><i class="fas fa-utensils"></i><span>مطاعم</span></button>
        <button class="service-btn" data-service="cafe"><i class="fas fa-mug-saucer"></i><span>كافيهات</span></button>
        <button class="service-btn" data-service="fuel"><i class="fas fa-gas-pump"></i><span>بنزين</span></button>
        <button class="service-btn" data-service="market"><i class="fas fa-store"></i><span>أسواق</span></button>
        <button class="service-btn active" data-service="tourist"><i
                class="fas fa-umbrella-beach"></i><span>سياحة</span></button>
        <button class="service-btn" data-service="historical"><i class="fas fa-landmark"></i><span>آثار</span></button>
        <button class="service-btn" data-service="museum"><i class="fas fa-monument"></i><span>متاحف</span></button>
        <button class="service-btn" data-service="beach"><i class="fas fa-water"></i><span>شواطئ</span></button>
        <button class="service-btn" data-service="entertainment"><i
                class="fas fa-gamepad"></i><span>ترفيه</span></button>
        <button class="service-btn" data-service="mosque"><i class="fas fa-mosque"></i><span>مساجد</span></button>
    </div>

    <!-- ============================================================ -->
    <!-- لوحة النتائج -->
    <!-- ============================================================ -->
    <div id="panel">
        <div class="panel-header">
            <h3 id="panelTitle"><i class="fas fa-list"></i> النتائج</h3>
            <button id="closePanel"><i class="fas fa-xmark"></i></button>
        </div>
        <div id="panelContent"></div>
    </div>

    <!-- ============================================================ -->
    <!-- JavaScript -->
    <!-- ============================================================ -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            var loading = document.getElementById('loading');

            // ============================================================
            // 1. التحقق من Leaflet
            // ============================================================
            if (typeof L === 'undefined') {
                var script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
                script.onload = function () {
                    if (typeof L !== 'undefined') {
                        loading.classList.add('hide');
                        setTimeout(function () { loading.style.display = 'none'; }, 800);
                        initApp();
                    }
                };
                script.onerror = function () {
                    loading.innerHTML = `
                        <div style="text-align:center;padding:20px;">
                            <div style="font-size:50px;">⚠️</div>
                            <h2>خطأ في التحميل</h2>
                            <p style="opacity:0.8;margin:10px 0;">تأكد من اتصال الإنترنت</p>
                            <button onclick="location.reload()" style="background:white;color:#1a73e8;border:none;padding:10px 30px;border-radius:30px;font-size:16px;cursor:pointer;margin-top:15px;">إعادة المحاولة</button>
                        </div>
                    `;
                };
                document.head.appendChild(script);
                return;
            }

            setTimeout(function () {
                loading.classList.add('hide');
                setTimeout(function () { loading.style.display = 'none'; }, 800);
            }, 2500);

            initApp();

            function initApp() {

                // ============================================================
                // 2. الخريطة
                // ============================================================
                var map = L.map('map', {
                    center: [26.8206, 30.8025],
                    zoom: 6,
                    zoomControl: false,
                    fadeAnimation: true,
                    zoomAnimation: true,
                    inertia: true,
                    keyboard: true,
                    doubleClickZoom: true
                });

                // إضافة أزرار Leaflet يدوياً
                L.control.zoom({
                    position: 'bottomright'
                }).addTo(map);

                // ============================================================
                // 3. طبقات الخريطة المتعددة (6 طبقات)
                // ============================================================
                var layers = {
                    osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap',
                        maxZoom: 19
                    }),
                    dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
                        attribution: '© CartoDB',
                        maxZoom: 19
                    }),
                    satellite: L.tileLayer(
                        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        attribution: '© Esri',
                        maxZoom: 19
                    }),
                    hot: L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap',
                        maxZoom: 19
                    }),
                    topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenTopoMap',
                        maxZoom: 17
                    }),
                    traffic: L.tileLayer(
                        'https://tile.openstreetmap.org/{z}/{x}/{y}.png?style=traffic', {
                        attribution: '© OpenStreetMap',
                        maxZoom: 19,
                        opacity: 0.5
                    })
                };

                var currentLayer = layers.osm;
                currentLayer.addTo(map);

                // ============================================================
                // 4. المتغيرات
                // ============================================================
                var currentMarker = null;
                var favorites = JSON.parse(localStorage.getItem('favorites')) || [];
                var panel = document.getElementById('panel');
                var panelContent = document.getElementById('panelContent');
                var panelTitle = document.getElementById('panelTitle');
                var markers = [];
                var isTrafficOn = false;
                var searchResults = [];
                var currentDestination = null;

                // ============================================================
                // 5. الدوال الأساسية
                // ============================================================
                function showToast(msg, duration) {
                    duration = duration || 3000;
                    var old = document.querySelector('.toast');
                    if (old) old.remove();
                    var toast = document.createElement('div');
                    toast.className = 'toast';
                    toast.textContent = msg;
                    document.body.appendChild(toast);
                    setTimeout(function () { toast.remove(); }, duration);
                }

                function addCustomMarker(lat, lon, name, icon) {
                    var iconSize = 38;
                    var customIcon = L.divIcon({
                        className: 'custom-marker',
                        html: `
                            <div style="
                                background: white;
                                border-radius: 50%;
                                width: ${iconSize}px;
                                height: ${iconSize}px;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                font-size: 18px;
                                border: 3px solid #1a73e8;
                                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                                transition: all 0.3s ease;
                                cursor: pointer;
                            ">
                                ${icon || '📍'}
                            </div>
                        `,
                        iconSize: [iconSize, iconSize],
                        iconAnchor: [iconSize / 2, iconSize],
                        popupAnchor: [0, -iconSize]
                    });

                    var marker = L.marker([lat, lon], {
                        icon: customIcon,
                        riseOnHover: true
                    }).addTo(map);

                    marker.bindPopup(`
                        <div style="text-align:center;padding:6px;min-width:140px;">
                            <div style="font-size:24px;">${icon || '📍'}</div>
                            <div style="font-weight:600;font-size:13px;margin:4px 0;">${name}</div>
                            <button onclick="map.setView([${lat}, ${lon}], 16)" style="
                                background:#1a73e8;
                                color:white;
                                border:none;
                                padding:3px 12px;
                                border-radius:20px;
                                cursor:pointer;
                                font-size:11px;
                                margin-top:3px;
                            ">
                                <i class="fas fa-location-dot"></i> عرض
                            </button>
                            <button onclick="navigateToPlace(${lat}, ${lon}, '${name}')" style="
                                background:#2ecc71;
                                color:white;
                                border:none;
                                padding:3px 12px;
                                border-radius:20px;
                                cursor:pointer;
                                font-size:11px;
                                margin-top:3px;
                                margin-right:3px;
                            ">
                                <i class="fas fa-route"></i> توجيه
                            </button>
                        </div>
                    `);

                    markers.push(marker);
                    return marker;
                }

                function clearMarkers() {
                    markers.forEach(function (m) { map.removeLayer(m); });
                    markers = [];
                    if (currentMarker) {
                        map.removeLayer(currentMarker);
                        currentMarker = null;
                    }
                }

                function openPanel(title, html) {
                    panelTitle.innerHTML = title;
                    panelContent.innerHTML = html;
                    panel.classList.add('open');
                }

                function closePanel() {
                    panel.classList.remove('open');
                }

                function getIcon(category) {
                    var icons = {
                        'hospital': '🏥',
                        'pharmacy': '💊',
                        'bank': '🏦',
                        'restaurant': '🍽️',
                        'cafe': '☕',
                        'fuel': '⛽',
                        'market': '🛒',
                        'tourist': '🏛️',
                        'historical': '🏛️',
                        'museum': '🏛️',
                        'beach': '🏖️',
                        'entertainment': '🎡',
                        'mosque': '🕌'
                    };
                    return icons[category] || '📍';
                }

                // ============================================================
                // 6. البحث المتقدم - كل مصر
                // ============================================================
                function searchOSM(query, category) {
                    if (!query || query.trim() === '') {
                        showToast('⚠️ ادخل نص للبحث');
                        return;
                    }

                    showToast('⏳ جاري البحث في جميع أنحاء مصر...');

                    // بناء استعلام البحث
                    var searchQuery = query.trim();
                    if (category && category !== 'all') {
                        var categoryMap = {
                            'hospital': 'مستشفى',
                            'pharmacy': 'صيدلية',
                            'bank': 'بنك',
                            'restaurant': 'مطعم',
                            'cafe': 'كافيه',
                            'fuel': 'محطة وقود',
                            'market': 'سوق',
                            'tourist': 'معلم سياحي',
                            'historical': 'أثر',
                            'museum': 'متحف',
                            'beach': 'شاطئ',
                            'entertainment': 'ترفيه',
                            'mosque': 'مسجد'
                        };
                        searchQuery = categoryMap[category] || query;
                    }

                    // جلب البيانات من OpenStreetMap
                    fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(searchQuery) +
                        '&format=json&limit=50&addressdetails=1&accept-language=ar&countrycodes=eg', {
                        headers: { 'User-Agent': 'MyMapApp/1.0' }
                    })
                        .then(function (res) {
                            if (!res.ok) throw new Error('فشل الاتصال');
                            return res.json();
                        })
                        .then(function (data) {
                            if (!data || data.length === 0) {
                                openPanel('<i class="fas fa-search"></i> نتائج البحث',
                                    '<div style="padding:30px 20px;text-align:center;color:#999;"><div style="font-size:40px;">🔍</div><div style="font-size:16px;font-weight:600;color:#333;margin-top:8px;">لا توجد نتائج</div></div>'
                                );
                                showToast('❌ لا توجد نتائج');
                                return;
                            }

                            // حفظ النتائج
                            searchResults = data;
                            displaySearchResults(data);
                            showToast('✅ تم العثور على ' + data.length + ' نتيجة');
                        })
                        .catch(function (error) {
                            console.error('❌ خطأ:', error);
                            showToast('❌ ' + error.message);
                        });
                }

                function displaySearchResults(results) {
                    clearMarkers();
                    var html = '';
                    var firstResult = results[0];

                    // حساب المسافة من موقع المستخدم
                    var userLocation = map.getCenter();

                    results.forEach(function (item, index) {
                        var name = item.display_name ? item.display_name.split(',')[0] : 'مكان';
                        var address = item.display_name || '';
                        var lat = parseFloat(item.lat);
                        var lon = parseFloat(item.lon);

                        // حساب المسافة
                        var distance = getDistance(userLocation.lat, userLocation.lng, lat, lon);
                        var distanceText = distance < 1 ? (distance * 1000).toFixed(0) + ' م' : distance.toFixed(1) +
                            ' كم';

                        var icon = '📍';
                        if (item.category === 'amenity' || item.type === 'hospital') icon = '🏥';
                        else if (item.type === 'pharmacy') icon = '💊';
                        else if (item.type === 'bank') icon = '🏦';
                        else if (item.type === 'restaurant') icon = '🍽️';
                        else if (item.type === 'cafe') icon = '☕';
                        else if (item.type === 'fuel') icon = '⛽';
                        else if (item.type === 'tourism') icon = '🏛️';
                        else if (item.type === 'historical') icon = '🏛️';
                        else if (item.type === 'museum') icon = '🏛️';
                        else if (item.type === 'beach') icon = '🏖️';
                        else if (item.type === 'entertainment') icon = '🎡';
                        else if (item.type === 'place_of_worship') icon = '🕌';
                        else if (item.category === 'shop') icon = '🛒';

                        // إضافة ماركر لكل نتيجة
                        addCustomMarker(lat, lon, name, icon);

                        html += `
                            <div class="result-item" onclick="map.setView([${lat}, ${lon}], 15); closePanel();">
                                <div class="info">
                                    <div class="name">${icon} ${name}</div>
                                    <div class="address">${address}</div>
                                    <div class="distance">📏 ${distanceText}</div>
                                </div>
                                <div class="actions">
                                    <button class="fav-btn" onclick="event.stopPropagation(); addFav('${encodeURIComponent(name)}', ${lat}, ${lon})">
                                        <i class="fas fa-heart"></i>
                                    </button>
                                    <button class="route-btn" onclick="event.stopPropagation(); navigateToPlace(${lat}, ${lon}, '${name}')">
                                        <i class="fas fa-route"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });

                    // التركيز على النتيجة الأولى
                    if (firstResult) {
                        map.setView([parseFloat(firstResult.lat), parseFloat(firstResult.lon)], 12);
                    }

                    openPanel('<i class="fas fa-search"></i> نتائج البحث (' + results.length + ')', html);
                }

                function getDistance(lat1, lon1, lat2, lon2) {
                    var R = 6371;
                    var dLat = (lat2 - lat1) * Math.PI / 180;
                    var dLon = (lon2 - lon1) * Math.PI / 180;
                    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                        Math.sin(dLon / 2) * Math.sin(dLon / 2);
                    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                    return R * c;
                }

                // ============================================================
                // 7. التوجيه ومؤشر الاتجاه
                // ============================================================
                window.navigateToPlace = function (lat, lon, name) {
                    currentDestination = { lat: lat, lon: lon, name: name };

                    // حساب المسافة
                    var userPos = map.getCenter();
                    var distance = getDistance(userPos.lat, userPos.lng, lat, lon);
                    var distanceText = distance < 1 ? (distance * 1000).toFixed(0) + ' م' : distance.toFixed(1) + ' كم';

                    // إظهار مؤشر التوجيه
                    document.getElementById('guideDest').textContent = name;
                    document.getElementById('guideDist').textContent = distanceText;
                    document.getElementById('navigationGuide').classList.add('show');

                    // رسم خط على الخريطة
                    if (currentMarker) map.removeLayer(currentMarker);
                    currentMarker = L.marker([lat, lon], {
                        icon: L.divIcon({
                            className: 'destination-marker',
                            html: '📍',
                            iconSize: [30, 30]
                        })
                    }).addTo(map);

                    // رسم خط بين الموقع الحالي والوجهة
                    var line = L.polyline([
                        [userPos.lat, userPos.lng],
                        [lat, lon]
                    ], {
                        color: '#1a73e8',
                        weight: 3,
                        opacity: 0.7,
                        dashArray: '8, 8'
                    }).addTo(map);

                    showToast('🧭 تم تحديد الوجهة: ' + name);
                };

                // ============================================================
                // 8. البحث الصوتي
                // ============================================================
                var voiceBtn = document.getElementById('voiceBtn');
                var voiceStatus = document.getElementById('voiceStatus');
                var voiceStatusText = document.getElementById('voiceStatusText');
                var voiceCancelBtn = document.getElementById('voiceCancelBtn');
                var recognition = null;
                var isRecording = false;

                function showVoiceStatus(text) {
                    voiceStatusText.textContent = text;
                    voiceStatus.classList.add('show');
                }

                function hideVoiceStatus() {
                    voiceStatus.classList.remove('show');
                }

                function startVoiceSearch() {
                    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                        showToast('❌ متصفحك لا يدعم البحث الصوتي');
                        return;
                    }

                    if (navigator.permissions) {
                        navigator.permissions.query({ name: 'microphone' })
                            .then(function (result) {
                                if (result.state === 'denied') {
                                    showToast('⚠️ تم رفض إذن الميكروفون');
                                    return;
                                }
                                startListening();
                            })
                            .catch(function () { startListening(); });
                    } else {
                        startListening();
                    }
                }

                function startListening() {
                    try {
                        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                        recognition = new SpeechRecognition();
                        recognition.lang = 'ar-EG';
                        recognition.continuous = false;
                        recognition.interimResults = true;

                        voiceBtn.classList.add('recording');
                        isRecording = true;
                        showVoiceStatus('🎤 تحدث الآن...');

                        recognition.start();

                        recognition.onresult = function (event) {
                            var finalTranscript = '';

                            for (var i = event.resultIndex; i < event.results.length; i++) {
                                if (event.results[i].isFinal) {
                                    finalTranscript = event.results[i][0].transcript;
                                }
                            }

                            if (finalTranscript.trim() !== '') {
                                showVoiceStatus('✅ تم التعرف: "' + finalTranscript + '"');
                                document.getElementById('searchInput').value = finalTranscript;

                                setTimeout(function () {
                                    var activeBtn = document.querySelector('.service-btn.active');
                                    var category = activeBtn ? activeBtn.getAttribute('data-service') :
                                        null;
                                    searchOSM(finalTranscript, category);
                                    hideVoiceStatus();
                                    voiceBtn.classList.remove('recording');
                                    isRecording = false;
                                }, 500);
                            }
                        };

                        recognition.onerror = function (event) {
                            var errorMessages = {
                                'not-allowed': '⚠️ لم تسمح باستخدام الميكروفون',
                                'audio-capture': '⚠️ لا يوجد ميكروفون',
                                'no-speech': '🔇 لم يتم سماع صوت',
                                'aborted': '⏹️ تم الإلغاء'
                            };
                            var msg = errorMessages[event.error] || '❌ حدث خطأ: ' + event.error;
                            showToast(msg);
                            hideVoiceStatus();
                            voiceBtn.classList.remove('recording');
                            isRecording = false;
                        };

                        recognition.onend = function () {
                            if (isRecording) {
                                showToast('🔇 لم يتم سماع صوت، حاول مرة أخرى');
                                hideVoiceStatus();
                                voiceBtn.classList.remove('recording');
                                isRecording = false;
                            }
                        };

                    } catch (error) {
                        showToast('❌ حدث خطأ في تشغيل الميكروفون');
                        voiceBtn.classList.remove('recording');
                        isRecording = false;
                    }
                }

                function stopVoiceSearch() {
                    if (recognition && isRecording) {
                        try { recognition.abort(); } catch (e) { }
                    }
                    hideVoiceStatus();
                    voiceBtn.classList.remove('recording');
                    isRecording = false;
                }

                voiceBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    if (isRecording) {
                        stopVoiceSearch();
                    } else {
                        startVoiceSearch();
                    }
                });

                voiceCancelBtn.addEventListener('click', stopVoiceSearch);

                document.addEventListener('click', function (e) {
                    if (voiceStatus.classList.contains('show') &&
                        !voiceStatus.contains(e.target) &&
                        e.target !== voiceBtn &&
                        !voiceBtn.contains(e.target)) {
                        stopVoiceSearch();
                    }
                });

                // ============================================================
                // 9. المفضلة
                // ============================================================
                window.addFav = function (name, lat, lon) {
                    var displayName = decodeURIComponent(name);
                    var exists = favorites.find(function (f) { return f.lat === lat && f.lon === lon; });
                    if (exists) {
                        showToast('📍 موجود بالفعل');
                        return;
                    }
                    favorites.push({ displayName, lat, lon });
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                    showToast('❤️ تم الحفظ');
                    renderFavorites();
                };

                function removeFav(index) {
                    favorites.splice(index, 1);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                    showToast('🗑️ تم الحذف');
                    renderFavorites();
                }

                function renderFavorites() {
                    if (favorites.length === 0) {
                        openPanel('<i class="fas fa-heart" style="color:#e74c3c;"></i> المفضلة',
                            '<div style="padding:30px 20px;text-align:center;color:#999;"><div style="font-size:40px;">❤️</div><div style="font-size:16px;font-weight:600;color:#333;margin-top:8px;">لا توجد مفضلة</div></div>'
                        );
                        return;
                    }
                    var html = '';
                    favorites.forEach(function (item, index) {
                        html += `
                            <div class="result-item" onclick="map.setView([${item.lat}, ${item.lon}], 15); addCustomMarker(${item.lat}, ${item.lon}, '${item.displayName}', '📍'); closePanel();">
                                <div class="info">
                                    <div class="name">📍 ${item.displayName}</div>
                                    <div class="address">${item.lat.toFixed(4)}, ${item.lon.toFixed(4)}</div>
                                </div>
                                <div class="actions">
                                    <button onclick="event.stopPropagation(); removeFav(${index})" style="background:none;border:none;font-size:14px;cursor:pointer;color:#e74c3c;">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                    openPanel('<i class="fas fa-heart" style="color:#e74c3c;"></i> المفضلة (' + favorites.length + ')', html);
                }

                document.getElementById('favoritesBtn').addEventListener('click', function () {
                    renderFavorites();
                });

                // ============================================================
                // 10. أزرار التحكم
                // ============================================================
                // تكبير
                document.getElementById('zoomInBtn').addEventListener('click', function () {
                    map.zoomIn();
                });

                // تصغير
                document.getElementById('zoomOutBtn').addEventListener('click', function () {
                    map.zoomOut();
                });

                // إعادة تعيين
                document.getElementById('resetViewBtn').addEventListener('click', function () {
                    map.setView([26.8206, 30.8025], 6);
                    showToast('🏠 تم إعادة تعيين الخريطة');
                    document.getElementById('navigationGuide').classList.remove('show');
                    if (currentMarker) {
                        map.removeLayer(currentMarker);
                        currentMarker = null;
                    }
                });

                // حركة المرور
                document.getElementById('trafficToggle').addEventListener('click', function () {
                    isTrafficOn = !isTrafficOn;
                    this.classList.toggle('active');

                    if (isTrafficOn) {
                        // إضافة طبقة مرور
                        if (!layers.trafficAdded) {
                            layers.traffic = L.tileLayer(
                                'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                                attribution: '© OpenStreetMap',
                                maxZoom: 19,
                                opacity: 0.6
                            }
                            );
                            layers.trafficAdded = true;
                        }
                        layers.traffic.addTo(map);
                        showToast('🚗 تم تفعيل طبقة المرور');
                    } else {
                        if (layers.traffic) {
                            map.removeLayer(layers.traffic);
                        }
                        showToast('🚗 تم إلغاء طبقة المرور');
                    }
                });

                // مؤشر التوجيه
                document.getElementById('guideToggle').addEventListener('click', function () {
                    if (currentDestination) {
                        document.getElementById('navigationGuide').classList.toggle('show');
                    } else {
                        showToast('📍 حدد وجهة أولاً من نتائج البحث');
                    }
                });

                // إغلاق مؤشر التوجيه
                document.getElementById('closeGuide').addEventListener('click', function () {
                    document.getElementById('navigationGuide').classList.remove('show');
                    if (currentMarker) {
                        map.removeLayer(currentMarker);
                        currentMarker = null;
                    }
                    currentDestination = null;
                });

                // ============================================================
                // 11. طبقات الخريطة (6 طبقات)
                // ============================================================
                document.getElementById('layersBtn').addEventListener('click', function () {
                    var choice = prompt(
                        'اختر الطبقة:\n' +
                        '1- العادي 🏙️\n' +
                        '2- الداكن 🌙\n' +
                        '3- الفضائي 🛰️\n' +
                        '4- الشوارع 🗺️\n' +
                        '5- الطبوغرافي ⛰️\n' +
                        '6- حركة المرور 🚗',
                        '1'
                    );

                    map.removeLayer(currentLayer);

                    if (choice === '1' || choice === '') { currentLayer = layers.osm; } else if (choice === '2') {
                        currentLayer = layers.dark;
                    } else if (choice === '3') { currentLayer = layers.satellite; } else if (
                        choice === '4') { currentLayer = layers.hot; } else if (choice === '5') {
                            currentLayer = layers
                                .topo;
                        } else if (choice === '6') { currentLayer = layers.traffic; } else {
                            currentLayer =
                            layers.osm;
                        }

                    currentLayer.addTo(map);
                    showToast('✅ تم تبديل الطبقة');
                });

                // ============================================================
                // 12. تحديد الموقع
                // ============================================================
                document.getElementById('locateBtn').addEventListener('click', function () {
                    if (!navigator.geolocation) {
                        showToast('⚠️ الموقع غير مدعوم');
                        return;
                    }
                    showToast('⏳ جاري التحديد...');
                    navigator.geolocation.getCurrentPosition(
                        function (pos) {
                            map.setView([pos.coords.latitude, pos.coords.longitude], 15);
                            addCustomMarker(pos.coords.latitude, pos.coords.longitude, '📍 موقعك', '📍');
                            showToast('✅ تم التحديد');
                            // تحديث المسافات في النتائج
                            if (searchResults.length > 0) {
                                displaySearchResults(searchResults);
                            }
                        },
                        function () {
                            showToast('⚠️ لم نتمكن من التحديد');
                        }
                    );
                });

                // ============================================================
                // 13. أزرار الخدمات
                // ============================================================
                document.querySelectorAll('.service-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        document.querySelectorAll('.service-btn').forEach(function (b) {
                            b.classList.remove(
                                'active');
                        });
                        this.classList.add('active');
                        var service = this.getAttribute('data-service');
                        var searchTerms = {
                            'hospital': 'مستشفى',
                            'pharmacy': 'صيدلية',
                            'bank': 'بنك',
                            'restaurant': 'مطعم',
                            'cafe': 'كافيه',
                            'fuel': 'محطة وقود',
                            'market': 'سوق',
                            'tourist': 'معالم سياحية',
                            'historical': 'أماكن أثرية',
                            'museum': 'متاحف',
                            'beach': 'شواطئ',
                            'entertainment': 'أماكن ترفيهية',
                            'mosque': 'مساجد'
                        };
                        var query = searchTerms[service] || service;
                        document.getElementById('searchInput').value = query;
                        searchOSM(query, service);
                    });
                });

                // ============================================================
                // 14. البحث
                // ============================================================
                document.getElementById('searchBtn').addEventListener('click', function () {
                    var query = document.getElementById('searchInput').value;
                    var activeBtn = document.querySelector('.service-btn.active');
                    var category = activeBtn ? activeBtn.getAttribute('data-service') : null;
                    searchOSM(query, category);
                });

                document.getElementById('searchInput').addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        var query = document.getElementById('searchInput').value;
                        var activeBtn = document.querySelector('.service-btn.active');
                        var category = activeBtn ? activeBtn.getAttribute('data-service') : null;
                        searchOSM(query, category);
                    }
                });

                document.getElementById('closePanel').addEventListener('click', function () {
                    closePanel();
                });

                // ============================================================
                // 15. تحميل افتراضي - بدون نتائج
                // ============================================================
                // لا نعرض أي نتائج عند التحميل
                setTimeout(function () {
                    document.getElementById('searchInput').placeholder = 'ابحث عن أي مكان في مصر...';
                    showToast('🔍 ابحث عن أي مكان في مصر');
                }, 1000);

                // ============================================================
                // 16. جعل الدوال عامة
                // ============================================================
                window.map = map;
                window.addCustomMarker = addCustomMarker;
                window.closePanel = closePanel;
                window.addFav = addFav;
                window.searchOSM = searchOSM;
                window.navigateToPlace = navigateToPlace;

                console.log('🗺️ خرائط مصر المتطورة - النسخة النهائية');
                console.log('✅ جميع الميزات تعمل بنجاح!');
                console.log('📋 عدد الخدمات: 13 فئة');
                console.log('🗺️ طبقات الخريطة: 6 طبقات');
                console.log('🎤 البحث الصوتي: جاهز');
                console.log('🧭 مؤشر التوجيه: جاهز');

            } // نهاية initApp

        }); // نهاية DOMContentLoaded
    </script>

</body>

</html>
