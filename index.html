<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>أورا ماب</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0e14;
            font-family: 'Segoe UI', sans-serif;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #1a1f2e;
        }

        /* ===== شريط البحث ===== */
        #search-container {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(94%, 600px);
            display: flex;
            align-items: center;
            background: rgba(12, 16, 24, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px;
            padding: 4px 4px 4px 16px;
            box-shadow: 0 8px 30px -8px rgba(0, 0, 0, 0.8);
        }

        #search-container i {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.9rem;
        }

        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4fc;
            font-size: 0.9rem;
            padding: 10px 12px;
            min-height: 44px;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #search-btn {
            background: rgba(60, 140, 255, 0.15);
            border: none;
            color: #8abaff;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            min-height: 38px;
            min-width: 50px;
            border: 1px solid rgba(60, 140, 255, 0.08);
            transition: 0.2s;
        }

        #search-btn:active {
            background: rgba(60, 140, 255, 0.3);
        }

        /* ===== نتائج البحث ===== */
        #search-results {
            position: absolute;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(94%, 600px);
            max-height: 260px;
            overflow-y: auto;
            background: rgba(10, 14, 24, 0.95);
            backdrop-filter: blur(24px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px;
            display: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        #search-results.show {
            display: block;
        }

        .result-item {
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d0daf0;
            font-size: 0.85rem;
        }

        .result-item:active {
            background: rgba(255, 255, 255, 0.06);
        }

        .result-item i {
            color: #7bb0ff;
            width: 18px;
        }

        .result-item .name {
            font-weight: 500;
        }

        .result-item .address {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* ===== أزرار التحكم ===== */
        #controls {
            position: absolute;
            top: 76px;
            right: 10px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(12, 16, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #eef4ff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            position: relative;
            touch-action: manipulation;
            user-select: none;
            transition: 0.2s;
        }

        .ctrl-btn:active {
            transform: scale(0.92);
        }

        .ctrl-btn.active {
            background: rgba(60, 140, 255, 0.25);
            border-color: rgba(60, 140, 255, 0.2);
        }

        .ctrl-btn .badge {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 12px;
            height: 12px;
            background: #3dff9e;
            border-radius: 50%;
            border: 2px solid rgba(12, 16, 24, 0.8);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }
        }

        /* ===== اللوحة السفلية - ألوان محسنة ===== */
        #bottom-bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: min(96%, 700px);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: rgba(10, 14, 24, 0.92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.9);
            flex-wrap: nowrap;
            gap: 2px;
            min-height: 56px;
        }

        .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            color: #8899bb;
            font-size: 0.55rem;
            font-weight: 500;
            border: 2px solid transparent;
            transition: 0.3s ease;
            touch-action: manipulation;
            user-select: none;
            min-width: 44px;
            min-height: 44px;
            justify-content: center;
        }

        .bottom-item i {
            font-size: 1.1rem;
            color: #7bb0ff;
            transition: 0.3s;
        }

        .bottom-item:active {
            transform: scale(0.92);
        }

        .bottom-item.active {
            background: rgba(60, 130, 255, 0.15);
            border-color: #4a9eff;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(60, 130, 255, 0.15);
        }

        .bottom-item.active i {
            color: #4a9eff;
        }

        .bottom-item.active span {
            color: #4a9eff;
        }

        .bottom-item span {
            font-size: 0.5rem;
            color: #667799;
            transition: 0.3s;
        }

        /* زر الملاحة - لون مميز عند التفعيل */
        .bottom-item#mode-navigation.active {
            background: rgba(255, 50, 50, 0.15);
            border-color: #ff3333;
            box-shadow: 0 0 30px rgba(255, 50, 50, 0.2);
        }

        .bottom-item#mode-navigation.active i {
            color: #ff3333;
        }

        .bottom-item#mode-navigation.active span {
            color: #ff3333;
        }

        /* ===== 3D Indicator ===== */
        #d3-indicator {
            position: absolute;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            padding: 5px 16px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
            align-items: center;
            gap: 8px;
        }

        /* ===== AR Overlay ===== */
        #ar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 500;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
        }

        #ar-overlay.open {
            display: flex;
        }

        #ar-overlay .ar-content {
            text-align: center;
            padding: 30px 20px;
            max-width: 90%;
        }

        #ar-overlay .ar-content i {
            font-size: 4rem;
            color: #ffb84d;
            margin-bottom: 16px;
            animation: ar-pulse 2s ease-in-out infinite;
        }

        @keyframes ar-pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.08);
                opacity: 0.8;
            }
        }

        #ar-overlay .ar-content .compass-display {
            font-size: 2.8rem;
            margin: 16px 0;
            color: #ffb84d;
        }

        .ar-close {
            margin-top: 24px;
            padding: 12px 36px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== مؤشر GPS ===== */
        .user-marker {
            width: 22px;
            height: 22px;
            background: #3dff9e;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(61, 255, 158, 0.5);
            border: 3px solid rgba(255, 255, 255, 0.15);
            animation: pulse-gps 1.5s ease-in-out infinite;
            position: relative;
        }

        .user-marker::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 7px;
            height: 7px;
            background: #3dff9e;
            border-radius: 50%;
        }

        @keyframes pulse-gps {
            0% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(61, 255, 158, 0.5), 0 0 80px rgba(61, 255, 158, 0.1);
            }
            100% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.3);
            }
        }

        /* ===== مؤشر البحث ===== */
        .search-marker {
            width: 30px;
            height: 30px;
            background: #ff6b6b;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.4);
            border: 3px solid #fff;
            position: relative;
        }

        .search-marker::after {
            content: '';
            position: absolute;
            top: 9px;
            left: 9px;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            transform: rotate(45deg);
        }

        /* ===== 3D Buildings ===== */
        .building-3d {
            position: absolute;
            background: rgba(140, 155, 175, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 2px;
            pointer-events: none;
            z-index: 1;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .building-3d .top {
            position: absolute;
            top: -3px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            background: rgba(200, 215, 235, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        /* ===== لوحة المعلومات ===== */
        #info-panel {
            position: absolute;
            bottom: 85px;
            right: 12px;
            z-index: 50;
            background: rgba(10, 14, 24, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 10px 14px;
            min-width: 100px;
            display: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        #info-panel.show {
            display: block;
        }

        #info-panel .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 0.65rem;
            color: #b0c8e8;
        }

        #info-panel .info-row i {
            color: #7bb0ff;
            width: 14px;
            font-size: 0.65rem;
        }

        /* ===== Leaflet ===== */
        .leaflet-control-attribution {
            display: none !important;
        }
        .leaflet-control-zoom {
            display: none !important;
        }

        /* ===== استجابة ===== */
        @media (max-width: 480px) {
            #bottom-bar {
                bottom: 12px;
                padding: 6px 6px;
                border-radius: 40px;
                min-height: 48px;
                gap: 1px;
            }

            .bottom-item {
                padding: 3px 6px;
                min-width: 36px;
                min-height: 38px;
            }

            .bottom-item i {
                font-size: 0.9rem;
            }

            .bottom-item span {
                font-size: 0.4rem;
            }

            #controls {
                top: 68px;
                right: 8px;
                gap: 6px;
            }

            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            #search-container {
                top: 8px;
                padding: 2px 2px 2px 12px;
                border-radius: 40px;
            }

            #search-input {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-height: 34px;
            }

            #search-btn {
                padding: 4px 12px;
                font-size: 0.65rem;
                min-height: 30px;
                min-width: 40px;
            }

            #search-results {
                top: 62px;
            }

            #info-panel {
                bottom: 75px;
                right: 8px;
                padding: 6px 10px;
                min-width: 70px;
            }

            #info-panel .info-row {
                font-size: 0.5rem;
            }

            #d3-indicator {
                bottom: 75px;
                padding: 3px 12px;
                font-size: 0.5rem;
            }
        }

        @media (max-width: 380px) {
            .bottom-item {
                padding: 2px 4px;
                min-width: 30px;
                min-height: 32px;
            }

            .bottom-item i {
                font-size: 0.7rem;
            }

            .bottom-item span {
                display: none;
            }

            #controls {
                gap: 4px;
            }

            .ctrl-btn {
                width: 34px;
                height: 34px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

            <i class="fas fa-heart"></i>

        <div class="ctrl-btn" id="d3-toggle" title="3D">

        <div class="ctrl-btn" id="ar-btn" title="AR">

    </div>

    <!-- ===== اللوحة السفلية ===== -->

            <i class="fas fa-satellite"></i>
            <span>قمر</span>

    </div>

            </div>

            <button class="ar-close" id="ar-close-btn">إغلاق</button>
        </div>
    </div>

            box-shadow: 0 0 30px rgba(255, 107, 107, 0.4);
            border: 3px solid #fff;
            position: relative;
        }

        .search-marker::after {
            content: '';
            position: absolute;
            top: 9px;
            left: 9px;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            transform: rotate(45deg);
        }

        /* ===== 3D Buildings ===== */
        .building-3d {
            position: absolute;
            background: rgba(140, 155, 175, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 2px;
            pointer-events: none;
            z-index: 1;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .building-3d .top {
            position: absolute;
            top: -3px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            background: rgba(200, 215, 235, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        /* ===== لوحة المعلومات ===== */
        #info-panel {
            position: absolute;
            bottom: 85px;
            right: 12px;
            z-index: 50;
            background: rgba(10, 14, 24, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 10px 14px;
            min-width: 100px;
            display: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        #info-panel.show {
            display: block;
        }

        #info-panel .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 0.65rem;
            color: #b0c8e8;
        }

        #info-panel .info-row i {
            color: #7bb0ff;
            width: 14px;
            font-size: 0.65rem;
        }

        /* ===== Leaflet ===== */
        .leaflet-control-attribution {
            display: none !important;
        }
        .leaflet-control-zoom {
            display: none !important;
        }

        /* ===== استجابة ===== */
        @media (max-width: 480px) {
            #bottom-bar {
                bottom: 12px;
                padding: 6px 6px;
                border-radius: 40px;
                min-height: 48px;
                gap: 1px;
            }

            .bottom-item {
                padding: 3px 6px;
                min-width: 36px;
                min-height: 38px;
            }

            .bottom-item i {
                font-size: 0.9rem;
            }

            .bottom-item span {
                font-size: 0.4rem;
            }

            #controls {
                top: 68px;
                right: 8px;
                gap: 6px;
            }

            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            #search-container {
                top: 8px;
                padding: 2px 2px 2px 12px;
                border-radius: 40px;
            }

            #search-input {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-height: 34px;
            }

            #search-btn {
                padding: 4px 12px;
                font-size: 0.65rem;
                min-height: 30px;
                min-width: 40px;
            }

            #search-results {
                top: 62px;
            }

            #info-panel {
                bottom: 75px;
                right: 8px;
                padding: 6px 10px;
                min-width: 70px;
            }

            #info-panel .info-row {
                font-size: 0.5rem;
            }

            #d3-indicator {
                bottom: 75px;
                padding: 3px 12px;
                font-size: 0.5rem;
            }

            .user-marker {
                width: 18px;
                height: 18px;
                border-width: 2px;
            }

            .user-marker::after {
                width: 5px;
                height: 5px;
            }

            .search-marker {
                width: 26px;
                height: 26px;
                border-width: 2px;
            }

            .search-marker::after {
                top: 8px;
                left: 8px;
                width: 6px;
                height: 6px;
            }

            #ar-overlay .ar-content i {
                font-size: 3rem;
            }

            #ar-overlay .ar-content .compass-display {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 380px) {
            .bottom-item {
                padding: 2px 4px;
                min-width: 30px;
                min-height: 32px;
            }

            .bottom-item i {

            }

            .bottom-item span {
                display: none;
            }

            #controls {
                gap: 4px;
            }

            .ctrl-btn {
                width: 34px;
                height: 34px;
                font-size: 0.8rem;
            }
        }

</head>
<body>

    <!-- ===== الخريطة ===== -->
    <div id="map"></div>

    <!-- ===== شريط البحث ===== -->
    <div id="search-container">
        <i class="fas fa-search"></i>
        <input id="search-input" type="text" placeholder="ابحث عن مدينة، شارع..." autocomplete="off" />
        <button id="search-btn">بحث</button>
    </div>

    <!-- ===== نتائج البحث ===== -->
    <div id="search-results"></div>

    <!-- ===== أزرار التحكم ===== -->
    <div id="controls">
        <div class="ctrl-btn" id="locate-btn" title="موقعي">
            <i class="fas fa-location-crosshairs"></i>
            <span class="badge"></span>
        </div>
        <div class="ctrl-btn" id="favorites-btn" title="المفضلة">
            <i class="fas fa-heart"></i>
        </div>
        <div class="ctrl-btn" id="d3-toggle" title="3D">
            <i class="fas fa-cube"></i>
        </div>
        <div class="ctrl-btn" id="ar-btn" title="AR">
            <i class="fas fa-vr-cardboard"></i>
        </div>
    </div>

    <!-- ===== اللوحة السفلية ===== -->
    <div id="bottom-bar">
        <div class="bottom-item active" id="mode-street">
            <i class="fas fa-road"></i>
            <span>شارع</span>
        </div>
        <div class="bottom-item" id="mode-satellite">
            <i class="fas fa-satellite"></i>
            <span>قمر</span>
        </div>
        <div class="bottom-item" id="mode-terrain">
            <i class="fas fa-mountain"></i>
            <span>تضاريس</span>
        </div>
        <div class="bottom-item" id="mode-night">
            <i class="fas fa-moon"></i>
            <span>ليلي</span>
        </div>
        <div class="bottom-item" id="mode-navigation">
            <i class="fas fa-route"></i>
            <span>ملاحة</span>
        </div>
    </div>

    <!-- ===== مؤشر 3D ===== -->
    <div id="d3-indicator">
        <i class="fas fa-cube"></i> وضع 3D مفعل
    </div>

    <!-- ===== لوحة المعلومات ===== -->
    <div id="info-panel">
        <div class="info-row">
            <i class="fas fa-route"></i>
            <span>المسافة: <span id="distance-info">--</span></span>
        </div>
        <div class="info-row">
            <i class="fas fa-clock"></i>
            <span>الوقت: <span id="time-info">--</span></span>
        </div>
        <div class="info-row">
            <i class="fas fa-map-pin"></i>
            <span>الوجهة: <span id="location-info">--</span></span>
        </div>
    </div>

    <!-- ===== AR Overlay ===== -->
    <div id="ar-overlay">
        <div class="ar-content">
            <i class="fas fa-camera"></i>
            <h3>🌍 الواقع المعزز</h3>
            <p>بوصلة حية + معلومات المكان</p>
            <div class="compass-display">
                <i class="fas fa-compass"></i>
                <span id="ar-compass">--</span>°
            </div>
            <p style="font-size:0.8rem; color:rgba(255,255,255,0.3);">
                <i class="fas fa-map-pin"></i> <span id="ar-location">جاري التحديد...</span>
            </p>
            <button class="ar-close" id="ar-close-btn">إغلاق</button>
        </div>
    </div>

    <script>
        // ================================================================
        //  الخريطة
        // ================================================================
        var map = L.map('map', {
            center: [30.0444, 31.2357],
            zoom: 13,
            zoomControl: true,
        });

        // طبقات الخريطة
        var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var satelliteLayer = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            });

        var terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });

        var nightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });

        var currentLayer = streetLayer;

        // ================================================================
        //  تبديل الأنماط - تم الإصلاح
        // ================================================================
        function switchLayer(layer, btn) {
            // إزالة الطبقة الحالية
            if (currentLayer) {
                map.removeLayer(currentLayer);
            }
            // إضافة الطبقة الجديدة
            currentLayer = layer;
            map.addLayer(layer);

            // تحديث الأزرار
            document.querySelectorAll('.bottom-item').forEach(function(el) {
                el.classList.remove('active');
            });
            if (btn) {
                btn.classList.add('active');
            }
        }

        // أزرار الطبقات
        document.getElementById('mode-street').addEventListener('click', function() {
            switchLayer(streetLayer, this);
        });

        document.getElementById('mode-satellite').addEventListener('click', function() {
            switchLayer(satelliteLayer, this);
        });

        document.getElementById('mode-terrain').addEventListener('click', function() {
            switchLayer(terrainLayer, this);
        });

        document.getElementById('mode-night').addEventListener('click', function() {
            switchLayer(nightLayer, this);
        });

        // ================================================================
        //  GPS
        // ================================================================
        var userMarker = null,
            userCircle = null,
            userPos = null;

        function createUserIcon() {
            return L.divIcon({
                className: 'user-marker',
                iconSize: [22, 22],
                iconAnchor: [11, 11],
                html: '<div></div>'
            });
        }

        function updateLocation(pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            var acc = pos.coords.accuracy || 30;
            userPos = [lat, lng];

            // تحديث AR
            fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng +
                    '&zoom=18&accept-language=ar')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var addr = data.display_name || 'موقع غير معروف';
                    document.getElementById('ar-location').textContent = addr.split(',').slice(0, 3).join(', ');
                })['catch'](function() {});

            if (userMarker) {
                userMarker.setLatLng([lat, lng]);
                if (userCircle) userCircle.setLatLng([lat, lng]);
            } else {
                var icon = createUserIcon();
                userMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                userCircle = L.circle([lat, lng], {
                    radius: acc,
                    color: '#3dff9e',
                    fillColor: '#3dff9e',
                    fillOpacity: 0.06,
                    weight: 1.5,
                    opacity: 0.5,
                }).addTo(map);
            }

            if (pos.coords.heading) {
                document.getElementById('ar-compass').textContent = Math.round(pos.coords.heading);
            }
            document.getElementById('locate-btn').style.color = '#3dff9e';
        }

        function locateUser() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(updateLocation, function() {
                    alert('⚠️ لم نتمكن من تحديد موقعك');
                }, { enableHighAccuracy: true });
                navigator.geolocation.watchPosition(updateLocation, null, { enableHighAccuracy: true });
            }
        }
        locateUser();

        document.getElementById('locate-btn').addEventListener('click', function() {
            if (userPos) {
                map.flyTo(userPos, 16, { duration: 1.2 });
                document.getElementById('locate-btn').style.color = '#3dff9e';
                setTimeout(function() { document.getElementById('locate-btn').style.color = ''; }, 1000);
            } else {
                locateUser();
                alert('⏳ جاري تحديد موقعك...');
            }
        });

        // ================================================================
        //  البحث - تم الإصلاح
        // ================================================================
        var searchInput = document.getElementById('search-input');
        var searchBtn = document.getElementById('search-btn');
        var results = document.getElementById('search-results');
        var searchMarker = null,
            searchCircle = null,
            searchTimeout = null;

        function clearSearch() {
            if (searchMarker) { map.removeLayer(searchMarker);
                searchMarker = null; }
            if (searchCircle) { map.removeLayer(searchCircle);
                searchCircle = null; }
        }

        function addSearch(lat, lng, name) {
            clearSearch();
            var icon = L.divIcon({
                className: 'search-marker',
                iconSize: [30, 30],
                iconAnchor: [15, 30],
                html: '<div></div>'
            });
            searchMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
            searchMarker.bindPopup('📍 ' + name);
            searchCircle = L.circle([lat, lng], { radius: 50, color: '#ff6b6b', fillColor: '#ff6b6b', fillOpacity: 0.05,
                weight: 2 }).addTo(map);
            map.flyTo([lat, lng], 16, { duration: 1.2 });
            setTimeout(function() { if (searchMarker) searchMarker.openPopup(); }, 500);
        }

        function doSearch(q) {
            if (q.length < 2) {
                results.classList.remove('show');
                return;
            }

            // استخدام API مختلف وأكثر استقراراً
            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) +
                '&limit=6&lang=ar&countrycodes=eg&addressdetails=1';

            fetch(url)
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(function(data) {
                    results.innerHTML = '';
                    if (!data || data.length === 0) {
                        results.innerHTML =
                            '<div style="padding:14px;color:rgba(255,255,255,0.3);text-align:center;">❌ لا توجد نتائج</div>';
                        results.classList.add('show');
                        return;
                    }

                    data.forEach(function(item) {
                        var div = document.createElement('div');
                        div.className = 'result-item';
                        var name = item.display_name.split(',')[0] || 'موقع';
                        var addr = item.display_name.split(',').slice(1, 4).join(', ');
                        div.innerHTML =
                            '<i class="fas fa-map-pin"></i><div><div class="name">' + name +
                            '</div><div class="address">' + addr + '</div></div>';
                        div.addEventListener('click', function() {
                            var lat = parseFloat(item.lat);
                            var lon = parseFloat(item.lon);
                            addSearch(lat, lon, name);
                            results.classList.remove('show');
                            searchInput.value = name;
                        });
                        results.appendChild(div);
                    });
                    results.classList.add('show');
                })['catch'](function(error) {
                    console.error('Search error:', error);
                    results.innerHTML =
                        '<div style="padding:14px;color:rgba(255,100,100,0.5);text-align:center;">⚠️ خطأ في البحث، حاول مرة أخرى</div>';
                    results.classList.add('show');
                });
        }

        searchBtn.addEventListener('click', function() { doSearch(searchInput.value); });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                doSearch(searchInput.value);
            }
        });

        searchInput.addEventListener('input', function() {
            if (searchTimeout) clearTimeout(searchTimeout);
            var q = searchInput.value.trim();
            if (q.length === 0) {
                results.classList.remove('show');
                clearSearch();
                return;
            }
            if (q.length >= 2) {
                searchTimeout = setTimeout(function() { doSearch(q); }, 500);
            }
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('#search-container') && !e.target.closest('#search-results')) {
                results.classList.remove('show');
            }
        });

        // ================================================================
        //  الملاحة - خط أحمر
        // ================================================================
        var navMode = false,
            routeLine = null,
            routeMarkers = [];

        function calcRoute(sLat, sLng, eLat, eLng) {
            var url = 'https://router.project-osrm.org/route/v1/driving/' + sLng + ',' + sLat + ';' + eLng + ',' + eLat +
                '?overview=full&geometries=geojson';
            return fetch(url)
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.code === 'Ok' && d.routes && d.routes.length > 0) {
                        return d.routes[0];
                    }
                    return null;
                })['catch'](function() { return null; });
        }

        function drawRoute(route, dest) {
            // إزالة المسار القديم
            if (routeLine) {
                map.removeLayer(routeLine);
                routeLine = null;
            }
            routeMarkers.forEach(function(m) { map.removeLayer(m); });
            routeMarkers = [];

            if (!route) return;

            var coords = route.geometry.coordinates.map(function(c) { return [c[1], c[0]]; });

            // خط أحمر واضح
            routeLine = L.polyline(coords, {
                color: '#ff0000',
                weight: 6,
                opacity: 0.9,
                dashArray: '12, 6',
                lineJoin: 'round',
            }).addTo(map);

            // نقطة البداية - خضراء
            var sIcon = L.divIcon({
                html: '<div style="background:#00ff00;border-radius:50%;width:18px;height:18px;border:3px solid #fff;box-shadow:0 0 20px rgba(0,255,0,0.5);"></div>',
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            });
            var startM = L.marker([coords[0][0], coords[0][1]], { icon: sIcon })
                .addTo(map)
                .bindPopup('🟢 نقطة البداية');
            routeMarkers.push(startM);

            // نقطة النهاية - حمراء
            var eIcon = L.divIcon({
                html: '<div style="background:#ff0000;border-radius:50%;width:18px;height:18px;border:3px solid #fff;box-shadow:0 0 20px rgba(255,0,0,0.5);"></div>',
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            });
            var endM = L.marker([coords[coords.length - 1][0], coords[coords.length - 1][1]], { icon: eIcon })
                .addTo(map)
                .bindPopup('🔴 ' + dest);
            routeMarkers.push(endM);

            // عرض المعلومات
            var dist = (route.distance / 1000).toFixed(1);
            var time = Math.round(route.duration / 60);
            document.getElementById('distance-info').textContent = dist + ' كم';
            document.getElementById('time-info').textContent = time + ' دقائق';
            document.getElementById('location-info').textContent = dest;
            document.getElementById('info-panel').classList.add('show');

            // تكبير الخريطة لعرض المسار
            var bounds = L.latLngBounds(coords);
            map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });

            showToast('🔴 المسافة: ' + dist + ' كم - ' + time + ' دقائق');
        }

        document.getElementById('mode-navigation').addEventListener('click', function() {
            navMode = !navMode;
            this.classList.toggle('active', navMode);

            if (navMode) {
                if (!userPos) {
                    alert('⚠️ حدد موقعك أولاً');
                    navMode = false;
                    this.classList.remove('active');
                    return;
                }

                var dest = prompt('📍 أدخل اسم الوجهة:');
                if (!dest) {
                    navMode = false;
                    this.classList.remove('active');
                    return;
                }

                fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(dest) +
                        '&limit=1&lang=ar')
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (!data || data.length === 0) {
                            alert('⚠️ لم يتم العثور على: ' + dest);
                            navMode = false;
                            document.getElementById('mode-navigation').classList.remove('active');
                            return;
                        }

                        var lat = parseFloat(data[0].lat);
                        var lon = parseFloat(data[0].lon);

                        calcRoute(userPos[0], userPos[1], lat, lon)
                            .then(function(route) {
                                if (route) {
                                    drawRoute(route, data[0].display_name.split(',')[0]);
                                } else {
                                    alert('❌ لا يمكن حساب المسار');
                                    navMode = false;
                                    document.getElementById('mode-navigation').classList.remove('active');
                                    document.getElementById('info-panel').classList.remove('show');
                                }
                            });
                    })['catch'](function() {
                        alert('⚠️ خطأ في البحث عن الوجهة');
                        navMode = false;
                        document.getElementById('mode-navigation').classList.remove('active');
                    });

            } else {
                // إلغاء الملاحة
                if (routeLine) {
                    map.removeLayer(routeLine);
                    routeLine = null;
                }
                routeMarkers.forEach(function(m) { map.removeLayer(m); });
                routeMarkers = [];
                document.getElementById('info-panel').classList.remove('show');
                showToast('📍 تم إلغاء الملاحة');
            }
        });

        // ================================================================
        //  3D
        // ================================================================
        var is3D = false;
        var btn3d = document.getElementById('d3-toggle');
        var indicator = document.getElementById('d3-indicator');
        var buildings = [],
            bInterval = null;

        var bData = [
            { lat: 30.0458, lng: 31.2242, w: 0.0012, h: 0.0012 },
            { lat: 30.0425, lng: 31.2334, w: 0.0020, h: 0.0016 },
            { lat: 30.0444, lng: 31.2357, w: 0.0025, h: 0.0020 },
            { lat: 30.0478, lng: 31.2335, w: 0.0030, h: 0.0025 },
            { lat: 30.0420, lng: 31.2260, w: 0.0020, h: 0.0015 },
            { lat: 30.0485, lng: 31.2365, w: 0.0018, h: 0.0018 },
            { lat: 30.0460, lng: 31.2380, w: 0.0022, h: 0.0016 },
            { lat: 30.0430, lng: 31.2350, w: 0.0016, h: 0.0014 },
            { lat: 30.0438, lng: 31.2340, w: 0.0028, h: 0.0018 },
            { lat: 30.0490, lng: 31.2220, w: 0.0025, h: 0.0020 },
            { lat: 30.0480, lng: 31.2300, w: 0.0018, h: 0.0015 },
            { lat: 30.0470, lng: 31.2320, w: 0.0020, h: 0.0016 },
            { lat: 30.0450, lng: 31.2370, w: 0.0015, h: 0.0015 },
            { lat: 30.0400, lng: 31.2300, w: 0.0030, h: 0.0020 },
            { lat: 30.0410, lng: 31.2320, w: 0.0025, h: 0.0025 },
            { lat: 30.0445, lng: 31.2365, w: 0.0018, h: 0.0015 },
            { lat: 30.0465, lng: 31.2250, w: 0.0014, h: 0.0014 },
            { lat: 30.0435, lng: 31.2370, w: 0.0016, h: 0.0016 },
        ];

        function createBuildings() {
            buildings.forEach(function(el) { if (el.parentNode) el.parentNode.removeChild(el); });
            buildings = [];
            if (!is3D) return;
            var c = document.getElementById('map');
            bData.forEach(function(b) {
                try {
                    var p1 = map.latLngToContainerPoint([b.lat, b.lng]);
                    var p2 = map.latLngToContainerPoint([b.lat + b.h, b.lng + b.w]);
                    var w = Math.abs(p2.x - p1.x),
                        h = Math.abs(p2.y - p1.y);
                    if (w < 300 && h < 300 && w > 3 && h > 3) {
                        var div = document.createElement('div');
                        div.className = 'building-3d';
                        div.style.left = (Math.min(p1.x, p2.x) - 1) + 'px';
                        div.style.top = (Math.min(p1.y, p2.y) - 1) + 'px';
                        div.style.width = (w + 2) + 'px';
                        div.style.height = (h + 2) + 'px';
                        div.style.background = 'rgba(150,165,185,' + (0.3 + Math.random() * 0.2) + ')';
                        var top = document.createElement('div');
                        top.className = 'top';
                        div.appendChild(top);
                        c.appendChild(div);
                        buildings.push(div);
                    }
                } catch (e) {}
            });
        }

        btn3d.addEventListener('click', function() {
            is3D = !is3D;
            btn3d.classList.toggle('active', is3D);
            if (is3D) {
                switchLayer(terrainLayer, document.getElementById('mode-terrain'));
                indicator.style.display = 'flex';
                btn3d.style.color = '#7bb0ff';
                setTimeout(createBuildings, 300);
                map.on('moveend', createBuildings);
                map.on('zoomend', createBuildings);
                if (bInterval) clearInterval(bInterval);
                bInterval = setInterval(createBuildings, 2000);
                showToast('🌐 3D مفعل - المباني تظهر');
            } else {
                indicator.style.display = 'none';
                btn3d.style.color = '';
                buildings.forEach(function(el) { if (el.parentNode) el.parentNode.removeChild(el); });
                buildings = [];
                map.off('moveend', createBuildings);
                map.off('zoomend', createBuildings);
                if (bInterval) { clearInterval(bInterval);
                    bInterval = null; }
                switchLayer(streetLayer, document.getElementById('mode-street'));
                showToast('📍 تم إلغاء 3D');
            }
        });

        // ================================================================
        //  المفضلة
        // ================================================================
        var favs = [],
            favMarkers = [];

        document.getElementById('favorites-btn').addEventListener('click', function() {
            if (userPos) {
                var name = prompt('اسم المكان:');
                if (name) {
                    favs.push({ lat: userPos[0], lng: userPos[1], name: name });
                    showToast('❤️ تم حفظ "' + name + '"');
                    updateFavs();
                }
            } else { alert('⚠️ حدد موقعك أولاً'); }
        });

        function updateFavs() {
            favMarkers.forEach(function(m) { map.removeLayer(m); });
            favMarkers = [];
            favs.forEach(function(f) {
                var icon = L.divIcon({
                    html: '<div style="background:#ff6b6b;border-radius:50%;width:14px;height:14px;border:2px solid #fff;box-shadow:0 0 20px rgba(255,107,107,0.4);"></div>',
                    iconSize: [14, 14],
                    iconAnchor: [7, 7]
                });
                favMarkers.push(L.marker([f.lat, f.lng], { icon: icon }).addTo(map).bindPopup('❤️ ' + f.name));
            });
        }

        // ================================================================
        //  AR
        // ================================================================
        var arBtn = document.getElementById('ar-btn');
        var arOverlay = document.getElementById('ar-overlay');
        var arInterval = null;

        arBtn.addEventListener('click', function() {
            arOverlay.classList.toggle('open');
            if (arOverlay.classList.contains('open')) {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(pos) {
                        if (pos.coords.heading) {
                            document.getElementById('ar-compass').textContent = Math.round(pos.coords
                            .heading);
                        }
                    });
                }
                if (arInterval) clearInterval(arInterval);
                arInterval = setInterval(function() {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(function(pos) {
                            if (pos.coords.heading) {
                                document.getElementById('ar-compass').textContent = Math.round(pos
                                    .coords.heading);
                            }
                        });
                    }
                }, 2000);
                showToast('🥽 AR مفعل - بوصلة تعمل');
            } else {
                if (arInterval) clearInterval(arInterval);
                showToast('📍 تم إلغاء AR');
            }
        });

        document.getElementById('ar-close-btn').addEventListener('click', function() {
            arOverlay.classList.remove('open');
            if (arInterval) clearInterval(arInterval);
        });

        // ================================================================
        //  Toast
        // ================================================================
        function showToast(msg, color) {
            color = color || '#7bb0ff';
            var t = document.createElement('div');
            t.style.position = 'absolute';
            t.style.top = '72px';
            t.style.left = '50%';
            t.style.transform = 'translateX(-50%)';
            t.style.zIndex = '999';
            t.style.padding = '8px 20px';
            t.style.background = 'rgba(0,0,0,0.8)';
            t.style.backdropFilter = 'blur(12px)';
            t.style.borderRadius = '40px';
            t.style.border = '1px solid ' + color + '33';
            t.style.color = '#fff';
            t.style.fontSize = '0.8rem';
            t.style.maxWidth = '90%';
            t.style.textAlign = 'center';
            t.innerHTML = msg;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                setTimeout(function() { t.remove(); }, 900);
            }, 3000);
        }

        // ================================================================
        //  تأكيد جاهزية الخريطة
        // ================================================================
        setTimeout(function() {
            map.invalidateSize();
            console.log('🚀 أورا ماب - جاهزة');
        }, 500);
    </script>
</body>
</html>
