<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أورا ماب</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0b0e14;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        #map {
            height: 100vh;
            width: 100vw;
            background: #1a1f2e;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        #search-bar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 6px;
            background: rgba(12, 16, 24, 0.92);
            backdrop-filter: blur(20px);
            padding: 6px 10px;
            border-radius: 50px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            width: 90%;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #search-input {
            flex: 1;
            border: none;
            padding: 10px 14px;
            font-size: 15px;
            border-radius: 30px;
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            color: #f0f4fc;
        }
        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        #search-btn {
            background: rgba(60, 140, 255, 0.15);
            color: #8abaff;
            border: 1px solid rgba(60, 140, 255, 0.08);
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.2s;
        }
        #search-btn:hover {
            background: rgba(60, 140, 255, 0.25);
        }

        #share-btn {
            background: rgba(255, 180, 60, 0.1);
            border: none;
            color: #ffb84d;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255, 180, 60, 0.06);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #share-btn:hover {
            background: rgba(255, 180, 60, 0.2);
        }
        #share-btn i {
            font-size: 1rem;
        }

        #bottom-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: min(96%, 850px);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: rgba(10, 14, 24, 0.92);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.9);
            flex-wrap: wrap;
            gap: 2px;
            min-height: 56px;
        }
        .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 8px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            color: #8899bb;
            font-size: 0.5rem;
            font-weight: 500;
            border: 2px solid transparent;
            transition: 0.3s ease;
            user-select: none;
            min-width: 38px;
            min-height: 38px;
            justify-content: center;
        }
        .bottom-item i {
            font-size: 0.95rem;
            color: #7bb0ff;
            transition: 0.3s;
        }
        .bottom-item:active {
            transform: scale(0.92);
        }
        .bottom-item.active {
            background: rgba(60, 130, 255, 0.12);
            border-color: #4a9eff;
            color: #ffffff;
        }
        .bottom-item.active i {
            color: #4a9eff;
        }
        .bottom-item.active span {
            color: #4a9eff;
        }
        .bottom-item span {
            font-size: 0.4rem;
            color: #667799;
            transition: 0.3s;
        }
        .bottom-item#mode-navigation.active {
            background: rgba(255, 50, 50, 0.15);
            border-color: #ff3333;
        }
        .bottom-item#mode-navigation.active i {
            color: #ff3333;
        }
        .bottom-item#mode-navigation.active span {
            color: #ff3333;
        }

        #info-panel {
            position: absolute;
            bottom: 110px;
            right: 15px;
            z-index: 50;
            background: rgba(10, 14, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 12px 16px;
            min-width: 170px;
            display: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        #info-panel.show {
            display: block;
        }
        #info-panel .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 0.7rem;
            color: #b0c8e8;
        }
        #info-panel .info-row i {
            color: #7bb0ff;
            width: 16px;
            font-size: 0.7rem;
        }

        .gps-marker {
            width: 30px;
            height: 30px;
            position: relative;
        }
        .gps-marker .arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            color: #4a9eff;
            text-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
            filter: drop-shadow(0 0 10px rgba(74, 158, 255, 0.3));
            transition: transform 0.3s ease;
        }
        .gps-marker .pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(74, 158, 255, 0.1);
            border: 2px solid rgba(74, 158, 255, 0.2);
            animation: pulse-ring 2s ease-out infinite;
        }
        @keyframes pulse-ring {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }
        }

        #memory-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
        }
        #memory-modal.open {
            display: flex;
        }
        .memory-panel {
            background: rgba(14, 20, 32, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 28px 32px;
            width: min(90%, 400px);
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
        }
        .memory-panel h2 {
            color: #e8f0ff;
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .memory-panel h2 i {
            color: #ffb84d;
        }
        .memory-item {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: #d0daf0;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .memory-item i {
            color: #ffb84d;
        }
        .memory-item .memory-date {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            margin-left: auto;
        }
        .memory-empty {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }
        .close-memory {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            background: rgba(60, 140, 255, 0.1);
            color: #b0d0ff;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid rgba(60, 140, 255, 0.05);
        }
        .memory-add {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .memory-add input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: #f0f4fc;
            font-size: 0.85rem;
            outline: none;
        }
        .memory-add input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        .memory-add button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            background: rgba(255, 180, 60, 0.1);
            color: #ffb84d;
            cursor: pointer;
            border: 1px solid rgba(255, 180, 60, 0.06);
        }

        #fav-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
        }
        #fav-modal.open {
            display: flex;
        }
        .fav-panel {
            background: rgba(14, 20, 32, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 28px 32px;
            width: min(90%, 400px);
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
        }
        .fav-panel h2 {
            color: #e8f0ff;
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .fav-panel h2 i {
            color: #ff6b6b;
        }
        .fav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: #d0daf0;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .fav-item .fav-del {
            color: #ff6b6b;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(255, 107, 107, 0.05);
            border: none;
            font-size: 0.7rem;
        }
        .fav-empty {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }
        .close-fav {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            background: rgba(60, 140, 255, 0.1);
            color: #b0d0ff;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid rgba(60, 140, 255, 0.05);
        }

        #ar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 500;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
        }
        #ar-overlay.open {
            display: flex;
        }
        #ar-overlay .ar-content {
            text-align: center;
            padding: 30px 20px;
            max-width: 90%;
        }
        #ar-overlay .ar-content i {
            font-size: 4rem;
            color: #ffb84d;
            margin-bottom: 16px;
            animation: ar-pulse 2s ease-in-out infinite;
        }
        @keyframes ar-pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.08);
                opacity: 0.8;
            }
        }
        #ar-overlay .ar-content .compass-display {
            font-size: 2.8rem;
            margin: 16px 0;
            color: #ffb84d;
        }
        #ar-overlay .ar-content .ar-info {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            margin: 6px 0;
        }
        .ar-close {
            margin-top: 24px;
            padding: 12px 36px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        #status-bar {
            position: absolute;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            padding: 4px 16px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.02);
            display: none;
        }
        #status-bar.online {
            border-color: rgba(61, 255, 158, 0.1);
            color: rgba(61, 255, 158, 0.3);
        }
        #status-bar.offline {
            border-color: rgba(255, 107, 107, 0.1);
            color: rgba(255, 107, 107, 0.3);
        }

        #speedometer {
            position: absolute;
            bottom: 110px;
            left: 15px;
            z-index: 50;
            background: rgba(10, 14, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 10px 14px;
            min-width: 80px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            display: none;
            text-align: center;
        }
        #speedometer.show {
            display: block;
        }
        #speedometer .speed-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #3dff9e;
        }
        #speedometer .speed-label {
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.3);
        }
        #speedometer .speed-accuracy {
            font-size: 0.4rem;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 2px;
        }

        #clear-markers-btn {
            position: absolute;
            top: 80px;
            left: 15px;
            z-index: 50;
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.1);
            color: #ff6b6b;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.6rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            background: rgba(10, 14, 24, 0.8);
            display: none;
        }
        #clear-markers-btn.show {
            display: block;
        }
        #clear-markers-btn:hover {
            background: rgba(255, 50, 50, 0.2);
        }

        .leaflet-control-attribution {
            display: none !important;
        }
        .leaflet-control-zoom {
            display: none !important;
        }

        @media (max-width: 480px) {
            #bottom-bar {
                bottom: 12px;
                padding: 4px 6px;
                border-radius: 40px;
                min-height: 44px;
                gap: 1px;
            }
            .bottom-item {
                padding: 2px 5px;
                min-width: 30px;
                min-height: 30px;
            }
            .bottom-item i {
                font-size: 0.75rem;
            }
            .bottom-item span {
                font-size: 0.35rem;
            }
            #search-bar {
                top: 10px;
                padding: 4px 8px;
                gap: 4px;
            }
            #search-input {
                font-size: 13px;
                padding: 6px 10px;
            }
            #search-btn {
                padding: 6px 12px;
                font-size: 13px;
            }
            #share-btn {
                padding: 6px 12px;
                font-size: 13px;
            }
            #share-btn span {
                display: none;
            }
            #info-panel {
                bottom: 85px;
                right: 10px;
                padding: 8px 12px;
                min-width: 120px;
            }
            #info-panel .info-row {
                font-size: 0.55rem;
            }
            #status-bar {
                bottom: 75px;
                font-size: 0.4rem;
                padding: 2px 12px;
            }
            .memory-panel,
            .fav-panel {
                padding: 16px 14px;
                width: 94%;
            }
            #ar-overlay .ar-content i {
                font-size: 3rem;
            }
            #ar-overlay .ar-content .compass-display {
                font-size: 2.2rem;
            }
            #speedometer {
                bottom: 85px;
                left: 10px;
                padding: 6px 10px;
                min-width: 60px;
            }
            #speedometer .speed-value {
                font-size: 0.9rem;
            }
            #clear-markers-btn {
                top: 70px;
                left: 10px;
                padding: 4px 10px;
                font-size: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- ===== تم إزالة شعار "أورا ماب" ===== -->

    <div id="search-bar">
        <input type="text" id="search-input" placeholder="ابحث عن مدينة، شارع، معلم..." />
        <button id="search-btn">🔍</button>
        <button id="share-btn"><i class="fas fa-share-alt"></i> <span>مشاركة</span></button>
    </div>

    <div id="status-bar" class="online">📡 متصل</div>

    <div id="info-panel">
        <div class="info-row"><i class="fas fa-route"></i> المسافة: <span id="distance">--</span> كم</div>
        <div class="info-row"><i class="fas fa-clock"></i> الوقت: <span id="time">--</span> دقيقة</div>
        <div class="info-row"><i class="fas fa-map-pin"></i> الوجهة: <span id="destination">--</span></div>
        <div class="info-row"><i class="fas fa-road"></i> الشارع: <span id="street-name">--</span></div>
        <div class="info-row"><i class="fas fa-city"></i> المنطقة: <span id="area-name">--</span></div>
    </div>

    <div id="speedometer">
        <div class="speed-value" id="speed-value">0</div>
        <div class="speed-label">كم/ساعة</div>
        <div class="speed-accuracy" id="speed-accuracy">جاري التحديث...</div>
    </div>

    <button id="clear-markers-btn"><i class="fas fa-eraser"></i> مسح الكل</button>

    <div id="bottom-bar">
        <div class="bottom-item active" id="mode-street"><i class="fas fa-road"></i><span>شارع</span></div>
        <div class="bottom-item" id="mode-satellite"><i class="fas fa-satellite"></i><span>قمر</span></div>
        <div class="bottom-item" id="mode-terrain"><i class="fas fa-mountain"></i><span>تضاريس</span></div>
        <div class="bottom-item" id="mode-night"><i class="fas fa-moon"></i><span>ليلي</span></div>
        <div class="bottom-item" id="mode-navigation"><i class="fas fa-route"></i><span>ملاحة</span></div>
        <div class="bottom-item" id="mode-gps"><i class="fas fa-location-crosshairs"></i><span>موقعي</span></div>
        <div class="bottom-item" id="mode-fav"><i class="fas fa-heart"></i><span>مفضلة</span></div>
        <div class="bottom-item" id="mode-memory"><i class="fas fa-clock-rotate-left"></i><span>ذكريات</span></div>
        <div class="bottom-item" id="mode-ar"><i class="fas fa-vr-cardboard"></i><span>AR</span></div>
    </div>

    <div id="fav-modal">
        <div class="fav-panel">
            <h2><i class="fas fa-heart"></i> الأماكن المفضلة</h2>
            <div id="fav-list"></div>
            <button class="close-fav" id="close-fav-btn">إغلاق</button>
        </div>
    </div>

    <div id="memory-modal">
        <div class="memory-panel">
            <h2><i class="fas fa-clock-rotate-left"></i> مسار الذكريات</h2>
            <div id="memory-list"></div>
            <div class="memory-add">
                <input id="memory-input" placeholder="أضف ذكرى جديدة..." />
                <button id="memory-add-btn"><i class="fas fa-plus"></i></button>
            </div>
            <button class="close-memory" id="close-memory-btn">إغلاق</button>
        </div>
    </div>

    <div id="ar-overlay">
        <div class="ar-content">
            <i class="fas fa-camera"></i>
            <h3>🌍 الواقع المعزز</h3>
            <p>اتجاهك الحقيقي + معلومات المكان</p>
            <div class="compass-display"><i class="fas fa-compass"></i> <span id="ar-compass">--</span>°</div>
            <div class="ar-info"><i class="fas fa-map-pin"></i> <span id="ar-location">جاري التحديد...</span></div>
            <div class="ar-info"><i class="fas fa-building"></i> <span id="ar-nearby">جاري البحث...</span></div>
            <div class="ar-info" style="font-size:2rem;margin-top:10px;" id="ar-direction">⬆️</div>
            <button class="ar-close" id="ar-close-btn">إغلاق</button>
        </div>
    </div>

    <script>
        // ================================================================
        //  تهيئة الخريطة
        // ================================================================
        var map = L.map('map', {
            center: [30.0444, 31.2357],
            zoom: 14,
            zoomControl: false,
        });

        var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var satelliteLayer = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            });

        var terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });

        var nightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });

        var currentLayer = streetLayer;

        var currentHour = new Date().getHours();
        if (currentHour < 6 || currentHour > 18) {

        // ================================================================

        function createGPSIcon(heading) {
            var container = document.createElement('div');

            pulse.className = 'pulse';
            container.appendChild(pulse);

            // السهم يدور حسب زاوية الاتجاه

            container.appendChild(arrow);

            return L.divIcon({
                className: 'gps-marker-container',
                html: container.outerHTML,
                iconSize: [30, 30],
                iconAnchor: [15, 15],
            });
        }

        function updateGPSIcon(heading) {
            if (userMarker) {
                var icon = createGPSIcon(heading || userHeading || 0);
                userMarker.setIcon(icon);

        function getLocationDetails(lat, lng) {
            var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng +
                '&zoom=18&accept-language=ar';

            return fetch(url, {
                headers: {
                    'User-Agent': 'AoraMap/1.0',
                    'Accept': 'application/json'
                }
            })
            .then(function(response) {
                if (!response.ok) throw new Error('Network error');
                return response.json();
            })
            .then(function(data) {
                var result = {
                    street: 'شارع غير معروف',
                    area: 'منطقة غير معروفة',
                    full: 'موقع غير معروف'
                };

                if (data && data.address) {
                    result.street = data.address.road || data.address.street || data.address.pedestrian ||
                        data.address.footway || 'شارع غير معروف';
                    result.area = data.address.suburb || data.address.neighbourhood || data.address.city_district ||
                        data.address.district || data.address.city || data.address.town || data.address.village ||
                        'منطقة غير معروفة';
                    result.full = data.display_name || 'موقع غير معروف';
                }

                return result;
            });
        }

        function updateLocation(pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            var acc = pos.coords.accuracy || 30;
            var heading = pos.coords.heading || 0;
            var speed = pos.coords.speed;

            userPos = [lat, lng];
            userHeading = heading;

            // ===== حساب السرعة الحقيقية من GPS =====
            var speedKmh = 0;
            var speedAccuracy = 'جيد';

            if (speed !== null && speed !== undefined && speed >= 0) {
                speedKmh = speed * 3.6;
                speedAccuracy = 'من GPS';
            } else if (lastPos && lastTime) {
                var dist = calcDistance(lastPos[0], lastPos[1], lat, lng);
                var timeDiff = (Date.now() - lastTime) / 1000;
                if (timeDiff > 0.5 && dist > 0.001) {
                    speedKmh = (dist / timeDiff) * 3600;
                    speedAccuracy = 'محسوبة';
                } else {
                    speedAccuracy = 'منتظر...';
                }
            }

            if (speedKmh > 0) {
                speedBuffer.push(speedKmh);
                if (speedBuffer.length > 5) speedBuffer.shift();
                var avgSpeed = speedBuffer.reduce(function(a, b) { return a + b; }, 0) / speedBuffer.length;
                document.getElementById('speed-value').textContent = Math.round(avgSpeed);
                document.getElementById('speed-accuracy').textContent = '🟢 ' + speedAccuracy + ' (' + speedBuffer
                    .length + '/5)';
                document.getElementById('speedometer').classList.add('show');
            } else if (speedBuffer.length > 0) {
                var lastSpeed = speedBuffer[speedBuffer.length - 1] || 0;
                document.getElementById('speed-value').textContent = Math.round(lastSpeed);
                document.getElementById('speed-accuracy').textContent = '🟡 متوقف (' + speedAccuracy + ')';
                document.getElementById('speedometer').classList.add('show');
            } else {
                document.getElementById('speed-value').textContent = '0';
                document.getElementById('speed-accuracy').textContent = '⏳ ' + speedAccuracy;
                document.getElementById('speedometer').classList.add('show');
            }

            lastPos = [lat, lng];
            lastTime = Date.now();

            // ===== تحديث العلامة =====
            if (userMarker) {
                userMarker.setLatLng([lat, lng]);
                if (userCircle) userCircle.setLatLng([lat, lng]);
                updateGPSIcon(heading);
            } else {
                var icon = createGPSIcon(heading);
                userMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                userCircle = L.circle([lat, lng], {
                    radius: acc,
                    color: '#4a9eff',
                    fillColor: '#4a9eff',
                    fillOpacity: 0.06,
                    weight: 1.5,
                    opacity: 0.5,
                }).addTo(map);

                map.flyTo([lat, lng], 16, { duration: 1.5 });
                showToast('📍 تم تحديد موقعك');
            }

            getLocationDetails(lat, lng)
                .then(function(details) {
                    document.getElementById('street-name').textContent = details.street;
                    document.getElementById('area-name').textContent = details.area;
                    document.getElementById('destination').textContent = details.full.split(',')[0] || 'موقعك الحالي';
                })
                ['catch'](function() {
                    document.getElementById('street-name').textContent = 'شارع (غير متصل)';
                    document.getElementById('area-name').textContent = 'منطقة (غير متصل)';
                });

            document.getElementById('mode-gps').style.color = '#4a9eff';
            document.getElementById('mode-gps').classList.add('active');
        }

        function locateUser() {
            if (navigator.geolocation) {
                showToast('⏳ جاري تحديد موقعك...');
                navigator.geolocation.getCurrentPosition(updateLocation, function(err) {
                    alert('⚠️ لم نتمكن من تحديد موقعك. تأكد من تشغيل GPS.');
                }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 });

                if (speedWatchId) navigator.geolocation.clearWatch(speedWatchId);
                speedWatchId = navigator.geolocation.watchPosition(updateLocation, null, {
                    enableHighAccuracy: true,
                    maximumAge: 1000,
                    timeout: 10000
                });
            } else {
                alert('⚠️ متصفحك لا يدعم تحديد الموقع');
            }
        }

        document.getElementById('mode-gps').addEventListener('click', function() {
            if (userPos) {
                map.flyTo(userPos, 16, { duration: 1.2 });
                showToast('📍 العودة إلى موقعك');
            } else {
                locateUser();
            }
        });

        setTimeout(locateUser, 1000);

        // ================================================================
        //  حساب المسافة
        // ================================================================
        function calcDistance(lat1, lon1, lat2, lon2) {
            var R = 6371;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        var searchBtn = document.getElementById('search-btn');

            clearSearchMarker();
            var icon = L.divIcon({
                className: 'search-marker',
                html: '<div style="background:#ff6b6b;border-radius:50% 50% 50% 0;width:30px;height:30px;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 0 30px rgba(255,107,107,0.5);"><div style="position:absolute;top:8px;left:8px;width:10px;height:10px;background:#fff;border-radius:50%;transform:rotate(45deg);"></div></div>',
                iconSize: [30, 30],
                iconAnchor: [15, 30],
            });
            searchMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
            searchMarker.bindPopup('📍 ' + name);
            map.flyTo([lat, lng], 15, { duration: 1.2 });
            setTimeout(function() { if (searchMarker) searchMarker.openPopup(); }, 600);
            document.getElementById('clear-markers-btn').classList.add('show');
        }

        function doSearch(query) {
            if (query.length < 2) {
                alert('⚠️ اكتب أكثر من حرفين');
                return;
            }

            localStorage.setItem('last_search', query);
            showToast('🔍 جاري البحث عن: ' + query + '...', '#7bb0ff');

            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' +
                encodeURIComponent(query) + '&limit=5&lang=ar&addressdetails=1&countrycodes=eg&accept-language=ar';

            var controller = new AbortController();
            var timeoutId = setTimeout(function() {
                controller.abort();
                showToast('⏱️ البحث بطيء، جرب كلمة أكثر تحديداً', '#ffb84d');
            }, 8000);

            fetch(url, {
                headers: {
                    'User-Agent': 'AoraMap/2.0 (Contact: aora@map.com)',
                    'Accept': 'application/json'
                },
                signal: controller.signal
            })
            .then(function(response) {
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error('Network error');
                return response.json();
            })
            .then(function(data) {
                clearTimeout(timeoutId);
                if (!data || data.length === 0) {
                    alert('❌ لم يتم العثور على: "' + query + '"');
                    return;
                }

                var result = data[0];
                var lat = parseFloat(result.lat);
                var lon = parseFloat(result.lon);
                var name = result.display_name?.split(',')[0] || query;

                addSearchMarker(lat, lon, name);
                document.getElementById('destination').textContent = name;
                document.getElementById('info-panel').classList.add('show');

                var cairo = [30.0444, 31.2357];
                var dist = calcDistance(cairo[0], cairo[1], lat, lon);
                document.getElementById('distance').textContent = dist.toFixed(1);
                document.getElementById('time').textContent = Math.round(dist / 60 * 60);

                getLocationDetails(lat, lon)
                    .then(function(details) {
                        document.getElementById('street-name').textContent = details.street;
                        document.getElementById('area-name').textContent = details.area;
                    })
                    ['catch'](function() {
                        document.getElementById('street-name').textContent = 'شارع غير معروف';
                        document.getElementById('area-name').textContent = 'منطقة غير معروفة';
                    });

                showToast('📍 تم العثور على: ' + name, '#3dff9e');
            })
            ['catch'](function(error) {
                clearTimeout(timeoutId);
                console.error('Search error:', error);
                alert('⚠️ تعذر البحث. تأكد من اتصالك بالإنترنت');
            });
        }

        function clearRoute() {
            if (routeLine) { map.removeLayer(routeLine);
                routeLine = null; }
            routeMarkers.forEach(function(m) { map.removeLayer(m); });
            routeMarkers = [];
            navDestination = null;
            navArrived = false;
            if (navCheckInterval) {
                clearInterval(navCheckInterval);
                navCheckInterval = null;
            }
            document.getElementById('clear-markers-btn').classList.remove('show');
        }

        function playArrivalSound() {
            try {
                var ctx = new(window.AudioContext || window.webkitAudioContext)();
                var osc = ctx.createOscillator();
                var gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.5);
                setTimeout(function() {
                    var osc2 = ctx.createOscillator();
                    var gain2 = ctx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.frequency.value = 1100;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc2.start(ctx.currentTime);
                    osc2.stop(ctx.currentTime + 0.5);
                }, 200);
                navigator.vibrate(200);
            } catch (e) { console.log('Sound not available'); }
        }

        function doNavigation(dest) {
            if (!userPos) {
                alert('⚠️ حدد موقعك أولاً (انتظر حتى يظهر GPS)');
                return;
            }

            showToast('⏳ جاري البحث عن الوجهة...');

            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(dest) +
                '&limit=1&lang=ar&addressdetails=1&countrycodes=eg';

            fetch(url, {
                headers: {
                    'User-Agent': 'AoraMap/1.0',
                    'Accept': 'application/json'
                }
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data || data.length === 0) {
                    alert('❌ لم يتم العثور على: ' + dest);
                    return;
                }

                var item = data[0];
                var lat = parseFloat(item.lat);
                var lon = parseFloat(item.lon);
                var name = item.display_name?.split(',')[0] || dest;
                navDestination = [lat, lon];

                var points = [
                    [userPos[0], userPos[1]],
                    [(userPos[0] + lat) / 2 + 0.003, (userPos[1] + lon) / 2 - 0.003],
                    [(userPos[0] + lat) / 2 - 0.003, (userPos[1] + lon) / 2 + 0.003],
                    [lat, lon]
                ];

                routeLine = L.polyline(points, {
                    color: '#ff3333',
                    weight: 6,
                    opacity: 0.9,
                    dashArray: '10, 8',
                    lineJoin: 'round',
                }).addTo(map);

                var directions = ['🟢 ابدأ', '⬆️ استمر', '⬆️ استمر', '🔴 وصلت'];
                points.forEach(function(p, index) {
                    var icon = L.divIcon({
                        html: '<div style="background:rgba(0,0,0,0.6);color:#fff;padding:2px 10px;border-radius:20px;font-size:0.6rem;border:1px solid rgba(255,255,255,0.1);">' +
                            directions[index] + '</div>',
                        iconSize: [60, 20],
                        iconAnchor: [30, 10],
                    });
                    var m = L.marker([p[0], p[1]], { icon: icon }).addTo(map);
                    routeMarkers.push(m);
                });

                var dist = calcDistance(userPos[0], userPos[1], lat, lon);
                var time = Math.round(dist / 60 * 60);

                document.getElementById('distance').textContent = dist.toFixed(1);
                document.getElementById('time').textContent = time;
                document.getElementById('destination').textContent = name;
                document.getElementById('info-panel').classList.add('show');

                map.flyToBounds([
                    [userPos[0], userPos[1]],
                    [lat, lon]
                ], { padding: [80, 80], maxZoom: 14 });

                showToast('🧭 المسافة: ' + dist.toFixed(1) + ' كم - ' + time + ' دقائق');
                document.getElementById('clear-markers-btn').classList.add('show');

                if (navCheckInterval) clearInterval(navCheckInterval);
                navCheckInterval = setInterval(function() {
                    if (userPos && navDestination && !navArrived) {
                        var currentDist = calcDistance(userPos[0], userPos[1], navDestination[0],
                        navDestination[1]);
                        if (currentDist < 0.1) {
                            navArrived = true;
                            clearInterval(navCheckInterval);
                            playArrivalSound();
                            showToast('🔔 لقد وصلت إلى وجهتك!', '#3dff9e');
                            var alertDiv = document.createElement('div');
                            alertDiv.style.position = 'fixed';
                            alertDiv.style.top = '50%';
                            alertDiv.style.left = '50%';
                            alertDiv.style.transform = 'translate(-50%, -50%)';
                            alertDiv.style.zIndex = '9999';
                            alertDiv.style.background = 'rgba(0,0,0,0.9)';
                            alertDiv.style.backdropFilter = 'blur(20px)';
                            alertDiv.style.padding = '30px 40px';
                            alertDiv.style.borderRadius = '24px';
                            alertDiv.style.border = '2px solid #3dff9e';
                            alertDiv.style.color = '#fff';
                            alertDiv.style.textAlign = 'center';
                            alertDiv.innerHTML = '<h2>✅ وصلت!</h2><p style="margin-top:10px;">' + name +
                                '</p><button onclick="this.parentElement.remove()" style="margin-top:16px;padding:10px 30px;border:none;border-radius:40px;background:#3dff9e;color:#000;cursor:pointer;">حسناً</button>';
                            document.body.appendChild(alertDiv);
                        }
                    }
                }, 3000);

            })
            ['catch'](function(error) {
                console.error('Navigation error:', error);
                alert('⚠️ خطأ في البحث عن الوجهة. تأكد من اتصالك بالإنترنت');
            });
        }

        updateFavsMarkers();

        // ================================================================
        //  Memory Lane
        // ================================================================
        var memories = JSON.parse(localStorage.getItem('aora_memories') || '[]');

        function updateMemoryUI() {
            var list = document.getElementById('memory-list');
            list.innerHTML = '';
            if (memories.length === 0) {
                list.innerHTML = '<div class="memory-empty">📜 لا توجد ذكريات بعد<br>أضف ذكرى جديدة!</div>';
                return;
            }
            var sorted = memories.slice().reverse();
            sorted.forEach(function(m) {
                var div = document.createElement('div');
                div.className = 'memory-item';
                var date = new Date(m.date).toLocaleDateString('ar-EG');
                div.innerHTML =
                    '<i class="fas fa-clock"></i><span>' + m.text + '</span><span class="memory-date">' +
                    date + '</span>';
                if (m.lat && m.lng) {
                    div.addEventListener('click', function() {
                        map.flyTo([m.lat, m.lng], 15, { duration: 1.2 });
                        document.getElementById('memory-modal').classList.remove('open');
                        showToast('📍 تم الانتقال إلى الذكرى', '#ffb84d');
                    });
                }
                list.appendChild(div);
            });
        }

        document.getElementById('mode-memory').addEventListener('click', function() {
            document.getElementById('memory-modal').classList.toggle('open');
            updateMemoryUI();
        });

        document.getElementById('close-memory-btn').addEventListener('click', function() {
            document.getElementById('memory-modal').classList.remove('open');
        });

        document.getElementById('memory-modal').addEventListener('click', function(e) {
            if (e.target === this) { this.classList.remove('open'); }
        });

        document.getElementById('memory-add-btn').addEventListener('click', function() {
            var input = document.getElementById('memory-input');
            var text = input.value.trim();
            if (text.length === 0) {
                showToast('⚠️ أدخل نص الذكرى', '#ff6b6b');
                return;
            }
            var memory = {
                text: text,
                date: new Date().toISOString(),
                lat: userPos ? userPos[0] : null,
                lng: userPos ? userPos[1] : null
            };
            memories.push(memory);
            localStorage.setItem('aora_memories', JSON.stringify(memories));
            input.value = '';
            updateMemoryUI();
            showToast('📜 تم إضافة الذكرى: ' + text, '#ffb84d');
        });

        document.getElementById('memory-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('memory-add-btn').click();
            }
        });

        // ================================================================
        //  AR - الواقع المعزز
        // ================================================================
        var arBtn = document.getElementById('mode-ar');
        var arOverlay = document.getElementById('ar-overlay');
        var arInterval = null;
        var arDirection = document.getElementById('ar-direction');

        function calcBearing(lat1, lon1, lat2, lon2) {
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var lat1Rad = lat1 * Math.PI / 180;
            var lat2Rad = lat2 * Math.PI / 180;
            var y = Math.sin(dLon) * Math.cos(lat2Rad);
            var x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
            var bearing = Math.atan2(y, x) * 180 / Math.PI;
            return (bearing + 360) % 360;
        }

        arBtn.addEventListener('click', function() {
            arOverlay.classList.toggle('open');
            if (arOverlay.classList.contains('open')) {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(pos) {
                        if (pos.coords.heading !== null && pos.coords.heading !== undefined) {
                            document.getElementById('ar-compass').textContent = Math.round(pos.coords
                            .heading);
                        }
                        fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + pos
                                .coords.latitude + '&lon=' + pos.coords.longitude +
                                '&zoom=18&accept-language=ar')
                            .then(function(r) { return r.json(); })
                            .then(function(data) {
                                var addr = data.display_name || 'موقع غير معروف';
                                document.getElementById('ar-location').textContent = addr.split(',')
                                    .slice(0, 3).join(', ');
                                if (data.address) {
                                    var nearby = data.address.amenity || data.address.shop || data
                                        .address.tourism || 'لا يوجد معلم';
                                    document.getElementById('ar-nearby').textContent = nearby;
                                }
                            })['catch'](function() {});
                    });
                }

                if (arInterval) clearInterval(arInterval);
                arInterval = setInterval(function() {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(function(pos) {
                            if (pos.coords.heading !== null && pos.coords.heading !== undefined) {
                                var heading = Math.round(pos.coords.heading);
                                document.getElementById('ar-compass').textContent = heading;

                                if (navDestination && userPos) {
                                    var destBearing = calcBearing(userPos[0], userPos[1],
                                        navDestination[0], navDestination[1]);
                                    var relativeAngle = destBearing - heading;
                                    if (relativeAngle > -30 && relativeAngle < 30) {
                                        arDirection.textContent = '⬆️ أمامك';
                                        arDirection.style.color = '#3dff9e';
                                    } else if (relativeAngle > 30 && relativeAngle < 150) {
                                        arDirection.textContent = '↗️ يمين';
                                        arDirection.style.color = '#ffb84d';
                                    } else if (relativeAngle > -150 && relativeAngle < -30) {
                                        arDirection.textContent = '↖️ يسار';
                                        arDirection.style.color = '#ffb84d';
                                    } else {
                                        arDirection.textContent = '🔙 خلفك';
                                        arDirection.style.color = '#ff6b6b';
                                    }
                                } else {
                                    arDirection.textContent = '⬆️';
                                    arDirection.style.color = '#ffb84d';
                                }
                            }
                        });
                    }
                }, 500);

                showToast('🥽 AR مفعل - بوصلة حية', '#ffb84d');
            } else {
                if (arInterval) clearInterval(arInterval);
                showToast('📍 تم إلغاء AR', '#667799');
            }
        });

        document.getElementById('ar-close-btn').addEventListener('click', function() {
            arOverlay.classList.remove('open');
            if (arInterval) clearInterval(arInterval);
        });

        // ================================================================
        //  مشاركة الموقع
        // ================================================================
        document.getElementById('share-btn').addEventListener('click', function() {
            if (userPos) {
                var url = 'https://www.openstreetmap.org/?mlat=' + userPos[0] + '&mlon=' + userPos[1] +
                    '&zoom=16';
                var shortUrl = 'https://tinyurl.com/api-create.php?url=' + encodeURIComponent(url);

                fetch(shortUrl)
                    .then(function(response) { return response.text(); })
                    .then(function(short) {
                        if (navigator.share) {
                            navigator.share({
                                title: 'موقعي',
                                text: '📍 موقعي: ' + userPos[0].toFixed(4) + ', ' + userPos[1].toFixed(4),
                                url: short || url
                            })['catch'](function() {});
                        } else {
                            navigator.clipboard.writeText(short || url).then(function() {
                                showToast('📋 تم نسخ الرابط المختصر', '#7bb0ff');
                            })['catch'](function() {
                                prompt('انسخ الرابط:', short || url);
                            });
                        }
                    })
                    ['catch'](function() {
                        if (navigator.share) {
                            navigator.share({
                                title: 'موقعي',
                                text: '📍 موقعي: ' + userPos[0].toFixed(4) + ', ' + userPos[1].toFixed(4),
                                url: url
                            })['catch'](function() {});
                        } else {
                            navigator.clipboard.writeText(url).then(function() {
                                showToast('📋 تم نسخ رابط الموقع', '#7bb0ff');
                            })['catch'](function() {
                                prompt('انسخ الرابط:', url);
                            });
                        }
                    });
            } else {
                showToast('⚠️ حدد موقعك أولاً', '#ff6b6b');
            }
        });

        // ================================================================
        //  زر مسح العلامات
        // ================================================================
        document.getElementById('clear-markers-btn').addEventListener('click', function() {
            clearSearchMarker();
            clearRoute();
            favMarkers.forEach(function(m) { map.removeLayer(m); });
            favMarkers = [];
            this.classList.remove('show');
            showToast('🧹 تم مسح جميع العلامات', '#7bb0ff');
        });

        // ================================================================
        //  Toast
        // ================================================================
        function showToast(msg, color) {
            color = color || '#7bb0ff';
            var t = document.createElement('div');
            t.style.position = 'absolute';
            t.style.top = '80px';
            t.style.left = '50%';
            t.style.transform = 'translateX(-50%)';
            t.style.zIndex = '999';
            t.style.padding = '8px 20px';
            t.style.background = 'rgba(0,0,0,0.8)';
            t.style.backdropFilter = 'blur(12px)';
            t.style.borderRadius = '40px';
            t.style.border = '1px solid ' + color + '33';
            t.style.color = '#fff';
            t.style.fontSize = '0.8rem';
            t.style.maxWidth = '90%';
            t.style.textAlign = 'center';
            t.innerHTML = msg;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                setTimeout(function() { t.remove(); }, 900);
            }, 3000);
        }

        // ================================================================
        //  حالة الاتصال
        // ================================================================
        var statusBar = document.getElementById('status-bar');

        function updateStatus() {
            if (navigator.onLine) {
                statusBar.className = 'online';
                statusBar.textContent = '📡 متصل';
            } else {
                statusBar.className = 'offline';
                statusBar.textContent = '📡 غير متصل';
            }
            statusBar.style.display = 'block';
        }

        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        updateStatus();

        setTimeout(function() {
            map.invalidateSize();
        }, 500);

        console.log('🚀 أورا ماب - الإصدار النهائي');
        console.log('✅ تم إزالة شعار "أورا ماب"');
        console.log('✅ تم إلغاء نقاط المرور الوهمية');
        console.log('✅ تم تفعيل البحث الحقيقي');
        console.log('✅ تم تفعيل الملاحة الحقيقية');
        console.log('✅ تم تصحيح عداد السرعة من GPS');
        console.log('✅ السهم يتحرك مع اتجاه الهاتف');
    </script>
</body>
</html>
