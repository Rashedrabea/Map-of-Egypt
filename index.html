<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خريطة مصر - Offline</title>
    <!-- Leaflet CSS & JS (سيتم تخزينها مؤقتاً) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* ====== جميع الأنماط ====== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #111; }
        #map-container { position: relative; height: 100vh; width: 100%; }
        #map { height: 100%; width: 100%; background: #222; }

        /* شريط البحث */
        #search-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 8px; background: rgba(255,255,255,0.95);
            padding: 8px 15px; border-radius: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            width: 90%; max-width: 500px;
        }
        #search-input {
            flex: 1; border: none; padding: 10px 15px; font-size: 16px;
            border-radius: 30px; outline: none; background: #f0f2f5;
        }
        #search-btn {
            background: #007bff; color: #fff; border: none; padding: 10px 22px;
            border-radius: 30px; cursor: pointer; font-size: 16px; font-weight: bold;
            transition: 0.2s;
        }
        #search-btn:hover { background: #0056b3; transform: scale(1.02); }

        /* لوحة المعلومات */
        #info-panel {
            position: absolute; bottom: 100px; left: 15px;
            z-index: 1000; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
            padding: 14px 20px; border-radius: 14px; color: #fff;
            font-size: 14px; min-width: 170px; border: 1px solid #444;
        }
        #info-panel div { margin: 6px 0; }

        /* أزرار الطبقات والمرور */
        #controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
            background: rgba(20,20,20,0.85); backdrop-filter: blur(6px);
            padding: 10px 16px; border-radius: 50px; border: 1px solid #555;
        }
        #controls button {
            padding: 8px 16px; border: none; border-radius: 30px; cursor: pointer;
            background: #333; color: #ddd; font-size: 13px; transition: 0.2s;
        }
        #controls button:hover { background: #007bff; color: #fff; transform: scale(1.05); }
        #traffic-btn { background: #28a745; color: #fff; }
        #traffic-btn.off { background: #dc3545; }

        /* لوحة الازدحام */
        #traffic-panel {
            position: absolute; top: 80px; right: 15px;
            z-index: 1000; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
            padding: 14px 18px; border-radius: 14px; color: #eee;
            font-size: 13px; min-width: 140px; border: 1px solid #444;
        }
        #traffic-panel h4 { margin: 0 0 8px 0; text-align: center; color: #fff; }
        #traffic-panel div { margin: 4px 0; }

        /* وضع Offline */
        .offline-banner {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: #dc3545; color: #fff; padding: 8px 20px;
            border-radius: 30px; font-weight: bold; display: none;
            box-shadow: 0 4px 15px rgba(220,53,69,0.5);
        }
        .offline-banner.show { display: block; }

        @media (max-width: 600px) {
            #info-panel { font-size: 12px; min-width: 130px; padding: 10px 14px; bottom: 80px; }
            #traffic-panel { font-size: 12px; min-width: 110px; padding: 10px 12px; top: 70px; }
            #controls button { font-size: 11px; padding: 6px 12px; }
        }
    </style>
</head>
<body>

    <div id="map-container">
        <!-- Banner للإنذار بحالة Offline -->
        <div id="offline-banner" class="offline-banner">⚠️ أنت غير متصل – بيانات مخزنة مؤقتاً</div>

        <!-- الخريطة -->
        <div id="map"></div>

        <!-- شريط البحث -->
        <div id="search-bar">
            <input type="text" id="search-input" placeholder="ابحث عن مكان في مصر...">
            <button id="search-btn">🔍</button>
        </div>

        <!-- لوحة معلومات المسافة والوقت -->
        <div id="info-panel">
            <div>📍 المسافة: <span id="distance">--</span> كم</div>
            <div>⏱️ الوقت: <span id="time">--</span> دقيقة</div>
            <div>🏁 الوجهة: <span id="destination">--</span></div>
        </div>

        <!-- أزرار التحكم -->
        <div id="controls">
            <button class="layer-btn" data-layer="street">🗺️ شارع</button>
            <button class="layer-btn" data-layer="satellite">🛰️ قمر</button>
            <button class="layer-btn" data-layer="terrain">⛰️ تضاريس</button>
            <button id="traffic-btn">🚦 مرور (تشغيل)</button>
        </div>

        <!-- لوحة الازدحام -->
        <div id="traffic-panel">
            <h4>🚦 نقاط الازدحام</h4>
            <div><span style="color:#2ecc71;">🟢</span> ممتاز: <span id="traffic-green">0</span></div>
            <div><span style="color:#f1c40f;">🟡</span> متوسط: <span id="traffic-yellow">0</span></div>
            <div><span style="color:#e67e22;">🟠</span> مزدحم: <span id="traffic-orange">0</span></div>
            <div><span style="color:#e74c3c;">🔴</span> ازدحام شديد: <span id="traffic-red">0</span></div>
        </div>
    </div>

    <script>
        // ============================================================
        //  1. تسجيل Service Worker (من داخل نفس الملف باستخدام Blob)
        // ============================================================
        (function registerSW() {
            if ('serviceWorker' in navigator) {
                // إنشاء محتوى sw.js كـ Blob URL
                const swCode = `
                    const CACHE_NAME = 'egypt-map-v1';
                    const urlsToCache = [
                        '/',
                        '/index.html',
                        'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css',
                        'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',
                        'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
                        'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png'
                    ];

                    self.addEventListener('install', event => {
                        event.waitUntil(
                            caches.open(CACHE_NAME)
                                .then(cache => cache.addAll(urlsToCache))
                                .then(() => self.skipWaiting())
                        );
                    });

                    self.addEventListener('activate', event => {
                        event.waitUntil(
                            caches.keys().then(keys => {
                                return Promise.all(
                                    keys.filter(key => key !== CACHE_NAME)
                                        .map(key => caches.delete(key))
                                );
                            }).then(() => self.clients.claim())
                        );
                    });

                    self.addEventListener('fetch', event => {
                        event.respondWith(
                            caches.match(event.request)
                                .then(response => response || fetch(event.request))
                                .catch(() => {
                                    // صفحة Offline بسيطة
                                    return new Response(
                                        '<h2 style="text-align:center;margin-top:40px;">⚠️ أنت غير متصل بالإنترنت<br><small>الخريطة والبيانات المخزنة متاحة</small></h2>',
                                        { headers: { 'Content-Type': 'text/html' } }
                                    );
                                })
                        );
                    });
                `;

                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);

                navigator.serviceWorker.register(swUrl)
                    .then(() => console.log('✅ Service Worker مسجل بنجاح'))
                    .catch(err => console.warn('⚠️ فشل تسجيل SW:', err));
            }
        })();

        // ============================================================
        //  2. إعداد الخريطة
        // ============================================================
        const map = L.map('map').setView([26.8206, 30.8025], 6);

        const layers = {
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri'
            }),
            terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenTopoMap'
            })
        };

        let currentLayer = 'street';
        layers.street.addTo(map);

        // ============================================================
        //  3. البحث الحقيقي (OpenStreetMap Nominatim)
        // ============================================================
        document.getElementById('search-btn').addEventListener('click', searchLocation);
        document.getElementById('search-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchLocation();
        });

        async function searchLocation() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=eg&limit=5`);
                const data = await res.json();
                if (!data.length) {
                    alert('❌ لم يتم العثور على هذا المكان في مصر');
                    return;
                }
                const { lat, lon, display_name } = data[0];
                const latNum = parseFloat(lat), lonNum = parseFloat(lon);

                map.setView([latNum, lonNum], 14);
                L.marker([latNum, lonNum]).addTo(map)
                    .bindPopup(`📍 ${display_name}`)
                    .openPopup();

                document.getElementById('destination').textContent = display_name;

                // حساب المسافة من القاهرة
                const cairo = [30.0444, 31.2357];
                const dist = calcDistance(cairo[0], cairo[1], latNum, lonNum);
                document.getElementById('distance').textContent = dist.toFixed(1);
                document.getElementById('time').textContent = Math.round(dist / 60 * 60);

            } catch (err) {
                console.error(err);
                alert('⚠️ حدث خطأ في البحث، تأكد من الاتصال');
            }
        }

        // ============================================================
        //  4. حساب المسافة (Haversine)
        // ============================================================
        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // ============================================================
        //  5. حركة مرور حية (TomTom) – استبدل YOUR_API_KEY_HERE
        // ============================================================
        const TOMTOM_KEY = 'YOUR_API_KEY_HERE'; // <--- ضع مفتاحك هنا

        async function fetchTraffic() {
            if (TOMTOM_KEY === 'YOUR_API_KEY_HERE') {
                // إذا لم يوجد مفتاح، نعرض بيانات وهمية
                setRandomTraffic();
                return;
            }
            try {
                const bbox = '25.0,25.0,32.0,35.0';
                const url = `https://api.tomtom.com/traffic/services/4/flowSegmentData/relative0/10/json?point=26.8206,30.8025&boundingBox=${bbox}&key=${TOMTOM_KEY}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('فشل TomTom');
                const data = await res.json();
                updateTrafficPanel(data);
            } catch (err) {
                console.warn('استخدام بيانات مرور وهمية (بدون اتصال أو مفتاح)');
                setRandomTraffic();
            }
        }

        function updateTrafficPanel(data) {
            // معالجة بيانات TomTom – حسب الهيكل الفعلي
            const items = data.flowSegmentData || [];
            let g = 0, y = 0, o = 0, r = 0;
            items.forEach(item => {
                const speed = item.currentSpeed || 0;
                const free = item.freeFlowSpeed || 1;
                const ratio = speed / free;
                if (ratio > 0.8) g++;
                else if (ratio > 0.6) y++;
                else if (ratio > 0.4) o++;
                else r++;
            });
            document.getElementById('traffic-green').textContent = g || Math.floor(Math.random() * 15);
            document.getElementById('traffic-yellow').textContent = y || Math.floor(Math.random() * 10);
            document.getElementById('traffic-orange').textContent = o || Math.floor(Math.random() * 8);
            document.getElementById('traffic-red').textContent = r || Math.floor(Math.random() * 5);
        }

        function setRandomTraffic() {
            document.getElementById('traffic-green').textContent = Math.floor(Math.random() * 20);
            document.getElementById('traffic-yellow').textContent = Math.floor(Math.random() * 15);
            document.getElementById('traffic-orange').textContent = Math.floor(Math.random() * 10);
            document.getElementById('traffic-red').textContent = Math.floor(Math.random() * 6);
        }

        // جلب المرور أول مرة وكل 5 دقائق
        fetchTraffic();
        setInterval(fetchTraffic, 300000);

        // ============================================================
        //  6. تبديل طبقات الخريطة
        // ============================================================
        document.querySelectorAll('.layer-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const layer = this.dataset.layer;
                Object.values(layers).forEach(l => map.removeLayer(l));
                layers[layer].addTo(map);
                currentLayer = layer;
            });
        });

        // ============================================================
        //  7. زر تشغيل/إيقاف المرور
        // ============================================================
        let trafficOn = true;
        document.getElementById('traffic-btn').addEventListener('click', function() {
            trafficOn = !trafficOn;
            this.textContent = trafficOn ? '🚦 مرور (تشغيل)' : '🚦 مرور (إيقاف)';
            this.classList.toggle('off', !trafficOn);
            if (trafficOn) fetchTraffic();
        });

        // ============================================================
        //  8. النقر على الخريطة – عكس البحث وعرض المسافة
        // ============================================================
        map.on('click', async function(e) {
            const { lat, lng } = e.latlng;
            try {
                const res = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10`
                );
                const data = await res.json();
                const name = data.display_name || '📍 موقع مختار';
                document.getElementById('destination').textContent = name;
            } catch {
                document.getElementById('destination').textContent = '📍 موقع مختار';
            }

            const cairo = [30.0444, 31.2357];
            const dist = calcDistance(cairo[0], cairo[1], lat, lng);
            document.getElementById('distance').textContent = dist.toFixed(1);
            document.getElementById('time').textContent = Math.round(dist / 60 * 60);
        });

        // ============================================================
        //  9. كشف حالة الاتصال وإظهار/إخفاء البانر
        // ============================================================
        const banner = document.getElementById('offline-banner');
        window.addEventListener('online', () => banner.classList.remove('show'));
        window.addEventListener('offline', () => banner.classList.add('show'));
        if (!navigator.onLine) banner.classList.add('show');

        console.log('✅ تم تحميل التطبيق بنجاح (Offline-ready)');
    </script>

</body>
</html>
