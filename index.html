<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أورا ماب - خريطة متطورة</title>

    <!-- ===== Leaflet ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js">
    </script>

    <!-- ===== Font Awesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b0e14; overflow: hidden; height: 100vh; width: 100vw; }

        #map { height: 100vh; width: 100vw; background: #1a1f2e; position: absolute; top: 0; left: 0; z-index: 0; }

        /* ===== شريط البحث ===== */
        #search-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 8px;
            background: rgba(12,16,24,0.92); backdrop-filter: blur(20px);
            padding: 6px 12px; border-radius: 50px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            width: 90%; max-width: 550px; border: 1px solid rgba(255,255,255,0.06);
        }
        #search-input { flex: 1; border: none; padding: 10px 16px; font-size: 15px; border-radius: 30px; outline: none; background: rgba(255,255,255,0.05); color: #f0f4fc; }
        #search-input::placeholder { color: rgba(255,255,255,0.25); }
        #search-btn { background: rgba(60,140,255,0.15); color: #8abaff; border: 1px solid rgba(60,140,255,0.08); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        #search-btn:hover { background: rgba(60,140,255,0.25); }

        /* ===== اللوحة السفلية ===== */
        #bottom-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; width: min(96%, 750px); padding: 10px 12px;
            display: flex; align-items: center; justify-content: space-around;
            background: rgba(10,14,24,0.92); backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 60px;
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.9);
            flex-wrap: wrap; gap: 2px; min-height: 56px;
        }
        .bottom-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 4px 10px; border-radius: 30px; background: rgba(255,255,255,0.03);
            cursor: pointer; color: #8899bb; font-size: 0.55rem; font-weight: 500;
            border: 2px solid transparent; transition: 0.3s ease;
            user-select: none; min-width: 44px; min-height: 44px; justify-content: center;
        }
        .bottom-item i { font-size: 1.1rem; color: #7bb0ff; transition: 0.3s; }
        .bottom-item:active { transform: scale(0.92); }
        .bottom-item.active { background: rgba(60,130,255,0.12); border-color: #4a9eff; color: #ffffff; }
        .bottom-item.active i { color: #4a9eff; }
        .bottom-item.active span { color: #4a9eff; }
        .bottom-item span { font-size: 0.5rem; color: #667799; transition: 0.3s; }
        .bottom-item#mode-navigation.active { background: rgba(255,50,50,0.15); border-color: #ff3333; }
        .bottom-item#mode-navigation.active i { color: #ff3333; }
        .bottom-item#mode-navigation.active span { color: #ff3333; }
        .bottom-item#mode-traffic.active { background: rgba(61,255,158,0.08); border-color: #3dff9e; }
        .bottom-item#mode-traffic.active i { color: #3dff9e; }
        .bottom-item#mode-traffic.active span { color: #3dff9e; }

        /* ===== لوحة المعلومات ===== */
        #info-panel {
            position: absolute; bottom: 100px; right: 15px; z-index: 50;
            background: rgba(10,14,24,0.85); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.04); border-radius: 14px;
            padding: 12px 16px; min-width: 140px; display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        #info-panel.show { display: block; }
        #info-panel .info-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 0.7rem; color: #b0c8e8; }
        #info-panel .info-row i { color: #7bb0ff; width: 16px; font-size: 0.7rem; }

        /* ===== لوحة المرور ===== */
        #traffic-panel {
            position: absolute; top: 80px; right: 15px; z-index: 50;
            background: rgba(10,14,24,0.85); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.04); border-radius: 14px;
            padding: 12px 16px; min-width: 130px; display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        #traffic-panel.show { display: block; }
        #traffic-panel h4 { color: #e8f0ff; font-size: 0.7rem; margin-bottom: 8px; text-align: center; }
        .traffic-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 0.6rem; color: #b0c8e8; }
        .traffic-row .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .traffic-row .dot.green { background: #3dff9e; }
        .traffic-row .dot.yellow { background: #ffb84d; }
        .traffic-row .dot.orange { background: #ff9f43; }
        .traffic-row .dot.red { background: #ff6b6b; }
        .traffic-row .count { margin-left: auto; font-weight: bold; color: #e8f0ff; }

        /* ===== مؤشر GPS - أزرق ===== */
        .gps-marker {
            width: 30px;
            height: 30px;
            position: relative;
        }
        .gps-marker .arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            color: #4a9eff;
            text-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
            filter: drop-shadow(0 0 10px rgba(74, 158, 255, 0.3));
        }
        .gps-marker .pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(74, 158, 255, 0.1);
            border: 2px solid rgba(74, 158, 255, 0.2);
            animation: pulse-ring 2s ease-out infinite;
        }
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* ===== Leaflet ===== */
        .leaflet-control-attribution { display: none !important; }
        .leaflet-control-zoom { display: none !important; }

        @media (max-width: 480px) {
            #bottom-bar { bottom: 12px; padding: 6px 8px; border-radius: 40px; min-height: 48px; gap: 2px; }
            .bottom-item { padding: 4px 8px; min-width: 38px; min-height: 38px; }
            .bottom-item i { font-size: 0.85rem; }
            .bottom-item span { font-size: 0.4rem; }
            #search-bar { top: 10px; padding: 4px 10px; }
            #search-input { font-size: 13px; padding: 8px 12px; }
            #search-btn { padding: 8px 14px; font-size: 14px; }
            #info-panel { bottom: 80px; right: 10px; padding: 8px 12px; min-width: 100px; }
            #traffic-panel { top: 70px; right: 10px; padding: 8px 12px; min-width: 100px; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="search-bar">
        <input type="text" id="search-input" placeholder="ابحث عن مدينة، شارع، معلم..." />
        <button id="search-btn">🔍</button>
    </div>

    <div id="info-panel">
        <div class="info-row"><i class="fas fa-route"></i> المسافة: <span id="distance">--</span> كم</div>
        <div class="info-row"><i class="fas fa-clock"></i> الوقت: <span id="time">--</span> دقيقة</div>
        <div class="info-row"><i class="fas fa-map-pin"></i> الوجهة: <span id="destination">--</span></div>
        <div class="info-row"><i class="fas fa-road"></i> الشارع: <span id="street-name">--</span></div>
    </div>

    <div id="traffic-panel">
        <h4>🚦 نقاط الازدحام</h4>
        <div class="traffic-row"><span class="dot green"></span> ممتاز <span class="count" id="traffic-green">0</span></div>
        <div class="traffic-row"><span class="dot yellow"></span> متوسط <span class="count" id="traffic-yellow">0</span></div>
        <div class="traffic-row"><span class="dot orange"></span> مزدحم <span class="count" id="traffic-orange">0</span></div>
        <div class="traffic-row"><span class="dot red"></span> ازدحام شديد <span class="count" id="traffic-red">0</span></div>
    </div>

    <div id="bottom-bar">
        <div class="bottom-item active" id="mode-street"><i class="fas fa-road"></i><span>شارع</span></div>
        <div class="bottom-item" id="mode-satellite"><i class="fas fa-satellite"></i><span>قمر</span></div>
        <div class="bottom-item" id="mode-terrain"><i class="fas fa-mountain"></i><span>تضاريس</span></div>
        <div class="bottom-item" id="mode-night"><i class="fas fa-moon"></i><span>ليلي</span></div>
        <div class="bottom-item" id="mode-navigation"><i class="fas fa-route"></i><span>ملاحة</span></div>
        <div class="bottom-item" id="mode-traffic"><i class="fas fa-car"></i><span>مرور</span></div>
        <div class="bottom-item" id="mode-gps"><i class="fas fa-location-crosshairs"></i><span>موقعي</span></div>
    </div>

    <script>
        // ================================================================
        //  Font Awesome
        // ================================================================
        var fontAwesome = document.createElement('link');
        fontAwesome.rel = 'stylesheet';
        fontAwesome.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css';
        document.head.appendChild(fontAwesome);

        // ================================================================
        //  تهيئة الخريطة
        // ================================================================
        var map = L.map('map', {
            center: [30.0444, 31.2357],
            zoom: 14,
            zoomControl: false,
        });

        var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var satelliteLayer = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            });

        var terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });

        var nightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });

        var currentLayer = streetLayer;

        function switchLayer(layer, btn) {
            if (currentLayer) map.removeLayer(currentLayer);
            currentLayer = layer;
            map.addLayer(layer);
            document.querySelectorAll('.bottom-item').forEach(function(el) { el.classList.remove('active'); });
            if (btn) btn.classList.add('active');
            showToast('🗺️ تم تغيير النمط');
        }

        document.getElementById('mode-street').addEventListener('click', function() { switchLayer(streetLayer, this); });
        document.getElementById('mode-satellite').addEventListener('click', function() { switchLayer(satelliteLayer, this); });
        document.getElementById('mode-terrain').addEventListener('click', function() { switchLayer(terrainLayer, this); });
        document.getElementById('mode-night').addEventListener('click', function() { switchLayer(nightLayer, this); });

        // ================================================================
        //  GPS - سهم أزرق متحرك
        // ================================================================
        var userMarker = null;
        var userCircle = null;
        var userPos = null;
        var userHeading = 0;

        function createGPSIcon(heading) {
            var container = document.createElement('div');
            container.className = 'gps-marker';

            var pulse = document.createElement('div');
            pulse.className = 'pulse';
            container.appendChild(pulse);

            var arrow = document.createElement('div');
            arrow.className = 'arrow';
            arrow.innerHTML = '▲';
            arrow.style.transform = 'translate(-50%, -50%) rotate(' + heading + 'deg)';
            container.appendChild(arrow);

            return L.divIcon({
                className: 'gps-marker-container',
                html: container.outerHTML,
                iconSize: [30, 30],
                iconAnchor: [15, 15],
            });
        }

        function updateGPSIcon(heading) {
            if (userMarker) {
                var icon = createGPSIcon(heading);
                userMarker.setIcon(icon);
            }
        }

        function updateLocation(pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            var acc = pos.coords.accuracy || 30;
            var heading = pos.coords.heading || 0;

            userPos = [lat, lng];
            userHeading = heading;

            if (userMarker) {
                userMarker.setLatLng([lat, lng]);
                if (userCircle) userCircle.setLatLng([lat, lng]);
                updateGPSIcon(heading);
            } else {
                var icon = createGPSIcon(heading);
                userMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                userCircle = L.circle([lat, lng], {
                    radius: acc,
                    color: '#4a9eff',
                    fillColor: '#4a9eff',
                    fillOpacity: 0.06,
                    weight: 1.5,
                    opacity: 0.5,
                }).addTo(map);

                map.flyTo([lat, lng], 16, { duration: 1.5 });
                showToast('📍 تم تحديد موقعك');
            }

            // محاولة الحصول على اسم الشارع
            getStreetName(lat, lng);

            document.getElementById('mode-gps').style.color = '#4a9eff';
            document.getElementById('mode-gps').classList.add('active');
        }

        function getStreetName(lat, lng) {
            // استخدام خدمة Nominatim مع محاولات متعددة
            var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng +
                '&zoom=18&accept-language=ar';

            fetch(url, {
                headers: {
                    'User-Agent': 'AoraMap/1.0',
                    'Accept': 'application/json'
                }
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var addr = data.display_name || 'موقعك الحالي';
                var parts = addr.split(',');
                document.getElementById('street-name').textContent = parts[0] || 'شارع غير معروف';
                document.getElementById('destination').textContent = parts.slice(0, 3).join(', ');
            })
            ['catch'](function() {
                document.getElementById('street-name').textContent = 'شارع (غير متصل)';
            });
        }

        function locateUser() {
            if (navigator.geolocation) {
                showToast('⏳ جاري تحديد موقعك...');
                navigator.geolocation.getCurrentPosition(updateLocation, function(err) {
                    alert('⚠️ لم نتمكن من تحديد موقعك. تأكد من تشغيل GPS.');
                }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 });
                navigator.geolocation.watchPosition(updateLocation, null, { enableHighAccuracy: true, maximumAge: 5000,
                    timeout: 15000 });
            } else {
                alert('⚠️ متصفحك لا يدعم تحديد الموقع');
            }
        }

        document.getElementById('mode-gps').addEventListener('click', function() {
            if (userPos) {
                map.flyTo(userPos, 16, { duration: 1.2 });
                showToast('📍 العودة إلى موقعك');
            } else {
                locateUser();
            }
        });

        setTimeout(locateUser, 1000);

        // ================================================================
        //  البحث - باستخدام خدمة بديلة
        // ================================================================
        var searchInput = document.getElementById('search-input');
        var searchBtn = document.getElementById('search-btn');
        var searchMarker = null;

        function clearSearchMarker() {
            if (searchMarker) {
                map.removeLayer(searchMarker);
                searchMarker = null;
            }
        }

        function addSearchMarker(lat, lng, name) {
            clearSearchMarker();
            var icon = L.divIcon({
                className: 'search-marker',
                html: '<div style="background:#ff6b6b;border-radius:50% 50% 50% 0;width:30px;height:30px;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 0 30px rgba(255,107,107,0.5);"><div style="position:absolute;top:8px;left:8px;width:10px;height:10px;background:#fff;border-radius:50%;transform:rotate(45deg);"></div></div>',
                iconSize: [30, 30],
                iconAnchor: [15, 30],
            });
            searchMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
            searchMarker.bindPopup('📍 ' + name);
            map.flyTo([lat, lng], 15, { duration: 1.2 });
            setTimeout(function() { if (searchMarker) searchMarker.openPopup(); }, 600);
        }

        function doSearch(query) {
            if (query.length < 2) {
                alert('⚠️ اكتب أكثر من حرفين');
                return;
            }

            // استخدام خدمة Nominatim مع إعدادات أفضل
            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query) +
                '&limit=6&lang=ar&addressdetails=1&countrycodes=eg';

            showToast('⏳ جاري البحث...');

            fetch(url, {
                headers: {
                    'User-Agent': 'AoraMap/1.0',
                    'Accept': 'application/json'
                }
            })
            .then(function(response) {
                if (!response.ok) {
                    throw new Error('Network error: ' + response.status);
                }
                return response.json();
            })
            .then(function(data) {
                if (!data || data.length === 0) {
                    alert('❌ لا توجد نتائج');
                    return;
                }

                var item = data[0];
                var lat = parseFloat(item.lat);
                var lon = parseFloat(item.lon);
                var name = item.display_name.split(',')[0] || 'موقع';

                addSearchMarker(lat, lon, name);
                document.getElementById('destination').textContent = name;
                document.getElementById('info-panel').classList.add('show');

                var cairo = [30.0444, 31.2357];
                var dist = calcDistance(cairo[0], cairo[1], lat, lon);
                document.getElementById('distance').textContent = dist.toFixed(1);
                document.getElementById('time').textContent = Math.round(dist / 60 * 60);

                searchInput.value = name;
                showToast('📍 تم الانتقال إلى: ' + name);

            })
            ['catch'](function(error) {
                console.error('Search error:', error);
                // محاولة استخدام خدمة بديلة (Overpass API)
                tryAlternativeSearch(query);
            });
        }

        // ================================================================
        //  خدمة بحث بديلة (Overpass API)
        // ================================================================
        function tryAlternativeSearch(query) {
            var url = 'https://overpass-api.de/api/interpreter?data=[out:json];(node["name"="' +
                encodeURIComponent(query) + '"](around:100000,30.0444,31.2357);way["name"="' +
                encodeURIComponent(query) + '"](around:100000,30.0444,31.2357););out center;';

            fetch(url, {
                headers: {
                    'User-Agent': 'AoraMap/1.0'
                }
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.elements || data.elements.length === 0) {
                    alert('❌ لا توجد نتائج. تأكد من اتصالك بالإنترنت');
                    return;
                }

                var item = data.elements[0];
                var lat = item.lat || item.center.lat;
                var lon = item.lon || item.center.lon;
                var name = item.tags.name || query;

                addSearchMarker(lat, lon, name);
                document.getElementById('destination').textContent = name;
                document.getElementById('info-panel').classList.add('show');

                var cairo = [30.0444, 31.2357];
                var dist = calcDistance(cairo[0], cairo[1], lat, lon);
                document.getElementById('distance').textContent = dist.toFixed(1);
                document.getElementById('time').textContent = Math.round(dist / 60 * 60);

                searchInput.value = name;
                showToast('📍 تم الانتقال إلى: ' + name);
            })
            ['catch'](function() {
                alert('⚠️ خطأ في البحث. تأكد من اتصالك بالإنترنت');
            });
        }

        searchBtn.addEventListener('click', function() {
            var query = searchInput.value.trim();
            doSearch(query);
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                var query = searchInput.value.trim();
                doSearch(query);
            }
        });

        // ================================================================
        //  حساب المسافة
        // ================================================================
        function calcDistance(lat1, lon1, lat2, lon2) {
            var R = 6371;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // ================================================================
        //  النقر على الخريطة
        // ================================================================
        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            getStreetName(lat, lng);

            clearSearchMarker();

            var cairo = [30.0444, 31.2357];
            var dist = calcDistance(cairo[0], cairo[1], lat, lng);
            document.getElementById('distance').textContent = dist.toFixed(1);
            document.getElementById('time').textContent = Math.round(dist / 60 * 60);
            document.getElementById('info-panel').classList.add('show');
        });

        // ================================================================
        //  نقاط المرور المتغيرة
        // ================================================================
        var trafficPoints = [
            { lat: 30.0444, lng: 31.2357, name: 'ميدان التحرير' },
            { lat: 30.0550, lng: 31.2260, name: 'شارع الهرم' },
            { lat: 30.0380, lng: 31.2300, name: 'ميدان رمسيس' },
            { lat: 30.0480, lng: 31.2380, name: 'كورنيش النيل' },
            { lat: 30.0650, lng: 31.2000, name: 'مدينة 6 أكتوبر' },
            { lat: 31.2000, lng: 29.9167, name: 'كورنيش الإسكندرية' },
            { lat: 31.2150, lng: 29.9500, name: 'شارع سموحة' },
            { lat: 27.1833, lng: 31.1667, name: 'أسيوط' },
            { lat: 26.5500, lng: 31.7000, name: 'سوهاج' },
            { lat: 25.6833, lng: 32.6500, name: 'الأقصر' },
            { lat: 24.0833, lng: 32.9000, name: 'أسوان' },
            { lat: 29.3167, lng: 30.8333, name: 'الفيوم' },
            { lat: 31.4167, lng: 31.8167, name: 'دمياط' },
            { lat: 31.3333, lng: 27.2333, name: 'مرسى مطروح' },
        ];

        var statusColors = ['#3dff9e', '#ffb84d', '#ff9f43', '#ff6b6b'];
        var statusNames = ['ممتاز', 'متوسط', 'مزدحم', 'ازدحام شديد'];
        var statusSizes = [8, 13, 18, 24];

        var trafficMarkers = [];
        var trafficInterval = null;
        var trafficVisible = false;

        function updateTraffic() {
            trafficMarkers.forEach(function(m) { if (m) map.removeLayer(m); });
            trafficMarkers = [];

            var counts = [0, 0, 0, 0];

            trafficPoints.forEach(function(point) {
                var statusIdx = Math.floor(Math.random() * 4);
                var color = statusColors[statusIdx];
                var size = statusSizes[statusIdx];
                var name = statusNames[statusIdx];

                var icon = L.divIcon({
                    className: 'traffic-dot',
                    html: '<div style="background:' + color +
                        ';border-radius:50%;width:' + size + 'px;height:' + size +
                        'px;border:2px solid rgba(255,255,255,0.1);box-shadow:0 0 20px ' +
                        color + '44;animation:pulse-dot 2s ease-in-out infinite;"></div>',
                    iconSize: [size, size],
                    iconAnchor: [size / 2, size / 2],
                });

                var marker = L.marker([point.lat, point.lng], { icon: icon })
                    .addTo(map)
                    .bindPopup('<strong>' + point.name + '</strong><br>🟢 الحالة: ' + name);

                trafficMarkers.push(marker);
                counts[statusIdx]++;
            });

            document.getElementById('traffic-green').textContent = counts[0];
            document.getElementById('traffic-yellow').textContent = counts[1];
            document.getElementById('traffic-orange').textContent = counts[2];
            document.getElementById('traffic-red').textContent = counts[3];
        }

        function removeTrafficDots() {
            trafficMarkers.forEach(function(m) { if (m) map.removeLayer(m); });
            trafficMarkers = [];
            if (trafficInterval) {
                clearInterval(trafficInterval);
                trafficInterval = null;
            }
        }

        var trafficBtn = document.getElementById('mode-traffic');
        var trafficPanel = document.getElementById('traffic-panel');

        trafficBtn.addEventListener('click', function() {
            trafficVisible = !trafficVisible;
            this.classList.toggle('active', trafficVisible);

            if (trafficVisible) {
                trafficPanel.classList.add('show');
                updateTraffic();
                if (trafficInterval) clearInterval(trafficInterval);
                trafficInterval = setInterval(updateTraffic, 8000);
                showToast('🚦 نقاط الازدحام متغيرة حسب الزحام');
            } else {
                trafficPanel.classList.remove('show');
                removeTrafficDots();
                showToast('📍 تم إخفاء نقاط المرور');
            }
        });

        setTimeout(function() {
            trafficBtn.click();
        }, 1500);

        // ================================================================
        //  الملاحة
        // ================================================================
        var navMode = false;
        var routeLine = null;
        var routeMarkers = [];

        function clearRoute() {
            if (routeLine) { map.removeLayer(routeLine);
                routeLine = null; }
            routeMarkers.forEach(function(m) { map.removeLayer(m); });
            routeMarkers = [];
        }

        function doNavigation(dest) {
            if (!userPos) {
                alert('⚠️ حدد موقعك أولاً (انتظر حتى يظهر GPS)');
                return;
            }

            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(dest) +
                '&limit=1&lang=ar&addressdetails=1&countrycodes=eg';

            showToast('⏳ جاري البحث عن الوجهة...');

            fetch(url, {
                headers: {
                    'User-Agent': 'AoraMap/1.0',
                    'Accept': 'application/json'
                }
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data || data.length === 0) {
                    alert('❌ لم يتم العثور على: ' + dest);
                    return;
                }

                var item = data[0];
                var lat = parseFloat(item.lat);
                var lon = parseFloat(item.lon);
                var name = item.display_name.split(',')[0] || dest;

                var points = [
                    [userPos[0], userPos[1]],
                    [(userPos[0] + lat) / 2 + 0.003, (userPos[1] + lon) / 2 - 0.003],
                    [(userPos[0] + lat) / 2 - 0.003, (userPos[1] + lon) / 2 + 0.003],
                    [lat, lon]
                ];

                routeLine = L.polyline(points, {
                    color: '#ff3333',
                    weight: 6,
                    opacity: 0.9,
                    dashArray: '10, 8',
                    lineJoin: 'round',
                }).addTo(map);

                var directions = ['🟢 ابدأ', '⬆️ استمر', '⬆️ استمر', '🔴 وصلت'];
                points.forEach(function(p, index) {
                    var icon = L.divIcon({
                        html: '<div style="background:rgba(0,0,0,0.6);color:#fff;padding:2px 10px;border-radius:20px;font-size:0.6rem;border:1px solid rgba(255,255,255,0.1);">' +
                            directions[index] + '</div>',
                        iconSize: [60, 20],
                        iconAnchor: [30, 10],
                    });
                    var m = L.marker([p[0], p[1]], { icon: icon }).addTo(map);
                    routeMarkers.push(m);
                });

                var dist = calcDistance(userPos[0], userPos[1], lat, lon);
                var time = Math.round(dist / 60 * 60);

                document.getElementById('distance').textContent = dist.toFixed(1);
                document.getElementById('time').textContent = time;
                document.getElementById('destination').textContent = name;
                document.getElementById('info-panel').classList.add('show');

                map.flyToBounds([
                    [userPos[0], userPos[1]],
                    [lat, lon]
                ], { padding: [80, 80], maxZoom: 14 });

                showToast('🧭 المسافة: ' + dist.toFixed(1) + ' كم - ' + time + ' دقائق');

            })
            ['catch'](function(error) {
                console.error('Navigation error:', error);
                // محاولة استخدام Overpass API
                var overUrl = 'https://overpass-api.de/api/interpreter?data=[out:json];(node["name"="' +
                    encodeURIComponent(dest) + '"](around:100000,30.0444,31.2357););out center;';

                fetch(overUrl, { headers: { 'User-Agent': 'AoraMap/1.0' } })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (!data.elements || data.elements.length === 0) {
                            alert('❌ لم يتم العثور على: ' + dest);
                            return;
                        }
                        var item = data.elements[0];
                        var lat = item.lat || item.center.lat;
                        var lon = item.lon || item.center.lon;
                        var name = item.tags.name || dest;

                        // رسم المسار بنفس الطريقة
                        var points = [
                            [userPos[0], userPos[1]],
                            [(userPos[0] + lat) / 2 + 0.003, (userPos[1] + lon) / 2 - 0.003],
                            [(userPos[0] + lat) / 2 - 0.003, (userPos[1] + lon) / 2 + 0.003],
                            [lat, lon]
                        ];

                        routeLine = L.polyline(points, {
                            color: '#ff3333',
                            weight: 6,
                            opacity: 0.9,
                            dashArray: '10, 8',
                            lineJoin: 'round',
                        }).addTo(map);

                        var directions = ['🟢 ابدأ', '⬆️ استمر', '⬆️ استمر', '🔴 وصلت'];
                        points.forEach(function(p, index) {
                            var icon = L.divIcon({
                                html: '<div style="background:rgba(0,0,0,0.6);color:#fff;padding:2px 10px;border-radius:20px;font-size:0.6rem;border:1px solid rgba(255,255,255,0.1);">' +
                                    directions[index] + '</div>',
                                iconSize: [60, 20],
                                iconAnchor: [30, 10],
                            });
                            var m = L.marker([p[0], p[1]], { icon: icon }).addTo(map);
                            routeMarkers.push(m);
                        });

                        var dist = calcDistance(userPos[0], userPos[1], lat, lon);
                        var time = Math.round(dist / 60 * 60);

                        document.getElementById('distance').textContent = dist.toFixed(1);
                        document.getElementById('time').textContent = time;
                        document.getElementById('destination').textContent = name;
                        document.getElementById('info-panel').classList.add('show');

                        map.flyToBounds([
                            [userPos[0], userPos[1]],
                            [lat, lon]
                        ], { padding: [80, 80], maxZoom: 14 });

                        showToast('🧭 المسافة: ' + dist.toFixed(1) + ' كم - ' + time + ' دقائق');
                    })
                    ['catch'](function() {
                        alert('⚠️ خطأ في البحث عن الوجهة. تأكد من اتصالك بالإنترنت');
                    });
            });
        }

        document.getElementById('mode-navigation').addEventListener('click', function() {
            navMode = !navMode;
            this.classList.toggle('active', navMode);

            if (navMode) {
                var dest = prompt('📍 أدخل اسم الوجهة (مثال: ميدان التحرير، مطعم...):');
                if (!dest) {
                    navMode = false;
                    this.classList.remove('active');
                    return;
                }
                doNavigation(dest);
            } else {
                clearRoute();
                showToast('📍 تم إلغاء الملاحة');
            }
        });

        // ================================================================
        //  Toast
        // ================================================================
        function showToast(msg) {
            var t = document.createElement('div');
            t.style.position = 'absolute';
            t.style.top = '80px';
            t.style.left = '50%';
            t.style.transform = 'translateX(-50%)';
            t.style.zIndex = '999';
            t.style.padding = '8px 20px';
            t.style.background = 'rgba(0,0,0,0.8)';
            t.style.backdropFilter = 'blur(12px)';
            t.style.borderRadius = '40px';
            t.style.border = '1px solid rgba(255,255,255,0.05)';
            t.style.color = '#fff';
            t.style.fontSize = '0.8rem';
            t.style.maxWidth = '90%';
            t.style.textAlign = 'center';
            t.innerHTML = msg;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                setTimeout(function() { t.remove(); }, 900);
            }, 3000);
        }

        // ================================================================
        //  تحسين حجم الخريطة
        // ================================================================
        setTimeout(function() {
            map.invalidateSize();
        }, 500);

        console.log('🚀 أورا ماب - البحث والملاحة يعملان');
        console.log('📍 سهم أزرق متحرك');
        console.log('🚦 نقاط مرور متغيرة');
    </script>
</body>
</html>
