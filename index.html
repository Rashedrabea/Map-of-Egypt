<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>أورا ماب – الخريطة الذكية</title>

    <!-- ===== Leaflet ===== -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <!-- ===== Font Awesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0e14;
            color: #f0f4fc;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        #map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            transition: transform 0.8s cubic-bezier(0.2, 0.9, 0.4, 1);
            transform-origin: center center;
        }

        #map-container.is3d {
            transform: perspective(1000px) rotateX(8deg) scale(0.97);
        }

        #map {
            width: 100%;
            height: 100%;
            background: #0f121a;
        }

        /* ===== شريط البحث ===== */
        #search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: min(90%, 600px);
            display: flex;
            align-items: center;
            background: rgba(12, 16, 24, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
        }

        #search-container i {
            color: rgba(255, 255, 255, 0.35);
            font-size: 1rem;
        }

        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4fc;
            font-size: 0.95rem;
            padding: 12px 16px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        #search-btn {
            background: rgba(60, 140, 255, 0.15);
            border: none;
            color: #8abaff;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(60, 140, 255, 0.08);
        }

        #search-btn:hover {
            background: rgba(60, 140, 255, 0.25);
        }

        /* ===== أزرار التحكم ===== */
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(12, 16, 24, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #eef4ff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .ctrl-btn:hover {
            background: rgba(30, 40, 60, 0.8);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .ctrl-btn.active {
            background: rgba(60, 140, 255, 0.25);
            border-color: rgba(60, 140, 255, 0.2);
            box-shadow: 0 0 30px rgba(60, 140, 255, 0.2);
        }

        .ctrl-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 12px;
            height: 12px;
            background: #3dff9e;
            border-radius: 50%;
            border: 2px solid rgba(12, 16, 24, 0.8);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.7;
            }
        }

        /* ===== اللوحة السفلية ===== */
        #bottom-bar {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: min(92%, 750px);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: rgba(10, 14, 24, 0.75);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 60px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.8);
            flex-wrap: wrap;
            gap: 4px;
        }

        .bottom-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            color: #b0c8e8;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .bottom-item i {
            font-size: 1rem;
            color: #7bb0ff;
        }

        .bottom-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.04);
            color: #fff;
        }

        .bottom-item.active {
            background: rgba(60, 130, 255, 0.12);
            border-color: rgba(60, 130, 255, 0.12);
            color: #b8d6ff;
        }

        /* ===== 3D Indicator ===== */
        #d3-indicator {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            padding: 8px 24px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
            align-items: center;
            gap: 10px;
        }

        #d3-indicator i {
            color: #7bb0ff;
        }

        /* ===== نتائج البحث ===== */
        #search-results {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: min(90%, 600px);
            max-height: 300px;
            overflow-y: auto;
            background: rgba(10, 14, 24, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px;
            display: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        #search-results.show {
            display: block;
        }

        .result-item {
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #d0daf0;
        }

        .result-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .result-item i {
            color: #7bb0ff;
            width: 20px;
        }

        .result-item .name {
            font-weight: 500;
        }

        .result-item .address {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* ===== AR Overlay ===== */
        #ar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
        }

        #ar-overlay.open {
            display: flex;
        }

        #ar-overlay .ar-content {
            text-align: center;
            padding: 40px;
        }

        #ar-overlay .ar-content i {
            font-size: 4rem;
            color: #ffb84d;
            margin-bottom: 20px;
            animation: ar-pulse 2s ease-in-out infinite;
        }

        @keyframes ar-pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        #ar-overlay .ar-content h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        #ar-overlay .ar-content p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
        }

        #ar-overlay .ar-content .compass-display {
            font-size: 3rem;
            margin: 20px 0;
            color: #ffb84d;
        }

        .ar-close {
            margin-top: 30px;
            padding: 12px 40px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ar-close:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* ===== مؤشر الموقع ===== */
        .user-marker {
            width: 20px;
            height: 20px;
            background: #3dff9e;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(61, 255, 158, 0.4), 0 0 60px rgba(61, 255, 158, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.15);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.4);
            }
            50% {
                box-shadow: 0 0 40px rgba(61, 255, 158, 0.6), 0 0 80px rgba(61, 255, 158, 0.2);
            }
            100% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.4);
            }
        }

        /* ===== مؤشر البحث ===== */
        .search-marker {
            width: 30px;
            height: 30px;
            background: #ff6b6b;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
            border: 3px solid #fff;
        }

        .search-marker::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
        }

        /* ===== 3D Buildings ===== */
        .building-3d {
            position: absolute;
            background: rgba(140, 155, 175, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            pointer-events: none;
            z-index: 1;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .building-3d .top {
            position: absolute;
            top: -3px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            background: rgba(200, 215, 235, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* ===== لوحة المعلومات ===== */
        #info-panel {
            position: absolute;
            bottom: 100px;
            right: 20px;
            z-index: 8;
            background: rgba(10, 14, 24, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 12px 16px;
            min-width: 120px;
            display: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        #info-panel.show {
            display: block;
        }

        #info-panel .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 0.7rem;
            color: #b0c8e8;
        }

        #info-panel .info-row i {
            color: #7bb0ff;
            width: 16px;
            font-size: 0.7rem;
        }

        /* ===== Routing Machine Override ===== */
        .leaflet-routing-container {
            display: none !important;
        }

        /* ===== استجابة ===== */
        @media (max-width: 640px) {
            #search-container {
                top: 12px;
                width: 94%;
                padding: 2px 2px 2px 14px;
            }
            #search-input {
                font-size: 0.85rem;
                padding: 10px 12px;
            }
            #search-btn {
                padding: 8px 14px;
                font-size: 0.75rem;
            }
            #controls {
                top: 12px;
                right: 12px;
            }
            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            #bottom-bar {
                bottom: 16px;
                padding: 6px 10px;
                width: 96%;
                border-radius: 40px;
            }
            .bottom-item {
                font-size: 0.6rem;
                padding: 4px 10px;
                gap: 4px;
            }
            .bottom-item i {
                font-size: 0.8rem;
            }
            #ar-overlay .ar-content {
                padding: 20px;
            }
            #ar-overlay .ar-content i {
                font-size: 3rem;
            }
            #info-panel {
                bottom: 80px;
                right: 12px;
                padding: 8px 12px;
                min-width: 80px;
            }
            #info-panel .info-row {
                font-size: 0.6rem;
            }
        }

        .leaflet-control-attribution {
            display: none !important;
        }
        .leaflet-control-zoom {
            display: none !important;
        }
        .leaflet-tile-pane {
            filter: saturate(1.1) contrast(1.05);
        }
    </style>
</head>
<body>
    <!-- ===== حاوية الخريطة ===== -->
    <div id="map-container">
        <div id="map"></div>
    </div>

    <!-- ===== شريط البحث ===== -->
    <div id="search-container">
        <i class="fas fa-search"></i>
        <input id="search-input" type="text" placeholder="ابحث عن مدينة، شارع، مطعم..." />
        <button id="search-btn">بحث</button>
    </div>

    <!-- ===== نتائج البحث ===== -->
    <div id="search-results"></div>

    <!-- ===== أزرار التحكم ===== -->
    <div id="controls">
        <div class="ctrl-btn" id="locate-btn" title="تحديد موقعي">
            <i class="fas fa-location-crosshairs"></i>
            <span class="badge"></span>
        </div>
        <div class="ctrl-btn" id="favorites-btn" title="المفضلة">
            <i class="fas fa-heart"></i>
        </div>
        <div class="ctrl-btn" id="d3-toggle" title="الوضع ثلاثي الأبعاد">
            <i class="fas fa-cube"></i>
        </div>
        <div class="ctrl-btn" id="ar-btn" title="الواقع المعزز">
            <i class="fas fa-vr-cardboard"></i>
        </div>
    </div>

    <!-- ===== اللوحة السفلية ===== -->
    <div id="bottom-bar">
        <div class="bottom-item active" id="mode-street">
            <i class="fas fa-road"></i>
            <span>شارع</span>
        </div>
        <div class="bottom-item" id="mode-satellite">
            <i class="fas fa-satellite"></i>
            <span>قمر صناعي</span>
        </div>
        <div class="bottom-item" id="mode-terrain">
            <i class="fas fa-mountain"></i>
            <span>تضاريس</span>
        </div>
        <div class="bottom-item" id="mode-night">
            <i class="fas fa-moon"></i>
            <span>ليلي</span>
        </div>
        <div class="bottom-item" id="mode-navigation">
            <i class="fas fa-route"></i>
            <span>ملاحة</span>
        </div>
    </div>

    <!-- ===== مؤشر ثلاثي الأبعاد ===== -->
    <div id="d3-indicator">
        <i class="fas fa-cube"></i>
        الوضع ثلاثي الأبعاد مفعل - المباني تظهر
    </div>

    <!-- ===== لوحة المعلومات ===== -->
    <div id="info-panel">
        <div class="info-row">
            <i class="fas fa-route"></i>
            <span>المسافة: <span id="distance-info">--</span></span>
        </div>
        <div class="info-row">
            <i class="fas fa-clock"></i>
            <span>الوقت: <span id="time-info">--</span></span>
        </div>
        <div class="info-row">
            <i class="fas fa-map-pin"></i>
            <span>الموقع: <span id="location-info">--</span></span>
        </div>
    </div>

    <!-- ===== طبقة الواقع المعزز ===== -->
    <div id="ar-overlay">
        <div class="ar-content">
            <i class="fas fa-camera"></i>
            <h3>🌍 الواقع المعزز</h3>
            <p>اتجاه بوصلة حية + معلومات المكان</p>
            <div class="compass-display">
                <i class="fas fa-compass"></i>
                <span id="ar-compass">--</span>°
            </div>
            <p style="font-size:0.8rem; color:rgba(255,255,255,0.3);">
                <i class="fas fa-map-pin"></i> الموقع: <span id="ar-location">جاري التحديد...</span>
            </p>
            <p style="font-size:0.8rem; color:rgba(255,255,255,0.3);">
                <i class="fas fa-building"></i> أقرب معلم: <span id="ar-nearby">جاري البحث...</span>
            </p>
            <button class="ar-close" id="ar-close-btn">إغلاق</button>
        </div>
    </div>

    <script>
        // ================================================================
        //  تهيئة Leaflet
        // ================================================================
        const map = L.map('map', {
            center: [30.0444, 31.2357],
            zoom: 15,
            zoomControl: true,
            fadeAnimation: true,
            zoomAnimation: true,
        });

        // ===== طبقات الخريطة =====
        const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 19,
        }).addTo(map);

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri',
            maxZoom: 19,
        });

        const terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenTopoMap',
            maxZoom: 17,
        });

        const nightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CartoDB',
            maxZoom: 19,
        });

        let currentLayer = streetLayer;

        // ================================================================
        //  متغيرات الملاحة
        // ================================================================
        let navigationMode = false;
        let routingControl = null;
        let startPoint = null;
        let endPoint = null;

        // ================================================================
        //  تبديل الأنماط
        // ================================================================
        function setMapLayer(layer, activeBtn) {
            if (currentLayer) map.removeLayer(currentLayer);
            currentLayer = layer;
            map.addLayer(layer);
            document.querySelectorAll('.bottom-item').forEach(el => el.classList.remove('active'));
            if (activeBtn) activeBtn.classList.add('active');
        }

        document.getElementById('mode-street').addEventListener('click', function() {
            setMapLayer(streetLayer, this);
        });

        document.getElementById('mode-satellite').addEventListener('click', function() {
            setMapLayer(satelliteLayer, this);
        });

        document.getElementById('mode-terrain').addEventListener('click', function() {
            setMapLayer(terrainLayer, this);
        });

        document.getElementById('mode-night').addEventListener('click', function() {
            setMapLayer(nightLayer, this);
        });

        // ================================================================
        //  وضع الملاحة (باستخدام Leaflet Routing Machine)
        // ================================================================
        document.getElementById('mode-navigation').addEventListener('click', function() {
            navigationMode = !navigationMode;
            this.classList.toggle('active', navigationMode);

            if (navigationMode) {
                // طلب من المستخدم تحديد نقطة البداية والنهاية
                if (!startPoint) {
                    // استخدام الموقع الحالي كنقطة بداية
                    if (userPosition) {
                        startPoint = userPosition;
                    } else {
                        alert('⚠️ حدد موقعك أولاً');
                        navigationMode = false;
                        this.classList.remove('active');
                        return;
                    }
                }

                // طلب نقطة النهاية
                const destination = prompt('أدخل اسم الوجهة (مثال: مطعم، شارع، معلم):');
                if (!destination) {
                    navigationMode = false;
                    this.classList.remove('active');
                    return;
                }

                // البحث عن الوجهة
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destination)}&limit=1&lang=ar`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.length === 0) {
                            alert('⚠️ لم يتم العثور على الوجهة');
                            navigationMode = false;
                            document.getElementById('mode-navigation').classList.remove('active');
                            return;
                        }

                        const lat = parseFloat(data[0].lat);
                        const lon = parseFloat(data[0].lon);
                        endPoint = [lat, lon];

                        // إنشاء المسار
                        if (routingControl) {
                            map.removeControl(routingControl);
                        }

                        routingControl = L.Routing.control({
                            waypoints: [
                                L.latLng(startPoint[0], startPoint[1]),
                                L.latLng(endPoint[0], endPoint[1])
                            ],
                            routeWhileDragging: false,
                            showAlternatives: true,
                            fitSelectedRoutes: true,
                            createMarker: function() { return null; },
                            language: 'ar',
                            router: L.Routing.osrmv1({
                                serviceUrl: 'https://router.project-osrm.org/route/v1/',
                                profile: 'driving',
                            }),
                        }).addTo(map);

                        // عرض معلومات المسار
                        routingControl.on('routesfound', function(e) {
                            const route = e.routes[0];
                            const distance = (route.summary.totalDistance / 1000).toFixed(1);
                            const time = Math.round(route.summary.totalTime / 60);
                            document.getElementById('distance-info').textContent = `${distance} كم`;
                            document.getElementById('time-info').textContent = `${time} دقائق`;
                            document.getElementById('location-info').textContent = data[0].display_name
                                .split(',')[0];
                            document.getElementById('info-panel').classList.add('show');
                            showToast(`🧭 المسافة: ${distance} كم - ${time} دقائق`, '#4ecdc4');
                        });

                        routingControl.on('routingerror', function() {
                            showToast('❌ لا يمكن حساب المسار', '#ff6b6b');
                        });
                    })
                    .catch(() => {
                        alert('⚠️ خطأ في البحث عن الوجهة');
                        navigationMode = false;
                        document.getElementById('mode-navigation').classList.remove('active');
                    });

            } else {
                // إلغاء الملاحة
                if (routingControl) {
                    map.removeControl(routingControl);
                    routingControl = null;
                }
                document.getElementById('info-panel').classList.remove('show');
                startPoint = null;
                endPoint = null;
                showToast('📍 تم إلغاء الملاحة', '#ff6b6b');
            }
        });

        // ================================================================
        //  المباني 3D
        // ================================================================
        let is3D = false;
        const btn3d = document.getElementById('d3-toggle');
        const indicator = document.getElementById('d3-indicator');
        const mapContainer = document.getElementById('map-container');
        let buildingElements = [];
        let buildingInterval = null;

        const buildingData = [
            { lat: 30.0458, lng: 31.2242, w: 0.0012, h: 0.0012 },
            { lat: 30.0425, lng: 31.2334, w: 0.0020, h: 0.0016 },
            { lat: 30.0444, lng: 31.2357, w: 0.0025, h: 0.0020 },
            { lat: 30.0478, lng: 31.2335, w: 0.0030, h: 0.0025 },
            { lat: 30.0420, lng: 31.2260, w: 0.0020, h: 0.0015 },
            { lat: 30.0485, lng: 31.2365, w: 0.0018, h: 0.0018 },
            { lat: 30.0460, lng: 31.2380, w: 0.0022, h: 0.0016 },
            { lat: 30.0430, lng: 31.2350, w: 0.0016, h: 0.0014 },
            { lat: 30.0438, lng: 31.2340, w: 0.0028, h: 0.0018 },
            { lat: 30.0490, lng: 31.2220, w: 0.0025, h: 0.0020 },
            { lat: 30.0480, lng: 31.2300, w: 0.0018, h: 0.0015 },
            { lat: 30.0470, lng: 31.2320, w: 0.0020, h: 0.0016 },
            { lat: 30.0450, lng: 31.2370, w: 0.0015, h: 0.0015 },
            { lat: 30.0400, lng: 31.2300, w: 0.0030, h: 0.0020 },
            { lat: 30.0410, lng: 31.2320, w: 0.0025, h: 0.0025 },
            { lat: 30.0445, lng: 31.2365, w: 0.0018, h: 0.0015 },
            { lat: 30.0465, lng: 31.2250, w: 0.0014, h: 0.0014 },
            { lat: 30.0435, lng: 31.2370, w: 0.0016, h: 0.0016 },
        ];

        function create3DBuildings() {
            buildingElements.forEach(el => {
                if (el.parentNode) el.parentNode.removeChild(el);
            });
            buildingElements = [];

            if (!is3D) return;

            const container = document.getElementById('map');

            buildingData.forEach(b => {
                try {
                    const point = map.latLngToContainerPoint([b.lat, b.lng]);
                    const point2 = map.latLngToContainerPoint([b.lat + b.h, b.lng + b.w]);

                    const width = Math.abs(point2.x - point.x);
                    const height = Math.abs(point2.y - point.y);

                    if (width < 300 && height < 300 && width > 3 && height > 3) {
                        const div = document.createElement('div');
                        div.className = 'building-3d';

                        const x = Math.min(point.x, point2.x) - 1;
                        const y = Math.min(point.y, point2.y) - 1;

                        div.style.left = x + 'px';
                        div.style.top = y + 'px';
                        div.style.width = (width + 2) + 'px';
                        div.style.height = (height + 2) + 'px';

                        const colors = [
                            'rgba(150, 165, 185, 0.5)',
                            'rgba(160, 175, 195, 0.5)',
                            'rgba(140, 155, 175, 0.5)',
                            'rgba(170, 180, 200, 0.5)',
                        ];
                        div.style.background = colors[Math.floor(Math.random() * colors.length)];

                        const top = document.createElement('div');
                        top.className = 'top';
                        div.appendChild(top);

                        container.appendChild(div);
                        buildingElements.push(div);
                    }
                } catch (e) {}
            });
        }

        // ================================================================
        //  الوضع ثلاثي الأبعاد
        // ================================================================
        btn3d.addEventListener('click', () => {
            is3D = !is3D;
            btn3d.classList.toggle('active', is3D);

            if (is3D) {
                mapContainer.classList.add('is3d');
                setMapLayer(terrainLayer, document.getElementById('mode-terrain'));
                indicator.style.display = 'flex';
                btn3d.style.color = '#7bb0ff';

                setTimeout(create3DBuildings, 300);
                map.on('moveend', create3DBuildings);
                map.on('zoomend', create3DBuildings);

                if (buildingInterval) clearInterval(buildingInterval);
                buildingInterval = setInterval(create3DBuildings, 2000);

                showToast('🌐 الوضع ثلاثي الأبعاد مفعل - المباني تظهر', '#7bb0ff');
            } else {
                mapContainer.classList.remove('is3d');
                indicator.style.display = 'none';
                btn3d.style.color = '';

                buildingElements.forEach(el => {
                    if (el.parentNode) el.parentNode.removeChild(el);
                });
                buildingElements = [];

                map.off('moveend', create3DBuildings);
                map.off('zoomend', create3DBuildings);

                if (buildingInterval) {
                    clearInterval(buildingInterval);
                    buildingInterval = null;
                }

                setMapLayer(streetLayer, document.getElementById('mode-street'));
                showToast('📍 الوضع العادي - تم إلغاء 3D', '#ff6b6b');
            }
        });

        // ================================================================
        //  المفضلة
        // ================================================================
        let favorites = [];
        let favoriteMarkers = [];

        document.getElementById('favorites-btn').addEventListener('click', () => {
            if (userPosition) {
                const name = prompt('أدخل اسم لهذا المكان:');
                if (name) {
                    favorites.push({
                        lat: userPosition[0],
                        lng: userPosition[1],
                        name: name
                    });
                    showToast(`❤️ تم حفظ "${name}" في المفضلة`, '#ff6b6b');
                    updateFavorites();
                }
            } else {
                alert('⚠️ حدد موقعك أولاً');
            }
        });

        function updateFavorites() {
            // إزالة العلامات القديمة
            favoriteMarkers.forEach(m => map.removeLayer(m));
            favoriteMarkers = [];

            favorites.forEach(fav => {
                const icon = L.divIcon({
                    className: 'fav-marker',
                    html: `<div style="background:#ff6b6b;border-radius:50%;width:14px;height:14px;border:2px solid #fff;box-shadow:0 0 20px rgba(255,107,107,0.4);"></div>`,
                    iconSize: [14, 14],
                    iconAnchor: [7, 7],
                });
                const marker = L.marker([fav.lat, fav.lng], { icon })
                    .addTo(map)
                    .bindPopup(`❤️ ${fav.name}`);
                favoriteMarkers.push(marker);
            });
        }

        // ================================================================
        //  مؤشر الموقع
        // ================================================================
        let userMarker = null;
        let userCircle = null;
        let userPosition = null;

        function createUserIcon() {
            return L.divIcon({
                className: 'user-marker',
                iconSize: [20, 20],
                iconAnchor: [10, 10],
                html: '<div></div>',
            });
        }

        function updateLocation(position) {
            const { latitude, longitude, accuracy } = position.coords;
            userPosition = [latitude, longitude];

            // تحديث الموقع في AR
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&accept-language=ar`)
                .then(res => res.json())
                .then(data => {
                    const address = data.display_name || 'موقع غير معروف';
                    document.getElementById('ar-location').textContent = address.split(',').slice(0, 3).join(', ');
                    if (data.address) {
                        const nearby = data.address.amenity || data.address.shop || data.address.tourism || data.address
                            .office || 'لا يوجد معلم قريب';
                        document.getElementById('ar-nearby').textContent = nearby;
                    }
                })
                .catch(() => {
                    document.getElementById('ar-location').textContent = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                });

            if (userMarker) {
                userMarker.setLatLng([latitude, longitude]);
                if (userCircle) userCircle.setLatLng([latitude, longitude]);
            } else {
                const icon = createUserIcon();
                userMarker = L.marker([latitude, longitude], { icon }).addTo(map);
                userCircle = L.circle([latitude, longitude], {
                    radius: accuracy || 30,
                    color: '#3dff9e',
                    fillColor: '#3dff9e',
                    fillOpacity: 0.08,
                    weight: 1.5,
                    opacity: 0.6,
                }).addTo(map);
            }

            if (position.coords.heading !== null && position.coords.heading !== undefined) {
                document.getElementById('ar-compass').textContent = Math.round(position.coords.heading);
            }

            // تحديث نقطة البداية للملاحة
            if (navigationMode && !startPoint) {
                startPoint = userPosition;
            }
        }

        function locateUser() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    updateLocation,
                    (err) => {
                        console.warn('Geolocation error:', err);
                        alert('⚠️ لم نتمكن من تحديد موقعك. تأكد من تشغيل خدمات الموقع.');
                    }, {
                        enableHighAccuracy: true,
                        maximumAge: 5000,
                        timeout: 10000,
                    }
                );
                navigator.geolocation.watchPosition(updateLocation, null, {
                    enableHighAccuracy: true,
                    maximumAge: 5000,
                    timeout: 10000,
                });
            } else {
                alert('متصفحك لا يدعم تحديد الموقع.');
            }
        }

        locateUser();

        document.getElementById('locate-btn').addEventListener('click', () => {
            if (userPosition) {
                map.flyTo(userPosition, 16, { duration: 1.2 });
                document.getElementById('locate-btn').style.color = '#3dff9e';
                setTimeout(() => {
                    document.getElementById('locate-btn').style.color = '';
                }, 1000);
            } else {
                locateUser();
                alert('⏳ جاري تحديد موقعك...');
            }
        });

        // ================================================================
        //  البحث
        // ================================================================
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const resultsContainer = document.getElementById('search-results');
        let searchMarker = null;
        let searchCircle = null;

        function clearSearchMarker() {
            if (searchMarker) {
                map.removeLayer(searchMarker);
                searchMarker = null;
            }
            if (searchCircle) {
                map.removeLayer(searchCircle);
                searchCircle = null;
            }
        }

        function addSearchMarker(lat, lng, name) {
            clearSearchMarker();

            const icon = L.divIcon({
                className: 'search-marker',
                iconSize: [30, 30],
                iconAnchor: [15, 30],
                html: '<div></div>',
            });

            searchMarker = L.marker([lat, lng], { icon }).addTo(map);
            searchMarker.bindPopup(`<strong>📍 ${name}</strong><br>تم العثور على الموقع`);

            searchCircle = L.circle([lat, lng], {
                radius: 50,
                color: '#ff6b6b',
                fillColor: '#ff6b6b',
                fillOpacity: 0.05,
                weight: 2,
                opacity: 0.5,
            }).addTo(map);

            map.flyTo([lat, lng], 16, { duration: 1.2 });

            setTimeout(() => {
                if (searchMarker) searchMarker.openPopup();
            }, 500);
        }

        async function performSearch(query) {
            if (query.length < 2) {
                resultsContainer.classList.remove('show');
                return;
            }

            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=6&lang=ar`
                );
                const data = await response.json();

                resultsContainer.innerHTML = '';
                if (data.length === 0) {
                    resultsContainer.innerHTML =
                        '<div style="padding:16px;color:rgba(255,255,255,0.3);text-align:center;">لا توجد نتائج</div>';
                    resultsContainer.classList.add('show');
                    return;
                }

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    const name = item.display_name.split(',')[0];
                    const address = item.display_name.split(',').slice(1, 4).join(', ');
                    div.innerHTML = `
                            <i class="fas fa-map-pin"></i>
                            <div>
                                <div class="name">${name}</div>
                                <div class="address">${address}</div>
                            </div>
                        `;
                    div.addEventListener('click', () => {
                        const lat = parseFloat(item.lat);
                        const lon = parseFloat(item.lon);
                        addSearchMarker(lat, lon, name);
                        resultsContainer.classList.remove('show');
                        searchInput.value = name;
                    });
                    resultsContainer.appendChild(div);
                });

                resultsContainer.classList.add('show');
            } catch (error) {
                console.error('Search error:', error);
                resultsContainer.innerHTML =
                    '<div style="padding:16px;color:rgba(255,100,100,0.5);text-align:center;">خطأ في البحث، حاول مرة أخرى</div>';
                resultsContainer.classList.add('show');
            }
        }

        searchBtn.addEventListener('click', () => performSearch(searchInput.value));
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch(searchInput.value);
        });
        searchInput.addEventListener('input', () => {
            if (searchInput.value.length === 0) {
                resultsContainer.classList.remove('show');
                clearSearchMarker();
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#search-container') && !e.target.closest('#search-results')) {
                resultsContainer.classList.remove('show');
            }
        });

        // ================================================================
        //  الواقع المعزز
        // ================================================================
        const arBtn = document.getElementById('ar-btn');
        const arOverlay = document.getElementById('ar-overlay');
        let arInterval = null;

        arBtn.addEventListener('click', () => {
            arOverlay.classList.toggle('open');
            if (arOverlay.classList.contains('open')) {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        if (pos.coords.heading !== null && pos.coords.heading !== undefined) {
                            document.getElementById('ar-compass').textContent = Math.round(pos.coords
                            .heading);
                        }
                        fetch(
                                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&zoom=18&accept-language=ar`
                                )
                            .then(res => res.json())
                            .then(data => {
                                const address = data.display_name || 'موقع غير معروف';
                                document.getElementById('ar-location').textContent = address.split(',')
                                    .slice(0, 3).join(', ');
                                if (data.address) {
                                    const nearby = data.address.amenity || data.address.shop || data.address
                                        .tourism || data.address.office || 'لا يوجد معلم قريب';
                                    document.getElementById('ar-nearby').textContent = nearby;
                                }
                            })
                            .catch(() => {
                                document.getElementById('ar-location').textContent =
                                    `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
                            });
                    });
                }
                if (arInterval) clearInterval(arInterval);
                arInterval = setInterval(() => {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition((pos) => {
                            if (pos.coords.heading !== null && pos.coords.heading !== undefined) {
                                document.getElementById('ar-compass').textContent = Math.round(pos
                                    .coords.heading);
                            }
                        });
                    }
                }, 2000);
                showToast('🥽 الواقع المعزز مفعل - البوصلة تعمل', '#ffb84d');
            } else {
                if (arInterval) clearInterval(arInterval);
                showToast('📍 تم إلغاء الواقع المعزز', '#ff6b6b');
            }
        });

        document.getElementById('ar-close-btn').addEventListener('click', () => {
            arOverlay.classList.remove('open');
            if (arInterval) clearInterval(arInterval);
        });

        // ================================================================
        //  دوال مساعدة
        // ================================================================
        function showToast(message, color = '#7bb0ff') {
            const toast = document.createElement('div');
            toast.style.position = 'absolute';
            toast.style.top = '80px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.zIndex = '20';
            toast.style.padding = '10px 24px';
            toast.style.background = 'rgba(0,0,0,0.7)';
            toast.style.backdropFilter = 'blur(12px)';
            toast.style.borderRadius = '40px';
            toast.style.border = `1px solid ${color}33`;
            toast.style.color = '#fff';
            toast.style.fontSize = '0.85rem';
            toast.style.boxShadow = '0 8px 30px rgba(0,0,0,0.4)';
            toast.style.transition = 'opacity 0.8s';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 900);
            }, 3000);
        }

        // ================================================================
        //  رسالة ترحيب
        // ================================================================
        console.log('🚀 أورا ماب – جميع الميزات متاحة');
        console.log('📍 الملاحة تعمل مع OSRM، البحث الصوتي تم استبداله بالبحث النصي');

        setTimeout(() => {
            const toast = document.createElement('div');
            toast.style.position = 'absolute';
            toast.style.bottom = '100px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.zIndex = '20';
            toast.style.padding = '12px 28px';
            toast.style.background = 'rgba(0,20,40,0.8)';
            toast.style.backdropFilter = 'blur(16px)';
            toast.style.borderRadius = '60px';
            toast.style.border = '1px solid rgba(255,255,255,0.04)';
            toast.style.color = '#b0d0ff';
            toast.style.fontSize = '0.85rem';
            toast.style.boxShadow = '0 12px 40px rgba(0,0,0,0.6)';
            toast.innerHTML = '🗺️ <strong>أورا ماب</strong> – الملاحة تعمل الآن!';
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = 'opacity 1s';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 1200);
            }, 4000);
        }, 800);
    </script>
</body>
</html>
