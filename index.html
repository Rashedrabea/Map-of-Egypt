<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>أورا ماب</title>

    <!-- ===== Leaflet ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.min.js">
    </script>

    <!-- ===== Font Awesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0e14;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* ===== الخريطة - تأخذ كامل الشاشة ===== */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #1a1f2e;
        }

        /* ===== شريط البحث ===== */
        #search-container {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(94%, 600px);
            display: flex;
            align-items: center;
            background: rgba(12, 16, 24, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px;
            padding: 4px 4px 4px 16px;
            box-shadow: 0 8px 30px -8px rgba(0, 0, 0, 0.8);
        }

        #search-container i {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.9rem;
        }

        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4fc;
            font-size: 0.9rem;
            padding: 10px 12px;
            min-height: 44px;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #search-btn {
            background: rgba(60, 140, 255, 0.12);
            border: none;
            color: #8abaff;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            min-height: 38px;
            border: 1px solid rgba(60, 140, 255, 0.06);
            transition: 0.2s;
        }

        #search-btn:active {
            background: rgba(60, 140, 255, 0.25);
        }

        /* ===== زر البحث الصوتي ===== */
        #voice-btn {
            background: rgba(255, 180, 60, 0.1);
            border: none;
            color: #ffb84d;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            min-height: 38px;
            border: 1px solid rgba(255, 180, 60, 0.06);
            transition: 0.2s;
            margin-left: 4px;
        }

        #voice-btn:active {
            background: rgba(255, 180, 60, 0.2);
        }

        #voice-btn.listening {
            background: rgba(255, 50, 50, 0.15);
            border-color: rgba(255, 50, 50, 0.2);
            animation: pulse-voice 1s ease-in-out infinite;
        }

        @keyframes pulse-voice {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* ===== نتائج البحث ===== */
        #search-results {
            position: absolute;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(94%, 600px);
            max-height: 260px;
            overflow-y: auto;
            background: rgba(10, 14, 24, 0.95);
            backdrop-filter: blur(24px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px;
            display: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        #search-results.show {
            display: block;
        }

        .result-item {
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d0daf0;
            font-size: 0.85rem;
            transition: 0.15s;
        }

        .result-item:active {
            background: rgba(255, 255, 255, 0.06);
        }

        .result-item i {
            color: #7bb0ff;
            width: 18px;
        }

        .result-item .name {
            font-weight: 500;
        }

        .result-item .address {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* ===== أزرار التحكم الجانبية ===== */
        #controls {
            position: absolute;
            top: 76px;
            right: 10px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(12, 16, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #eef4ff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            position: relative;
            transition: 0.2s;
            user-select: none;
        }

        .ctrl-btn:active {
            transform: scale(0.92);
        }

        .ctrl-btn.active {
            background: rgba(60, 140, 255, 0.2);
            border-color: rgba(60, 140, 255, 0.15);
            box-shadow: 0 0 30px rgba(60, 140, 255, 0.1);
        }

        .ctrl-btn .badge {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 12px;
            height: 12px;
            background: #3dff9e;
            border-radius: 50%;
            border: 2px solid rgba(12, 16, 24, 0.8);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }
        }

        /* ===== اللوحة السفلية ===== */
        #bottom-bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: min(96%, 700px);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: rgba(10, 14, 24, 0.92);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.9);
            flex-wrap: nowrap;
            gap: 2px;
            min-height: 56px;
        }

        .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            color: #8899bb;
            font-size: 0.55rem;
            font-weight: 500;
            border: 2px solid transparent;
            transition: 0.3s ease;
            user-select: none;
            min-width: 44px;
            min-height: 44px;
            justify-content: center;
        }

        .bottom-item i {
            font-size: 1.1rem;
            color: #7bb0ff;
            transition: 0.3s;
        }

        .bottom-item:active {
            transform: scale(0.92);
        }

        .bottom-item.active {
            background: rgba(60, 130, 255, 0.12);
            border-color: #4a9eff;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(60, 130, 255, 0.12);
        }

        .bottom-item.active i {
            color: #4a9eff;
        }

        .bottom-item.active span {
            color: #4a9eff;
        }

        .bottom-item span {
            font-size: 0.5rem;
            color: #667799;
            transition: 0.3s;
        }

        /* ===== مؤشر الموقع ===== */
        .user-marker {
            width: 22px;
            height: 22px;
            background: #3dff9e;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(61, 255, 158, 0.5);
            border: 3px solid rgba(255, 255, 255, 0.15);
            animation: pulse-gps 1.5s ease-in-out infinite;
            position: relative;
        }

        .user-marker::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 7px;
            height: 7px;
            background: #3dff9e;
            border-radius: 50%;
        }

        @keyframes pulse-gps {
            0% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(61, 255, 158, 0.5), 0 0 80px rgba(61, 255, 158, 0.1);
            }
            100% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.3);
            }
        }

        /* ===== مؤشر البحث ===== */
        .search-marker {
            width: 30px;
            height: 30px;
            background: #ff6b6b;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.4);
            border: 3px solid #fff;
            position: relative;
        }

        .search-marker::after {
            content: '';
            position: absolute;
            top: 9px;
            left: 9px;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            transform: rotate(45deg);
        }

        /* ===== Leaflet ===== */
        .leaflet-control-attribution {
            display: none !important;
        }
        .leaflet-control-zoom {
            display: none !important;
        }
        .leaflet-tile-pane {
            filter: saturate(1.05) contrast(1.02);
        }

        /* ===== استجابة ===== */
        @media (max-width: 480px) {
            #bottom-bar {
                bottom: 12px;
                padding: 6px 6px;
                border-radius: 40px;
                min-height: 48px;
                gap: 1px;
            }

            .bottom-item {
                padding: 3px 6px;
                min-width: 36px;
                min-height: 38px;
            }

            .bottom-item i {
                font-size: 0.9rem;
            }

            .bottom-item span {
                font-size: 0.4rem;
            }

            #controls {
                top: 68px;
                right: 8px;
                gap: 6px;
            }

            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            #search-container {
                top: 8px;
                padding: 2px 2px 2px 12px;
                border-radius: 40px;
            }

            #search-input {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-height: 34px;
            }

            #search-btn {
                padding: 4px 12px;
                font-size: 0.65rem;
                min-height: 30px;
            }

            #voice-btn {
                padding: 4px 10px;
                font-size: 0.8rem;
                min-height: 30px;
            }

            #search-results {
                top: 62px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== الخريطة ===== -->
    <div id="map"></div>

    <!-- ===== شريط البحث ===== -->
    <div id="search-container">
        <i class="fas fa-search"></i>
        <input id="search-input" type="text" placeholder="ابحث عن مدينة، شارع..." autocomplete="off" />
        <button id="voice-btn" title="بحث صوتي"><i class="fas fa-microphone"></i></button>
        <button id="search-btn">بحث</button>
    </div>

    <!-- ===== نتائج البحث ===== -->
    <div id="search-results"></div>

    <!-- ===== أزرار التحكم ===== -->
    <div id="controls">
        <div class="ctrl-btn" id="locate-btn" title="موقعي">
            <i class="fas fa-location-crosshairs"></i>
            <span class="badge"></span>
        </div>
        <div class="ctrl-btn" id="favorites-btn" title="المفضلة">
            <i class="fas fa-heart"></i>
        </div>
        <div class="ctrl-btn" id="d3-toggle" title="3D">
            <i class="fas fa-cube"></i>
        </div>
        <div class="ctrl-btn" id="ar-btn" title="AR">
            <i class="fas fa-vr-cardboard"></i>
        </div>
    </div>

    <!-- ===== اللوحة السفلية ===== -->
    <div id="bottom-bar">
        <div class="bottom-item active" id="mode-street">
            <i class="fas fa-road"></i>
            <span>شارع</span>
        </div>
        <div class="bottom-item" id="mode-satellite">
            <i class="fas fa-satellite"></i>
            <span>قمر</span>
        </div>
        <div class="bottom-item" id="mode-terrain">
            <i class="fas fa-mountain"></i>
            <span>تضاريس</span>
        </div>
        <div class="bottom-item" id="mode-night">
            <i class="fas fa-moon"></i>
            <span>ليلي</span>
        </div>
        <div class="bottom-item" id="mode-navigation">
            <i class="fas fa-route"></i>
            <span>ملاحة</span>
        </div>
    </div>

    <script>
        // ================================================================
        //  الطريقة الأكثر أماناً - استخدام iframe كحل احتياطي
        // ================================================================

        // أولاً: نحاول استخدام Leaflet
        function tryLeaflet() {
            if (typeof L !== 'undefined') {
                try {
                    var map = L.map('map', {
                        center: [30.0444, 31.2357],
                        zoom: 13,
                        zoomControl: true,
                    });

                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        maxZoom: 19,
                        attribution: '© OpenStreetMap'
                    }).addTo(map);

                    console.log('✅ الخريطة ظهرت باستخدام Leaflet');
                    return true;
                } catch (e) {
                    console.log('❌ خطأ في Leaflet:', e);
                    return false;
                }
            }
            return false;
        }

        // ثانياً: إذا فشل Leaflet، نستخدم iframe
        function useIframeFallback() {
            var mapDiv = document.getElementById('map');
            mapDiv.innerHTML = '';

            var iframe = document.createElement('iframe');
            iframe.src = 'https://www.openstreetmap.org/export/embed.html?bbox=31.1%2C29.9%2C31.4%2C30.2&amp;layer=mapnik&amp;marker=30.0444%2C31.2357';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.style.zIndex = '0';
            iframe.loading = 'lazy';

            mapDiv.appendChild(iframe);
            console.log('✅ الخريطة ظهرت باستخدام iframe (حل بديل)');

            // إظهار رسالة للمستخدم
            showToast('🗺️ الخريطة تعمل (وضع بديل)', '#ffb84d');
        }

        // ================================================================
        //  تشغيل الخريطة
        // ================================================================
        function initMap() {
            // المحاولة الأولى: Leaflet
            var success = tryLeaflet();

            // إذا فشل، استخدم iframe بعد 2 ثانية
            if (!success) {
                console.log('⚠️ Leaflet فشل، استخدام iframe بديل');
                setTimeout(useIframeFallback, 2000);
            }

            // ================================================================
            //  حتى لو نجح Leaflet، نضيف زر لتحديث الخريطة
            // ================================================================
            document.getElementById('search-btn').addEventListener('dblclick', function() {
                location.reload();
            });
        }

        // ================================================================
        //  بدء التطبيق
        // ================================================================
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            initMap();
        } else {
            document.addEventListener('DOMContentLoaded', initMap);
        }

        // محاولة إضافية بعد 3 ثواني
        setTimeout(function() {
            var mapDiv = document.getElementById('map');
            if (mapDiv && mapDiv.innerHTML === '') {
                useIframeFallback();
            }
        }, 3000);

        // ================================================================
        //  بعد تحميل الخريطة (سواء Leaflet أو iframe)
        // ================================================================
        function showToast(msg, color) {
            color = color || '#7bb0ff';
            var t = document.createElement('div');
            t.style.position = 'fixed';
            t.style.top = '80px';
            t.style.left = '50%';
            t.style.transform = 'translateX(-50%)';
            t.style.zIndex = '999';
            t.style.padding = '8px 20px';
            t.style.background = 'rgba(0,0,0,0.8)';
            t.style.backdropFilter = 'blur(12px)';
            t.style.borderRadius = '40px';
            t.style.border = '1px solid ' + color + '33';
            t.style.color = '#fff';
            t.style.fontSize = '0.8rem';
            t.style.maxWidth = '90%';
            t.style.textAlign = 'center';
            t.innerHTML = msg;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                setTimeout(function() { t.remove(); }, 900);
            }, 3000);
        }

        // رسالة ترحيب
        setTimeout(function() {
            showToast('🛡️ أورا ماب - خصوصية مطلقة', '#3dff9e');
        }, 1500);

        console.log('🚀 أورا ماب - جاهزة');
    </script>
</body>
</html>
