<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>أورا ماب</title>

    <!-- ===== Leaflet ===== -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <!-- ===== Font Awesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ===== إعادة تعيين كل شيء ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0e14;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* ===== الخريطة ===== */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #1a1f2e;
        }

        /* ===== شريط البحث ===== */
        #search-container {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(94%, 600px);
            display: flex;
            align-items: center;
            background: rgba(12, 16, 24, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px;
            padding: 4px 4px 4px 16px;
            box-shadow: 0 8px 30px -8px rgba(0, 0, 0, 0.8);
        }

        #search-container i {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.9rem;
        }

        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4fc;
            font-size: 0.9rem;
            padding: 10px 12px;
            min-height: 44px;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #search-btn {
            background: rgba(60, 140, 255, 0.12);
            border: none;
            color: #8abaff;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            min-height: 38px;
            border: 1px solid rgba(60, 140, 255, 0.06);
        }

        /* ===== أزرار التحكم ===== */
        #controls {
            position: absolute;
            top: 76px;
            right: 10px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(12, 16, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #eef4ff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            transition: 0.2s;
        }

        .ctrl-btn:active {
            transform: scale(0.92);
        }

        .ctrl-btn .badge {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 12px;
            height: 12px;
            background: #3dff9e;
            border-radius: 50%;
            border: 2px solid rgba(12, 16, 24, 0.8);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }
        }

        /* ===== اللوحة السفلية ===== */
        #bottom-bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: min(96%, 700px);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: rgba(10, 14, 24, 0.92);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.9);
            flex-wrap: nowrap;
            gap: 2px;
            min-height: 56px;
        }

        .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            color: #8899bb;
            font-size: 0.55rem;
            font-weight: 500;
            border: 2px solid transparent;
            transition: 0.3s ease;
            min-width: 44px;
            min-height: 44px;
            justify-content: center;
        }

        .bottom-item i {
            font-size: 1.1rem;
            color: #7bb0ff;
        }

        .bottom-item:active {
            transform: scale(0.92);
        }

        .bottom-item.active {
            background: rgba(60, 130, 255, 0.12);
            border-color: #4a9eff;
            color: #ffffff;
        }

        .bottom-item.active i {
            color: #4a9eff;
        }

        .bottom-item.active span {
            color: #4a9eff;
        }

        .bottom-item span {
            font-size: 0.5rem;
            color: #667799;
        }

        /* ===== Leaflet ===== */
        .leaflet-control-attribution {
            display: none !important;
        }
        .leaflet-control-zoom {
            display: none !important;
        }

        /* ===== استجابة ===== */
        @media (max-width: 480px) {
            #bottom-bar {
                bottom: 12px;
                padding: 6px 6px;
                border-radius: 40px;
                min-height: 48px;
                gap: 1px;
            }
            .bottom-item {
                padding: 3px 6px;
                min-width: 36px;
                min-height: 38px;
            }
            .bottom-item i {
                font-size: 0.9rem;
            }
            .bottom-item span {
                font-size: 0.4rem;
            }
            #controls {
                top: 68px;
                right: 8px;
                gap: 6px;
            }
            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            #search-container {
                top: 8px;
                padding: 2px 2px 2px 12px;
                border-radius: 40px;
            }
            #search-input {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-height: 34px;
            }
            #search-btn {
                padding: 4px 12px;
                font-size: 0.65rem;
                min-height: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== الخريطة ===== -->
    <div id="map"></div>

    <!-- ===== شريط البحث ===== -->
    <div id="search-container">
        <i class="fas fa-search"></i>
        <input id="search-input" type="text" placeholder="ابحث عن مدينة، شارع..." autocomplete="off" />
        <button id="search-btn">بحث</button>
    </div>

    <!-- ===== أزرار التحكم ===== -->
    <div id="controls">
        <div class="ctrl-btn" id="locate-btn" title="موقعي">
            <i class="fas fa-location-crosshairs"></i>
            <span class="badge"></span>
        </div>
        <div class="ctrl-btn" id="favorites-btn" title="المفضلة">
            <i class="fas fa-heart"></i>
        </div>
        <div class="ctrl-btn" id="d3-toggle" title="3D">
            <i class="fas fa-cube"></i>
        </div>
        <div class="ctrl-btn" id="ar-btn" title="AR">
            <i class="fas fa-vr-cardboard"></i>
        </div>
    </div>

    <!-- ===== اللوحة السفلية ===== -->
    <div id="bottom-bar">
        <div class="bottom-item active" id="mode-street">
            <i class="fas fa-road"></i>
            <span>شارع</span>
        </div>
        <div class="bottom-item" id="mode-satellite">
            <i class="fas fa-satellite"></i>
            <span>قمر</span>
        </div>
        <div class="bottom-item" id="mode-terrain">
            <i class="fas fa-mountain"></i>
            <span>تضاريس</span>
        </div>
        <div class="bottom-item" id="mode-night">
            <i class="fas fa-moon"></i>
            <span>ليلي</span>
        </div>
        <div class="bottom-item" id="mode-navigation">
            <i class="fas fa-route"></i>
            <span>ملاحة</span>
        </div>
    </div>

    <script>
        // ================================================================
        //  بدء التطبيق - بطريقة بسيطة ومباشرة
        // ================================================================

        // التأكد من أن Leaflet متاح
        function initMap() {
            // إذا لم يكن Leaflet متاحاً، انتظر
            if (typeof L === 'undefined') {
                console.log('⏳ انتظار تحميل Leaflet...');
                setTimeout(initMap, 500);
                return;
            }

            console.log('✅ Leaflet متاح، جاري إنشاء الخريطة...');

            try {
                // إنشاء الخريطة
                var map = L.map('map', {
                    center: [30.0444, 31.2357],
                    zoom: 13,
                    zoomControl: true,
                });

                // إضافة طبقة الشارع
                var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                // طبقات أخرى
                var satelliteLayer = L.tileLayer(
                    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        maxZoom: 19
                    });

                var terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });

                var nightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });

                var currentLayer = streetLayer;

                // ================================================================
                //  تبديل الأنماط
                // ================================================================
                function switchLayer(layer, btn) {
                    if (currentLayer) map.removeLayer(currentLayer);
                    currentLayer = layer;
                    map.addLayer(layer);
                    document.querySelectorAll('.bottom-item').forEach(function(el) {
                        el.classList.remove('active');
                    });
                    if (btn) btn.classList.add('active');
                }

                document.getElementById('mode-street').addEventListener('click', function() {
                    switchLayer(streetLayer, this);
                });
                document.getElementById('mode-satellite').addEventListener('click', function() {
                    switchLayer(satelliteLayer, this);
                });
                document.getElementById('mode-terrain').addEventListener('click', function() {
                    switchLayer(terrainLayer, this);
                });
                document.getElementById('mode-night').addEventListener('click', function() {
                    switchLayer(nightLayer, this);
                });

                // ================================================================
                //  GPS
                // ================================================================
                var userMarker = null,
                    userCircle = null,
                    userPos = null;

                function createUserIcon() {
                    return L.divIcon({
                        className: 'user-marker',
                        iconSize: [22, 22],
                        iconAnchor: [11, 11],
                        html: '<div></div>'
                    });
                }

                function updateLocation(pos) {
                    var lat = pos.coords.latitude;
                    var lng = pos.coords.longitude;
                    var acc = pos.coords.accuracy || 30;
                    userPos = [lat, lng];

                    if (userMarker) {
                        userMarker.setLatLng([lat, lng]);
                        if (userCircle) userCircle.setLatLng([lat, lng]);
                    } else {
                        var icon = createUserIcon();
                        userMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                        userCircle = L.circle([lat, lng], {
                            radius: acc,
                            color: '#3dff9e',
                            fillColor: '#3dff9e',
                            fillOpacity: 0.06,
                            weight: 1.5,
                            opacity: 0.5,
                        }).addTo(map);
                    }
                }

                function locateUser() {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(updateLocation, function() {
                            alert('⚠️ لم نتمكن من تحديد موقعك');
                        }, { enableHighAccuracy: true });
                        navigator.geolocation.watchPosition(updateLocation, null, { enableHighAccuracy: true });
                    }
                }
                locateUser();

                document.getElementById('locate-btn').addEventListener('click', function() {
                    if (userPos) {
                        map.flyTo(userPos, 16, { duration: 1.2 });
                        document.getElementById('locate-btn').style.color = '#3dff9e';
                        setTimeout(function() { document.getElementById('locate-btn').style.color = ''; }, 1000);
                    } else {
                        locateUser();
                        alert('⏳ جاري تحديد موقعك...');
                    }
                });

                // ================================================================
                //  البحث
                // ================================================================
                var searchInput = document.getElementById('search-input');
                var searchBtn = document.getElementById('search-btn');
                var searchMarker = null,
                    searchCircle = null;

                function clearSearch() {
                    if (searchMarker) { map.removeLayer(searchMarker);
                        searchMarker = null; }
                    if (searchCircle) { map.removeLayer(searchCircle);
                        searchCircle = null; }
                }

                function addSearch(lat, lng, name) {
                    clearSearch();
                    var icon = L.divIcon({
                        className: 'search-marker',
                        iconSize: [30, 30],
                        iconAnchor: [15, 30],
                        html: '<div></div>'
                    });
                    searchMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                    searchMarker.bindPopup('📍 ' + name);
                    searchCircle = L.circle([lat, lng], { radius: 50, color: '#ff6b6b', fillColor: '#ff6b6b',
                        fillOpacity: 0.05, weight: 2 }).addTo(map);
                    map.flyTo([lat, lng], 16, { duration: 1.2 });
                    setTimeout(function() { if (searchMarker) searchMarker.openPopup(); }, 500);
                }

                function doSearch(q) {
                    if (q.length < 2) {
                        alert('⚠️ اكتب أكثر من حرفين');
                        return;
                    }

                    var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) +
                        '&limit=6&lang=ar&addressdetails=1';

                    fetch(url, {
                        headers: { 'User-Agent': 'AoraMap/1.0' }
                    })
                    .then(function(response) {
                        if (!response.ok) throw new Error('Network error');
                        return response.json();
                    })
                    .then(function(data) {
                        if (!data || data.length === 0) {
                            alert('❌ لا توجد نتائج');
                            return;
                        }

                        var item = data[0];
                        var lat = parseFloat(item.lat);
                        var lon = parseFloat(item.lon);
                        var name = item.display_name.split(',')[0] || 'موقع';
                        addSearch(lat, lon, name);
                        searchInput.value = name;
                    })
                    ['catch'](function(error) {
                        alert('⚠️ خطأ في البحث، حاول مرة أخرى');
                    });
                }

                searchBtn.addEventListener('click', function() { doSearch(searchInput.value); });

                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        doSearch(searchInput.value);
                    }
                });

                // ================================================================
                //  الملاحة
                // ================================================================
                var navMode = false,
                    routeLine = null,
                    routeMarkers = [];

                function calcRoute(sLat, sLng, eLat, eLng) {
                    var url = 'https://router.project-osrm.org/route/v1/driving/' + sLng + ',' + sLat + ';' + eLng + ',' +
                        eLat +
                        '?overview=full&geometries=geojson';
                    return fetch(url)
                        .then(function(r) { return r.json(); })
                        .then(function(d) {
                            if (d.code === 'Ok' && d.routes && d.routes.length > 0) {
                                return d.routes[0];
                            }
                            return null;
                        })['catch'](function() { return null; });
                }

                function drawRoute(route, dest) {
                    if (routeLine) {
                        map.removeLayer(routeLine);
                        routeLine = null;
                    }
                    routeMarkers.forEach(function(m) { map.removeLayer(m); });
                    routeMarkers = [];

                    if (!route) return;

                    var coords = route.geometry.coordinates.map(function(c) { return [c[1], c[0]]; });

                    routeLine = L.polyline(coords, {
                        color: '#ff1111',
                        weight: 7,
                        opacity: 0.95,
                        lineJoin: 'round',
                        lineCap: 'round',
                    }).addTo(map);

                    var sIcon = L.divIcon({
                        html: '<div style="background:#00ff44;border-radius:50%;width:20px;height:20px;border:3px solid #fff;box-shadow:0 0 25px rgba(0,255,68,0.6);"></div>',
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });
                    routeMarkers.push(L.marker([coords[0][0], coords[0][1]], { icon: sIcon }).addTo(map).bindPopup(
                        '🟢 البداية'));

                    var eIcon = L.divIcon({
                        html: '<div style="background:#ff2222;border-radius:50%;width:20px;height:20px;border:3px solid #fff;box-shadow:0 0 25px rgba(255,34,34,0.6);"></div>',
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });
                    routeMarkers.push(L.marker([coords[coords.length - 1][0], coords[coords.length - 1][1]], { icon: eIcon })
                        .addTo(map).bindPopup('🔴 ' + dest));

                    var dist = (route.distance / 1000).toFixed(1);
                    var time = Math.round(route.duration / 60);
                    showToast('🔴 المسافة: ' + dist + ' كم - ' + time + ' دقائق', '#ff3333');

                    var bounds = L.latLngBounds(coords);
                    map.fitBounds(bounds, { padding: [60, 60], maxZoom: 15 });
                }

                document.getElementById('mode-navigation').addEventListener('click', function() {
                    navMode = !navMode;
                    this.classList.toggle('active', navMode);

                    if (navMode) {
                        if (!userPos) {
                            alert('⚠️ حدد موقعك أولاً');
                            navMode = false;
                            this.classList.remove('active');
                            return;
                        }

                        var dest = prompt('📍 أدخل اسم الوجهة:');
                        if (!dest) {
                            navMode = false;
                            this.classList.remove('active');
                            return;
                        }

                        var searchUrl = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(
                            dest) +
                            '&limit=1&lang=ar&addressdetails=1';

                        fetch(searchUrl, {
                            headers: { 'User-Agent': 'AoraMap/1.0' }
                        })
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            if (!data || data.length === 0) {
                                alert('⚠️ لم يتم العثور على: ' + dest);
                                navMode = false;
                                document.getElementById('mode-navigation').classList.remove('active');
                                return;
                            }

                            var lat = parseFloat(data[0].lat);
                            var lon = parseFloat(data[0].lon);

                            calcRoute(userPos[0], userPos[1], lat, lon)
                                .then(function(route) {
                                    if (route) {
                                        drawRoute(route, data[0].display_name.split(',')[0]);
                                    } else {
                                        alert('❌ لا يمكن حساب المسار');
                                        navMode = false;
                                        document.getElementById('mode-navigation').classList.remove('active');
                                    }
                                });
                        })['catch'](function() {
                            alert('⚠️ خطأ في البحث عن الوجهة');
                            navMode = false;
                            document.getElementById('mode-navigation').classList.remove('active');
                        });

                    } else {
                        if (routeLine) {
                            map.removeLayer(routeLine);
                            routeLine = null;
                        }
                        routeMarkers.forEach(function(m) { map.removeLayer(m); });
                        routeMarkers = [];
                        showToast('📍 تم إلغاء الملاحة', '#667799');
                    }
                });

                // ================================================================
                //  مؤشر 3D (محاكاة)
                // ================================================================
                var is3D = false;
                var btn3d = document.getElementById('d3-toggle');

                btn3d.addEventListener('click', function() {
                    is3D = !is3D;
                    btn3d.classList.toggle('active', is3D);

                    if (is3D) {
                        switchLayer(terrainLayer, document.getElementById('mode-terrain'));
                        btn3d.style.color = '#7bb0ff';
                        // تأثير 3D بإمالة الخريطة
                        document.getElementById('map').style.transition = 'transform 0.8s ease';
                        document.getElementById('map').style.transform = 'perspective(1000px) rotateX(5deg) scale(0.97)';
                        showToast('🌐 3D مفعل', '#7bb0ff');
                    } else {
                        btn3d.style.color = '';
                        document.getElementById('map').style.transform = '';
                        switchLayer(streetLayer, document.getElementById('mode-street'));
                        showToast('📍 تم إلغاء 3D', '#667799');
                    }
                });

                // ================================================================
                //  AR (الواقع المعزز)
                // ================================================================
                var arBtn = document.getElementById('ar-btn');

                arBtn.addEventListener('click', function() {
                    if (userPos) {
                        var msg = '🌍 الواقع المعزز\n';
                        msg += '📍 الموقع: ' + userPos[0].toFixed(4) + ', ' + userPos[1].toFixed(4) + '\n';
                        msg += '🧭 الاتجاه: ' + (userPos[2] || 'غير معروف') + '°';
                        alert(msg);
                    } else {
                        alert('⚠️ حدد موقعك أولاً');
                    }
                });

                // ================================================================
                //  المفضلة
                // ================================================================
                var favs = JSON.parse(localStorage.getItem('aora_favorites') || '[]');

                document.getElementById('favorites-btn').addEventListener('click', function() {
                    if (userPos) {
                        var name = prompt('أدخل اسم المكان:');
                        if (name) {
                            favs.push({ lat: userPos[0], lng: userPos[1], name: name });
                            localStorage.setItem('aora_favorites', JSON.stringify(favs));
                            showToast('❤️ تم حفظ "' + name + '"', '#ff6b6b');
                        }
                    } else {
                        alert('⚠️ حدد موقعك أولاً');
                    }
                });

                // ================================================================
                //  Toast
                // ================================================================
                function showToast(msg, color) {
                    color = color || '#7bb0ff';
                    var t = document.createElement('div');
                    t.style.position = 'absolute';
                    t.style.top = '80px';
                    t.style.left = '50%';
                    t.style.transform = 'translateX(-50%)';
                    t.style.zIndex = '999';
                    t.style.padding = '8px 20px';
                    t.style.background = 'rgba(0,0,0,0.8)';
                    t.style.backdropFilter = 'blur(12px)';
                    t.style.borderRadius = '40px';
                    t.style.border = '1px solid ' + color + '33';
                    t.style.color = '#fff';
                    t.style.fontSize = '0.8rem';
                    t.style.maxWidth = '90%';
                    t.style.textAlign = 'center';
                    t.innerHTML = msg;
                    document.body.appendChild(t);
                    setTimeout(function() {
                        t.style.opacity = '0';
                        setTimeout(function() { t.remove(); }, 900);
                    }, 3000);
                }

                // ================================================================
                //  تحسين حجم الخريطة
                // ================================================================
                function fixMapSize() {
                    if (map) {
                        var container = document.getElementById('map');
                        container.style.width = '100%';
                        container.style.height = '100%';
                        setTimeout(function() {
                            map.invalidateSize();
                        }, 100);
                    }
                }

                setTimeout(fixMapSize, 200);
                setTimeout(fixMapSize, 500);
                setTimeout(fixMapSize, 1000);

                window.addEventListener('resize', function() {
                    fixMapSize();
                });

                // ================================================================
                //  رسالة ترحيب
                // ================================================================
                setTimeout(function() {
                    showToast('🛡️ أورا ماب - خصوصية مطلقة', '#3dff9e');
                }, 1500);

                console.log('🚀 أورا ماب - جاهزة');

            } catch (e) {
                console.error('❌ خطأ:', e);
                document.getElementById('map').innerHTML =
                    '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#ff6b6b;flex-direction:column;gap:10px;font-size:1rem;">' +
                    '<i class="fas fa-exclamation-triangle" style="font-size:3rem;color:#ff6b6b;"></i>' +
                    'حدث خطأ في تحميل الخريطة<br>' +
                    '<span style="font-size:0.8rem;color:#667799;">' + e.message + '</span>' +
                    '<button onclick="location.reload()" style="margin-top:10px;padding:8px 24px;border-radius:40px;border:none;background:rgba(60,140,255,0.12);color:#8abaff;cursor:pointer;">إعادة المحاولة</button>' +
                    '</div>';
            }
        }

        // ================================================================
        //  بدء التطبيق
        // ================================================================
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            initMap();
        } else {
            document.addEventListener('DOMContentLoaded', initMap);
        }

        // محاولة إضافية بعد 3 ثواني
        setTimeout(function() {
            var mapDiv = document.getElementById('map');
            if (mapDiv && mapDiv.innerHTML === '') {
                initMap();
            }
        }, 3000);

        // ================================================================
        //  إصلاح حجم الخريطة
        // ================================================================
        function forceMapSize() {
            var el = document.getElementById('map');
            if (el) {
                el.style.width = '100%';
                el.style.height = '100%';
                el.style.position = 'absolute';
                el.style.top = '0';
                el.style.left = '0';
                el.style.margin = '0';
                el.style.padding = '0';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(forceMapSize, 100);
            setTimeout(forceMapSize, 300);
            setTimeout(forceMapSize, 600);
        });
        setTimeout(forceMapSize, 50);
    </script>
</body>
</html>
