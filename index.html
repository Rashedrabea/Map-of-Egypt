<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🗺️ خرائط مصر - البحث الصوتي والمشاركات</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ===== أنماط مختصرة ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            direction: rtl;
            background: #1a1a2e;
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 0;
            background: #1a1a2e;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0d47a1, #1a73e8, #0d47a1);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.8s ease;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        #loading .icon {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        #loading h1 {
            font-size: 32px;
            margin-top: 20px;
            font-weight: 700;
        }

        #loading p {
            opacity: 0.8;
            margin-top: 8px;
            font-size: 16px;
        }

        .loader-container {
            margin-top: 30px;
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .loader-bar {
            height: 100%;
            width: 0%;
            background: white;
            border-radius: 4px;
            animation: loadProgress 2.5s ease forwards;
        }

        @keyframes loadProgress {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        /* ===== شريط البحث ===== */
        .search-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 6px;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 6px 14px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            width: 96%;
            max-width: 800px;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 8px 0;
            font-size: 14px;
            outline: none;
            background: transparent;
            color: #333;
        }

        .search-box input::placeholder {
            color: #999;
        }

        .search-box .search-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .search-box .search-btn:hover {
            background: #0d47a1;
            transform: scale(1.02);
        }

        /* ===== زر الصوت المحسن ===== */
        .voice-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
            padding: 6px 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
            position: relative;
        }

        .voice-btn:hover {
            background: #f0f0f0;
            transform: scale(1.1);
        }

        .voice-btn.recording {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        .voice-btn .tooltip {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .voice-btn:hover .tooltip {
            opacity: 1;
        }

        .action-buttons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .action-buttons button {
            background: #f1f3f4;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            color: #555;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-buttons button:hover {
            background: #e2e6ea;
            transform: scale(1.05);
        }

        .leaflet-control-zoom {
            margin-bottom: 75px !important;
            margin-right: 10px !important;
        }

        .leaflet-control-zoom a {
            background: rgba(255, 255, 255, 0.95) !important;
            color: #333 !important;
            border-radius: 10px !important;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1) !important;
            width: 38px !important;
            height: 38px !important;
            line-height: 38px !important;
            font-size: 18px !important;
            border: none !important;
        }

        /* ===== شريط الخدمات ===== */
        .services-bar {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            padding: 6px 14px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            display: flex;
            gap: 4px;
            overflow-x: auto;
            max-width: 96%;
            flex-wrap: nowrap;
            scrollbar-width: none;
        }

        .services-bar::-webkit-scrollbar {
            display: none;
        }

        .service-btn {
            background: transparent;
            border: none;
            padding: 4px 10px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 9px;
            color: #555;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            white-space: nowrap;
            min-width: 42px;
        }

        .service-btn i {
            font-size: 15px;
        }

        .service-btn span {
            font-size: 7px;
            font-weight: 500;
        }

        .service-btn:hover {
            background: #f0f2f5;
            transform: translateY(-2px);
        }

        .service-btn.active {
            background: #1a73e8;
            color: white;
            transform: translateY(-2px);
        }

        .service-btn[data-service="hospital"] {
            color: #e74c3c;
        }

        .service-btn[data-service="hospital"].active {
            background: #e74c3c;
            color: white;
        }

        .service-btn[data-service="pharmacy"] {
            color: #2ecc71;
        }

        .service-btn[data-service="pharmacy"].active {
            background: #2ecc71;
            color: white;
        }

        .service-btn[data-service="bank"] {
            color: #f39c12;
        }

        .service-btn[data-service="bank"].active {
            background: #f39c12;
            color: white;
        }

        .service-btn[data-service="restaurant"] {
            color: #e67e22;
        }

        .service-btn[data-service="restaurant"].active {
            background: #e67e22;
            color: white;
        }

        .service-btn[data-service="tourist"] {
            color: #9b59b6;
        }

        .service-btn[data-service="tourist"].active {
            background: #9b59b6;
            color: white;
        }

        /* ===== لوحة النتائج ===== */
        #panel {
            position: absolute;
            top: 72px;
            right: -400px;
            width: 380px;
            max-height: calc(100vh - 150px);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #panel.open {
            right: 15px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid #eee;
            background: rgba(255, 255, 255, 0.8);
            flex-shrink: 0;
        }

        .panel-header h3 {
            font-size: 15px;
            color: #1a1a1a;
        }

        .panel-header button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
            transition: all 0.3s ease;
        }

        .panel-header button:hover {
            transform: rotate(90deg);
        }

        #panelContent {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .result-item {
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-item:hover {
            background: #f8f9fa;
            transform: translateX(-5px);
        }

        .result-item .name {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 13px;
        }

        .result-item .address {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        /* ===== مؤشر الصوت ===== */
        .voice-status {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .voice-status.show {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .voice-status .wave {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .voice-status .wave span {
            display: block;
            width: 4px;
            height: 20px;
            background: white;
            border-radius: 2px;
            animation: wave 0.8s ease infinite;
        }

        .voice-status .wave span:nth-child(2) {
            animation-delay: 0.1s;
            height: 30px;
        }

        .voice-status .wave span:nth-child(3) {
            animation-delay: 0.2s;
            height: 40px;
        }

        .voice-status .wave span:nth-child(4) {
            animation-delay: 0.3s;
            height: 30px;
        }

        .voice-status .wave span:nth-child(5) {
            animation-delay: 0.4s;
            height: 20px;
        }

        @keyframes wave {

            0%,
            100% {
                transform: scaleY(0.5);
            }

            50% {
                transform: scaleY(1);
            }
        }

        .voice-status .cancel-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .voice-status .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        /* ===== رسائل التنبيه ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            z-index: 2000;
            font-size: 12px;
            animation: toastIn 0.4s ease;
            pointer-events: none;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ===== نافذة المشاركة ===== */
        #shareModal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        #shareModal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .share-modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }

        .share-modal-content h3 {
            font-size: 18px;
            color: #1a1a1a;
            margin-bottom: 16px;
            text-align: center;
        }

        .share-modal-content .share-link {
            display: flex;
            gap: 8px;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .share-modal-content .share-link input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 12px;
            color: #333;
            outline: none;
        }

        .share-modal-content .share-link button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .share-modal-content .share-options {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .share-modal-content .share-options button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .share-modal-content .share-options button:hover {
            transform: scale(1.05);
        }

        .share-modal-content .share-options .btn-whatsapp {
            background: #25D366;
            color: white;
        }

        .share-modal-content .share-options .btn-facebook {
            background: #1877F2;
            color: white;
        }

        .share-modal-content .share-options .btn-twitter {
            background: #000000;
            color: white;
        }

        .share-modal-content .share-options .btn-copy {
            background: #1a73e8;
            color: white;
        }

        .share-modal-content .close-modal {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 8px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .search-container {
                top: 8px;
                padding: 4px 12px;
                flex-wrap: wrap;
                border-radius: 25px;
                gap: 4px;
            }

            .search-box input {
                font-size: 12px;
                padding: 6px 0;
            }

            .search-box .search-btn {
                padding: 4px 12px;
                font-size: 12px;
            }

            .voice-btn {
                font-size: 18px;
                padding: 4px 8px;
            }

            .services-bar {
                bottom: 10px;
                padding: 4px 10px;
            }

            .service-btn {
                min-width: 34px;
                padding: 3px 6px;
            }

            .service-btn i {
                font-size: 12px;
            }

            .service-btn span {
                font-size: 6px;
            }

            #panel {
                width: 94%;
                right: -100%;
                top: 65px;
            }

            #panel.open {
                right: 3%;
            }

            .leaflet-control-zoom {
                margin-bottom: 65px !important;
                margin-right: 5px !important;
            }

            .leaflet-control-zoom a {
                width: 32px !important;
                height: 32px !important;
                line-height: 32px !important;
                font-size: 16px !important;
            }

            .voice-status {
                bottom: 80px;
                padding: 10px 18px;
                font-size: 13px;
            }

            .share-modal-content {
                padding: 16px;
            }

            .share-modal-content .share-options {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (prefers-color-scheme: dark) {
            .search-container {
                background: rgba(26, 26, 46, 0.97);
            }

            .search-box input {
                color: #eee;
            }

            .search-box input::placeholder {
                color: #666;
            }

            .voice-btn {
                color: #aaa;
            }

            .voice-btn:hover {
                background: #2a2a3e;
            }

            .services-bar {
                background: rgba(26, 26, 46, 0.97);
            }

            .service-btn {
                color: #ccc;
            }

            .service-btn:hover {
                background: #2a2a3e;
            }

            #panel {
                background: rgba(26, 26, 46, 0.98);
            }

            .panel-header {
                background: rgba(26, 26, 46, 0.9);
                border-color: #2a2a3e;
            }

            .panel-header h3 {
                color: #eee;
            }

            .result-item {
                border-color: #2a2a3e;
            }

            .result-item:hover {
                background: #2a2a3e;
            }

            .result-item .name {
                color: #eee;
            }

            .result-item .address {
                color: #aaa;
            }

            .leaflet-control-zoom a {
                background: rgba(26, 26, 46, 0.95) !important;
                color: #ccc !important;
            }

            .share-modal-content {
                background: #1a1a2e;
            }

            .share-modal-content h3 {
                color: #eee;
            }

            .share-modal-content .share-link {
                background: #2a2a3e;
            }

            .share-modal-content .share-link input {
                color: #eee;
            }
        }
    </style>
</head>

<body>

    <!-- ===== شاشة التحميل ===== -->
    <div id="loading">
        <div class="icon">🗺️</div>
        <h1>خرائط مصر</h1>
        <p>بحث صوتي ومشاركة</p>
        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
    </div>

    <!-- ===== الخريطة ===== -->
    <div id="map"></div>

    <!-- ===== شريط البحث ===== -->
    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search" style="color:#1a73e8;"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن أي شيء... (مستشفى، مطعم، أثر)">
            <button class="voice-btn" id="voiceBtn" title="بحث صوتي - اضغط وتحدث">
                <i class="fas fa-microphone"></i>
                <span class="tooltip">🎤 اضغط للبحث الصوتي</span>
            </button>
            <button class="search-btn" id="searchBtn"><i class="fas fa-arrow-left"></i> بحث</button>
        </div>
        <div class="action-buttons">
            <button id="locateBtn" title="موقعي"><i class="fas fa-location-dot"></i></button>
            <button id="favoritesBtn" title="المفضلة"><i class="fas fa-heart"></i></button>
            <button id="layersBtn" title="طبقات"><i class="fas fa-layer-group"></i></button>
            <button id="shareBtn" title="مشاركة"><i class="fas fa-share-alt"></i></button>
        </div>
    </div>

    <!-- ===== مؤشر الصوت ===== -->
    <div class="voice-status" id="voiceStatus">
        <div class="wave">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        <span class="text" id="voiceStatusText">🎤 استمع...</span>
        <button class="cancel-btn" id="voiceCancelBtn"><i class="fas fa-xmark"></i></button>
    </div>

    <!-- ===== نافذة المشاركة ===== -->
    <div id="shareModal">
        <div class="share-modal-content">
            <h3><i class="fas fa-share-alt" style="color:#2ecc71;"></i> مشاركة الموقع</h3>
            <div class="share-link">
                <input type="text" id="shareLinkInput" readonly>
                <button id="copyLinkBtn"><i class="fas fa-copy"></i> نسخ</button>
            </div>
            <div class="share-options">
                <button class="btn-whatsapp" onclick="shareToWhatsApp()">
                    <i class="fab fa-whatsapp" style="font-size:24px;"></i>
                    واتساب
                </button>
                <button class="btn-facebook" onclick="shareToFacebook()">
                    <i class="fab fa-facebook" style="font-size:24px;"></i>
                    فيسبوك
                </button>
                <button class="btn-twitter" onclick="shareToTwitter()">
                    <i class="fab fa-x-twitter" style="font-size:24px;"></i>
                    X
                </button>
                <button class="btn-copy" onclick="copyShareLink()">
                    <i class="fas fa-link" style="font-size:24px;"></i>
                    نسخ الرابط
                </button>
            </div>
            <button class="close-modal" onclick="closeShareModal()"><i class="fas fa-times"></i> إغلاق</button>
        </div>
    </div>

    <!-- ===== شريط الخدمات ===== -->
    <div class="services-bar" id="servicesBar">
        <button class="service-btn active" data-service="tourist"><i
                class="fas fa-umbrella-beach"></i><span>سياحة</span></button>
        <button class="service-btn" data-service="hospital"><i
                class="fas fa-hospital"></i><span>مستشفيات</span></button>
        <button class="service-btn" data-service="pharmacy"><i
                class="fas fa-prescription-bottle"></i><span>صيدليات</span></button>
        <button class="service-btn" data-service="bank"><i class="fas fa-university"></i><span>بنوك</span></button>
        <button class="service-btn" data-service="restaurant"><i class="fas fa-utensils"></i><span>مطاعم</span></button>
    </div>

    <!-- ===== لوحة النتائج ===== -->
    <div id="panel">
        <div class="panel-header">
            <h3 id="panelTitle"><i class="fas fa-list"></i> النتائج</h3>
            <button id="closePanel"><i class="fas fa-xmark"></i></button>
        </div>
        <div id="panelContent"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            var loading = document.getElementById('loading');

            if (typeof L === 'undefined') {
                var script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
                script.onload = function () {
                    if (typeof L !== 'undefined') {
                        loading.classList.add('hide');
                        setTimeout(function () { loading.style.display = 'none'; }, 800);
                        initApp();
                    }
                };
                script.onerror = function () {
                    loading.innerHTML = `
                        <div style="text-align:center;padding:20px;">
                            <div style="font-size:50px;">⚠️</div>
                            <h2>خطأ في التحميل</h2>
                            <p style="opacity:0.8;margin:10px 0;">تأكد من اتصال الإنترنت</p>
                            <button onclick="location.reload()" style="background:white;color:#1a73e8;border:none;padding:10px 30px;border-radius:30px;font-size:16px;cursor:pointer;margin-top:15px;">إعادة المحاولة</button>
                        </div>
                    `;
                };
                document.head.appendChild(script);
                return;
            }

            setTimeout(function () {
                loading.classList.add('hide');
                setTimeout(function () { loading.style.display = 'none'; }, 800);
            }, 2000);

            initApp();

            function initApp() {

                // ============================================================
                // 1. الخريطة
                // ============================================================
                var map = L.map('map', {
                    center: [26.8206, 30.8025],
                    zoom: 6,
                    zoomControl: true
                });

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap',
                    maxZoom: 19
                }).addTo(map);

                // ============================================================
                // 2. البيانات
                // ============================================================
                var serviceData = {
                    tourist: [
                        { name: 'أهرامات الجيزة', lat: 29.9792, lon: 31.1342, address: 'الجيزة، القاهرة' },
                        { name: 'أبو الهول', lat: 29.9753, lon: 31.1375, address: 'الجيزة، القاهرة' },
                        { name: 'قلعة صلاح الدين', lat: 30.0490, lon: 31.2620, address: 'القاهرة' },
                        { name: 'المتحف المصري', lat: 30.0479, lon: 31.2334, address: 'التحرير، القاهرة' },
                        { name: 'مكتبة الإسكندرية', lat: 31.2080, lon: 29.9090, address: 'الإسكندرية' },
                    ],
                    hospital: [
                        {
                            name: 'مستشفى القاهرة الجامعي', lat: 30.0444, lon: 31.2357,
                            address: 'القصر العيني، القاهرة'
                        },
                        { name: 'مستشفى المعادي', lat: 29.9686, lon: 31.2461, address: 'المعادي، القاهرة' },
                        { name: 'مستشفى 6 أكتوبر', lat: 29.9554, lon: 31.2936, address: 'مدينة 6 أكتوبر' },
                    ],
                    pharmacy: [
                        { name: 'صيدلية العزبي', lat: 30.0484, lon: 31.2387, address: 'التحرير، القاهرة' },
                        { name: 'صيدلية النيل', lat: 29.9726, lon: 31.2491, address: 'المعادي، القاهرة' },
                    ],
                    bank: [
                        { name: 'البنك الأهلي المصري', lat: 30.0464, lon: 31.2367, address: 'القاهرة' },
                        { name: 'بنك مصر', lat: 30.0524, lon: 31.2397, address: 'القاهرة' },
                    ],
                    restaurant: [
                        { name: 'مطعم النيل', lat: 30.0474, lon: 31.2347, address: 'القاهرة' },
                        { name: 'مطعم الأهرام', lat: 29.9666, lon: 31.2471, address: 'المعادي، القاهرة' },
                    ]
                };

                // ============================================================
                // 3. المتغيرات
                // ============================================================
                var currentMarker = null;
                var favorites = JSON.parse(localStorage.getItem('favorites')) || [];
                var panel = document.getElementById('panel');
                var panelContent = document.getElementById('panelContent');
                var panelTitle = document.getElementById('panelTitle');
                var markers = [];

                // ============================================================
                // 4. دوال مساعدة
                // ============================================================
                function showToast(msg) {
                    var old = document.querySelector('.toast');
                    if (old) old.remove();
                    var toast = document.createElement('div');
                    toast.className = 'toast';
                    toast.textContent = msg;
                    document.body.appendChild(toast);
                    setTimeout(function () { toast.remove(); }, 3000);
                }

                function addCustomMarker(lat, lon, name, icon) {
                    var iconSize = 40;
                    var customIcon = L.divIcon({
                        className: 'custom-marker',
                        html: `
                            <div style="
                                background: white;
                                border-radius: 50%;
                                width: ${iconSize}px;
                                height: ${iconSize}px;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                font-size: 20px;
                                border: 3px solid #1a73e8;
                                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                                transition: all 0.3s ease;
                                cursor: pointer;
                            ">
                                ${icon || '📍'}
                            </div>
                        `,
                        iconSize: [iconSize, iconSize],
                        iconAnchor: [iconSize / 2, iconSize],
                        popupAnchor: [0, -iconSize]
                    });

                    var marker = L.marker([lat, lon], {
                        icon: customIcon,
                        riseOnHover: true
                    }).addTo(map);

                    marker.bindPopup(`
                        <div style="text-align:center;padding:8px;min-width:160px;">
                            <div style="font-size:28px;">${icon || '📍'}</div>
                            <div style="font-weight:600;font-size:14px;margin:4px 0;">${name}</div>
                            <button onclick="map.setView([${lat}, ${lon}], 16)" style="
                                background:#1a73e8;
                                color:white;
                                border:none;
                                padding:4px 14px;
                                border-radius:20px;
                                cursor:pointer;
                                font-size:12px;
                                margin-top:4px;
                            ">
                                <i class="fas fa-location-dot"></i> عرض
                            </button>
                        </div>
                    `);

                    markers.push(marker);
                    return marker;
                }

                function clearMarkers() {
                    markers.forEach(function (m) { map.removeLayer(m); });
                    markers = [];
                    if (currentMarker) {
                        map.removeLayer(currentMarker);
                        currentMarker = null;
                    }
                }

                function openPanel(title, html) {
                    panelTitle.innerHTML = title;
                    panelContent.innerHTML = html;
                    panel.classList.add('open');
                }

                function closePanel() {
                    panel.classList.remove('open');
                }

                // ============================================================
                // 5. البحث
                // ============================================================
                function searchOSM(query) {
                    if (!query || query.trim() === '') {
                        showToast('⚠️ ادخل نص للبحث');
                        return;
                    }

                    var localResults = [];
                    for (var key in serviceData) {
                        serviceData[key].forEach(function (item) {
                            if (item.name.toLowerCase().includes(query.toLowerCase()) ||
                                (item.address && item.address.toLowerCase().includes(query.toLowerCase()))) {
                                localResults.push({ ...item, category: key });
                            }
                        });
                    }

                    if (localResults.length > 0) {
                        clearMarkers();
                        var html = '';
                        localResults.forEach(function (item) {
                            var icon = '📍';
                            if (item.category === 'tourist') icon = '🏛️';
                            else if (item.category === 'hospital') icon = '🏥';
                            else if (item.category === 'pharmacy') icon = '💊';
                            else if (item.category === 'bank') icon = '🏦';
                            else if (item.category === 'restaurant') icon = '🍽️';

                            html += `
                                <div class="result-item" onclick="map.setView([${item.lat}, ${item.lon}], 14); addCustomMarker(${item.lat}, ${item.lon}, '${item.name}', '${icon}'); closePanel();">
                                    <div>
                                        <div class="name">${icon} ${item.name}</div>
                                        <div class="address">${item.address || ''}</div>
                                    </div>
                                </div>
                            `;
                            addCustomMarker(item.lat, item.lon, item.name, icon);
                        });

                        if (localResults[0]) {
                            map.setView([localResults[0].lat, localResults[0].lon], 13);
                            var iconFirst = '📍';
                            if (localResults[0].category === 'tourist') iconFirst = '🏛️';
                            else if (localResults[0].category === 'hospital') iconFirst = '🏥';
                            else if (localResults[0].category === 'pharmacy') iconFirst = '💊';
                            else if (localResults[0].category === 'bank') iconFirst = '🏦';
                            else if (localResults[0].category === 'restaurant') iconFirst = '🍽️';
                            addCustomMarker(localResults[0].lat, localResults[0].lon, localResults[0].name, iconFirst);
                        }

                        openPanel('<i class="fas fa-search"></i> نتائج البحث (' + localResults.length + ')', html);
                        showToast('✅ تم العثور على ' + localResults.length + ' نتيجة');
                        return;
                    }

                    showToast('⏳ جاري البحث...');
                    fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(query) +
                        '&format=json&limit=10&accept-language=ar&countrycodes=eg', {
                        headers: { 'User-Agent': 'MyMapApp/1.0' }
                    })
                        .then(function (res) { return res.json(); })
                        .then(function (data) {
                            if (!data || data.length === 0) {
                                openPanel('<i class="fas fa-search"></i> نتائج البحث',
                                    '<div style="padding:30px 20px;text-align:center;color:#999;"><div style="font-size:40px;">🔍</div><div style="font-size:16px;font-weight:600;color:#333;margin-top:8px;">لا توجد نتائج</div></div>'
                                );
                                showToast('❌ لا توجد نتائج');
                                return;
                            }

                            clearMarkers();
                            var html = '';
                            data.forEach(function (item) {
                                var name = item.display_name.split(',')[0];
                                html += `
                                    <div class="result-item" onclick="map.setView([${item.lat}, ${item.lon}], 14); addCustomMarker(${item.lat}, ${item.lon}, '${name}', '📍'); closePanel();">
                                        <div>
                                            <div class="name">📍 ${name}</div>
                                            <div class="address">${item.display_name}</div>
                                        </div>
                                    </div>
                                `;
                                addCustomMarker(parseFloat(item.lat), parseFloat(item.lon), name, '📍');
                            });

                            if (data[0]) {
                                map.setView([data[0].lat, data[0].lon], 13);
                                addCustomMarker(parseFloat(data[0].lat), parseFloat(data[0].lon), data[0].display_name
                                    .split(',')[0], '📍');
                            }

                            openPanel('<i class="fas fa-search"></i> نتائج البحث (' + data.length + ')', html);
                            showToast('✅ تم العثور على ' + data.length + ' نتيجة');
                        })
                        .catch(function () {
                            showToast('❌ حدث خطأ في البحث');
                        });
                }

                // ============================================================
                // 6. البحث الصوتي 🎤 (محسن)
                // ============================================================
                var voiceBtn = document.getElementById('voiceBtn');
                var voiceStatus = document.getElementById('voiceStatus');
                var voiceStatusText = document.getElementById('voiceStatusText');
                var voiceCancelBtn = document.getElementById('voiceCancelBtn');
                var recognition = null;
                var isRecording = false;

                function showVoiceStatus(text) {
                    voiceStatusText.textContent = text;
                    voiceStatus.classList.add('show');
                }

                function hideVoiceStatus() {
                    voiceStatus.classList.remove('show');
                }

                function startVoiceRecognition() {
                    // التحقق من دعم المتصفح
                    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                        showToast('❌ متصفحك لا يدعم البحث الصوتي');
                        showToast('💡 استخدم Chrome أو Edge');
                        return;
                    }

                    // التحقق من إذن الميكروفون
                    if (navigator.permissions) {
                        navigator.permissions.query({ name: 'microphone' })
                            .then(function (result) {
                                if (result.state === 'denied') {
                                    showToast('⚠️ تم رفض إذن الميكروفون');
                                    showToast('💡 امنح الإذن من إعدادات المتصفح');
                                    return;
                                }
                                startListening();
                            })
                            .catch(function () {
                                startListening();
                            });
                    } else {
                        startListening();
                    }
                }

                function startListening() {
                    try {
                        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                        recognition = new SpeechRecognition();
                        recognition.lang = 'ar-EG';
                        recognition.continuous = false;
                        recognition.interimResults = true;

                        voiceBtn.classList.add('recording');
                        isRecording = true;
                        showVoiceStatus('🎤 استمع...');

                        recognition.start();

                        recognition.onstart = function () {
                            showVoiceStatus('🎤 استمع...');
                        };

                        recognition.onresult = function (event) {
                            var transcript = '';
                            var isFinal = false;

                            for (var i = event.resultIndex; i < event.results.length; i++) {
                                if (event.results[i].isFinal) {
                                    transcript = event.results[i][0].transcript;
                                    isFinal = true;
                                } else {
                                    transcript = event.results[i][0].transcript;
                                }
                            }

                            if (isFinal && transcript.trim() !== '') {
                                showVoiceStatus('✅ تم التعرف: "' + transcript + '"');
                                document.getElementById('searchInput').value = transcript;
                                setTimeout(function () {
                                    searchOSM(transcript);
                                    hideVoiceStatus();
                                    voiceBtn.classList.remove('recording');
                                    isRecording = false;
                                }, 500);
                            } else if (transcript.trim() !== '') {
                                showVoiceStatus('🔊 ' + transcript);
                            }
                        };

                        recognition.onerror = function (event) {
                            console.log('❌ خطأ في التعرف:', event.error);

                            var errorMessages = {
                                'not-allowed': '⚠️ لم تسمح باستخدام الميكروفون',
                                'audio-capture': '⚠️ لا يوجد ميكروفون',
                                'no-speech': '🔇 لم يتم سماع صوت',
                                'aborted': '⏹️ تم الإلغاء',
                                'network': '🌐 مشكلة في الاتصال'
                            };

                            var msg = errorMessages[event.error] || '❌ حدث خطأ: ' + event.error;
                            showToast(msg);
                            hideVoiceStatus();
                            voiceBtn.classList.remove('recording');
                            isRecording = false;
                        };

                        recognition.onend = function () {
                            if (isRecording) {
                                showToast('🔇 لم يتم سماع صوت، حاول مرة أخرى');
                                hideVoiceStatus();
                                voiceBtn.classList.remove('recording');
                                isRecording = false;
                            }
                        };

                    } catch (error) {
                        console.error('❌ خطأ:', error);
                        showToast('❌ حدث خطأ في تشغيل الميكروفون');
                        voiceBtn.classList.remove('recording');
                        isRecording = false;
                    }
                }

                function stopVoiceRecognition() {
                    if (recognition && isRecording) {
                        try {
                            recognition.abort();
                        } catch (e) { }
                    }
                    hideVoiceStatus();
                    voiceBtn.classList.remove('recording');
                    isRecording = false;
                    showToast('⏹️ تم إلغاء البحث الصوتي');
                }

                voiceBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    if (isRecording) {
                        stopVoiceRecognition();
                    } else {
                        startVoiceRecognition();
                    }
                });

                voiceCancelBtn.addEventListener('click', function () {
                    stopVoiceRecognition();
                });

                document.addEventListener('click', function (e) {
                    if (voiceStatus.classList.contains('show') &&
                        !voiceStatus.contains(e.target) &&
                        e.target !== voiceBtn &&
                        !voiceBtn.contains(e.target)) {
                        stopVoiceRecognition();
                    }
                });

                // ============================================================
                // 7. المشاركة المحسنة 🔥 (تعمل دائماً)
                // ============================================================
                var shareModal = document.getElementById('shareModal');
                var shareLinkInput = document.getElementById('shareLinkInput');
                var currentShareUrl = '';

                function openShareModal() {
                    var center = map.getCenter();
                    var url = 'https://www.google.com/maps?q=' + center.lat + ',' + center.lng;
                    currentShareUrl = url;
                    shareLinkInput.value = url;
                    shareModal.classList.add('show');
                }

                function closeShareModal() {
                    shareModal.classList.remove('show');
                }

                function copyShareLink() {
                    if (navigator.clipboard) {
                        navigator.clipboard.writeText(currentShareUrl).then(function () {
                            showToast('✅ تم نسخ الرابط');
                        }).catch(function () {
                            fallbackCopy(currentShareUrl);
                        });
                    } else {
                        fallbackCopy(currentShareUrl);
                    }
                }

                function fallbackCopy(text) {
                    shareLinkInput.select();
                    try {
                        document.execCommand('copy');
                        showToast('✅ تم نسخ الرابط');
                    } catch (err) {
                        showToast('⚠️ يمكنك نسخ الرابط يدوياً');
                    }
                }

                function shareToWhatsApp() {
                    var text = '📍 موقعي على الخريطة\n' + currentShareUrl;
                    var url = 'https://wa.me/?text=' + encodeURIComponent(text);
                    window.open(url, '_blank');
                }

                function shareToFacebook() {
                    var url = 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(currentShareUrl);
                    window.open(url, '_blank');
                }

                function shareToTwitter() {
                    var text = '📍 موقعي على الخريطة';
                    var url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(
                        currentShareUrl);
                    window.open(url, '_blank');
                }

                // جعل الدوال عامة
                window.shareToWhatsApp = shareToWhatsApp;
                window.shareToFacebook = shareToFacebook;
                window.shareToTwitter = shareToTwitter;
                window.copyShareLink = copyShareLink;
                window.closeShareModal = closeShareModal;

                document.getElementById('shareBtn').addEventListener('click', openShareModal);

                document.getElementById('copyLinkBtn').addEventListener('click', copyShareLink);

                // إغلاق النافذة بالنقر خارجها
                shareModal.addEventListener('click', function (e) {
                    if (e.target === shareModal) {
                        closeShareModal();
                    }
                });

                // ============================================================
                // 8. المفضلة
                // ============================================================
                window.addFav = function (name, lat, lon) {
                    var displayName = decodeURIComponent(name);
                    var exists = favorites.find(function (f) { return f.lat === lat && f.lon === lon; });
                    if (exists) {
                        showToast('📍 موجود بالفعل');
                        return;
                    }
                    favorites.push({ displayName, lat, lon });
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                    showToast('❤️ تم الحفظ');
                    renderFavorites();
                };

                function removeFav(index) {
                    favorites.splice(index, 1);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                    showToast('🗑️ تم الحذف');
                    renderFavorites();
                }

                function renderFavorites() {
                    if (favorites.length === 0) {
                        openPanel('<i class="fas fa-heart" style="color:#e74c3c;"></i> المفضلة',
                            '<div style="padding:30px 20px;text-align:center;color:#999;"><div style="font-size:40px;">❤️</div><div style="font-size:16px;font-weight:600;color:#333;margin-top:8px;">لا توجد مفضلة</div></div>'
                        );
                        return;
                    }
                    var html = '';
                    favorites.forEach(function (item, index) {
                        html += `
                            <div class="result-item" onclick="map.setView([${item.lat}, ${item.lon}], 15); addCustomMarker(${item.lat}, ${item.lon}, '${item.displayName}', '📍'); closePanel();">
                                <div>
                                    <div class="name">📍 ${item.displayName}</div>
                                    <div class="address">${item.lat.toFixed(4)}, ${item.lon.toFixed(4)}</div>
                                </div>
                                <button onclick="event.stopPropagation(); removeFav(${index})" style="background:none;border:none;font-size:16px;cursor:pointer;color:#e74c3c;">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        `;
                    });
                    openPanel('<i class="fas fa-heart" style="color:#e74c3c;"></i> المفضلة (' + favorites.length + ')', html);
                }

                document.getElementById('favoritesBtn').addEventListener('click', function () {
                    renderFavorites();
                });

                // ============================================================
                // 9. تحديد الموقع
                // ============================================================
                document.getElementById('locateBtn').addEventListener('click', function () {
                    if (!navigator.geolocation) {
                        showToast('⚠️ الموقع غير مدعوم');
                        return;
                    }
                    showToast('⏳ جاري التحديد...');
                    navigator.geolocation.getCurrentPosition(
                        function (pos) {
                            map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                            addCustomMarker(pos.coords.latitude, pos.coords.longitude, '📍 موقعك', '📍');
                            showToast('✅ تم التحديد');
                        },
                        function () {
                            showToast('⚠️ لم نتمكن من التحديد');
                        }
                    );
                });

                // ============================================================
                // 10. طبقات الخريطة
                // ============================================================
                var currentLayer = null;
                var layers = {
                    osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap',
                        maxZoom: 19
                    }),
                    dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
                        attribution: '© CartoDB',
                        maxZoom: 19
                    }),
                    satellite: L.tileLayer(
                        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        attribution: '© Esri',
                        maxZoom: 19
                    })
                };

                currentLayer = layers.osm;
                currentLayer.addTo(map);

                document.getElementById('layersBtn').addEventListener('click', function () {
                    var choice = prompt('اختر الطبقة:\n1- العادي 🏙️\n2- الداكن 🌙\n3- الفضائي 🛰️', '1');
                    map.removeLayer(currentLayer);
                    if (choice === '1' || choice === '') { currentLayer = layers.osm; } else if (choice === '2') {
                        currentLayer = layers.dark;
                    } else if (choice === '3') { currentLayer = layers.satellite; } else {
                        currentLayer = layers.osm;
                    }
                    currentLayer.addTo(map);
                    showToast('✅ تم تبديل الطبقة');
                });

                // ============================================================
                // 11. أزرار الخدمات
                // ============================================================
                document.querySelectorAll('.service-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        document.querySelectorAll('.service-btn').forEach(function (b) {
                            b.classList.remove(
                                'active');
                        });
                        this.classList.add('active');
                        var service = this.getAttribute('data-service');
                        var searchTerms = {
                            'tourist': 'معالم سياحية',
                            'hospital': 'مستشفى',
                            'pharmacy': 'صيدلية',
                            'bank': 'بنك',
                            'restaurant': 'مطعم'
                        };
                        var query = searchTerms[service] || service;
                        document.getElementById('searchInput').value = query;
                        searchOSM(query);
                    });
                });

                // ============================================================
                // 12. البحث
                // ============================================================
                document.getElementById('searchBtn').addEventListener('click', function () {
                    searchOSM(document.getElementById('searchInput').value);
                });

                document.getElementById('searchInput').addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') searchOSM(document.getElementById('searchInput').value);
                });

                document.getElementById('closePanel').addEventListener('click', function () {
                    closePanel();
                });

                // ============================================================
                // 13. تحميل افتراضي
                // ============================================================
                setTimeout(function () {
                    searchOSM('القاهرة');
                }, 1000);

                // ============================================================
                // 14. جعل الدوال عامة
                // ============================================================
                window.map = map;
                window.addCustomMarker = addCustomMarker;
                window.closePanel = closePanel;
                window.addFav = addFav;
                window.searchOSM = searchOSM;
                window.openShareModal = openShareModal;
                window.closeShareModal = closeShareModal;
                window.shareToWhatsApp = shareToWhatsApp;
                window.shareToFacebook = shareToFacebook;
                window.shareToTwitter = shareToTwitter;
                window.copyShareLink = copyShareLink;

                console.log('🗺️ خرائط مصر - البحث الصوتي والمشاركات');
                console.log('✅ التطبيق جاهز!');
                console.log('🎤 اضغط على زر الميكروفون للبحث الصوتي');
                console.log('📤 اضغط على زر المشاركة لمشاركة الموقع');

                // تحذير إذا كان المتصفح لا يدعم البحث الصوتي
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    console.warn('⚠️ البحث الصوتي غير مدعوم في هذا المتصفح');
                    showToast('💡 استخدم Chrome للبحث الصوتي');
                }

            } // نهاية initApp

        }); // نهاية DOMContentLoaded
    </script>

</body>

</html>
