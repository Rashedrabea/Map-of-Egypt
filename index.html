<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>أورا ماب – الخريطة الكاملة</title>

    <!-- ===== Leaflet ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.min.js">
    </script>

    <!-- ===== Font Awesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0e14;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* ===== الخريطة ===== */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #1a1f2e;
        }

        /* ===== شريط البحث ===== */
        #search-container {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(94%, 600px);
            display: flex;
            align-items: center;
            background: rgba(12, 16, 24, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px;
            padding: 4px 4px 4px 16px;
            box-shadow: 0 8px 30px -8px rgba(0, 0, 0, 0.8);
        }

        #search-container i {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.9rem;
        }

        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4fc;
            font-size: 0.9rem;
            padding: 10px 12px;
            min-height: 44px;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #search-btn {
            background: rgba(60, 140, 255, 0.12);
            border: none;
            color: #8abaff;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            min-height: 38px;
            border: 1px solid rgba(60, 140, 255, 0.06);
        }

        /* ===== زر البحث الصوتي ===== */
        #voice-btn {
            background: rgba(255, 180, 60, 0.1);
            border: none;
            color: #ffb84d;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            min-height: 38px;
            border: 1px solid rgba(255, 180, 60, 0.06);
            margin-left: 4px;
        }

        #voice-btn.listening {
            background: rgba(255, 50, 50, 0.15);
            border-color: rgba(255, 50, 50, 0.2);
            animation: pulse-voice 1s ease-in-out infinite;
        }

        @keyframes pulse-voice {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* ===== نتائج البحث ===== */
        #search-results {
            position: absolute;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(94%, 600px);
            max-height: 260px;
            overflow-y: auto;
            background: rgba(10, 14, 24, 0.95);
            backdrop-filter: blur(24px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px;
            display: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        #search-results.show {
            display: block;
        }

        .result-item {
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d0daf0;
            font-size: 0.85rem;
        }

        .result-item:active {
            background: rgba(255, 255, 255, 0.06);
        }

        .result-item i {
            color: #7bb0ff;
            width: 18px;
        }

        .result-item .name {
            font-weight: 500;
        }

        .result-item .address {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* ===== أزرار التحكم ===== */
        #controls {
            position: absolute;
            top: 76px;
            right: 10px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(12, 16, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #eef4ff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            position: relative;
            transition: 0.2s;
            user-select: none;
        }

        .ctrl-btn:active {
            transform: scale(0.92);
        }

        .ctrl-btn .badge {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 12px;
            height: 12px;
            background: #3dff9e;
            border-radius: 50%;
            border: 2px solid rgba(12, 16, 24, 0.8);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }
        }

        /* ===== اللوحة السفلية ===== */
        #bottom-bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: min(96%, 750px);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: rgba(10, 14, 24, 0.92);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.9);
            flex-wrap: nowrap;
            gap: 2px;
            min-height: 56px;
        }

        .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            color: #8899bb;
            font-size: 0.55rem;
            font-weight: 500;
            border: 2px solid transparent;
            transition: 0.3s ease;
            user-select: none;
            min-width: 44px;
            min-height: 44px;
            justify-content: center;
        }

        .bottom-item i {
            font-size: 1.1rem;
            color: #7bb0ff;
            transition: 0.3s;
        }

        .bottom-item:active {
            transform: scale(0.92);
        }

        .bottom-item.active {
            background: rgba(60, 130, 255, 0.12);
            border-color: #4a9eff;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(60, 130, 255, 0.12);
        }

        .bottom-item.active i {
            color: #4a9eff;
        }

        .bottom-item.active span {
            color: #4a9eff;
        }

        .bottom-item span {
            font-size: 0.5rem;
            color: #667799;
            transition: 0.3s;
        }

        /* زر الملاحة - لون مميز */
        .bottom-item#mode-navigation.active {
            background: rgba(255, 50, 50, 0.15);
            border-color: #ff3333;
            box-shadow: 0 0 30px rgba(255, 50, 50, 0.15);
        }

        .bottom-item#mode-navigation.active i {
            color: #ff3333;
        }

        .bottom-item#mode-navigation.active span {
            color: #ff3333;
        }

        /* ===== مؤشرات ===== */
        .user-marker {
            width: 22px;
            height: 22px;
            background: #3dff9e;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(61, 255, 158, 0.5);
            border: 3px solid rgba(255, 255, 255, 0.15);
            animation: pulse-gps 1.5s ease-in-out infinite;
            position: relative;
        }

        .user-marker::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 7px;
            height: 7px;
            background: #3dff9e;
            border-radius: 50%;
        }

        @keyframes pulse-gps {
            0% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(61, 255, 158, 0.5), 0 0 80px rgba(61, 255, 158, 0.1);
            }
            100% {
                box-shadow: 0 0 20px rgba(61, 255, 158, 0.3);
            }
        }

        .search-marker {
            width: 30px;
            height: 30px;
            background: #ff6b6b;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.4);
            border: 3px solid #fff;
            position: relative;
        }

        .search-marker::after {
            content: '';
            position: absolute;
            top: 9px;
            left: 9px;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            transform: rotate(45deg);
        }

        /* ===== 3D Buildings ===== */
        .building-3d {
            position: absolute;
            background: rgba(140, 155, 175, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 2px;
            pointer-events: none;
            z-index: 1;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .building-3d .top {
            position: absolute;
            top: -3px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            background: rgba(200, 215, 235, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        /* ===== لوحة المعلومات ===== */
        #info-panel {
            position: absolute;
            bottom: 85px;
            right: 12px;
            z-index: 50;
            background: rgba(10, 14, 24, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 10px 14px;
            min-width: 100px;
            display: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        #info-panel.show {
            display: block;
        }

        #info-panel .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 0.65rem;
            color: #b0c8e8;
        }

        #info-panel .info-row i {
            color: #7bb0ff;
            width: 14px;
            font-size: 0.65rem;
        }

        /* ===== نافذة المفضلة ===== */
        #fav-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
        }

        #fav-modal.open {
            display: flex;
        }

        .fav-panel {
            background: rgba(14, 20, 32, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 28px 32px;
            width: min(90%, 400px);
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
        }

        .fav-panel h2 {
            color: #e8f0ff;
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .fav-panel h2 i {
            color: #ff6b6b;
        }

        .fav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: #d0daf0;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .fav-item .fav-del {
            color: #ff6b6b;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(255, 107, 107, 0.05);
            border: none;
            font-size: 0.7rem;
        }

        .fav-empty {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }

        .close-fav {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            background: rgba(60, 140, 255, 0.1);
            color: #b0d0ff;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid rgba(60, 140, 255, 0.05);
        }

        /* ===== AR Overlay ===== */
        #ar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 500;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
        }

        #ar-overlay.open {
            display: flex;
        }

        #ar-overlay .ar-content {
            text-align: center;
            padding: 30px 20px;
            max-width: 90%;
        }

        #ar-overlay .ar-content i {
            font-size: 4rem;
            color: #ffb84d;
            margin-bottom: 16px;
            animation: ar-pulse 2s ease-in-out infinite;
        }

        @keyframes ar-pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.08);
                opacity: 0.8;
            }
        }

        #ar-overlay .ar-content .compass-display {
            font-size: 2.8rem;
            margin: 16px 0;
            color: #ffb84d;
        }

        #ar-overlay .ar-content .ar-info {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            margin: 6px 0;
        }

        .ar-close {
            margin-top: 24px;
            padding: 12px 36px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== شريط الملاحة ===== */
        #nav-bar {
            position: absolute;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99;
            width: min(94%, 600px);
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(10, 14, 24, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px;
            padding: 6px 12px 6px 16px;
            box-shadow: 0 8px 30px -8px rgba(0, 0, 0, 0.8);
        }

        #nav-bar.show {
            display: flex;
        }

        #nav-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4fc;
            font-size: 0.85rem;
            padding: 8px 10px;
            min-height: 36px;
        }

        #nav-bar input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #nav-btn {
            background: rgba(255, 50, 50, 0.12);
            border: none;
            color: #ff4444;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            min-height: 34px;
            border: 1px solid rgba(255, 50, 50, 0.06);
        }

        #nav-close {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* ===== Leaflet ===== */
        .leaflet-control-attribution {
            display: none !important;
        }
        .leaflet-control-zoom {
            display: none !important;
        }
        .leaflet-tile-pane {
            filter: saturate(1.05) contrast(1.02);
        }

        /* ===== استجابة ===== */
        @media (max-width: 480px) {
            #bottom-bar {
                bottom: 12px;
                padding: 6px 6px;
                border-radius: 40px;
                min-height: 48px;
                gap: 1px;
            }

            .bottom-item {
                padding: 3px 6px;
                min-width: 36px;
                min-height: 38px;
            }

            .bottom-item i {
                font-size: 0.9rem;
            }

            .bottom-item span {
                font-size: 0.4rem;
            }

            #controls {
                top: 68px;
                right: 8px;
                gap: 6px;
            }

            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            #search-container {
                top: 8px;
                padding: 2px 2px 2px 12px;
                border-radius: 40px;
            }

            #search-input {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-height: 34px;
            }

            #search-btn {
                padding: 4px 12px;
                font-size: 0.65rem;
                min-height: 30px;
            }

            #voice-btn {
                padding: 4px 10px;
                font-size: 0.8rem;
                min-height: 30px;
            }

            #search-results {
                top: 62px;
            }

            #info-panel {
                bottom: 75px;
                right: 8px;
                padding: 6px 10px;
                min-width: 70px;
            }

            #info-panel .info-row {
                font-size: 0.5rem;
            }

            #nav-bar {
                top: 64px;
                padding: 4px 8px 4px 12px;
            }

            #nav-bar input {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-height: 30px;
            }

            #nav-bt
