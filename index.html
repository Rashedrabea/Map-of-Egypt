<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>خرائط مصر الشاملة - جميع الخدمات</title>

    <!-- ===== المكتبات ===== -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            overflow: hidden;
            height: 100vh;
            background: #f0f2f5;
        }

        #map {
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ===== شريط البحث ===== */
        .search-container {
            position: fixed;
            top: 15px;
            right: 50%;
            transform: translateX(50%);
            z-index: 1000;
            width: 90%;
            max-width: 700px;
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(15px);
            padding: 10px 18px;
            border-radius: 50px;
            box-shadow: 0 8px 35px rgba(0, 0, 0, 0.2);
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .search-container i {
            color: #2c3e50;
            font-size: 1.1rem;
        }

        .search-container input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            padding: 8px 5px;
            background: transparent;
            color: #2c3e50;
            direction: rtl;
        }

        .search-container input::placeholder {
            color: #95a5a6;
        }

        .search-container button {
            background: #2980b9;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .search-container button:hover {
            background: #1a5276;
            transform: scale(1.05);
        }

        /* ===== لوحة التحكم ===== */
        .control-panel {
            position: fixed;
            bottom: 25px;
            right: 50%;
            transform: translateX(50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            padding: 10px 18px;
            border-radius: 50px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.15);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95%;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .control-panel button {
            background: rgba(41, 128, 185, 0.08);
            border: none;
            color: #2c3e50;
            font-size: 0.9rem;
            padding: 7px 13px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .control-panel button:hover {
            background: #2980b9;
            color: white;
            transform: translateY(-2px);
        }

        .control-panel button.active {
            background: #2980b9;
            color: white;
        }

        .control-panel button.navigate-active {
            background: #e74c3c;
            color: white;
            animation: pulse-nav 1.5s infinite;
        }

        @keyframes pulse-nav {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 20px rgba(231, 76, 60, 0.4);
            }
        }

        /* ===== معلومات المسافة ===== */
        .distance-info {
            position: fixed;
            bottom: 100px;
            right: 50%;
            transform: translateX(50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 1rem;
            text-align: center;
            direction: rtl;
            border: 2px solid #2980b9;
            display: none;
            min-width: 200px;
        }

        .distance-info.visible {
            display: block;
        }

        .distance-info .dist-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2ecc71;
        }

        .distance-info .dist-label {
            color: #bdc3c7;
            font-size: 0.8rem;
        }

        /* ===== نافذة الخدمات ===== */
        .service-popup {
            max-width: 350px;
            padding: 10px;
            text-align: right;
            direction: rtl;
        }

        .service-popup h3 {
            color: #2980b9;
            margin-bottom: 8px;
            font-size: 1.1rem;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 5px;
        }

        .service-popup .info-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        .service-popup .info-row .label {
            color: #7f8c8d;
            font-weight: bold;
        }

        .service-popup .info-row .value {
            color: #2c3e50;
        }

        .service-popup .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            color: white;
            margin-top: 5px;
        }

        .service-popup .badge.hospital {
            background: #e74c3c;
        }

        .service-popup .badge.school {
            background: #3498db;
        }

        .service-popup .badge.mosque {
            background: #2ecc71;
        }

        .service-popup .badge.pharmacy {
            background: #f39c12;
        }

        .service-popup .badge.bank {
            background: #9b59b6;
        }

        /* ===== التجاوب ===== */
        @media (max-width: 640px) {
            .search-container {
                top: 8px;
                padding: 6px 12px;
                border-radius: 30px;
                max-width: 95%;
            }

            .search-container input {
                font-size: 0.85rem;
            }

            .search-container button {
                width: 34px;
                height: 34px;
            }

            .control-panel {
                bottom: 12px;
                padding: 6px 10px;
                gap: 4px;
                border-radius: 25px;
            }

            .control-panel button {
                font-size: 0.75rem;
                padding: 5px 8px;
            }

            .control-panel button span {
                display: none;
            }

            .distance-info {
                bottom: 75px;
                padding: 8px 16px;
                font-size: 0.8rem;
                min-width: 150px;
            }

            .distance-info .dist-number {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>

    <!-- ===== شريط البحث ===== -->
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="ابحث عن أي مكان في مصر..." autocomplete="off" />
        <button id="searchBtn" title="بحث"><i class="fas fa-arrow-left"></i></button>
    </div>

    <!-- ===== الخريطة ===== -->
    <div id="map"></div>

    <!-- ===== معلومات المسافة ===== -->
    <div id="distanceInfo" class="distance-info">
        <div>
            <span style="font-size:1.5rem;" id="directionIcon">🧭</span>
            <span class="dist-number" id="distNumber">0</span>
            <span class="dist-label">كم</span>
        </div>
        <div style="font-size:0.8rem;color:#bdc3c7;" id="distStatus">⏳ انتظر التحديث...</div>
    </div>

    <!-- ===== لوحة التحكم ===== -->
    <div class="control-panel">
        <button id="homeBtn"><i class="fas fa-home"></i> <span>الرئيسية</span></button>
        <button id="locateBtn"><i class="fas fa-location-dot"></i> <span>موقعي</span></button>
        <button id="navigateBtn"><i class="fas fa-compass"></i> <span>ملاحة</span></button>
        <button id="stopNavBtn" style="display:none;"><i class="fas fa-stop"></i> <span>إيقاف</span></button>
        <button id="trafficBtn"><i class="fas fa-car"></i> <span>مرور</span></button>
        <button id="servicesBtn"><i class="fas fa-hospital"></i> <span>خدمات</span></button>
        <button id="aiBtn"><i class="fas fa-robot"></i> <span>AI</span></button>
        <button id="layersBtn"><i class="fas fa-layer-group"></i> <span>طبقات</span></button>
        <button id="fullscreenBtn"><i class="fas fa-expand"></i> <span>كامل</span></button>
    </div>

    <!-- ===== المكتبات ===== -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>

    <!-- ================================================================ -->
    <!-- ===== الكود الرئيسي ===== -->
    <!-- ================================================================ -->
    <script>
        // ========================================================================
        // 1. تهيئة الخريطة
        // ========================================================================
        const map = L.map('map', {
            center: [30.0444, 31.2357],
            zoom: 13,
            zoomControl: true,
            preferCanvas: true
        });

        const baseLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const satelliteLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '© Google'
        });

        // ========================================================================
        // 2. عناصر واجهة المستخدم
        // ========================================================================
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const locateBtn = document.getElementById('locateBtn');
        const navigateBtn = document.getElementById('navigateBtn');
        const stopNavBtn = document.getElementById('stopNavBtn');
        const homeBtn = document.getElementById('homeBtn');
        const layersBtn = document.getElementById('layersBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const trafficBtn = document.getElementById('trafficBtn');
        const servicesBtn = document.getElementById('servicesBtn');
        const aiBtn = document.getElementById('aiBtn');
        const distanceInfo = document.getElementById('distanceInfo');
        const distNumber = document.getElementById('distNumber');
        const distStatus = document.getElementById('distStatus');
        const directionIcon = document.getElementById('directionIcon');

        // ========================================================================
        // 3. 🔍 البحث الدقيق
        // ========================================================================
        function searchLocation(query) {
            if (!query.trim()) return;

            const geocoder = L.Control.Geocoder.nominatim({
                geocodingQueryParams: {
                    countrycodes: 'eg',
                    limit: 5,
                    'accept-language': 'ar'
                }
            });

            geocoder.geocode(query, function (results) {
                if (results && results.length > 0) {
                    // اختيار النتيجة الأقرب لمصر
                    let bestResult = results[0];

                    // محاولة العثور على نتيجة في الجيزة أو القاهرة
                    for (let r of results) {
                        if (r.name.includes('الجيزة') || r.name.includes('القاهرة') || r.name.includes('مصر')) {
                            bestResult = r;
                            break;
                        }
                    }

                    const r = bestResult;
                    destination = r.center;

                    if (destMarker) map.removeLayer(destMarker);

                    destMarker = L.marker(destination, {
                        icon: L.divIcon({
                            className: 'dest-marker',
                            html: `<div style="background:#e74c3c;color:white;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:3px solid white;box-shadow:0 0 30px rgba(231,76,60,0.5);">🏁</div>`,
                            iconSize: [32, 32],
                            iconAnchor: [16, 16]
                        })
                    }).addTo(map).bindPopup(`<b>📍 ${r.name}</b><br><small>${r.html || ''}</small>`).openPopup();

                    map.setView(destination, 14);

                    if (userPosition) {
                        drawRoute(userPosition, destination);
                    }

                    console.log(`✅ تم العثور على: ${r.name}`);
                } else {
                    alert('❌ لم يتم العثور على الموقع. حاول بكلمات أكثر تحديداً.');
                }
            });
        }

        // ========================================================================
        // 4. 🧭 المؤشر المتحرك
        // ========================================================================
        let userMarker = null;
        let userCircle = null;
        let userPosition = null;
        let watchId = null;
        let isTracking = false;
        let destination = null;
        let destMarker = null;
        let routeLine = null;
        let routeArrow = null;
        let isNavigating = false;
        let navInterval = null;

        // إنشاء أيقونة المستخدم
        function createUserIcon() {
            return L.divIcon({
                className: 'user-marker',
                html: `
                    <div style="position:relative;width:44px;height:44px;">
                        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
                             width:22px;height:22px;background:#2980b9;border-radius:50%;
                             border:3px solid white;box-shadow:0 0 25px rgba(41,128,185,0.7);
                             z-index:2;">
                        </div>
                        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
                             width:44px;height:44px;border-radius:50%;
                             border:2px solid rgba(41,128,185,0.3);
                             animation: pulse-ring 2s infinite;
                             z-index:1;">
                        </div>
                        <div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);
                             width:0;height:0;
                             border-left:8px solid transparent;
                             border-right:8px solid transparent;
                             border-bottom:12px solid #2980b9;
                             opacity:0.9;
                             z-index:3;">
                        </div>
                    </div>
                    <style>
                        @keyframes pulse-ring {
                            0% { transform: translate(-50%,-50%) scale(0.8); opacity: 1; }
                            100% { transform: translate(-50%,-50%) scale(1.8); opacity: 0; }
                        }
                    </style>
                `,
                iconSize: [44, 44],
                iconAnchor: [22, 22]
            });
        }

        // تحديث موقع المستخدم
        function updateUserPosition(lat, lng) {
            userPosition = { lat, lng };

            if (!userMarker) {
                userMarker = L.marker([lat, lng], {
                    icon: createUserIcon(),
                    zIndexOffset: 1000
                }).addTo(map);

                userCircle = L.circle([lat, lng], {
                    radius: 25,
                    color: '#2980b9',
                    fillColor: '#2980b9',
                    fillOpacity: 0.1,
                    weight: 1
                }).addTo(map);
            } else {
                userMarker.setLatLng([lat, lng]);
                userCircle.setLatLng([lat, lng]);
            }

            if (isNavigating && destination) {
                updateNavigation();
            }

            if (isNavigating) {
                map.panTo([lat, lng]);
            }
        }

        // بدء تتبع الموقع
        function startTracking() {
            if (!navigator.geolocation) {
                alert('متصفحك لا يدعم تحديد الموقع.');
                return;
            }

            isTracking = true;
            locateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>جاري...</span>';
            locateBtn.disabled = true;

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    updateUserPosition(latitude, longitude);
                    map.setView([latitude, longitude], 16);

                    locateBtn.innerHTML = '<i class="fas fa-location-dot"></i> <span>موقعي</span>';
                    locateBtn.disabled = false;

                    if (watchId) navigator.geolocation.clearWatch(watchId);
                    watchId = navigator.geolocation.watchPosition(
                        (newPos) => {
                            const { latitude, longitude } = newPos.coords;
                            updateUserPosition(latitude, longitude);
                        },
                        (err) => console.warn('⚠️ تتبع الموقع:', err),
                        { enableHighAccuracy: true, maximumAge: 5000, timeout: 30000 }
                    );
                },
                (err) => {
                    alert('❌ تعذر تحديد الموقع: ' + err.message);
                    locateBtn.innerHTML = '<i class="fas fa-location-dot"></i> <span>موقعي</span>';
                    locateBtn.disabled = false;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // ========================================================================
        // 5. 🗺️ رسم المسار
        // ========================================================================
        function drawRoute(from, to) {
            if (routeLine) map.removeLayer(routeLine);
            if (routeArrow) map.removeLayer(routeArrow);

            routeLine = L.polyline([from, to], {
                color: '#2980b9',
                weight: 4,
                opacity: 0.7,
                dashArray: '15, 10'
            }).addTo(map);

            const midLat = (from.lat + to.lat) / 2;
            const midLng = (from.lng + to.lng) / 2;
            const angle = Math.atan2(to.lat - from.lat, to.lng - from.lng) * 180 / Math.PI;

            routeArrow = L.marker([midLat, midLng], {
                icon: L.divIcon({
                    className: 'arrow-marker',
                    html: `<div style="transform:rotate(${angle}deg);font-size:2rem;color:#2980b9;text-shadow:0 0 15px rgba(41,128,185,0.4);">➤</div>`,
                    iconSize: [30, 30],
                    iconAnchor: [15, 15]
                })
            }).addTo(map);
        }

        // ========================================================================
        // 6. 🧭 الملاحة
        // ========================================================================
        function startNavigation() {
            if (!userPosition) {
                alert('⚠️ يرجى تحديد موقعك أولاً (اضغط على "موقعي").');
                return;
            }

            if (!destination) {
                alert('⚠️ يرجى تحديد وجهة أولاً (ابحث عن مكان).');
                return;
            }

            isNavigating = true;
            navigateBtn.classList.add('navigate-active');
            navigateBtn.innerHTML = '<i class="fas fa-compass fa-spin"></i> <span>ملاحة...</span>';
            stopNavBtn.style.display = 'flex';

            distanceInfo.classList.add('visible');

            updateNavigation();

            if (navInterval) clearInterval(navInterval);
            navInterval = setInterval(updateNavigation, 2000);

            if (!isTracking) {
                startTracking();
            }
        }

        function stopNavigation() {
            isNavigating = false;
            navigateBtn.classList.remove('navigate-active');
            navigateBtn.innerHTML = '<i class="fas fa-compass"></i> <span>ملاحة</span>';
            stopNavBtn.style.display = 'none';

            distanceInfo.classList.remove('visible');

            if (navInterval) {
                clearInterval(navInterval);
                navInterval = null;
            }

            if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
            if (routeArrow) { map.removeLayer(routeArrow); routeArrow = null; }
        }

        function updateNavigation() {
            if (!userPosition || !destination) return;

            const from = L.latLng(userPosition.lat, userPosition.lng);
            const to = L.latLng(destination.lat, destination.lng);

            const distance = from.distanceTo(to);
            const distanceKm = distance / 1000;

            const angle = Math.atan2(to.lat - from.lat, to.lng - from.lng) * 180 / Math.PI;
            let direction = '';

            if (angle > -22.5 && angle <= 22.5) direction = '⬆️ شمال';
            else if (angle > 22.5 && angle <= 67.5) direction = '↗️ شمال شرق';
            else if (angle > 67.5 && angle <= 112.5) direction = '➡️ شرق';
            else if (angle > 112.5 && angle <= 157.5) direction = '↘️ جنوب شرق';
            else if (angle > 157.5 || angle <= -157.5) direction = '⬇️ جنوب';
            else if (angle > -157.5 && angle <= -112.5) direction = '↙️ جنوب غرب';
            else if (angle > -112.5 && angle <= -67.5) direction = '⬅️ غرب';
            else if (angle > -67.5 && angle <= -22.5) direction = '↖️ شمال غرب';

            distNumber.textContent = distanceKm.toFixed(2);
            directionIcon.textContent = direction.split(' ')[0] || '🧭';

            if (distanceKm < 0.05) {
                distStatus.textContent = '🎉 لقد وصلت إلى وجهتك!';
                distStatus.style.color = '#2ecc71';
                stopNavigation();
            } else {
                distStatus.textContent = `${direction} - ${distanceKm.toFixed(2)} كم`;
                distStatus.style.color = '#bdc3c7';
            }

            drawRoute(userPosition, destination);
        }

        // ========================================================================
        // 7. 🚦 حركة المرور
        // ========================================================================
        let trafficActive = false;
        let trafficLayer = L.layerGroup().addTo(map);
        let trafficInterval = null;

        function generateTraffic() {
            const center = map.getCenter();
            const zoom = map.getZoom();
            const count = 20 + Math.floor(zoom * 2);
            const points = [];

            for (let i = 0; i < count; i++) {
                const angle = Math.random() * 2 * Math.PI;
                const distance = Math.random() * (0.3 + zoom / 15);
                const lat = center.lat + (distance * Math.cos(angle)) / 111;
                const lng = center.lng + (distance * Math.sin(angle)) / (111 * Math.cos(center.lat * Math.PI / 180));

                const inNile = (lat > 30.01 && lat < 30.09 && lng > 31.19 && lng < 31.29);
                if (inNile) continue;

                const rand = Math.random();
                let color, status;
                if (rand < 0.35) { color = '#2ecc71'; status = 'سلس'; }
                else if (rand < 0.60) { color = '#f1c40f'; status = 'متوسط'; }
                else if (rand < 0.85) { color = '#e67e22'; status = 'مزدحم'; }
                else { color = '#e74c3c'; status = 'ازدحام'; }

                points.push({ lat, lng, color, status });
            }
            return points;
        }

        function updateTraffic() {
            if (!trafficActive) return;
            trafficLayer.clearLayers();

            const points = generateTraffic();
            points.forEach(p => {
                const circle = L.circleMarker([p.lat, p.lng], {
                    radius: 4 + Math.random() * 3,
                    fillColor: p.color,
                    color: p.color,
                    weight: 2,
                    opacity: 0.8,
                    fillOpacity: 0.5
                });
                circle.bindPopup(`<b>🚦 حركة المرور</b><br>الحالة: ${p.status}`);
                trafficLayer.addLayer(circle);
            });
        }

        trafficBtn.addEventListener('click', function () {
            trafficActive = !trafficActive;
            if (trafficActive) {
                this.classList.add('active');
                this.innerHTML = '<i class="fas fa-car"></i> <span>إيقاف</span>';
                updateTraffic();
                trafficInterval = setInterval(updateTraffic, 60000);
                map.on('moveend', () => {
                    if (trafficActive) {
                        clearTimeout(map._trafficTimeout);
                        map._trafficTimeout = setTimeout(updateTraffic, 1000);
                    }
                });
            } else {
                this.classList.remove('active');
                this.innerHTML = '<i class="fas fa-car"></i> <span>مرور</span>';
                clearInterval(trafficInterval);
                trafficLayer.clearLayers();
                map.off('moveend');
            }
        });

        // ========================================================================
        // 8. 🏥 الخدمات
        // ========================================================================
        let servicesActive = false;
        let servicesLayer = L.layerGroup().addTo(map);

        const dummyServices = [
            { name: 'مستشفى القصر العيني', lat: 30.0280, lng: 31.2195, type: 'hospital', address: 'شارع القصر العيني' },
            { name: 'مدرسة النيل الثانوية', lat: 30.0450, lng: 31.2450, type: 'school', address: 'شارع النيل' },
            { name: 'مسجد الأزهر', lat: 30.0471, lng: 31.2335, type: 'mosque', address: 'حي الأزهر' },
            { name: 'صيدلية النيل', lat: 30.0500, lng: 31.2400, type: 'pharmacy', address: 'شارع النيل' },
            { name: 'بنك مصر', lat: 30.0420, lng: 31.2300, type: 'bank', address: 'وسط البلد' },
            { name: 'مستشفى 57357', lat: 30.0350, lng: 31.2250, type: 'hospital', address: 'مدينة نصر' },
            { name: 'جامعة القاهرة', lat: 30.0268, lng: 31.2100, type: 'school', address: 'الجيزة' },
            { name: 'مسجد الحسين', lat: 30.0520, lng: 31.2600, type: 'mosque', address: 'الحسين' }
        ];

        function showServices() {
            servicesLayer.clearLayers();

            const iconMap = {
                'hospital': { icon: 'fa-hospital', color: '#e74c3c', label: 'مستشفى' },
                'school': { icon: 'fa-graduation-cap', color: '#3498db', label: 'مدرسة' },
                'mosque': { icon: 'fa-mosque', color: '#2ecc71', label: 'مسجد' },
                'pharmacy': { icon: 'fa-prescription-bottle', color: '#f39c12', label: 'صيدلية' },
                'bank': { icon: 'fa-university', color: '#9b59b6', label: 'بنك' }
            };

            dummyServices.forEach(s => {
                const icon = L.divIcon({
                    className: 'service-icon',
                    html: `<i class="fas ${iconMap[s.type].icon}" style="color:white;font-size:16px;"></i>`,
                    iconSize: [30, 30],
                    iconAnchor: [15, 30]
                });

                const marker = L.marker([s.lat, s.lng], { icon })
                    .bindPopup(`
                        <div class="service-popup">
                            <h3>${s.name}</h3>
                            <div class="info-row">
                                <span class="label">🏷️ النوع</span>
                                <span class="value">${iconMap[s.type].label}</span>
                            </div>
                            ${s.address ? `<div class="info-row"><span class="label">📍 العنوان</span><span class="value">${s.address}</span></div>` : ''}
                            <span class="badge ${s.type}">${iconMap[s.type].label}</span>
                        </div>
                    `, { maxWidth: 350 });

                servicesLayer.addLayer(marker);
            });
        }

        servicesBtn.addEventListener('click', function () {
            servicesActive = !servicesActive;
            if (servicesActive) {
                this.classList.add('active');
                this.innerHTML = '<i class="fas fa-hospital"></i> <span>إخفاء</span>';
                showServices();
            } else {
                this.classList.remove('active');
                this.innerHTML = '<i class="fas fa-hospital"></i> <span>خدمات</span>';
                servicesLayer.clearLayers();
            }
        });

        // ========================================================================
        // 9. 🤖 الذكاء الاصطناعي
        // ========================================================================
        aiBtn.addEventListener('click', function () {
            const center = map.getCenter();

            const geocoder = L.Control.Geocoder.nominatim({
                geocodingQueryParams: { 'accept-language': 'ar' }
            });

            geocoder.reverse(center, 13, function (results) {
                const placeName = results?.[0]?.name || 'هذا الموقع';

                const facts = [
                    `📍 ${placeName} هو معلم مهم في مصر.`,
                    `🏛️ ${placeName} يتميز بأهمية تاريخية وثقافية.`,
                    `🌍 ${placeName} يعد من الأماكن البارزة في المنطقة.`,
                    `✨ ${placeName} يستحق الزيارة والاستكشاف.`
                ];
                const info = facts[Math.floor(Math.random() * facts.length)];

                L.popup()
                    .setLatLng(center)
                    .setContent(`
                        <div style="text-align:right;direction:rtl;max-width:250px;">
                            <h4 style="color:#2980b9;">🤖 الذكاء الاصطناعي</h4>
                            <p>${info}</p>
                            <small style="color:#95a5a6;">📍 ${placeName}</small>
                        </div>
                    `)
                    .openOn(map);
            });
        });

        // ========================================================================
        // 10. ربط الأحداث
        // ========================================================================

        searchBtn.addEventListener('click', () => searchLocation(searchInput.value));
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchLocation(searchInput.value);
        });

        locateBtn.addEventListener('click', startTracking);
        navigateBtn.addEventListener('click', startNavigation);
        stopNavBtn.addEventListener('click', stopNavigation);

        homeBtn.addEventListener('click', () => {
            map.setView([30.0444, 31.2357], 13);
            if (isNavigating) stopNavigation();
        });

        let currentLayer = 'base';
        layersBtn.addEventListener('click', function () {
            if (currentLayer === 'base') {
                map.removeLayer(baseLayer);
                map.addLayer(satelliteLayer);
                currentLayer = 'satellite';
                this.innerHTML = '<i class="fas fa-map"></i> <span>خريطة</span>';
            } else {
                map.removeLayer(satelliteLayer);
                map.addLayer(baseLayer);
                currentLayer = 'base';
                this.innerHTML = '<i class="fas fa-layer-group"></i> <span>طبقات</span>';
            }
        });

        fullscreenBtn.addEventListener('click', function () {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                this.innerHTML = '<i class="fas fa-compress"></i> <span>تصغير</span>';
            } else {
                document.exitFullscreen();
                this.innerHTML = '<i class="fas fa-expand"></i> <span>كامل</span>';
            }
        });

        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('fullscreenBtn');
            if (!document.fullscreenElement) {
                btn.innerHTML = '<i class="fas fa-expand"></i> <span>كامل</span>';
            }
        });

        // ========================================================================
        // 11. بدء سريع
        // ========================================================================
        setTimeout(() => {
            searchInput.value = 'الجيزة';
            searchLocation('الجيزة');
        }, 500);

        console.log('✅ تم تحميل التطبيق بنجاح!');
        console.log('🚀 جميع الميزات تعمل:');
        console.log('  🔍 بحث دقيق');
        console.log('  🧭 مؤشر متحرك');
        console.log('  🗺️ مسار');
        console.log('  🚦 مرور');
        console.log('  🏥 خدمات');
        console.log('  🤖 ذكاء اصطناعي');
        console.log('  🧭 ملاحة');
    </script>

</body>

</html>
